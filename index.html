          <div>
            <div style={{color:"#475569",fontFamily:"'Orbitron',monospace",fontSize:7,letterSpacing:1,marginBottom:5}}>{isIncoming?"THEY GIVE":"YOU GIVE"}</div>
            <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{(isIncoming?o:o).length===0?<span style={{color:"#1E293B",fontSize:9}}>Nothing</span>:(isIncoming?o:o).map((c,i)=>{const rc=RARITY_CFG[c.rarity]||RARITY_CFG.Common;return<div key={i} style={{display:"flex",alignItems:"center",gap:4,background:rc.color+"12",border:`1px solid ${rc.color}44`,borderRadius:6,padding:"3px 6px"}}><img src={MINI(c.id)} style={{width:18,height:18,imageRendering:"pixelated"}} onError={e=>e.target.style.display="none"}/><span style={{color:rc.color,fontFamily:"'Orbitron',monospace",fontSize:7,fontWeight:700}}>{c.name}</span></div>;})}</div>
          </div>
          <div style={{textAlign:"center",color:"#334155",fontSize:16}}>⇄</div>
          <div>
            <div style={{color:"#475569",fontFamily:"'Orbitron',monospace",fontSize:7,letterSpacing:1,marginBottom:5}}>{isIncoming?"YOU GIVE":"THEY GIVE"}</div>
            <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{r.length===0?<span style={{color:"#1E293B",fontSize:9}}>Nothing</span>:r.map((c,i)=>{const rc=RARITY_CFG[c.rarity]||RARITY_CFG.Common;return<div key={i} style={{display:"flex",alignItems:"center",gap:4,background:rc.color+"12",border:`1px solid ${rc.color}44`,borderRadius:6,padding:"3px 6px"}}><img src={MINI(c.id)} style={{width:18,height:18,imageRendering:"pixelated"}} onError={e=>e.target.style.display="none"}/><span style={{color:rc.color,fontFamily:"'Orbitron',monospace",fontSize:7,fontWeight:700}}>{c.name}</span></div>;})}</div>
          </div>
        </div>
      </div>
    );
  };

  return(
    <div style={{animation:"fadeIn .3s ease"}}>
      <h1 style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:"clamp(18px,4vw,26px)",marginBottom:4}}>CARD <span style={{color:"#C084FC"}}>TRADING</span></h1>
      <p style={{color:"#334155",fontSize:11,marginBottom:16}}>Swap cards with other trainers · trades are instant on acceptance</p>
      <div style={{display:"flex",gap:4,marginBottom:18,background:"#080D1A",padding:3,borderRadius:9,width:"fit-content"}}>
        {[["incoming","📥 INCOMING",pendingTrades.length],["outgoing","📤 SENT",0],["new","➕ NEW",0]].map(([id,label,cnt])=>(
          <button key={id} onClick={()=>setTab(id)} style={{padding:"7px 14px",background:tab===id?"#1E3A5F":"transparent",border:"none",borderRadius:7,color:tab===id?"#60A5FA":"#475569",fontFamily:"'Orbitron',monospace",fontSize:8,fontWeight:700,cursor:"pointer",position:"relative",whiteSpace:"nowrap"}}>
            {label}{cnt>0&&<span style={{marginLeft:4,background:"#C084FC",color:"white",borderRadius:9,padding:"1px 5px",fontSize:7}}>{cnt}</span>}
          </button>
        ))}
      </div>

      {tab==="incoming"&&(
        pendingTrades.length===0
          ?<div style={{textAlign:"center",padding:"60px 0",color:"#1E293B",fontFamily:"'Orbitron',monospace",fontSize:11}}>No incoming offers</div>
          :pendingTrades.map(t=><OfferCard key={t.id} trade={t} isIncoming={true}/>)
      )}

      {tab==="outgoing"&&(
        outgoing.length===0
          ?<div style={{textAlign:"center",padding:"60px 0",color:"#1E293B",fontFamily:"'Orbitron',monospace",fontSize:11}}>No sent offers</div>
          :outgoing.map(t=><OfferCard key={t.id} trade={t} isIncoming={false}/>)
      )}

      {tab==="new"&&(
        <div>
          {/* Step 1: Find trainer */}
          <div style={{background:"#080D1A",border:"1px solid #1E293B",borderRadius:12,padding:16,marginBottom:14}}>
            <div style={{fontFamily:"'Orbitron',monospace",fontSize:8,color:"#475569",letterSpacing:2,marginBottom:8}}>STEP 1 — FIND TRAINER</div>
            <div style={{display:"flex",gap:8}}>
              <input value={search} onChange={e=>setSearch(e.target.value)} onKeyDown={e=>e.key==="Enter"&&searchPlayer()} placeholder="Exact username..." style={{flex:1,background:"#0F172A",border:"1px solid #1E293B",color:"#F1F5F9",borderRadius:8,padding:"10px 14px",fontFamily:"'Exo 2',sans-serif",fontSize:13,outline:"none"}}/>
              <button onClick={searchPlayer} disabled={searching} style={{padding:"10px 18px",background:searching?"#1A2035":"linear-gradient(135deg,#4c1d95,#7C3AED)",border:"none",borderRadius:8,color:searching?"#334155":"white",fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:9,cursor:searching?"not-allowed":"pointer"}}>{searching?"...":"FIND"}</button>
            </div>
            {target&&(
              <div style={{marginTop:10,display:"flex",alignItems:"center",gap:10,background:"#0F172A",borderRadius:8,padding:"8px 12px"}}>
                <img src={ITEM("poke-ball")} style={{width:24,height:24,imageRendering:"pixelated"}} onError={e=>e.target.style.display="none"}/>
                <span style={{fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:12,color:"#34D399"}}>{target.username}</span>
                <span style={{color:"#334155",fontSize:10}}>{target.collection.length} cards</span>
                <button onClick={()=>{setTarget(null);setMyOffer([]);setTheirRequest([]);setSearch("");}} style={{marginLeft:"auto",background:"none",border:"1px solid #1E293B",borderRadius:6,color:"#475569",padding:"3px 8px",cursor:"pointer",fontFamily:"'Orbitron',monospace",fontSize:7}}>✕</button>
              </div>
            )}
          </div>

          {target&&(<>
            {/* Step 2: Pick cards */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
              <div style={{background:"#080D1A",border:"1px solid #1E293B",borderRadius:12,padding:14}}>
                <div style={{fontFamily:"'Orbitron',monospace",fontSize:8,color:"#60A5FA",letterSpacing:2,marginBottom:8}}>YOUR OFFER <span style={{color:"#334155"}}>({myOffer.length} selected)</span></div>
                <div style={{display:"flex",flexDirection:"column",gap:4,maxHeight:280,overflowY:"auto"}}>
                  {mySorted.length===0?<div style={{color:"#1E293B",fontSize:10,padding:8}}>No cards</div>
                  :mySorted.map(c=><CardChip key={c.uid} c={c} selected={myOffer.includes(c.uid)} onClick={()=>setMyOffer(o=>o.includes(c.uid)?o.filter(x=>x!==c.uid):[...o,c.uid])}/>)}
                </div>
              </div>
              <div style={{background:"#080D1A",border:"1px solid #1E293B",borderRadius:12,padding:14}}>
                <div style={{fontFamily:"'Orbitron',monospace",fontSize:8,color:"#C084FC",letterSpacing:2,marginBottom:8}}>REQUEST FROM {target.username.toUpperCase()} <span style={{color:"#334155"}}>({theirRequest.length})</span></div>
                <div style={{display:"flex",flexDirection:"column",gap:4,maxHeight:280,overflowY:"auto"}}>
                  {target.collection.length===0?<div style={{color:"#1E293B",fontSize:10,padding:8}}>Empty collection</div>
                  :target.collection.map(c=><CardChip key={c.uid} c={c} selected={theirRequest.includes(c.uid)} onClick={()=>setTheirRequest(o=>o.includes(c.uid)?o.filter(x=>x!==c.uid):[...o,c.uid])}/>)}
                </div>
              </div>
            </div>

            {/* Step 3: Summary + send */}
            <div style={{background:"#080D1A",border:"1px solid #C084FC33",borderRadius:12,padding:14}}>
              <div style={{fontFamily:"'Orbitron',monospace",fontSize:8,color:"#475569",letterSpacing:2,marginBottom:10}}>STEP 3 — REVIEW & SEND</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 28px 1fr",gap:10,alignItems:"center",marginBottom:12}}>
                <div>
                  <div style={{color:"#60A5FA",fontSize:7,fontFamily:"'Orbitron',monospace",letterSpacing:1,marginBottom:5}}>YOU GIVE ({myOffer.length})</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:3}}>{myOffer.length===0?<span style={{color:"#1E293B",fontSize:9}}>Nothing</span>:collection.filter(c=>myOffer.includes(c.uid)).map(c=>{const rc=RARITY_CFG[c.rarity]||RARITY_CFG.Common;return<span key={c.uid} style={{color:rc.color,fontSize:8,background:rc.color+"15",borderRadius:4,padding:"2px 6px",fontFamily:"'Orbitron',monospace",fontWeight:700}}>{c.name}</span>})}</div>
                </div>
                <div style={{fontSize:16,color:"#334155",textAlign:"center"}}>⇄</div>
                <div>
                  <div style={{color:"#C084FC",fontSize:7,fontFamily:"'Orbitron',monospace",letterSpacing:1,marginBottom:5}}>YOU GET ({theirRequest.length})</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:3}}>{theirRequest.length===0?<span style={{color:"#1E293B",fontSize:9}}>Nothing</span>:target.collection.filter(c=>theirRequest.includes(c.uid)).map(c=>{const rc=RARITY_CFG[c.rarity]||RARITY_CFG.Common;return<span key={c.uid} style={{color:rc.color,fontSize:8,background:rc.color+"15",borderRadius:4,padding:"2px 6px",fontFamily:"'Orbitron',monospace",fontWeight:700}}>{c.name}</span>})}</div>
                </div>
              </div>
              <button onClick={sendOffer} disabled={sending||(myOffer.length===0&&theirRequest.length===0)} style={{width:"100%",padding:"11px",background:sending?"#1A2035":"linear-gradient(135deg,#4c1d95,#7C3AED)",border:"none",borderRadius:9,color:"white",fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:11,cursor:sending?"not-allowed":"pointer",letterSpacing:1,opacity:myOffer.length===0&&theirRequest.length===0?.4:1}}>
                {sending?"SENDING...":"📦 SEND OFFER"}
              </button>
            </div>
          </>)}
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════════ DUKE ADMIN PANEL */
function DukeAdminPanel({notify,player,loadCollection}){
  const [target,setTarget]=useState("");
  const [targetData,setTargetData]=useState(null);
  const [targetCol,setTargetCol]=useState([]);
  const [loading,setLoading]=useState(false);
  const [coins,setCoins]=useState("");
  const [cardSearch,setCardSearch]=useState("");
  const [bulkCount,setBulkCount]=useState("50");
  const [bulkRarity,setBulkRarity]=useState("Any");
  const [giving,setGiving]=useState(false);

  // Always operate on self (duke) — no need to lookup
  const selfId = player?.id;
  const selfName = player?.username;

  const lookup=async()=>{
    const n=target.trim();if(!n)return;
    setLoading(true);setTargetData(null);setTargetCol([]);
    const{data:p}=await sb.from("players").select("*").eq("username",n).maybeSingle();
    if(!p){notify("User not found","#EF4444");setLoading(false);return;}
    const{data:col}=await sb.from("collection").select("*").eq("player_id",p.id);
    setTargetData(p);setTargetCol(col||[]);setLoading(false);
  };

  const setCoinsAdmin=async()=>{
    const c=parseInt(coins);if(isNaN(c)||!targetData)return;
    await sb.from("players").update({coins:c}).eq("id",targetData.id);
    setTargetData(p=>({...p,coins:c}));notify(`Set ${targetData.username} coins to ${c}`,"#10B981");
  };

  const resetPlayer=async()=>{
    if(!targetData||!window.confirm(`Reset ${targetData.username}?`))return;
    await sb.from("collection").delete().eq("player_id",targetData.id);
    await sb.from("players").update({coins:1000,total_packs:0,total_cards:0,total_sold:0,won:false}).eq("id",targetData.id);
    setTargetData(p=>({...p,coins:1000}));setTargetCol([]);
    notify(`Reset ${targetData.username}`,"#F59E0B");
  };

  const deleteCard=async(uid,name)=>{
    await sb.from("collection").delete().eq("uid",uid);
    setTargetCol(c=>c.filter(x=>x.uid!==uid));
    notify(`Deleted ${name}`,"#EF4444");
  };

  const banPlayer=async()=>{
    if(!targetData||!window.confirm(`Delete account for ${targetData.username}?`))return;
    await sb.from("collection").delete().eq("player_id",targetData.id);
    await sb.from("players").delete().eq("id",targetData.id);
    setTargetData(null);setTargetCol([]);
    notify(`Deleted ${target}`,"#EF4444");
  };

  // Give a specific card (any card from ALL_CARDS pool) to self
  const giveCard=async(card)=>{
    if(!selfId||giving)return;
    setGiving(true);
    const row={player_id:selfId,card_id:card.id,card_name:card.name,rarity:card.rarity,buy_price:card.bp||10,obtained_at:new Date().toLocaleDateString(),uid:crypto.randomUUID()};
    const{error}=await sb.from("collection").insert(row);
    if(error){notify("Failed: "+error.message,"#EF4444");setGiving(false);return;}
    notify(`✅ Got ${card.name} (${card.rarity})`,"#10B981");
    if(loadCollection)loadCollection(selfId);
    setGiving(false);
  };

  // Bulk give random cards to self
  const bulkGive=async()=>{
    const count=Math.min(2000,Math.max(1,parseInt(bulkCount)||50));
    if(!selfId){notify("Log in first","#EF4444");return;}
    setGiving(true);
    notify(`Adding ${count} cards...`,"#7C3AED");
    const pool=bulkRarity==="Any"?CARDS:CARDS.filter(c=>c.rarity===bulkRarity);
    if(pool.length===0){notify("No cards in that rarity","#EF4444");setGiving(false);return;}
    const rows=Array.from({length:count},()=>{
      const card=pool[Math.floor(Math.random()*pool.length)];
      return{player_id:selfId,card_id:card.id,card_name:card.name,rarity:card.rarity,buy_price:card.bp||10,obtained_at:new Date().toLocaleDateString(),uid:crypto.randomUUID()};
    });
    // Insert in chunks of 200
    for(let i=0;i<rows.length;i+=200){
      await sb.from("collection").insert(rows.slice(i,i+200));
    }
    if(loadCollection)loadCollection(selfId);
    notify(`✅ Added ${count} cards to your collection!`,"#10B981");
    setGiving(false);
  };

  // Clear own collection
  const clearSelf=async()=>{
    if(!window.confirm("Clear YOUR entire collection?"))return;
    await sb.from("collection").delete().eq("player_id",selfId);
    if(loadCollection)loadCollection(selfId);
    notify("Collection cleared","#F59E0B");
  };

  const stageForVideo=async(card)=>{
    if(!selfId||giving)return;
    if(!window.confirm(`Stage for video:\n\n"${card.name}" (${card.rarity}) will be your guaranteed next pull.\n\nThis will fill your collection with ALL other cards first.\n\nReady?`))return;
    setGiving(true);
    notify("Staging collection...","#7C3AED");

    // Get current collection to avoid duplicates
    const{data:existing}=await sb.from("collection").select("card_id,rarity").eq("player_id",selfId);
    const ownedKeys=new Set((existing||[]).map(r=>r.card_id+"_"+r.rarity));

    // Build rows for every card except the target
    const allPool=[...CARDS,...(MEGA_CARDS||[]),...(RADIANT_CARDS||[]),...(CRYSTAL_CARDS||[]),...(RAINBOW_CARDS||[])];
    const rows=allPool
      .filter(c=>!(String(c.id)===String(card.id)&&c.rarity===card.rarity))
      .filter(c=>!ownedKeys.has(c.id+"_"+c.rarity))
      .map(c=>({player_id:selfId,card_id:c.id,card_name:c.name,rarity:c.rarity,buy_price:c.bp||10,obtained_at:new Date().toLocaleDateString(),uid:crypto.randomUUID()}));

    // Insert in chunks
    for(let i=0;i<rows.length;i+=200){
      await sb.from("collection").insert(rows.slice(i,i+200));
    }

    // Set the guaranteed pull in localStorage
    lsSet("guaranteedPull",JSON.stringify({id:card.id,rarity:card.rarity}));

    if(loadCollection)loadCollection(selfId);
    notify(`🎬 Staged! ${rows.length} cards added. Next pack pull = ${card.name}!`,"#FCD34D");
    setGiving(false);
  };

  const clearGuaranteed=()=>{
    lsSet("guaranteedPull","");
    notify("Guaranteed pull cleared","#475569");
  };
  const rarities=["Any","Common","Uncommon","Rare","Epic","Legendary","Ultra Rare","Secret","GOLDEN"];
  const allCardsPool=[...CARDS,...MEGA_CARDS,...(RADIANT_CARDS||[]),...(CRYSTAL_CARDS||[]),...(RAINBOW_CARDS||[])];
  const filteredCards=allCardsPool.filter(c=>
    !cardSearch||(c.name.toLowerCase().includes(cardSearch.toLowerCase())||c.type?.toLowerCase().includes(cardSearch.toLowerCase())||(c.rarity||"").toLowerCase().includes(cardSearch.toLowerCase()))
  ).slice(0,80);

  return(
    <div style={{marginTop:20,background:"#0a0010",border:"2px solid #7C3AED44",borderRadius:12,padding:20}}>
      <div style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:10,color:"#7C3AED",letterSpacing:3,marginBottom:16}}>👑 DUKE ADMIN PANEL</div>

      {/* ── GIVE SELF CARDS ── */}
      <div style={{background:"#0d001a",border:"1px solid #7C3AED33",borderRadius:10,padding:14,marginBottom:16}}>
        <div style={{fontFamily:"'Orbitron',monospace",fontSize:8,color:"#7C3AED",letterSpacing:2,marginBottom:10}}>🎴 GIVE YOURSELF CARDS</div>

        {/* Bulk add */}
        <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap",marginBottom:10}}>
          <input value={bulkCount} onChange={e=>setBulkCount(e.target.value)} placeholder="Count" style={{width:70,background:"#0F172A",border:"1px solid #334155",color:"#F1F5F9",borderRadius:7,padding:"7px 10px",fontSize:12,outline:"none"}}/>
          <select value={bulkRarity} onChange={e=>setBulkRarity(e.target.value)} style={{background:"#0F172A",border:"1px solid #334155",color:"#F1F5F9",borderRadius:7,padding:"7px 10px",fontSize:12,outline:"none"}}>
            {rarities.map(r=><option key={r} value={r}>{r}</option>)}
          </select>
          <button onClick={bulkGive} disabled={giving} style={{padding:"7px 18px",background:"linear-gradient(135deg,#4c1d95,#7C3AED)",border:"none",borderRadius:7,color:"white",fontFamily:"'Orbitron',monospace",fontSize:9,cursor:"pointer",fontWeight:700,opacity:giving?0.6:1}}>
            {giving?"ADDING...":"BULK ADD"}
          </button>
          <button onClick={clearSelf} style={{padding:"7px 14px",background:"linear-gradient(135deg,#7f1d1d,#EF4444)",border:"none",borderRadius:7,color:"white",fontFamily:"'Orbitron',monospace",fontSize:8,cursor:"pointer",fontWeight:700}}>CLEAR MINE</button>
        </div>

        {/* Stage for video */}
        <div style={{background:"#1a0a00",border:"1px solid #FCD34D44",borderRadius:8,padding:12,marginBottom:10}}>
          <div style={{fontFamily:"'Orbitron',monospace",fontSize:8,color:"#FCD34D",letterSpacing:2,marginBottom:6}}>🎬 STAGE FOR VIDEO</div>
          <div style={{color:"#94A3B8",fontSize:11,marginBottom:8}}>Search a card below → click <b style={{color:"#FCD34D"}}>🎬 STAGE</b> to fill every other card into your collection and guarantee that card as your next pull.</div>
          {lsGet("guaranteedPull")&&<div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{color:"#FCD34D",fontSize:11}}>⚡ Guaranteed pull is SET — open any pack for the video!</span>
            <button onClick={clearGuaranteed} style={{padding:"3px 10px",background:"#7f1d1d",border:"none",borderRadius:5,color:"white",fontSize:9,cursor:"pointer",fontFamily:"'Orbitron',monospace"}}>CLEAR</button>
          </div>}
        </div>

        {/* Search and give specific card */}
        <input value={cardSearch} onChange={e=>setCardSearch(e.target.value)} placeholder="Search any card by name, type, or rarity..." style={{width:"100%",boxSizing:"border-box",background:"#0F172A",border:"1px solid #334155",color:"#F1F5F9",borderRadius:7,padding:"8px 12px",fontSize:12,outline:"none",marginBottom:8}}/>
        {cardSearch&&(
          <div style={{display:"flex",flexWrap:"wrap",gap:6,maxHeight:260,overflowY:"auto",padding:4}}>
            {filteredCards.map(card=>{
              const rc=RARITY_CFG[card.rarity]||RARITY_CFG.Common;
              return(
                <button key={card.id+card.rarity} disabled={giving}
                  style={{background:`${rc.color}12`,border:`1px solid ${rc.color}44`,borderRadius:8,padding:"6px 10px",cursor:"pointer",display:"flex",alignItems:"center",gap:7,opacity:giving?0.6:1,transition:"background .15s"}}
                  onMouseEnter={e=>e.currentTarget.style.background=rc.color+"28"}
                  onMouseLeave={e=>e.currentTarget.style.background=rc.color+"12"}>
                  <img src={`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${card.id}.png`} style={{width:28,height:28,imageRendering:"pixelated"}} onError={e=>e.target.style.display="none"} alt=""/>
                  <div style={{textAlign:"left"}}>
                    <div style={{color:rc.color,fontFamily:"'Orbitron',monospace",fontSize:8,fontWeight:700}}>{card.name}</div>
                    <div style={{color:"#475569",fontSize:8}}>{card.rarity} · {card.type}</div>
                  </div>
                  <div style={{display:"flex",flexDirection:"column",gap:3,marginLeft:4}}>
                    <button onClick={e=>{e.stopPropagation();giveCard(card);}} disabled={giving} style={{padding:"2px 7px",background:"#065F46",border:"none",borderRadius:4,color:"white",fontSize:8,cursor:"pointer",fontFamily:"'Orbitron',monospace",fontWeight:700}}>+1</button>
                    <button onClick={e=>{e.stopPropagation();stageForVideo(card);}} disabled={giving} style={{padding:"2px 7px",background:"#78350F",border:"none",borderRadius:4,color:"#FCD34D",fontSize:8,cursor:"pointer",fontFamily:"'Orbitron',monospace",fontWeight:700}}>🎬</button>
                  </div>
                </button>
              );
            })}
            {filteredCards.length===0&&<div style={{color:"#334155",fontSize:11,padding:8}}>No cards found</div>}
          </div>
        )}
      </div>

      {/* ── MANAGE OTHER USERS ── */}
      <div style={{background:"#0d001a",border:"1px solid #7C3AED33",borderRadius:10,padding:14}}>
        <div style={{fontFamily:"'Orbitron',monospace",fontSize:8,color:"#7C3AED",letterSpacing:2,marginBottom:10}}>👤 MANAGE OTHER USERS</div>
        <div style={{display:"flex",gap:8,marginBottom:14}}>
          <input value={target} onChange={e=>setTarget(e.target.value)} onKeyDown={e=>e.key==="Enter"&&lookup()} placeholder="Username to manage..." style={{flex:1,background:"#0F172A",border:"1px solid #334155",color:"#F1F5F9",borderRadius:7,padding:"9px 12px",fontFamily:"'Exo 2',sans-serif",fontSize:13,outline:"none"}}/>
          <button onClick={lookup} disabled={loading} style={{padding:"9px 16px",background:"linear-gradient(135deg,#4c1d95,#7C3AED)",border:"none",borderRadius:7,color:"white",fontFamily:"'Orbitron',monospace",fontSize:9,cursor:"pointer",fontWeight:700}}>{loading?"...":"LOOKUP"}</button>
        </div>
        {targetData&&<div>
          <div style={{background:"#0F172A",borderRadius:9,padding:12,marginBottom:12}}>
            <div style={{color:"#F1F5F9",fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:13,marginBottom:4}}>{targetData.username}</div>
            <div style={{color:"#475569",fontSize:11}}>Coins: {targetData.coins} · Cards: {targetCol.length}</div>
          </div>
          <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
            <input value={coins} onChange={e=>setCoins(e.target.value)} placeholder="Set coins..." style={{background:"#0F172A",border:"1px solid #334155",color:"#F1F5F9",borderRadius:7,padding:"7px 10px",fontSize:12,outline:"none",width:120}}/>
            <button onClick={setCoinsAdmin} style={{padding:"7px 14px",background:"linear-gradient(135deg,#065F46,#10B981)",border:"none",borderRadius:7,color:"white",fontFamily:"'Orbitron',monospace",fontSize:8,cursor:"pointer",fontWeight:700}}>SET COINS</button>
            <button onClick={async()=>{const f=!targetData.flagged;await sb.from("players").update({flagged:f}).eq("id",targetData.id);setTargetData(p=>({...p,flagged:f}));notify(`${targetData.username} ${f?"BANNED":"UNBANNED"}`,f?"#EF4444":"#10B981");}} style={{padding:"7px 14px",background:targetData.flagged?"linear-gradient(135deg,#065F46,#10B981)":"linear-gradient(135deg,#7f1d1d,#EF4444)",border:"none",borderRadius:7,color:"white",fontFamily:"'Orbitron',monospace",fontSize:8,cursor:"pointer",fontWeight:700}}>{targetData.flagged?"UNBAN":"BAN"}</button>
            <button onClick={resetPlayer} style={{padding:"7px 14px",background:"linear-gradient(135deg,#78350F,#F59E0B)",border:"none",borderRadius:7,color:"white",fontFamily:"'Orbitron',monospace",fontSize:8,cursor:"pointer",fontWeight:700}}>RESET</button>
            <button onClick={banPlayer} style={{padding:"7px 14px",background:"linear-gradient(135deg,#7f1d1d,#DC2626)",border:"none",borderRadius:7,color:"white",fontFamily:"'Orbitron',monospace",fontSize:8,cursor:"pointer",fontWeight:700}}>DELETE</button>
          </div>
          {targetCol.length>0&&<div>
            <div style={{color:"#475569",fontFamily:"'Orbitron',monospace",fontSize:8,letterSpacing:2,marginBottom:8}}>COLLECTION ({targetCol.length}) — click to delete</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6,maxHeight:160,overflowY:"auto"}}>
              {targetCol.map(row=>(
                <button key={row.uid} onClick={()=>deleteCard(row.uid,row.card_name)}
                  style={{background:"#1E293B",border:"1px solid #DC262633",borderRadius:6,padding:"4px 8px",color:"#94A3B8",cursor:"pointer",fontSize:10,fontFamily:"'Exo 2',sans-serif"}}
                  onMouseEnter={e=>{e.currentTarget.style.background="#2d0000";e.currentTarget.style.color="#EF4444";}}
                  onMouseLeave={e=>{e.currentTarget.style.background="#1E293B";e.currentTarget.style.color="#94A3B8";}}>
                  {row.card_name||row.card_id}
                </button>
              ))}
            </div>
          </div>}
        </div>}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════ TRAINER SEARCH */
function TrainerSearch(){
  const [query,setQuery]=useState("");
  const [results,setResults]=useState([]);
  const [loading,setLoading]=useState(false);
  const [viewed,setViewed]=useState(null);
  const [showAll,setShowAll]=useState(false);

  const doSearch=async()=>{
    const q=query.trim();
    if(!q)return;
    setLoading(true);setResults([]);setViewed(null);setShowAll(false);
    const{data}=await sb.from("players").select("id,username,coins,total_packs,total_cards,total_sold,won,join_date").ilike("username",`%${q}%`).limit(15);
    setResults(data||[]);setLoading(false);
  };

  const openTrainer=async(p)=>{
    setViewed(null);setLoading(true);setShowAll(false);
    const{data:col}=await sb.from("collection").select("*").eq("player_id",p.id);
    const collection=(col||[]).map(row=>{
      const base=ALL_CARDS.find(c=>String(c.id)===String(row.card_id));
      if(!base)return null;
      return{...base,uid:row.uid||row.id,obtainedAt:row.obtained_at,buyPrice:row.buy_price,rarity:row.rarity||base.rarity};
    }).filter(Boolean);
    setViewed({player:p,collection});setLoading(false);
  };

  if(viewed){
    const{player:vp,collection:vc}=viewed;
    const rarOrd=["GOLDEN","Mega","Secret","Ultra Rare","Legendary","Epic","Rare","Uncommon","Common"];
    const rStats={};vc.forEach(c=>{rStats[c.rarity]=(rStats[c.rarity]||0)+1;});
    const totalVal=vc.reduce((s,c)=>s+(c.bp||0),0);
    const prizes=vc.filter(c=>["GOLDEN","Mega","Secret","Ultra Rare","Legendary"].includes(c.rarity));
    return(
      <div style={{animation:"fadeIn .3s ease"}}>
        <button onClick={()=>setViewed(null)} style={{background:"none",border:"1px solid #1E293B",borderRadius:7,color:"#60A5FA",padding:"6px 14px",cursor:"pointer",fontFamily:"'Orbitron',monospace",fontSize:9,marginBottom:18,letterSpacing:1}}>← BACK</button>
        <div style={{background:"linear-gradient(135deg,#0F172A,#1A2744)",border:"1px solid #1E3A5F",borderRadius:16,padding:22,display:"flex",gap:18,alignItems:"center",marginBottom:16,flexWrap:"wrap"}}>
          <div style={{width:64,height:64,borderRadius:"50%",background:"linear-gradient(135deg,#1E3A5F,#2563EB)",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 0 24px #2563EB44",flexShrink:0}}>
            <img src={ITEM("poke-ball")} alt="" style={{width:36,height:36,imageRendering:"pixelated"}} onError={e=>e.target.style.display="none"}/>
          </div>
          <div style={{flex:1}}>
            <div style={{display:"flex",gap:8,alignItems:"center"}}><span style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:20}}>{vp.username}</span>{vp.won&&<span style={{fontSize:18}}>🏆</span>}</div>
            <div style={{color:"#334155",fontSize:10,marginTop:3}}>Trainer since {vp.join_date||"?"}</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:22,color:"#FCD34D"}}>🪙{(vp.coins||0).toLocaleString()}</div>
            <div style={{color:"#334155",fontSize:9,marginTop:2}}>Portfolio: {totalVal.toLocaleString()}🪙</div>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(120px,1fr))",gap:10,marginBottom:16}}>
          {[{l:"Packs",v:vp.total_packs||0,c:"#60A5FA"},{l:"Cards Pulled",v:vp.total_cards||0,c:"#34D399"},{l:"In Collection",v:vc.length,c:"#C084FC"},{l:"Cards Sold",v:vp.total_sold||0,c:"#FCD34D"}].map(s=>(
            <div key={s.l} style={{background:"#080D1A",border:`1px solid ${s.c}18`,borderRadius:12,padding:14,textAlign:"center"}}>
              <div style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:20,color:s.c}}>{s.v}</div>
              <div style={{color:"#1E293B",fontSize:8,marginTop:2,letterSpacing:.5}}>{s.l.toUpperCase()}</div>
            </div>
          ))}
        </div>
        {prizes.length>0&&(
          <div style={{background:"#080D1A",border:"1px solid #FCD34D18",borderRadius:12,padding:18,marginBottom:16}}>
            <div style={{fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:8,color:"#475569",letterSpacing:3,marginBottom:12}}>🏆 PRIZE SHELF</div>
            <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
              {prizes.map(card=><PokemonCard key={card.uid} card={card} currentPrice={card.bp}/>)}
            </div>
          </div>
        )}
        <div style={{background:"#080D1A",border:"1px solid #0A0F1E",borderRadius:12,padding:18,marginBottom:16}}>
          <div style={{fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:8,color:"#475569",letterSpacing:3,marginBottom:12}}>COLLECTION BREAKDOWN</div>
          {Object.entries(RARITY_CFG).map(([rarity,cfg])=>{const count=rStats[rarity]||0;if(!count)return null;const pct=vc.length>0?(count/vc.length)*100:0;return(<div key={rarity} style={{marginBottom:8}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span style={{color:cfg.color,fontFamily:"'Orbitron',monospace",fontSize:8,fontWeight:700}}>{rarity.toUpperCase()}</span><span style={{color:"#334155",fontSize:8}}>{count}</span></div><div style={{background:"#0F172A",borderRadius:3,height:4,overflow:"hidden"}}><div style={{background:`linear-gradient(90deg,${cfg.color}77,${cfg.color})`,borderRadius:3,height:4,width:pct+"%"}}/></div></div>);})}
        </div>
        {vc.length>0&&(
          <div style={{background:"#080D1A",border:"1px solid #0A0F1E",borderRadius:12,padding:18}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <div style={{fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:8,color:"#475569",letterSpacing:3}}>FULL COLLECTION ({vc.length} cards)</div>
              {vc.length>30&&<button onClick={()=>setShowAll(s=>!s)} style={{background:"none",border:"1px solid #1E293B",borderRadius:6,color:"#60A5FA",padding:"4px 10px",cursor:"pointer",fontFamily:"'Orbitron',monospace",fontSize:7}}>{showAll?"SHOW LESS":"SHOW ALL"}</button>}
            </div>
            <div style={{display:"flex",flexWrap:"wrap",gap:10}}>
              {[...vc].sort((a,b)=>rarOrd.indexOf(a.rarity)-rarOrd.indexOf(b.rarity)).slice(0,showAll?9999:30).map(card=><PokemonCard key={card.uid} card={card} currentPrice={card.bp}/>)}
            </div>
            {!showAll&&vc.length>30&&<div style={{color:"#334155",fontFamily:"'Orbitron',monospace",fontSize:9,textAlign:"center",marginTop:12}}>+{vc.length-30} more cards — click SHOW ALL</div>}
          </div>
        )}
      </div>
    );
  }

  return(
    <div style={{animation:"fadeIn .35s ease"}}>
      <h1 style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:"clamp(20px,4vw,28px)",marginBottom:6}}>TRAINER <span style={{color:"#60A5FA"}}>SEARCH</span></h1>
      <p style={{color:"#334155",fontSize:12,marginBottom:20}}>Look up any trainer and browse their collection</p>
      <div style={{display:"flex",gap:10,marginBottom:20}}>
        <input value={query} onChange={e=>setQuery(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doSearch()} placeholder="Search by trainer name..." style={{flex:1,background:"#0F172A",border:"1px solid #1E293B",color:"#F1F5F9",borderRadius:9,padding:"12px 16px",fontFamily:"'Exo 2',sans-serif",fontSize:14,outline:"none"}} autoFocus/>
        <button onClick={doSearch} disabled={loading||!query.trim()} style={{padding:"12px 22px",background:loading||!query.trim()?"#1A2035":"linear-gradient(135deg,#1e3a6e,#2563EB)",border:"none",borderRadius:9,color:loading||!query.trim()?"#334155":"white",fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:10,cursor:loading||!query.trim()?"not-allowed":"pointer",letterSpacing:1}}>{loading?"...":"SEARCH"}</button>
      </div>
      {results.length>0&&(
        <div style={{background:"#080D1A",border:"1px solid #0A0F1E",borderRadius:14,overflow:"hidden"}}>
          {results.map((r,i)=>(
            <div key={r.id} onClick={()=>openTrainer(r)} style={{display:"flex",alignItems:"center",gap:14,padding:"14px 18px",borderBottom:i<results.length-1?"1px solid #050a14":"none",cursor:"pointer",transition:"background .15s"}}
              onMouseEnter={e=>e.currentTarget.style.background="rgba(255,255,255,.03)"}
              onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
              <div style={{width:40,height:40,borderRadius:"50%",background:"linear-gradient(135deg,#1E3A5F,#2563EB)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                <img src={ITEM("poke-ball")} alt="" style={{width:22,height:22,imageRendering:"pixelated"}} onError={e=>e.target.style.display="none"}/>
              </div>
              <div style={{flex:1}}>
                <div style={{display:"flex",gap:7,alignItems:"center"}}><span style={{fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:13}}>{r.username}</span></div>
                <div style={{color:"#334155",fontSize:10,marginTop:2}}>{r.total_packs||0} packs · {r.total_cards||0} cards pulled</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:13,color:"#FCD34D"}}>{(r.coins||0).toLocaleString()}🪙</div>
                <div style={{color:"#475569",fontSize:9,marginTop:2}}>VIEW →</div>
              </div>
            </div>
          ))}
        </div>
      )}
      {!loading&&results.length===0&&query&&<div style={{textAlign:"center",padding:"50px 0",color:"#1E293B",fontFamily:"'Orbitron',monospace",fontSize:11}}>No trainers found for "{query}"</div>}
    </div>
  );
}

/* ══════════════════════════════════════════════════ CARD INDEX */
function CardIndex({collection}){
  const [filter,setFilter]=useState("All");
  const [search,setSearch]=useState("");
  const ownedIds=new Set(collection.map(c=>String(c.id)));
  const allWithGolden=[...ALL_CARDS];
  const totalUnique=new Set(allWithGolden.map(c=>String(c.id))).size;
  const ownedUnique=new Set([...ownedIds].filter(id=>allWithGolden.some(c=>String(c.id)===id))).size;
  const pct=Math.round(ownedUnique/totalUnique*100);

  const rarities=["All",...Object.keys(RARITY_CFG)];
  const filtered=allWithGolden
    .filter(c=>filter==="All"||c.rarity===filter)
    .filter(c=>!search||c.name.toLowerCase().includes(search.toLowerCase()))
    .sort((a,b)=>{
      const ro=["GOLDEN","Mega","Secret","Ultra Rare","Legendary","Epic","Rare","Uncommon","Common"];
      return ro.indexOf(a.rarity)-ro.indexOf(b.rarity);
    });

  return(
    <div style={{animation:"fadeIn .3s ease"}}>
      <h1 style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:"clamp(18px,4vw,26px)",marginBottom:4}}>CARD <span style={{color:"#34D399"}}>INDEX</span></h1>
      <p style={{color:"#334155",fontSize:11,marginBottom:16}}>{totalUnique} total cards · find them all</p>

      {/* Progress bar */}
      <div style={{background:"#080D1A",border:"1px solid #34D39922",borderRadius:14,padding:18,marginBottom:18}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:8}}>
          <span style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:14,color:"#34D399"}}>{ownedUnique} <span style={{fontSize:10,color:"#475569"}}>/ {totalUnique} discovered</span></span>
          <span style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:22,color:pct===100?"#FFD700":pct>50?"#34D399":"#60A5FA"}}>{pct}%</span>
        </div>
        <div style={{background:"#0F172A",borderRadius:8,height:12,overflow:"hidden"}}>
          <div style={{background:`linear-gradient(90deg,#10B98188,#34D399)`,height:"100%",width:pct+"%",borderRadius:8,transition:"width 1s ease",boxShadow:"0 0 12px #34D39955"}}/>
        </div>
        <div style={{display:"flex",gap:8,marginTop:10,flexWrap:"wrap"}}>
          {Object.entries(RARITY_CFG).map(([rarity,cfg])=>{
            const total=allWithGolden.filter(c=>c.rarity===rarity).length;
            const owned=allWithGolden.filter(c=>c.rarity===rarity&&ownedIds.has(String(c.id))).length;
            if(!total)return null;
            return(
              <div key={rarity} style={{background:cfg.color+"12",border:`1px solid ${cfg.color}33`,borderRadius:6,padding:"3px 8px",display:"flex",gap:5,alignItems:"center"}}>
                <span style={{color:cfg.color,fontFamily:"'Orbitron',monospace",fontSize:7,fontWeight:700}}>{rarity}</span>
                <span style={{color:"#334155",fontSize:8}}>{owned}/{total}</span>
              </div>
            );
          })}
        </div>
      </div>

      {/* Filters */}
      <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search cards..." style={{background:"#080D1A",border:"1px solid #1E293B",color:"#F1F5F9",borderRadius:8,padding:"7px 12px",fontFamily:"'Exo 2',sans-serif",fontSize:12,outline:"none",width:160}}/>
        <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
          {rarities.map(r=>{const rc=r!=="All"?RARITY_CFG[r]:null;const active=filter===r;return(
            <button key={r} onClick={()=>setFilter(r)} style={{padding:"4px 9px",borderRadius:16,border:`1px solid ${active?(rc?.color||"#64748B"):"#1E293B"}`,background:active?(rc?rc.color+"18":"#334155"):"transparent",color:active?(rc?.color||"#F1F5F9"):"#334155",fontFamily:"'Orbitron',monospace",fontSize:7,fontWeight:700,cursor:"pointer"}}>{r}</button>
          );})}
        </div>
      </div>

      {/* Card grid */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(90px,1fr))",gap:8}}>
        {filtered.map(card=>{
          const rc=RARITY_CFG[card.rarity]||RARITY_CFG.Common;
          const isOwned=ownedIds.has(String(card.id));
          const ownedCount=collection.filter(c=>String(c.id)===String(card.id)).length;
          return(
            <div key={card.id} style={{background:isOwned?`${rc.color}10`:"#050a14",border:`1px solid ${isOwned?rc.color+"44":"#0A0F1E"}`,borderRadius:10,padding:"8px 6px",textAlign:"center",position:"relative",opacity:isOwned?1:0.45,transition:"all .2s"}}
              title={card.name}>
              {isOwned&&ownedCount>1&&<div style={{position:"absolute",top:3,right:4,background:rc.color,color:"white",borderRadius:"50%",width:14,height:14,fontSize:7,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontFamily:"'Orbitron',monospace"}}>×{ownedCount}</div>}
              <img src={isOwned?ART(card.id):MINI(card.id)} alt={card.name}
                style={{width:isOwned?56:40,height:isOwned?56:40,objectFit:"contain",imageRendering:"pixelated",filter:isOwned?"none":"grayscale(1) brightness(0.3)"}}
                onError={e=>{e.target.src=MINI(card.id);e.target.style.imageRendering="pixelated";}}/>
              <div style={{color:isOwned?rc.color:"#1E293B",fontFamily:"'Orbitron',monospace",fontSize:6,fontWeight:700,marginTop:3,lineHeight:1.3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{isOwned?card.name:"???"}</div>
              {isOwned&&<div style={{color:"#334155",fontSize:6,marginTop:1}}>{card.rarity}</div>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

  {id:"dex_all",      cat:"special",    name:"Living Dex",         desc:"Discover ALL regular cards",                   icon:"🌈", reward:20000,check:(_,col)=>{const own=new Set(col.map(c=>String(c.id)));return ALL_CARDS.every(c=>own.has(String(c.id)));} },

function AchievementsPage({player,collection,notify,setDbPlayer}){
  const [claimed,setClaimed]=useState(()=>{
    try{return JSON.parse(lsGet(`ach_${player.id}`)||"[]");}catch{return[];}
  });
  const [claiming,setClaiming]=useState(null);

  const cats=["all","collection","rarity","economy","battle","special"];
  const [catFilter,setCatFilter]=useState("all");

  const claimAch=async(ach)=>{
    if(claiming)return;
    setClaiming(ach.id);
    const newCoins=player.coins+ach.reward;
    await sb.from("players").update({coins:newCoins}).eq("id",player.id);
    setDbPlayer(p=>({...p,coins:newCoins}));
    const newClaimed=[...claimed,ach.id];
    setClaimed(newClaimed);
    lsSet(`ach_${player.id}`,JSON.stringify(newClaimed));
    notify(`🏆 ${ach.name} · +${ach.reward}🪙`,"#FCD34D");
    setClaiming(null);
  };

  const completed=ACHIEVEMENTS.filter(a=>a.check(player,collection));
  const claimable=completed.filter(a=>!claimed.includes(a.id));
  const filtered=ACHIEVEMENTS.filter(a=>catFilter==="all"||a.cat===catFilter);
  const totalReward=ACHIEVEMENTS.reduce((s,a)=>s+a.reward,0);
  const claimedReward=ACHIEVEMENTS.filter(a=>claimed.includes(a.id)).reduce((s,a)=>s+a.reward,0);

  return(
    <div style={{animation:"fadeIn .3s ease"}}>
      <h1 style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:"clamp(18px,4vw,26px)",marginBottom:4}}>
        ACHIEVEMENTS <span style={{color:"#FCD34D"}}>{claimable.length>0&&`(${claimable.length} ready!)`}</span>
      </h1>
      <p style={{color:"#334155",fontSize:11,marginBottom:16}}>Complete goals to earn bonus coins · {claimed.length}/{ACHIEVEMENTS.length} done</p>

      {/* Progress */}
      <div style={{background:"#080D1A",border:"1px solid #FCD34D22",borderRadius:14,padding:16,marginBottom:16}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
          <span style={{fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:12,color:"#FCD34D"}}>{claimed.length} / {ACHIEVEMENTS.length}</span>
          <span style={{fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:11,color:"#10B981"}}>{claimedReward.toLocaleString()} / {totalReward.toLocaleString()}🪙 earned</span>
        </div>
        <div style={{background:"#0F172A",borderRadius:6,height:8,overflow:"hidden"}}>
          <div style={{background:"linear-gradient(90deg,#92400e,#FCD34D)",height:"100%",width:(claimed.length/ACHIEVEMENTS.length*100)+"%",borderRadius:6,transition:"width .8s ease"}}/>
        </div>
      </div>

      {/* Claim all button */}
      {claimable.length>0&&(
        <button onClick={async()=>{for(const a of claimable)await claimAch(a);}} style={{width:"100%",padding:"11px",background:"linear-gradient(135deg,#78350F,#F59E0B)",border:"none",borderRadius:10,color:"white",fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:11,cursor:"pointer",letterSpacing:1,marginBottom:14}}>
          🎁 CLAIM ALL ({claimable.reduce((s,a)=>s+a.reward,0).toLocaleString()}🪙)
        </button>
      )}

      {/* Category filter */}
      <div style={{display:"flex",gap:5,marginBottom:14,flexWrap:"wrap"}}>
        {cats.map(c=>{
          const colors={all:"#60A5FA",collection:"#34D399",rarity:"#C084FC",economy:"#FCD34D",battle:"#EF4444",special:"#FF4500"};
          const col=colors[c]||"#60A5FA";
          const active=catFilter===c;
          return<button key={c} onClick={()=>setCatFilter(c)} style={{padding:"5px 12px",borderRadius:16,border:`1px solid ${active?col:col+"33"}`,background:active?col+"18":"transparent",color:active?col:"#334155",fontFamily:"'Orbitron',monospace",fontSize:7,fontWeight:700,cursor:"pointer",textTransform:"uppercase"}}>{c}</button>;
        })}
      </div>

      {/* Achievement list */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:10}}>
        {filtered.map(ach=>{
          const done=completed.some(a=>a.id===ach.id);
          const isClaimed=claimed.includes(ach.id);
          const readyToClaim=done&&!isClaimed;
          const colors={collection:"#34D399",rarity:"#C084FC",economy:"#FCD34D",battle:"#EF4444",special:"#FF4500"};
          const catColor=colors[ach.cat]||"#60A5FA";
          return(
            <div key={ach.id} style={{background:readyToClaim?"linear-gradient(135deg,#1a1200,#2a1e00)":isClaimed?"#05080f":"#080D1A",border:`1px solid ${readyToClaim?"#FCD34D44":isClaimed?"#1E293B":"#0A0F1E"}`,borderRadius:12,padding:14,display:"flex",gap:12,alignItems:"center",transition:"all .2s",opacity:isClaimed?0.6:1}}>
              <div style={{fontSize:28,flexShrink:0,filter:!done&&!isClaimed?"grayscale(1) opacity(0.3)":"none"}}>{ach.icon}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:10,color:isClaimed?"#475569":readyToClaim?"#FCD34D":"#94A3B8",marginBottom:2}}>{ach.name}</div>
                <div style={{color:"#334155",fontSize:9,marginBottom:4}}>{ach.desc}</div>
                <div style={{display:"flex",gap:6,alignItems:"center"}}>
                  <span style={{color:catColor,fontSize:7,fontFamily:"'Orbitron',monospace",fontWeight:700,background:catColor+"15",borderRadius:4,padding:"1px 5px"}}>{ach.cat.toUpperCase()}</span>
                  <span style={{color:"#FCD34D",fontFamily:"'Share Tech Mono',monospace",fontSize:9,fontWeight:700}}>+{ach.reward}🪙</span>
                </div>
              </div>
              <div style={{flexShrink:0}}>
                {isClaimed?<span style={{color:"#334155",fontSize:14}}>✓</span>
                :readyToClaim?<button onClick={()=>claimAch(ach)} disabled={!!claiming} style={{padding:"6px 12px",background:"linear-gradient(135deg,#78350F,#F59E0B)",border:"none",borderRadius:7,color:"white",fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:8,cursor:"pointer",whiteSpace:"nowrap"}}>CLAIM</button>
                :<span style={{color:"#1E293B",fontSize:12}}>🔒</span>}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function CrateCard({crate,player,buyPack}){
  const [qty,setQty]=useState(1);
  const totalCost=crate.price*qty;
  const canAfford=player.coins>=totalCost;
  const maxQty=Math.min(50,Math.floor(player.coins/crate.price)||0);
  return(
    <div className="crate-card" style={{background:"linear-gradient(160deg,#0F172A,#1A2035)",border:`1px solid ${crate.color}33`,borderRadius:18,padding:"22px 20px",boxShadow:`0 4px 28px ${crate.color}14`}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"center",marginBottom:12}}>
        <img src={ITEM(crate.ball)} alt={crate.name} style={{width:60,height:60,objectFit:"contain",imageRendering:"pixelated",filter:`drop-shadow(0 0 14px ${crate.color}99)`}} onError={e=>e.target.style.display="none"}/>
      </div>
      <div style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:15,textAlign:"center",color:"#F1F5F9"}}>{crate.name}</div>
      <div style={{color:"#334155",textAlign:"center",fontSize:10,marginTop:3,marginBottom:10}}>{crate.desc}</div>
      {crate.luck>1&&<div style={{background:"rgba(255,255,255,.04)",border:`1px solid ${crate.color}44`,borderRadius:6,padding:"4px 10px",marginBottom:8,textAlign:"center"}}><span style={{color:crate.color,fontFamily:"'Orbitron',monospace",fontSize:7,fontWeight:700,letterSpacing:1}}>🍀 {crate.luck}× LUCK</span></div>}
      {crate.surgeType&&<div style={{background:"rgba(255,255,255,.03)",border:`1px solid ${crate.color}33`,borderRadius:6,padding:"3px 10px",marginBottom:8,textAlign:"center"}}><span style={{color:crate.color,fontFamily:"'Orbitron',monospace",fontSize:7,fontWeight:700,letterSpacing:1}}>⚡ {crate.surgeType.toUpperCase()} SURGE BUILT-IN</span></div>}
      <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6,marginBottom:10}}>
        {[1,5,10,25].map(n=>(
          <button key={n} onClick={()=>setQty(n)} style={{padding:"4px 9px",background:qty===n?crate.grad:"#1A2035",border:`1px solid ${qty===n?crate.color:"#1E293B"}`,borderRadius:6,color:qty===n?"white":"#475569",fontFamily:"'Orbitron',monospace",fontSize:8,cursor:"pointer",fontWeight:700}}>×{n}</button>
        ))}
        <input type="number" min={1} max={maxQty||1} value={qty} onChange={e=>setQty(Math.max(1,Math.min(maxQty||1,parseInt(e.target.value)||1)))}
          style={{width:44,background:"#0F172A",border:"1px solid #334155",color:"#F1F5F9",borderRadius:6,padding:"4px 6px",fontFamily:"'Orbitron',monospace",fontSize:9,textAlign:"center",outline:"none"}}/>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:4}}>
        <div>
          <span style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:17,color:crate.color}}>{totalCost}🪙</span>
          {qty>1&&<div style={{color:"#334155",fontSize:8,marginTop:1}}>{crate.price}🪙 each</div>}
        </div>
        <button onClick={()=>buyPack(crate.id,qty)} disabled={!canAfford||maxQty===0} style={{padding:"9px 18px",background:!canAfford?"#1A2035":crate.grad,border:!canAfford?"1px solid #1E293B":"none",borderRadius:8,color:!canAfford?"#334155":"white",fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:9,cursor:!canAfford?"not-allowed":"pointer",letterSpacing:1}}>
          {!canAfford?"NEED MORE":qty===1?"OPEN PACK":`OPEN ${qty}×`}
        </button>
      </div>
    </div>
  );
}

function App(){
  const [dbPlayer,setDbPlayer]           =useState(null);
  const [collection,setCollection]       =useState([]);
  const [page,setPage]                   =useState("shop");
  const [opening,setOpening]             =useState(null);
  const [revealedCards,setRevealedCards] =useState([]);
  const [revealIdx,setRevealIdx]         =useState(0);
  const [toast,setToast]                 =useState(null);
  const [filterRarity,setFilter]         =useState("All");
  const [sortBy,setSort]                 =useState("recent");
  const [nameEdit,setNameEdit]           =useState(false);
  const [tempName,setTempName]           =useState("");
  const [sellConfirm,setSellConfirm]     =useState(false);
  const [finishing,setFinishing]         =useState(false);
  
  const [pendingTrades,setPendingTrades] =useState([]);
  const timer=useRef(null);
  const lastPackTime=useRef(0);
  const [autoOpen,setAutoOpen]=useState(null); // {crateId, intervalId}
  const autoOpenRef=useRef(null);
  const [musicMuted,setMusicMuted]=useState(()=>lsGet("music_muted")==="1");
  const [sfxMuted,setSfxMuted]=useState(()=>lsGet("sfx_muted")==="1");
  const [showSettings,setShowSettings]=useState(false);
  const [showTutorial,setShowTutorial]=useState(false);
  const [tutStep,setTutStep]=useState(0);
  const [animSettings,setAnimSettings]=useState(()=>{
    try{return JSON.parse(lsGet("tcg_anim_settings")||"{}");}catch{return {};}
  });
  const saveAnimSettings=(k,v)=>{
    const ns={...animSettings,[k]:v};
    setAnimSettings(ns);
    lsSet("tcg_anim_settings",JSON.stringify(ns));
  };
  const skipAnim=(rarity)=>{
    if(animSettings.skipAll)return true;
    if(rarity==="Shiny")return animSettings.skipShiny||false;
    if(rarity==="Rainbow")return animSettings.skipRainbow||false;
    if(rarity==="Crystal")return animSettings.skipCrystal||false;
    if(rarity==="Radiant")return animSettings.skipRadiant||false;
    if(rarity==="Mega")return animSettings.skipMega||false;
    if(rarity==="Secret")return animSettings.skipSecret||false;
    if(rarity==="Ultra Rare")return animSettings.skipUltraRare||false;
    return true; // skip for lower rarities
  };
  const [solsPhase,setSolsPhase]=useState(null); // null | "build" | "explode"
  const solsTimer=useRef(null);

  useEffect(()=>{SFX.sfxMuted=sfxMuted;lsSet("sfx_muted",sfxMuted?"1":"0");},[sfxMuted]);
  useEffect(()=>{SFX.musicMuted=musicMuted;lsSet("music_muted",musicMuted?"1":"0");if(dbPlayer){if(musicMuted)SFX.stopMusic();else SFX.startMusic();}},[musicMuted]);

  // Convenience: merge dbPlayer + collection into one object for child components
  const player = dbPlayer ? {...dbPlayer, collection} : null;

  const notify=(msg,color="#34D399")=>{setToast({msg,color});setTimeout(()=>setToast(null),3500);};

  // ── After login: load collection + prices + subscribe to realtime
  const onLogin=async(p)=>{
    setDbPlayer(p);
    await loadCollection(p.id);
    await loadTrades(p.id);
    subscribeRealtime(p.id);
    // Show tutorial for brand-new accounts
    if(!lsGet("tut_done_"+p.id)){setShowTutorial(true);setTutStep(0);}
  };

  const loadCollection=async(pid)=>{
    const{data}=await sb.from("collection").select("*").eq("player_id",pid);
    if(data)setCollection(data.map(row=>{
      const base=ALL_CARDS.find(c=>String(c.id)===String(row.card_id))||MEGA_CARDS.find(c=>c.rarity===row.rarity)||CARDS[0];
      const isShiny=row.rarity==="Shiny";
      return{...base, dbId:row.id, uid:row.uid||row.id, obtainedAt:row.obtained_at, buyPrice:row.buy_price, player_id:row.player_id, rarity:row.rarity||base.rarity};
    }));
  };

  const subscribeRealtime=(pid)=>{

    // Listen for incoming trade offers
    sb.channel("trades_"+pid).on("postgres_changes",{event:"*",schema:"public",table:"trades",filter:`to_id=eq.${pid}`},(payload)=>{
      if(payload.eventType==="INSERT"){
        setPendingTrades(t=>[payload.new,...t]);
        notify(`📦 Trade offer from ${payload.new.from_name}!`,"#C084FC");
        SFX.sell();
      } else if(payload.eventType==="UPDATE"){
        setPendingTrades(t=>t.map(x=>x.id===payload.new.id?payload.new:x));
      } else if(payload.eventType==="DELETE"){
        setPendingTrades(t=>t.filter(x=>x.id!==payload.old.id));
      }
    }).subscribe();
  };

  const loadTrades=async(pid)=>{
    const{data}=await sb.from("trades").select("*").eq("to_id",pid).eq("status","pending");
    setPendingTrades(data||[]);
  };

  // ── Win detection
  useEffect(()=>{
    
  },[player,collection]);

  // ── Buy pack
  const buyPack=async(crateId, qty=1)=>{
    const crate=CRATES.find(c=>c.id===crateId);
    const totalCost=crate.price*qty;
    if(player.coins<totalCost){SFX.error();notify("Not enough coins!","#EF4444");return;}
    // Rate limit
    const now=Date.now();
    if(now-lastPackTime.current<2500){notify("Slow down!","#EF4444");return;}
    lastPackTime.current=now;
    // Re-fetch coins from DB
    const{data:fresh}=await sb.from("players").select("coins,flagged").eq("id",player.id).single();
    if(!fresh||fresh.flagged){notify("Account flagged. Contact admin.","#EF4444");return;}
    if(fresh.coins<totalCost){notify("Not enough coins!","#EF4444");setDbPlayer(p=>({...p,coins:fresh.coins}));return;}
    SFX.packOpen();
        // Roll all packs at once
    const allCards=[];
    for(let i=0;i<qty;i++) allCards.push(...rollPack(crateId,null));
    const withPrices=allCards.map(c=>({...c,buyPrice:c.bp}));
    const newCoins=fresh.coins-totalCost;
    await sb.from("players").update({coins:newCoins,total_packs:player.total_packs+qty,total_cards:player.total_cards+allCards.length}).eq("id",player.id);
    setDbPlayer(p=>({...p,coins:newCoins,total_packs:p.total_packs+qty,total_cards:p.total_cards+allCards.length}));
    await sb.from("transactions").insert({player_id:player.id,type:"pack",detail:`Opened ${qty}× ${crate.name}`,tx_date:new Date().toLocaleDateString()});
    setRevealedCards(withPrices);setRevealIdx(0);
    setOpening({crate,phase:"opening",qty});
    clearTimeout(timer.current);
    timer.current=setTimeout(()=>{
      const firstCard=withPrices[0];
      const needsSols=!skipAnim(firstCard?.isShiny?"Shiny":firstCard?.rarity);
      if(needsSols){
        setOpening(o=>o?{...o,phase:"reveal"}:null);
        setSolsPhase("build");
        clearTimeout(solsTimer.current);
        solsTimer.current=setTimeout(()=>{
          setSolsPhase("explode");
          solsTimer.current=setTimeout(()=>setSolsPhase(null),600);
        },2200);
      } else {
        setOpening(o=>o?{...o,phase:"reveal"}:null);
      }
    },1100);
  };

  const revealNext=()=>{
    if(revealIdx<revealedCards.length-1){
      const nextCard=revealedCards[revealIdx+1];
      const needsSols=!skipAnim(nextCard?.isShiny?"Shiny":nextCard?.rarity);
      if(needsSols){
        setSolsPhase("build");
        clearTimeout(solsTimer.current);
        solsTimer.current=setTimeout(()=>{
          setSolsPhase("explode");
          solsTimer.current=setTimeout(()=>{setSolsPhase(null);setRevealIdx(i=>i+1);},600);
        },2200);
      } else {
        setRevealIdx(i=>i+1);
      }
    }
    else{setOpening(o=>({...o,phase:"done"}));}
  };
  const closeOpening=async()=>{
    if(finishing)return;
    setFinishing(true);
    const rows=revealedCards.map(c=>({player_id:player.id,card_id:c.id,card_name:c.name,rarity:c.rarity,buy_price:c.buyPrice||c.bp,obtained_at:c.obtainedAt,uid:c.uid}));
    const{error:insErr}=await sb.from("collection").insert(rows);

      console.error("Insert failed, trying one by one:",insErr.message);
      for(const row of rows){
        const{error:e}=await sb.from("collection").insert(row);
        if(e)console.warn("Row fail:",row.card_name,e.message);

    await sb.from("players").update({coins:newCoins,total_sold:player.total_sold+1}).eq("id",player.id);
    await sb.from("transactions").insert({player_id:player.id,type:"sell",detail:`${card.name} @ ${price}🪙`,coins:price,tx_date:new Date().toLocaleDateString()});
    setDbPlayer(p=>({...p,coins:newCoins,total_sold:p.total_sold+1}));
    setCollection(c=>c.filter(x=>x.uid!==card.uid));
    SFX.sell();notify(`+${price}🪙 from ${card.name}`,RARITY_CFG[card.rarity]?.color||"#FCD34D");

  // ── EVOLUTION SYSTEM
  // Regular evo: need 2 of same Pokemon → fuses into next stage
  // Mega evo: need just 1 of a mega-eligible Pokemon → mega evolves it (consumes the card)
  const getEvoOpportunities=()=>{
    const counts={};
    collection.forEach(c=>{
      const k=String(c.id);
      if(!counts[k])counts[k]={card:c,uids:[]};
      counts[k].uids.push(c.uid);
    });
    const opps=[];
    Object.entries(counts).forEach(([id,{card,uids}])=>{
      const numId=Number(id);
      // Regular evo: need 2 copies
      const nextId=EVO_CHAIN[numId];
      if(nextId&&uids.length>=2){
        const nextIds=Array.isArray(nextId)?nextId:[nextId];
        const nextCards=nextIds.map(i=>ALL_CARDS.find(c=>c.id===i)).filter(Boolean);
        if(nextCards.length)opps.push({type:"evo",card,uids,nextCards,isChoice:Array.isArray(nextId)});
      }
      // Mega evo: need 50 copies — extremely rare achievement
      const megaId=MEGA_EVO_MAP[numId];
      if(megaId&&uids.length>=50){
        const megaCard=MEGA_CARDS.find(c=>c.id===megaId);
        if(megaCard)opps.push({type:"mega",card,uids,nextCards:[megaCard],isChoice:false,needed:50});
      }
    });
    return opps;
  };

  const [eeveeModal,setEeveeModal]=useState(null);

  const doEvolve=async(opp,chosenCard)=>{
    const evolved=chosenCard||opp.nextCards[0];
    const isMega=opp.type==="mega";
    if(!evolved||!evolved.id||!evolved.name){
      notify("Evolution target not found — nothing changed.","#EF4444");
      return;
    }
    const uidsToRemove=isMega?opp.uids.slice(0,50):opp.uids.slice(0,2);
    // Step 1: INSERT the evolved card first
    const evoCard={...evolved,uid:crypto.randomUUID(),obtainedAt:new Date().toLocaleDateString(),buyPrice:evolved.bp};
    const insertRow={player_id:player.id,card_id:evoCard.id,card_name:evoCard.name,rarity:evoCard.rarity,buy_price:evoCard.buyPrice,obtained_at:evoCard.obtainedAt,uid:evoCard.uid};
    const{data:inserted,error:insertErr}=await sb.from("collection").insert(insertRow).select();
    if(insertErr||!inserted||inserted.length===0){
      notify(`❌ Evolution insert FAILED — your cards are safe. Error: ${insertErr?.message||"no data returned"}`,"#EF4444");
      return;
    }
    // Step 2: Verify the card actually exists in DB before deleting anything
    const{data:verify}=await sb.from("collection").select("id").eq("uid",evoCard.uid).maybeSingle();
    if(!verify){
      notify("❌ Could not verify new card in database — nothing deleted.","#EF4444");
      return;
    }
    // Step 3: Only NOW delete the source cards
    for(const uid of uidsToRemove){
      await sb.from("collection").delete().eq("uid",uid);
    }
    await sb.from("transactions").insert({player_id:player.id,type:"evolve",detail:`${opp.card.name} → ${evolved.name}`,tx_date:new Date().toLocaleDateString()});
    await loadCollection(player.id);
    if(isMega){SFX.megaEvolve();notify(`🌟 MEGA EVOLUTION! ${evolved.name}!`,"#FF4500");}
    else{SFX.evolve();notify(`✨ Evolved into ${evolved.name}!`,RARITY_CFG[evolved.rarity]?.color||"#34D399");}
    setEeveeModal(null);
  };

  const getFiltered=()=>{

    else if(sortBy==="name")cards.sort((a,b)=>a.name.localeCompare(b.name));
    else if(sortBy==="value")cards.sort((a,b)=>(b.bp)-(a.bp));
    return cards;

              </button>
            ))}
          </nav>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <button onClick={()=>setShowSettings(true)} title="Settings" style={{background:"none",border:"1px solid #1E293B",borderRadius:7,color:"#94A3B8",padding:"5px 8px",cursor:"pointer",fontSize:12}}>⚙️</button>

        {/* SHOP */}
        {page==="shop"&&(

            <p style={{color:"#334155",marginBottom:20,fontSize:12}}>Pure random · {CARDS.length} cards in pool for all players</p>
            <div style={{background:"linear-gradient(135deg,#0b2318,#091b26)",border:"1px solid #10B98122",borderRadius:12,padding:"14px 20px",marginBottom:22,display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,flexWrap:"wrap"}}>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <img src={ITEM("lucky-egg")} alt="" style={{width:36,height:36,imageRendering:"pixelated",filter:"drop-shadow(0 0 8px #10B98188)"}} onError={e=>e.target.style.display="none"}/>
                <div><div style={{color:"#10B981",fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:9,letterSpacing:2}}>FREE DAILY REWARD</div><div style={{color:"#334155",fontSize:11,marginTop:2}}>+500 coins</div></div>
              </div>
              <button onClick={async()=>{
              const todayKey=`daily_${player.id}_${new Date().toDateString()}`;

              setDbPlayer(p=>({...p,coins:nc}));
              lsSet(todayKey,"1");
              notify("+500🪙 Daily reward claimed!","#10B981");
            }} style={{padding:"9px 20px",background:"linear-gradient(135deg,#065F46,#10B981)",border:"none",borderRadius:8,color:"white",fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:9,cursor:"pointer"}}>CLAIM +500🪙</button>

                      const run=()=>{
                        if(player.coins<crate.price){clearInterval(autoOpenRef.current);autoOpenRef.current=null;setAutoOpen(null);notify("Out of coins — auto stopped","#EF4444");return;}
                        buyPack(crate.id,1);
                      };
                      run();
                      autoOpenRef.current=setInterval(run,2000);

                const megaId=MEGA_EVO_MAP[Number(id)];
                if(!megaId)return null;
                const megaCard=MEGA_CARDS.find(c=>c.id===megaId);
                if(!megaCard)return null;
                return{card,megaCard,count,pct:Math.min(100,Math.round(count/50*100))};
              }).filter(Boolean).sort((a,b)=>b.count-a.count);

              const opps=getEvoOpportunities();
              if(opps.length===0&&megaProgress.length===0)return null;

                              </div>
                            </div>
                            <button onClick={()=>triggerEvolve(opp)} style={{padding:"8px 16px",background:isMega?"linear-gradient(135deg,#7c1d0a,#ea4900)":"linear-gradient(135deg,#14532d,#16a34a)",border:"none",borderRadius:8,color:"white",fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:9,cursor:"pointer",whiteSpace:"nowrap",boxShadow:isMega?`0 0 12px #FF450088`:`0 0 12px ${rc.color}44`}}>
                              {isMega?"MEGA EVOLVE ⚡":"EVOLVE ✨"}
                            </button>
                          </div>
                        );
                      })}
                    </div>
                  </>}

                            </div>

                          <img src={MINI(megaCard.id)} alt="" style={{width:28,height:28,imageRendering:"pixelated",flexShrink:0,opacity:count>=50?1:.3,filter:count>=50?"drop-shadow(0 0 6px #FF4500)":undefined}} onError={e=>e.target.style.display="none"}/>
                        </div>

              </div>

            </div>
            {sellConfirm&&<div style={{background:"#1E293B",border:"1px solid #EF444466",borderRadius:10,padding:"12px 16px",marginBottom:14,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}><span style={{color:"#F1F5F9",fontSize:12}}>Sell <b>{getFiltered().length}</b> for <b style={{color:"#FCD34D"}}>{getFiltered().reduce((s,c)=>s+(c.bp||0),0)}🪙</b>?</span><div style={{display:"flex",gap:7}}><button onClick={doSellAll} style={{padding:"6px 12px",background:"#DC2626",border:"none",borderRadius:6,color:"white",fontFamily:"'Orbitron',monospace",fontSize:8,fontWeight:700,cursor:"pointer"}}>CONFIRM</button><button onClick={()=>setSellConfirm(false)} style={{padding:"6px 10px",background:"#334155",border:"none",borderRadius:6,color:"#94A3B8",fontSize:10,cursor:"pointer"}}>Cancel</button></div></div>}

            :<div style={{display:"flex",flexWrap:"wrap",gap:12}}>{getFiltered().map(card=><PokemonCard key={card.uid} card={card} onSell={sellCard} currentPrice={card.bp}/>)}</div>}
          </div>
        )}

        {/* PROFILE */}
        {page==="profile"&&(
          <div style={{animation:"fadeIn .35s ease"}}>
            <h1 style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:"clamp(20px,4vw,28px)",marginBottom:20}}>TRAINER <span style={{color:"#FCD34D"}}>PROFILE</span></h1>

                <div style={{display:"flex",gap:9,alignItems:"center"}}><span style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:20}}>{player.username}</span></div>
                <div style={{color:"#334155",fontSize:10,marginTop:3}}>Since {player.join_date}</div>

            <div style={{background:"#080D1A",border:"1px solid #0A0F1E",borderRadius:12,padding:18,marginBottom:16}}>
              <div style={{fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:8,color:"#1E293B",letterSpacing:3,marginBottom:12}}>COLLECTION BREAKDOWN</div>
              {Object.entries(RARITY_CFG).map(([rarity,cfg])=>{const count=rStats[rarity]||0;const pct=collection.length>0?(count/collection.length)*100:0;return(<div key={rarity} style={{marginBottom:9}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span style={{color:cfg.color,fontFamily:"'Orbitron',monospace",fontSize:8,fontWeight:700}}>{rarity.toUpperCase()}</span><span style={{color:"#1E293B",fontSize:8}}>{count}</span></div><div style={{background:"#0F172A",borderRadius:3,height:4,overflow:"hidden"}}><div style={{background:`linear-gradient(90deg,${cfg.color}77,${cfg.color})`,borderRadius:3,height:4,width:pct+"%",transition:"width .8s ease"}}/></div></div>);})}
            </div>
            {collection.filter(c=>["Secret","Ultra Rare","Legendary","GOLDEN"].includes(c.rarity)).length>0&&(
              <div style={{background:"#080D1A",border:"1px solid #FCD34D12",borderRadius:12,padding:18,marginBottom:16}}>
                <div style={{fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:8,color:"#1E293B",letterSpacing:3,marginBottom:12}}>🏆 PRIZE SHELF</div>
                <div style={{display:"flex",gap:12,overflowX:"auto",paddingBottom:6}}>{collection.filter(c=>["Secret","Ultra Rare","Legendary","GOLDEN"].includes(c.rarity)).map(card=><PokemonCard key={card.uid} card={card} currentPrice={card.bp}/>)}</div>
              </div>
            )}
            <div style={{background:"#080D1A",border:"1px solid #DC262612",borderRadius:12,padding:16}}>
              <div style={{fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:8,color:"#2d0000",letterSpacing:2,marginBottom:10}}>DANGER ZONE</div>
              <button onClick={async()=>{if(window.confirm("Delete account and all data?")){await sb.from("collection").delete().eq("player_id",player.id);await sb.from("transactions").delete().eq("player_id",player.id);await sb.from("players").delete().eq("id",player.id);setDbPlayer(null);setCollection([]);}}} style={{padding:"7px 18px",background:"none",border:"1px solid #DC262644",borderRadius:7,color:"#DC2626",fontFamily:"'Orbitron',monospace",fontSize:8,cursor:"pointer",fontWeight:700}}>DELETE ACCOUNT</button>
              {["duke","admin"].includes(player.username.toLowerCase())&&<DukeAdminPanel notify={notify} player={player} loadCollection={loadCollection}/>}
            </div>
          </div>
        )}
      </main>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
// Hide loader once React has painted
requestAnimationFrame(()=>requestAnimationFrame(()=>{
  const l=document.getElementById('loading-screen');
  if(l){l.style.transition='opacity .5s ease';l.style.opacity='0';setTimeout(()=>l.remove(),520);}
}));
</script>
</body>
</html>
