                  <div style={{display:"flex",gap:10,flexWrap:"wrap",justifyContent:"center"}}>
                    {eeveeModal.nextCards.map(c=>(
                      <button key={c.id} onClick={()=>doEvolve(eeveeModal,c)} style={{background:`linear-gradient(${c.bg||"135deg,#1e293b,#0f172a"})`,border:`2px solid ${c.tc||"#334155"}`,borderRadius:12,padding:"12px 16px",cursor:"pointer",textAlign:"center",minWidth:95,transition:"transform .2s"}}
                        onMouseEnter={e=>e.currentTarget.style.transform="scale(1.07)"} onMouseLeave={e=>e.currentTarget.style.transform=""}>
                        <img src={ART(c.id)} alt={c.name} style={{width:64,height:64,objectFit:"contain",display:"block",margin:"0 auto"}} onError={e=>{e.target.src=MINI(c.id);e.target.style.imageRendering="pixelated";}}/>
                        <div style={{color:c.tc||"#94A3B8",fontFamily:"'Orbitron',monospace",fontSize:8,fontWeight:700,marginTop:5}}>{c.name}</div>
                        <div style={{color:"#475569",fontSize:8,marginTop:2}}>{c.type}</div>
                      </button>
                    ))}
                  </div>
                  <button onClick={()=>setEeveeModal(null)} style={{marginTop:16,width:"100%",padding:"8px",background:"#1E293B",border:"none",borderRadius:8,color:"#475569",cursor:"pointer",fontFamily:"'Orbitron',monospace",fontSize:9}}>CANCEL</button>
                </div>
              </div>
            )}
            {/* Evolution panel */}
            {(()=>{
              // Also show mega progress even if not yet at 50
              const counts={};
              collection.forEach(c=>{const k=String(c.id);if(!counts[k])counts[k]={card:c,count:0};counts[k].count++;});
              const megaProgress=Object.entries(counts).map(([id,{card,count}])=>{
                const megaId=MEGA_EVO_MAP[Number(id)];
                if(!megaId)return null;
                const megaCard=MEGA_CARDS.find(c=>c.id===megaId);
                if(!megaCard)return null;
                return{card,megaCard,count,pct:Math.min(100,Math.round(count/50*100))};
              }).filter(Boolean).sort((a,b)=>b.count-a.count);

              const opps=getEvoOpportunities();
              if(opps.length===0&&megaProgress.length===0)return null;
              return(
                <div style={{background:"linear-gradient(135deg,#0a1a0a,#0d2a0d)",border:"2px solid #22c55e55",borderRadius:14,padding:16,marginBottom:18}}>
                  {opps.length>0&&<>
                    <div style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:10,color:"#22c55e",letterSpacing:2,marginBottom:12}}>⚡ EVOLUTION READY ({opps.length})</div>
                    <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:megaProgress.length>0?16:0}}>
                      {opps.map((opp,i)=>{
                        const toCard=opp.nextCards[0];
                        const rc=RARITY_CFG[toCard?.rarity]||RARITY_CFG.Common;
                        const isMega=opp.type==="mega";
                        return(
                          <div key={i} style={{background:"rgba(0,0,0,.4)",border:`1px solid ${isMega?"#FF4500":rc.color}44`,borderRadius:11,padding:"10px 14px",display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
                            <div style={{display:"flex",alignItems:"center",gap:6}}>
                              <img src={ART(opp.card.id)} alt="" style={{width:40,height:40,objectFit:"contain"}} onError={e=>{e.target.src=MINI(opp.card.id);e.target.style.imageRendering="pixelated";}}/>
                              <div style={{color:"#475569",fontSize:16,fontWeight:700}}>→</div>
                              <img src={ART(toCard?.id)} alt="" style={{width:40,height:40,objectFit:"contain",filter:isMega?`drop-shadow(0 0 8px #FF4500)`:`drop-shadow(0 0 6px ${rc.color}88)`}} onError={e=>{e.target.src=MINI(toCard?.id);e.target.style.imageRendering="pixelated";}}/>
                              {opp.isChoice&&<div style={{color:"#334155",fontSize:9,fontFamily:"'Orbitron',monospace"}}>+{opp.nextCards.length-1} more</div>}
                            </div>
                            <div>
                              <div style={{color:"#F1F5F9",fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:10}}>
                                {opp.card.name} {isMega?"× 50 → MEGA":"× 2 → "+toCard?.name}{opp.isChoice?" (choose)":""}
                              </div>
                              <div style={{color:isMega?"#FF4500":rc.color,fontSize:8,marginTop:2,letterSpacing:1}}>
                                {isMega?"⚡ MEGA — consumes 50 cards":"Fuses 2 cards into "+toCard?.rarity}
                              </div>
                            </div>
                            <button onClick={()=>triggerEvolve(opp)} style={{padding:"8px 16px",background:isMega?"linear-gradient(135deg,#7c1d0a,#ea4900)":"linear-gradient(135deg,#14532d,#16a34a)",border:"none",borderRadius:8,color:"white",fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:9,cursor:"pointer",whiteSpace:"nowrap",boxShadow:isMega?`0 0 12px #FF450088`:`0 0 12px ${rc.color}44`}}>
                              {isMega?"MEGA EVOLVE ⚡":"EVOLVE ✨"}
                            </button>
                          </div>
                        );
                      })}
                    </div>
                  </>}
                  {megaProgress.length>0&&<>
                    <div style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:10,color:"#FF4500",letterSpacing:2,marginBottom:10}}>🌟 MEGA PROGRESS (need 50 of same)</div>
                    <div style={{display:"flex",flexDirection:"column",gap:8}}>
                      {megaProgress.map(({card,megaCard,count,pct})=>(
                        <div key={card.id} style={{display:"flex",alignItems:"center",gap:10}}>
                          <img src={MINI(card.id)} alt="" style={{width:28,height:28,imageRendering:"pixelated",flexShrink:0}} onError={e=>e.target.style.display="none"}/>
                          <div style={{flex:1}}>
                            <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                              <span style={{color:"#94A3B8",fontFamily:"'Orbitron',monospace",fontSize:8}}>{card.name} → {megaCard.name}</span>
                              <span style={{color:count>=50?"#FF4500":"#475569",fontFamily:"'Orbitron',monospace",fontSize:8,fontWeight:700}}>{count}/50</span>
                            </div>
                            <div style={{background:"#0F172A",borderRadius:4,height:5,overflow:"hidden"}}>
                              <div style={{background:`linear-gradient(90deg,#7c1d0a,#FF4500)`,width:pct+"%",height:"100%",borderRadius:4,transition:"width .5s ease",boxShadow:count>=50?"0 0 8px #FF4500":undefined}}/>
                            </div>
                          </div>
                          <img src={MINI(megaCard.id)} alt="" style={{width:28,height:28,imageRendering:"pixelated",flexShrink:0,opacity:count>=50?1:.3,filter:count>=50?"drop-shadow(0 0 6px #FF4500)":undefined}} onError={e=>e.target.style.display="none"}/>
                        </div>
                      ))}
                    </div>
                  </>}
                </div>
              );
            })()}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:18,flexWrap:"wrap",gap:10}}>
              <div>
                <h1 style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:"clamp(20px,4vw,28px)"}}>MY <span style={{color:"#FCD34D"}}>COLLECTION</span></h1>
                <p style={{color:"#334155",fontSize:11,marginTop:3}}>{collection.length} cards · Market value: {collection.reduce((s,c)=>s+(stockPrices[cardKey(c)]||c.bp||0),0).toLocaleString()}🪙</p>
              </div>
              <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                {["All",...Object.keys(RARITY_CFG)].map(r=>{const rc=r!=="All"?RARITY_CFG[r]:null;const active=filterRarity===r;return<button key={r} onClick={()=>setFilter(r)} style={{padding:"4px 10px",borderRadius:20,cursor:"pointer",border:`1px solid ${active?(rc?.color||"#64748B"):"#1E293B"}`,background:active?(rc?rc.color+"18":"#334155"):"transparent",color:active?(rc?.color||"#F1F5F9"):"#334155",fontFamily:"'Orbitron',monospace",fontSize:7,fontWeight:700}}>{r} ({r==="All"?collection.length:rStats[r]||0})</button>;})}
              </div>
            </div>
            <div style={{display:"flex",gap:8,marginBottom:14,alignItems:"center",flexWrap:"wrap"}}>
              <select value={sortBy} onChange={e=>setSort(e.target.value)} style={{background:"#1E293B",border:"1px solid #334155",color:"#F1F5F9",borderRadius:7,padding:"6px 10px",fontFamily:"'Exo 2',sans-serif",fontSize:11,cursor:"pointer"}}>
                <option value="recent">Newest First</option>
                <option value="rarity">By Rarity</option>
                <option value="name">By Name</option>
                <option value="value">By Market Value</option>
              </select>
              {getFiltered().filter(c=>!c.isGolden).length>0&&<button onClick={()=>setSellConfirm(true)} style={{padding:"6px 12px",background:"linear-gradient(135deg,#7f1d1d,#DC2626)",border:"none",borderRadius:7,color:"white",fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:8,cursor:"pointer"}}>SELL ALL ({getFiltered().filter(c=>!c.isGolden).length})</button>}
            </div>
            {sellConfirm&&<div style={{background:"#1E293B",border:"1px solid #EF444466",borderRadius:10,padding:"12px 16px",marginBottom:14,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}><span style={{color:"#F1F5F9",fontSize:12}}>Sell <b>{getFiltered().filter(c=>!c.isGolden).length}</b> for <b style={{color:"#FCD34D"}}>{getFiltered().filter(c=>!c.isGolden).reduce((s,c)=>s+(stockPrices[cardKey(c)]||c.bp||0),0)}🪙</b>?</span><div style={{display:"flex",gap:7}}><button onClick={doSellAll} style={{padding:"6px 12px",background:"#DC2626",border:"none",borderRadius:6,color:"white",fontFamily:"'Orbitron',monospace",fontSize:8,fontWeight:700,cursor:"pointer"}}>CONFIRM</button><button onClick={()=>setSellConfirm(false)} style={{padding:"6px 10px",background:"#334155",border:"none",borderRadius:6,color:"#94A3B8",fontSize:10,cursor:"pointer"}}>Cancel</button></div></div>}
            {collection.length===0?<div style={{textAlign:"center",padding:"70px 0"}}><img src={MINI(129)} alt="" style={{width:70,imageRendering:"pixelated",opacity:.2}} onError={e=>e.target.style.display="none"}/><div style={{color:"#1E293B",fontFamily:"'Orbitron',monospace",marginTop:14}}>Empty — open some packs!</div><button onClick={()=>setPage("shop")} style={{marginTop:12,padding:"9px 20px",background:"linear-gradient(135deg,#92400E,#F59E0B)",border:"none",borderRadius:8,color:"#1C1917",fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:10,cursor:"pointer"}}>SHOP →</button></div>
            :<div style={{display:"flex",flexWrap:"wrap",gap:12}}>{getFiltered().map(card=><PokemonCard key={card.uid} card={card} onSell={card.isGolden?null:sellCard} currentPrice={stockPrices[cardKey(card)]||card.bp}/>)}</div>}
          </div>
        )}

        {/* PROFILE */}
        {page==="profile"&&(
          <div style={{animation:"fadeIn .35s ease"}}>
            <h1 style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:"clamp(20px,4vw,28px)",marginBottom:20}}>TRAINER <span style={{color:"#FCD34D"}}>PROFILE</span></h1>
            <div style={{background:"linear-gradient(135deg,#0F172A,#1A2744)",border:"1px solid #1E3A5F",borderRadius:16,padding:22,display:"flex",gap:18,alignItems:"center",marginBottom:16,flexWrap:"wrap"}}>
              <div style={{width:68,height:68,borderRadius:"50%",background:"linear-gradient(135deg,#1E3A5F,#2563EB)",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 0 24px #2563EB44",flexShrink:0}}><img src={ITEM("poke-ball")} alt="" style={{width:38,height:38,imageRendering:"pixelated"}} onError={e=>e.target.style.display="none"}/></div>
              <div style={{flex:1}}>
                <div style={{display:"flex",gap:9,alignItems:"center"}}><span style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:20}}>{player.username}</span>{player.won&&<span style={{color:"#FFD700",fontSize:18}}>🏆</span>}</div>
                <div style={{color:"#334155",fontSize:10,marginTop:3}}>Since {player.join_date}</div>
              </div>
              <div style={{textAlign:"right"}}><div style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:24,color:"#FCD34D"}}>🪙{player.coins.toLocaleString()}</div></div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:10,marginBottom:16}}>
              {[{label:"Packs",value:player.total_packs,img:"poke-ball",color:"#60A5FA"},{label:"Cards Pulled",value:player.total_cards,img:"master-ball",color:"#34D399"},{label:"Cards Sold",value:player.total_sold,img:"nugget",color:"#FCD34D"},{label:"In Collection",value:collection.length,img:"great-ball",color:"#C084FC"}].map(s=>(
                <div key={s.label} style={{background:"#080D1A",border:`1px solid ${s.color}18`,borderRadius:12,padding:16,textAlign:"center"}}><img src={ITEM(s.img)} alt="" style={{width:28,height:28,imageRendering:"pixelated",filter:`drop-shadow(0 0 7px ${s.color}88)`}} onError={e=>e.target.style.display="none"}/><div style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:22,color:s.color,marginTop:5}}>{s.value}</div><div style={{color:"#1E293B",fontSize:8,marginTop:2,letterSpacing:.5}}>{s.label.toUpperCase()}</div></div>
              ))}
            </div>
            <div style={{background:"#080D1A",border:"1px solid #0A0F1E",borderRadius:12,padding:18,marginBottom:16}}>
              <div style={{fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:8,color:"#1E293B",letterSpacing:3,marginBottom:12}}>COLLECTION BREAKDOWN</div>
              {Object.entries(RARITY_CFG).map(([rarity,cfg])=>{const count=rStats[rarity]||0;const pct=collection.length>0?(count/collection.length)*100:0;return(<div key={rarity} style={{marginBottom:9}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span style={{color:cfg.color,fontFamily:"'Orbitron',monospace",fontSize:8,fontWeight:700}}>{rarity.toUpperCase()}</span><span style={{color:"#1E293B",fontSize:8}}>{count}</span></div><div style={{background:"#0F172A",borderRadius:3,height:4,overflow:"hidden"}}><div style={{background:`linear-gradient(90deg,${cfg.color}77,${cfg.color})`,borderRadius:3,height:4,width:pct+"%",transition:"width .8s ease"}}/></div></div>);})}
            </div>
            {collection.filter(c=>["Secret","Ultra Rare","Legendary","GOLDEN"].includes(c.rarity)).length>0&&(
              <div style={{background:"#080D1A",border:"1px solid #FCD34D12",borderRadius:12,padding:18,marginBottom:16}}>
                <div style={{fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:8,color:"#1E293B",letterSpacing:3,marginBottom:12}}>🏆 PRIZE SHELF</div>
                <div style={{display:"flex",gap:12,overflowX:"auto",paddingBottom:6}}>{collection.filter(c=>["Secret","Ultra Rare","Legendary","GOLDEN"].includes(c.rarity)).map(card=><PokemonCard key={card.uid} card={card} currentPrice={stockPrices[cardKey(card)]||card.bp}/>)}</div>
              </div>
            )}
            <div style={{background:"#080D1A",border:"1px solid #DC262612",borderRadius:12,padding:16}}>
              <div style={{fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:8,color:"#2d0000",letterSpacing:2,marginBottom:10}}>DANGER ZONE</div>
              <button onClick={async()=>{if(window.confirm("Delete account and all data?")){await sb.from("collection").delete().eq("player_id",player.id);await sb.from("transactions").delete().eq("player_id",player.id);await sb.from("players").delete().eq("id",player.id);setDbPlayer(null);setCollection([]);}}} style={{padding:"7px 18px",background:"none",border:"1px solid #DC262644",borderRadius:7,color:"#DC2626",fontFamily:"'Orbitron',monospace",fontSize:8,cursor:"pointer",fontWeight:700}}>DELETE ACCOUNT</button>
              {["duke","admin"].includes(player.username.toLowerCase())&&<DukeAdminPanel notify={notify}/>}
            </div>
          </div>
        )}
      </main>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
