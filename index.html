/* ══════════════════════════════════════════════════ MUSIC + SFX ENGINE */
const AudioEngine={
  ctx:null, sfxMuted:false, musicMuted:false,
  musicGain:null, musicNodes:[],
  init(){
    if(!this.ctx)try{this.ctx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}
  },
  resume(){if(this.ctx?.state==="suspended")this.ctx.resume();},

  // ── SFX
  tone(freq,type,atk,dec,sus,rel,dur,vol=0.3){
    if(this.sfxMuted||!this.ctx)return;
    this.resume();
    const now=this.ctx.currentTime;
    const o=this.ctx.createOscillator(),g=this.ctx.createGain();
    o.connect(g);g.connect(this.ctx.destination);
    o.type=type;o.frequency.setValueAtTime(freq,now);
    g.gain.setValueAtTime(0,now);g.gain.linearRampToValueAtTime(vol,now+atk);
    g.gain.linearRampToValueAtTime(vol*sus,now+atk+dec);g.gain.linearRampToValueAtTime(0,now+dur+rel);
    o.start(now);o.stop(now+dur+rel+0.05);
  },
  click(){this.init();this.tone(800,"sine",.001,.05,.3,.05,.06,.15);},
  sell(){this.init();this.tone(1047,"sine",.001,.05,.3,.1,.15,.2);setTimeout(()=>this.tone(1319,"sine",.001,.05,.2,.1,.1,.15),80);},
  error(){this.init();this.tone(200,"sawtooth",.001,.1,.5,.1,.3,.3);},
  packOpen(){this.init();for(let i=0;i<5;i++)setTimeout(()=>this.tone(200+i*60,"sawtooth",.001,.02,.1,.05,.06,.1),i*70);},
  common(){this.init();this.tone(523,"sine",.01,.1,.5,.2,.3,.2);},
  uncommon(){this.init();[523,659].forEach((f,i)=>setTimeout(()=>this.tone(f,"sine",.01,.1,.5,.2,.25,.22),i*90));},
  rare(){this.init();[523,659,784].forEach((f,i)=>setTimeout(()=>this.tone(f,"sine",.01,.1,.5,.2,.28,.26),i*80));},
  epic(){this.init();[392,494,587,784].forEach((f,i)=>setTimeout(()=>this.tone(f,"triangle",.01,.12,.6,.3,.35,.3),i*70));},
  legendary(){this.init();[261,329,392,523,659,784,1047].forEach((f,i)=>setTimeout(()=>this.tone(f,"triangle",.01,.1,.7,.3,.45,.28),i*55));},
  ultraRare(){this.init();this.tone(80,"sawtooth",.001,.3,.8,.5,.8,.35);[523,659,784,1047,1319].forEach((f,i)=>setTimeout(()=>this.tone(f,"square",.01,.1,.6,.4,.45,.28),100+i*65));},
  mega(){this.init();this.tone(55,"sawtooth",.001,.4,.9,.6,1,.4);[261,330,392,523,659,784,1047,1319].forEach((f,i)=>setTimeout(()=>this.tone(f,"triangle",.01,.12,.8,.4,.55,.3),150+i*60));},
  evolve(){this.init();[392,440,494,523,587,659,784].forEach((f,i)=>setTimeout(()=>this.tone(f,"sine",.01,.08,.5,.15,.22,.25),i*50));},
  megaEvolve(){this.init();this.tone(70,"sawtooth",.001,.5,.9,.7,1.6,.45);[261,330,392,523,659,784,1047,1319,1568].forEach((f,i)=>setTimeout(()=>this.tone(f,"triangle",.01,.12,.8,.4,.55,.32),200+i*60));},
  golden(){this.init();this.tone(55,"sawtooth",.001,.6,.95,.8,2,.45);[130,165,196,261,330,392,523,659,784,1047,1319].forEach((f,i)=>setTimeout(()=>this.tone(f,"triangle",.01,.1,.9,.5,.65,.36),100+i*55));},

  // ── CALMING MUSIC — layered ambient pads + gentle arp
  startMusic(){
    this.init();if(this.musicMuted||!this.ctx||this.musicNodes.length>0)return;
    this.resume();
    const ctx=this.ctx;
    // Master gain
    const master=ctx.createGain();master.gain.setValueAtTime(0,ctx.currentTime);master.gain.linearRampToValueAtTime(0.18,ctx.currentTime+3);master.connect(ctx.destination);
    this.musicGain=master;

    // Reverb convolver for lush atmosphere
    const rev=ctx.createConvolver();
    const buf=ctx.createBuffer(2,ctx.sampleRate*2,ctx.sampleRate);
    for(let c=0;c<2;c++){const d=buf.getChannelData(c);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2.5);}
    rev.buffer=buf;
    const revGain=ctx.createGain();revGain.gain.value=0.45;
    rev.connect(revGain);revGain.connect(master);

    // Chord pads — Am pentatonic: A2 C3 E3 G3 A3
    const padNotes=[110,130.81,164.81,196,220,261.63,329.63,392,440];
    const chord=[110,164.81,220,261.63,329.63]; // A minor

    const makeOsc=(freq,detune,vol)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type="sine";o.frequency.value=freq;o.detune.value=detune;
      g.gain.value=vol;o.connect(g);g.connect(rev);g.connect(master);
      o.start();this.musicNodes.push(o,g);return{o,g};
    };

    // Layered detuned pads
    chord.forEach(f=>{makeOsc(f,0,0.04);makeOsc(f,8,0.025);makeOsc(f,-7,0.025);});

    // Slow LFO filter sweep on a pad
    const sweepOsc=ctx.createOscillator(),sweepGain=ctx.createGain(),filt=ctx.createBiquadFilter();
    sweepOsc.frequency.value=0.05;sweepOsc.type="sine";sweepGain.gain.value=600;
    filt.type="lowpass";filt.frequency.value=800;filt.Q.value=2;
    sweepOsc.connect(sweepGain);sweepGain.connect(filt.frequency);
    const padOsc=ctx.createOscillator(),padG=ctx.createGain();
    padOsc.type="triangle";padOsc.frequency.value=220;padG.gain.value=0.06;
    padOsc.connect(filt);filt.connect(padG);padG.connect(rev);padG.connect(master);
    sweepOsc.start();padOsc.start();
    this.musicNodes.push(sweepOsc,sweepGain,filt,padOsc,padG);

    // Gentle arpeggio — 8 notes cycling slowly
    const arpNotes=[220,261.63,329.63,392,440,523.25,392,329.63];
    let arpIdx=0;
    const playArp=()=>{
      if(this.musicMuted||!this.ctx)return;
      const now=ctx.currentTime;
      const freq=arpNotes[arpIdx%arpNotes.length];arpIdx++;
      const ao=ctx.createOscillator(),ag=ctx.createGain();
      ao.type="sine";ao.frequency.value=freq;
      ag.gain.setValueAtTime(0,now);ag.gain.linearRampToValueAtTime(0.055,now+0.05);
      ag.gain.exponentialRampToValueAtTime(0.001,now+1.4);
      ao.connect(ag);ag.connect(rev);ag.connect(master);
      ao.start(now);ao.stop(now+1.5);
      this.arpTimer=setTimeout(playArp,1600+Math.random()*400);
    };
    this.arpTimer=setTimeout(playArp,1000);

    // Sub bass pulse — very subtle
    const bassNotes=[55,55,65.41,55];let bIdx=0;
    const playBass=()=>{
      if(this.musicMuted||!this.ctx)return;
      const now=ctx.currentTime;
      const bo=ctx.createOscillator(),bg=ctx.createGain();
      bo.type="sine";bo.frequency.value=bassNotes[bIdx%bassNotes.length];bIdx++;
      bg.gain.setValueAtTime(0,now);bg.gain.linearRampToValueAtTime(0.07,now+0.1);
      bg.gain.exponentialRampToValueAtTime(0.001,now+2.8);
      bo.connect(bg);bg.connect(master);bo.start(now);bo.stop(now+3);
      this.bassTimer=setTimeout(playBass,3200);
    };
    this.bassTimer=setTimeout(playBass,500);
  },

  stopMusic(){
    if(this.arpTimer)clearTimeout(this.arpTimer);
    if(this.bassTimer)clearTimeout(this.bassTimer);
    if(this.musicGain&&this.ctx){
      const now=this.ctx.currentTime;
      this.musicGain.gain.linearRampToValueAtTime(0,now+2);
      setTimeout(()=>{this.musicNodes.forEach(n=>{try{n.stop?.();n.disconnect?.();}catch(e){}});this.musicNodes=[];},2200);
    }else{this.musicNodes.forEach(n=>{try{n.stop?.();n.disconnect?.();}catch(e){}});this.musicNodes=[];}
  },

  setMusicMuted(v){
    this.musicMuted=v;
    if(v)this.stopMusic();
    else this.startMusic();
  },
};

const SFX=AudioEngine;

/* ══════════════════════════════════════════════════ STOCK ENGINE (shared via Supabase) */
const tickPrices = (prices, history) => {
  const np={...prices}, nh={...history};
  [...CARDS,GOLDEN_CHARIZARD].forEach(card=>{
    const k=cardKey(card);
    const cur=np[k]||card.bp;
    const vol={"Common":.04,"Uncommon":.05,"Rare":.07,"Epic":.10,"Legendary":.14,"Ultra Rare":.18,"Secret":.22,"GOLDEN":.20}[card.rarity]||.06;
    const meanRev=(card.bp-cur)/card.bp*0.03;
    const drift=(Math.random()-.5)*2*vol+meanRev;
    np[k]=Math.max(Math.round(card.bp*.25),Math.min(Math.round(card.bp*8),Math.round(cur*(1+drift))));
    nh[k]=[...(nh[k]||[card.bp]).slice(-80),np[k]];
  });
  return{np,nh};
};

/* ══════════════════════════════════════════════════ ROLL */
// luck multiplier shifts odds toward rarer cards
const rollCard=(surgeType=null,packId=null,luck=1)=>{
  const crate=CRATES.find(c=>c.id===packId);
  // Base rarity chances scaled by luck
  const base={"Common":.40,"Uncommon":.28,"Rare":.18,"Epic":.07,"Legendary":.026,"Ultra Rare":.005,"Secret":.001};
  const scaled={};
  Object.entries(base).forEach(([r,c])=>{
    const rarityRank={"Common":0,"Uncommon":1,"Rare":2,"Epic":3,"Legendary":4,"Ultra Rare":5,"Secret":6}[r]||0;
    scaled[r]=c*Math.pow(luck,rarityRank*0.18);
  });
  // Hard overrides for specific packs
  if(packId==="premium"){scaled["Common"]=0;scaled["Uncommon"]=0;}
  if(packId==="ultra"){scaled["Common"]=0;scaled["Uncommon"]=0;scaled["Rare"]=.35;}
  if(packId==="master"){scaled["Common"]=0;scaled["Uncommon"]=0;scaled["Rare"]=0;scaled["Epic"]=Math.max(scaled["Epic"],.40);}
  const tbl=Object.entries(RARITY_CFG).filter(([r])=>r!=="GOLDEN"&&r!=="Mega").map(([r,c])=>[r,{...c,chance:scaled[r]??c.chance}]);
  const tot=tbl.reduce((s,[,c])=>s+c.chance,0);
  const rand=Math.random()*tot; let cum=0,chosen="Common";
  for(const[r,c]of tbl){cum+=c.chance;if(rand<cum){chosen=r;break;}}
  let pool=CARDS.filter(c=>c.rarity===chosen);
  if(!pool.length)pool=CARDS.filter(c=>c.rarity==="Common");
  const weighted=[]; pool.forEach(c=>{const w=(surgeType&&c.type===surgeType)?3:1;for(let i=0;i<w;i++)weighted.push(c);});
  const picked=weighted[Math.floor(Math.random()*weighted.length)];
  return{...picked,uid:crypto.randomUUID(),obtainedAt:new Date().toLocaleDateString()};
};
const rollPack=(crateId,surge)=>{
  const crate=CRATES.find(c=>c.id===crateId);
  if(!crate)return[];
  // Mega pack: guaranteed random Mega card
  if(crate.megaPack){
    const mega=MEGA_CARDS[Math.floor(Math.random()*MEGA_CARDS.length)];
    return[{...mega,uid:crypto.randomUUID(),obtainedAt:new Date().toLocaleDateString()}];
  }
  const activeSurge=surge&&Date.now()<surge.expiresAt?surge.type:crate.surgeType;
  return Array.from({length:crate.cards},()=>rollCard(activeSurge,crateId,crate.luck||1));
};

/* ══════════════════════════════════════════════════ SPARKLINE */
function Sparkline({data,color,w=80,h=28}){
  if(!data||data.length<2)return null;
  const mn=Math.min(...data),mx=Math.max(...data),rng=mx-mn||1;
  const pts=data.map((v,i)=>`${(i/(data.length-1))*w},${h-((v-mn)/rng)*h}`).join(" ");
  const up=data[data.length-1]>=data[Math.max(0,data.length-10)];
  return <svg width={w} height={h} style={{display:"block"}}><polyline points={pts} fill="none" stroke={up?"#10B981":"#EF4444"} strokeWidth="1.5" strokeLinejoin="round"/></svg>;
}

  // Portfolio from collection

// SHA-256 hash using Web Crypto — never store plaintext passwords
const hashPassword=async(password,username)=>{
  const msg=password+"::ptcg::"+username.toLowerCase();
  const buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
};

function LoginScreen({onLogin}){
  const [step,setStep]       =useState("name"); // name → password
  const [name,setName]       =useState("");
  const [password,setPassword]=useState("");
  const [confirm,setConfirm] =useState("");
  const [isNew,setIsNew]     =useState(false);
  const [loading,setLoading] =useState(false);
  const [err,setErr]         =useState("");

  const inputStyle={width:"100%",background:"#0F172A",border:"1px solid #334155",color:"#F1F5F9",borderRadius:8,padding:"12px 14px",fontFamily:"'Exo 2',sans-serif",fontSize:15,outline:"none",marginBottom:10};

  // Step 1 — check if name exists
  const checkName=async()=>{
    const n=name.trim();
    if(!n||n.length<2){setErr("At least 2 characters");return;}
    if(n.length>20){setErr("Max 20 characters");return;}
    if(!/^[a-zA-Z0-9_\- ]+$/.test(n)){setErr("Letters, numbers, spaces, _ and - only");return;}
    setLoading(true);setErr("");
    const{data}=await sb.from("players").select("id").eq("username",n).maybeSingle();
    setIsNew(!data);
    setStep("password");
    setLoading(false);
  };

  // Step 2 — register or login with password
  const submitPassword=async()=>{
    const n=name.trim();
    if(!password){setErr("Enter a password");return;}
    if(isNew&&password.length<6){setErr("Password must be at least 6 characters");return;}
    if(isNew&&password!==confirm){setErr("Passwords don't match");return;}
    setLoading(true);setErr("");
    // Init AudioContext here — inside a real user gesture click
    AudioEngine.init();AudioEngine.resume();
    const hash=await hashPassword(password,n);
    if(isNew){
      const{data:created,error}=await sb.from("players").insert({username:n,password_hash:hash,coins:500,total_packs:0,total_cards:0,total_sold:0,won:false,join_date:new Date().toLocaleDateString(),coins_gained_today:0,gain_date:"",flagged:false}).select().single();
      if(error){setErr("Error: "+error.message);setLoading(false);return;}
      AudioEngine.startMusic();
      onLogin(created);
    } else {
      const{data}=await sb.from("players").select("*").eq("username",n).eq("password_hash",hash).maybeSingle();
      if(!data){setErr("Wrong password. Try again.");setLoading(false);return;}
      AudioEngine.startMusic();
      onLogin(data);
    }
  };

  const cardStyle={background:"#080D1A",border:"1px solid #1E293B",borderRadius:16,padding:28};
  const btnStyle=(disabled)=>({width:"100%",padding:"13px",background:disabled?"#1A2035":"linear-gradient(135deg,#92400E,#F59E0B)",border:"none",borderRadius:9,color:disabled?"#334155":"#1C1917",fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:13,cursor:disabled?"not-allowed":"pointer",letterSpacing:1});

  return(
    <div style={{minHeight:"100vh",background:"#020617",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{width:"100%",maxWidth:400,textAlign:"center"}}>
        <img src={ITEM("poke-ball")} alt="" style={{width:60,height:60,imageRendering:"pixelated",filter:"drop-shadow(0 0 20px #FCD34Daa)",marginBottom:16}} onError={e=>e.target.style.display="none"}/>
        <h1 style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:28,marginBottom:6}}><span style={{color:"#FCD34D"}}>PKM</span><span style={{color:"#60A5FA"}}>TCG</span></h1>
        <p style={{color:"#334155",fontSize:13,marginBottom:28}}>Multiplayer · PikaStocks · Golden Charizard Hunt</p>

        {step==="name"&&(
          <div style={cardStyle}>
            <div style={{color:"#94A3B8",fontFamily:"'Orbitron',monospace",fontSize:10,letterSpacing:2,marginBottom:12,textAlign:"left"}}>TRAINER NAME</div>
            <input value={name} onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&checkName()} placeholder="Enter your username..." style={inputStyle} autoFocus/>
            {err&&<div style={{color:"#EF4444",fontSize:11,marginBottom:10,textAlign:"left"}}>{err}</div>}
            <button onClick={checkName} disabled={loading||!name.trim()} style={btnStyle(loading||!name.trim())}>
              {loading?"CHECKING...":"NEXT →"}
            </button>
          </div>
        )}

        {step==="password"&&(
          <div style={cardStyle}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:18}}>
              <button onClick={()=>{setStep("name");setErr("");setPassword("");setConfirm("");}} style={{background:"none",border:"1px solid #1E293B",borderRadius:6,color:"#475569",padding:"4px 10px",cursor:"pointer",fontSize:11}}>← Back</button>
              <div style={{color:isNew?"#10B981":"#60A5FA",fontFamily:"'Orbitron',monospace",fontSize:10,letterSpacing:1}}>{isNew?"NEW ACCOUNT":"WELCOME BACK"}</div>
            </div>
            <div style={{color:"#F1F5F9",fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:15,marginBottom:16,textAlign:"left"}}>{name}</div>
            <div style={{color:"#94A3B8",fontFamily:"'Orbitron',monospace",fontSize:10,letterSpacing:2,marginBottom:8,textAlign:"left"}}>{isNew?"CREATE PASSWORD":"PASSWORD"}</div>
            <input type="password" value={password} onChange={e=>setPassword(e.target.value)} onKeyDown={e=>e.key==="Enter"&&(!isNew?submitPassword():confirm?submitPassword():null)} placeholder="Password..." style={inputStyle} autoFocus/>
            {isNew&&<>
              <div style={{color:"#94A3B8",fontFamily:"'Orbitron',monospace",fontSize:10,letterSpacing:2,marginBottom:8,textAlign:"left"}}>CONFIRM PASSWORD</div>
              <input type="password" value={confirm} onChange={e=>setConfirm(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submitPassword()} placeholder="Confirm password..." style={inputStyle}/>
            </>}
            {err&&<div style={{color:"#EF4444",fontSize:11,marginBottom:10,textAlign:"left"}}>{err}</div>}
            {isNew&&<p style={{color:"#1E293B",fontSize:10,marginBottom:12,textAlign:"left"}}>Min 6 characters · there is no password recovery so don't forget it!</p>}
            <button onClick={submitPassword} disabled={loading||!password||(isNew&&!confirm)} style={btnStyle(loading||!password||(isNew&&!confirm))}>
              {loading?"...":(isNew?"CREATE ACCOUNT →":"LOGIN →")}
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

function TradePage({player,collection,stockPrices,pendingTrades,setPendingTrades,loadCollection,notify}){
  const [tab,setTab]=useState("incoming"); // incoming | new
  const [search,setSearch]=useState("");
  const [target,setTarget]=useState(null); // {id, username, collection}
  const [searching,setSearching]=useState(false);
  const [myOffer,setMyOffer]=useState([]); // card uids i'm offering
  const [theirRequest,setTheirRequest]=useState([]); // card uids i want from them
  const [outgoing,setOutgoing]=useState([]);
  const [sending,setSending]=useState(false);

  useEffect(()=>{loadOutgoing();},[]);
  const loadOutgoing=async()=>{
    const{data}=await sb.from("trades").select("*").eq("from_id",player.id).in("status",["pending","accepted","declined"]);
    setOutgoing(data||[]);
  };

  const searchPlayer=async()=>{
    const q=search.trim();if(!q)return;
    setSearching(true);setTarget(null);setMyOffer([]);setTheirRequest([]);
    const{data:p}=await sb.from("players").select("id,username,coins").ilike("username",q).maybeSingle();
    if(!p||p.id===player.id){notify(p?.id===player.id?"Can't trade with yourself!":"Trainer not found","#EF4444");setSearching(false);return;}
    const{data:col}=await sb.from("collection").select("*").eq("player_id",p.id);
    const mapped=(col||[]).map(row=>{
      const base=ALL_CARDS.find(c=>String(c.id)===String(row.card_id))||GOLDEN_CHARIZARD;
      return{...base,uid:row.uid||row.id,rarity:row.rarity||base.rarity};
    });
    setTarget({...p,collection:mapped});setSearching(false);
  };

  const toggleOffer=(uid)=>setMyOffer(o=>o.includes(uid)?o.filter(x=>x!==uid):[...o,uid]);
  const toggleRequest=(uid)=>setTheirRequest(o=>o.includes(uid)?o.filter(x=>x!==uid):[...o,uid]);

  const sendOffer=async()=>{
    if(!target||myOffer.length===0&&theirRequest.length===0){notify("Select at least one card to trade","#EF4444");return;}
    setSending(true);
    const offeredCards=collection.filter(c=>myOffer.includes(c.uid)).map(c=>({uid:c.uid,id:c.id,name:c.name,rarity:c.rarity,bp:c.bp,tc:c.tc}));
    const requestedCards=target.collection.filter(c=>theirRequest.includes(c.uid)).map(c=>({uid:c.uid,id:c.id,name:c.name,rarity:c.rarity,bp:c.bp,tc:c.tc}));
    const{error}=await sb.from("trades").insert({from_id:player.id,to_id:target.id,from_name:player.username,to_name:target.username,offered:offeredCards,requested:requestedCards,status:"pending"});
    if(error){notify("Failed to send: "+error.message,"#EF4444");setSending(false);return;}
    notify(`📦 Trade offer sent to ${target.username}!`,"#C084FC");
    setMyOffer([]);setTheirRequest([]);setTarget(null);setSearch("");
    loadOutgoing();setSending(false);setTab("outgoing");
  };

  const acceptTrade=async(trade)=>{
    // Move offered cards to my collection, requested cards to their collection
    const offered=trade.offered||[];
    const requested=trade.requested||[];
    // Delete requested cards from my collection
    for(const c of requested){await sb.from("collection").delete().eq("uid",c.uid);}
    // Add offered cards to my collection
    for(const c of offered){
      await sb.from("collection").insert({player_id:player.id,card_id:c.id,card_name:c.name,rarity:c.rarity,buy_price:c.bp||0,obtained_at:new Date().toLocaleDateString(),uid:crypto.randomUUID()});
    }
    // Delete offered cards from sender's collection
    for(const c of offered){await sb.from("collection").delete().eq("uid",c.uid);}
    // Add requested cards to sender's collection
    for(const c of requested){
      await sb.from("collection").insert({player_id:trade.from_id,card_id:c.id,card_name:c.name,rarity:c.rarity,buy_price:c.bp||0,obtained_at:new Date().toLocaleDateString(),uid:crypto.randomUUID()});
    }
    await sb.from("trades").update({status:"accepted"}).eq("id",trade.id);
    setPendingTrades(t=>t.filter(x=>x.id!==trade.id));
    await loadCollection(player.id);
    notify(`✅ Trade accepted with ${trade.from_name}!`,"#34D399");
    SFX.evolve();
  };

  const declineTrade=async(trade)=>{
    await sb.from("trades").update({status:"declined"}).eq("id",trade.id);
    setPendingTrades(t=>t.filter(x=>x.id!==trade.id));
    notify("Trade declined","#475569");
  };

  const cancelTrade=async(trade)=>{
    await sb.from("trades").update({status:"cancelled"}).eq("id",trade.id);
    setOutgoing(o=>o.filter(x=>x.id!==trade.id));
    notify("Offer cancelled","#475569");
  };

  const TabBtn=({id,label,count})=>(
    <button onClick={()=>setTab(id)} style={{padding:"8px 16px",background:tab===id?"#1E3A5F":"transparent",border:"none",borderRadius:8,color:tab===id?"#60A5FA":"#475569",fontFamily:"'Orbitron',monospace",fontSize:9,fontWeight:700,cursor:"pointer",position:"relative"}}>
      {label}{count>0&&<span style={{marginLeft:5,background:"#C084FC",color:"white",borderRadius:10,padding:"1px 5px",fontSize:7}}>{count}</span>}
    </button>
  );

  const rarOrd=["GOLDEN","Mega","Secret","Ultra Rare","Legendary","Epic","Rare","Uncommon","Common"];
  const sortedCol=[...collection].sort((a,b)=>rarOrd.indexOf(a.rarity)-rarOrd.indexOf(b.rarity));
  const sortedThem=target?[...target.collection].sort((a,b)=>rarOrd.indexOf(a.rarity)-rarOrd.indexOf(b.rarity)):[];

  const MiniCard=({card,selected,onClick,dimmed})=>{
    const rc=RARITY_CFG[card.rarity]||RARITY_CFG.Common;
    return(
      <div onClick={onClick} style={{width:80,flexShrink:0,background:selected?`${rc.color}22`:`linear-gradient(${card.bg||"135deg,#0F172A,#1A2035"})`,border:`2px solid ${selected?rc.color:rc.color+"33"}`,borderRadius:10,padding:"6px 4px",cursor:"pointer",textAlign:"center",opacity:dimmed?.8:1,transition:"all .15s",boxShadow:selected?`0 0 12px ${rc.color}66`:undefined}}
        onMouseEnter={e=>e.currentTarget.style.transform="scale(1.05)"}
        onMouseLeave={e=>e.currentTarget.style.transform=""}>
        <img src={ART(card.id)} alt={card.name} style={{width:54,height:54,objectFit:"contain"}} onError={e=>{e.target.src=MINI(card.id);e.target.style.imageRendering="pixelated";}}/>
        <div style={{color:rc.color,fontSize:7,fontFamily:"'Orbitron',monospace",fontWeight:700,marginTop:3,lineHeight:1.2}}>{card.name}</div>
        {selected&&<div style={{color:rc.color,fontSize:9,marginTop:2}}>✓</div>}
      </div>
    );
  };

  const TradeOffer=({trade,isIncoming})=>{
    const offered=trade.offered||[];
    const requested=trade.requested||[];
    const statusColor={pending:"#C084FC",accepted:"#34D399",declined:"#EF4444",cancelled:"#475569"}[trade.status]||"#475569";
    return(
      <div style={{background:"#080D1A",border:`1px solid ${statusColor}33`,borderRadius:14,padding:18,marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,flexWrap:"wrap",gap:8}}>
          <div>
            <span style={{fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:12,color:"#F1F5F9"}}>
              {isIncoming?`📦 From ${trade.from_name}`:`📤 To ${trade.to_name}`}
            </span>
            <span style={{marginLeft:10,color:statusColor,fontFamily:"'Orbitron',monospace",fontSize:8,fontWeight:700}}>{trade.status.toUpperCase()}</span>
          </div>
          {isIncoming&&trade.status==="pending"&&(
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>acceptTrade(trade)} style={{padding:"6px 16px",background:"linear-gradient(135deg,#065F46,#10B981)",border:"none",borderRadius:7,color:"white",fontFamily:"'Orbitron',monospace",fontSize:9,cursor:"pointer",fontWeight:700}}>ACCEPT ✓</button>
              <button onClick={()=>declineTrade(trade)} style={{padding:"6px 12px",background:"none",border:"1px solid #EF444444",borderRadius:7,color:"#EF4444",fontFamily:"'Orbitron',monospace",fontSize:9,cursor:"pointer",fontWeight:700}}>DECLINE ✗</button>
            </div>
          )}
          {!isIncoming&&trade.status==="pending"&&(
            <button onClick={()=>cancelTrade(trade)} style={{padding:"6px 12px",background:"none",border:"1px solid #47556944",borderRadius:7,color:"#475569",fontFamily:"'Orbitron',monospace",fontSize:9,cursor:"pointer",fontWeight:700}}>CANCEL</button>
          )}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr auto 1fr",gap:12,alignItems:"center"}}>
          <div>
            <div style={{color:"#475569",fontFamily:"'Orbitron',monospace",fontSize:7,letterSpacing:2,marginBottom:8}}>{isIncoming?"THEY OFFER":"YOU OFFER"}</div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {offered.length===0?<span style={{color:"#1E293B",fontSize:10}}>Nothing</span>:offered.map((c,i)=>{
                const rc=RARITY_CFG[c.rarity]||RARITY_CFG.Common;
                return(<div key={i} style={{background:`linear-gradient(135deg,#080D1A,#0F172A)`,border:`1px solid ${rc.color}44`,borderRadius:8,padding:"5px 7px",textAlign:"center",minWidth:58}}>
                  <img src={ART(c.id)} alt={c.name} style={{width:36,height:36,objectFit:"contain"}} onError={e=>{e.target.src=MINI(c.id);e.target.style.imageRendering="pixelated";}}/>
                  <div style={{color:rc.color,fontSize:6,fontFamily:"'Orbitron',monospace",fontWeight:700,marginTop:2}}>{c.name}</div>
                </div>);
              })}
            </div>
          </div>
          <div style={{color:"#334155",fontSize:22,fontWeight:700}}>⇄</div>
          <div>
            <div style={{color:"#475569",fontFamily:"'Orbitron',monospace",fontSize:7,letterSpacing:2,marginBottom:8}}>{isIncoming?"YOU GIVE":"THEY GIVE"}</div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {requested.length===0?<span style={{color:"#1E293B",fontSize:10}}>Nothing</span>:requested.map((c,i)=>{
                const rc=RARITY_CFG[c.rarity]||RARITY_CFG.Common;
                return(<div key={i} style={{background:`linear-gradient(135deg,#080D1A,#0F172A)`,border:`1px solid ${rc.color}44`,borderRadius:8,padding:"5px 7px",textAlign:"center",minWidth:58}}>
                  <img src={ART(c.id)} alt={c.name} style={{width:36,height:36,objectFit:"contain"}} onError={e=>{e.target.src=MINI(c.id);e.target.style.imageRendering="pixelated";}}/>
                  <div style={{color:rc.color,fontSize:6,fontFamily:"'Orbitron',monospace",fontWeight:700,marginTop:2}}>{c.name}</div>
                </div>);
              })}
            </div>
          </div>
        </div>
      </div>
    );
  };

  return(
    <div style={{animation:"fadeIn .35s ease"}}>
      <h1 style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:"clamp(20px,4vw,28px)",marginBottom:6}}>CARD <span style={{color:"#C084FC"}}>TRADING</span></h1>
      <p style={{color:"#334155",fontSize:12,marginBottom:20}}>Swap cards directly with other trainers</p>

      <div style={{display:"flex",gap:6,marginBottom:20,background:"#080D1A",padding:4,borderRadius:10,width:"fit-content"}}>
        <TabBtn id="incoming" label="INCOMING" count={pendingTrades.length}/>
        <TabBtn id="outgoing" label="SENT" count={0}/>
        <TabBtn id="new" label="NEW TRADE" count={0}/>
      </div>

      {tab==="incoming"&&(
        <div>
          {pendingTrades.length===0?<div style={{textAlign:"center",padding:"50px 0",color:"#1E293B",fontFamily:"'Orbitron',monospace",fontSize:11}}>No incoming trade offers</div>
          :pendingTrades.map(t=><TradeOffer key={t.id} trade={t} isIncoming={true}/>)}
        </div>
      )}

      {tab==="outgoing"&&(
        <div>
          {outgoing.length===0?<div style={{textAlign:"center",padding:"50px 0",color:"#1E293B",fontFamily:"'Orbitron',monospace",fontSize:11}}>No sent offers</div>
          :outgoing.map(t=><TradeOffer key={t.id} trade={t} isIncoming={false}/>)}
        </div>
      )}

      {tab==="new"&&(
        <div>
          {/* Search for trader */}
          <div style={{display:"flex",gap:10,marginBottom:20}}>
            <input value={search} onChange={e=>setSearch(e.target.value)} onKeyDown={e=>e.key==="Enter"&&searchPlayer()} placeholder="Enter exact trainer name..." style={{flex:1,background:"#0F172A",border:"1px solid #1E293B",color:"#F1F5F9",borderRadius:9,padding:"12px 16px",fontFamily:"'Exo 2',sans-serif",fontSize:14,outline:"none"}}/>
            <button onClick={searchPlayer} disabled={searching} style={{padding:"12px 22px",background:searching?"#1A2035":"linear-gradient(135deg,#4c1d95,#7C3AED)",border:"none",borderRadius:9,color:searching?"#334155":"white",fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:10,cursor:searching?"not-allowed":"pointer",letterSpacing:1}}>{searching?"...":"FIND"}</button>
          </div>

          {target&&(
            <div>
              <div style={{background:"#080D1A",border:"1px solid #1E293B",borderRadius:12,padding:14,marginBottom:16,display:"flex",alignItems:"center",gap:12}}>
                <img src={ITEM("poke-ball")} style={{width:32,height:32,imageRendering:"pixelated"}} onError={e=>e.target.style.display="none"}/>
                <div style={{flex:1}}><div style={{fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:14}}>{target.username}</div><div style={{color:"#334155",fontSize:10}}>{target.collection.length} cards in collection</div></div>
              </div>

              {/* Card selection grid */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:20}}>
                <div>
                  <div style={{fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:10,color:"#60A5FA",letterSpacing:2,marginBottom:10}}>YOUR OFFER ({myOffer.length} selected)</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:6,maxHeight:340,overflowY:"auto",padding:4}}>
                    {sortedCol.filter(c=>!c.isGolden).map(c=>(
                      <MiniCard key={c.uid} card={c} selected={myOffer.includes(c.uid)} onClick={()=>toggleOffer(c.uid)}/>
                    ))}
                  </div>
                </div>
                <div>
                  <div style={{fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:10,color:"#C084FC",letterSpacing:2,marginBottom:10}}>REQUEST FROM {target.username.toUpperCase()} ({theirRequest.length} selected)</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:6,maxHeight:340,overflowY:"auto",padding:4}}>
                    {sortedThem.filter(c=>!c.isGolden).map(c=>(
                      <MiniCard key={c.uid} card={c} selected={theirRequest.includes(c.uid)} onClick={()=>toggleRequest(c.uid)}/>
                    ))}
                    {target.collection.length===0&&<div style={{color:"#1E293B",fontFamily:"'Orbitron',monospace",fontSize:10,padding:20}}>Empty collection</div>}
                  </div>
                </div>
              </div>

              {/* Trade summary + send */}
              {(myOffer.length>0||theirRequest.length>0)&&(
                <div style={{background:"#080D1A",border:"1px solid #C084FC33",borderRadius:12,padding:16,marginBottom:16}}>
                  <div style={{display:"grid",gridTemplateColumns:"1fr auto 1fr",gap:12,alignItems:"center",marginBottom:14}}>
                    <div><div style={{color:"#60A5FA",fontFamily:"'Orbitron',monospace",fontSize:8,letterSpacing:2,marginBottom:6}}>YOU GIVE</div>
                      <div style={{display:"flex",flexWrap:"wrap",gap:4}}>{collection.filter(c=>myOffer.includes(c.uid)).map(c=>{const rc=RARITY_CFG[c.rarity]||RARITY_CFG.Common;return<div key={c.uid} style={{color:rc.color,fontSize:9,background:rc.color+"18",borderRadius:5,padding:"2px 7px"}}>{c.name}</div>;})}</div>
                    </div>
                    <div style={{fontSize:20,color:"#334155"}}>⇄</div>
                    <div><div style={{color:"#C084FC",fontFamily:"'Orbitron',monospace",fontSize:8,letterSpacing:2,marginBottom:6}}>YOU GET</div>
                      <div style={{display:"flex",flexWrap:"wrap",gap:4}}>{target.collection.filter(c=>theirRequest.includes(c.uid)).map(c=>{const rc=RARITY_CFG[c.rarity]||RARITY_CFG.Common;return<div key={c.uid} style={{color:rc.color,fontSize:9,background:rc.color+"18",borderRadius:5,padding:"2px 7px"}}>{c.name}</div>;})}</div>
                    </div>
                  </div>
                  <button onClick={sendOffer} disabled={sending} style={{width:"100%",padding:"12px",background:sending?"#1A2035":"linear-gradient(135deg,#4c1d95,#7C3AED)",border:"none",borderRadius:9,color:sending?"#334155":"white",fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:11,cursor:sending?"not-allowed":"pointer",letterSpacing:1}}>
                    {sending?"SENDING...":"📦 SEND TRADE OFFER"}
                  </button>
                </div>
              )}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════════ DUKE ADMIN PANEL */
function DukeAdminPanel({notify}){
  const [target,setTarget]=useState("");
  const [targetData,setTargetData]=useState(null);
  const [targetCol,setTargetCol]=useState([]);
  const [loading,setLoading]=useState(false);
  const [coins,setCoins]=useState("");

  const lookup=async()=>{
    const n=target.trim();if(!n)return;
    setLoading(true);setTargetData(null);setTargetCol([]);
    const{data:p}=await sb.from("players").select("*").eq("username",n).maybeSingle();
    if(!p){notify("User not found","#EF4444");setLoading(false);return;}
    const{data:col}=await sb.from("collection").select("*").eq("player_id",p.id);
    setTargetData(p);setTargetCol(col||[]);setLoading(false);
  };

  const setCoinsAdmin=async()=>{
    const c=parseInt(coins);if(isNaN(c)||!targetData)return;
    await sb.from("players").update({coins:c}).eq("id",targetData.id);
    setTargetData(p=>({...p,coins:c}));notify(`Set ${targetData.username} coins to ${c}`,"#10B981");
  };

  const resetPlayer=async()=>{
    if(!targetData||!window.confirm(`Reset ${targetData.username}? This clears their collection and sets coins to 500.`))return;
    await sb.from("collection").delete().eq("player_id",targetData.id);
    await sb.from("players").update({coins:500,total_packs:0,total_cards:0,total_sold:0,won:false}).eq("id",targetData.id);
    setTargetData(p=>({...p,coins:500}));setTargetCol([]);
    notify(`Reset ${targetData.username}`,"#F59E0B");
  };

  const deleteCard=async(uid,name)=>{
    await sb.from("collection").delete().eq("uid",uid);
    setTargetCol(c=>c.filter(x=>x.uid!==uid));
    notify(`Deleted ${name}`,"#EF4444");
  };

  const giveMega=async(megaCard)=>{
    if(!targetData)return;
    const row={player_id:targetData.id,card_id:megaCard.id,card_name:megaCard.name,rarity:megaCard.rarity,buy_price:megaCard.bp,obtained_at:new Date().toLocaleDateString(),uid:crypto.randomUUID()};
    const{error}=await sb.from("collection").insert(row);
    if(error){notify("Failed: "+error.message,"#EF4444");return;}
    setTargetCol(c=>[...c,row]);
    notify(`✅ Gave ${megaCard.name} to ${targetData.username}`,"#FF4500");
  };

  const banPlayer=async()=>{
    if(!targetData||!window.confirm(`Delete account for ${targetData.username}?`))return;
    await sb.from("collection").delete().eq("player_id",targetData.id);
    await sb.from("transactions").delete().eq("player_id",targetData.id);
    await sb.from("players").delete().eq("id",targetData.id);
    setTargetData(null);setTargetCol([]);
    notify(`Deleted ${target}`,"#EF4444");
  };

  return(
    <div style={{marginTop:20,background:"#0a0010",border:"2px solid #7C3AED44",borderRadius:12,padding:20}}>
      <div style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:10,color:"#7C3AED",letterSpacing:3,marginBottom:14}}>👑 DUKE ADMIN PANEL</div>
      <div style={{display:"flex",gap:8,marginBottom:14}}>
        <input value={target} onChange={e=>setTarget(e.target.value)} onKeyDown={e=>e.key==="Enter"&&lookup()} placeholder="Username to manage..." style={{flex:1,background:"#0F172A",border:"1px solid #334155",color:"#F1F5F9",borderRadius:7,padding:"9px 12px",fontFamily:"'Exo 2',sans-serif",fontSize:13,outline:"none"}}/>
        <button onClick={lookup} disabled={loading} style={{padding:"9px 16px",background:"linear-gradient(135deg,#4c1d95,#7C3AED)",border:"none",borderRadius:7,color:"white",fontFamily:"'Orbitron',monospace",fontSize:9,cursor:"pointer",fontWeight:700}}>{loading?"...":"LOOKUP"}</button>
      </div>
      {targetData&&<div>
        <div style={{background:"#0F172A",borderRadius:9,padding:14,marginBottom:12}}>
          <div style={{color:"#F1F5F9",fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:13,marginBottom:4}}>{targetData.username}</div>
          <div style={{color:"#475569",fontSize:11}}>Coins: {targetData.coins} · Cards: {targetCol.length} · Won: {targetData.won?"Yes":"No"}</div>
        </div>
        <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
          <input value={coins} onChange={e=>setCoins(e.target.value)} placeholder="Set coins..." style={{background:"#0F172A",border:"1px solid #334155",color:"#F1F5F9",borderRadius:7,padding:"7px 10px",fontFamily:"'Exo 2',sans-serif",fontSize:12,outline:"none",width:120}}/>
          <button onClick={setCoinsAdmin} style={{padding:"7px 14px",background:"linear-gradient(135deg,#065F46,#10B981)",border:"none",borderRadius:7,color:"white",fontFamily:"'Orbitron',monospace",fontSize:8,cursor:"pointer",fontWeight:700}}>SET COINS</button>
          <button onClick={async()=>{const f=!targetData.flagged;await sb.from("players").update({flagged:f}).eq("id",targetData.id);setTargetData(p=>({...p,flagged:f}));notify(`${targetData.username} ${f?"BANNED":"UNBANNED"}`,f?"#EF4444":"#10B981");}} style={{padding:"7px 14px",background:targetData.flagged?"linear-gradient(135deg,#065F46,#10B981)":"linear-gradient(135deg,#7f1d1d,#EF4444)",border:"none",borderRadius:7,color:"white",fontFamily:"'Orbitron',monospace",fontSize:8,cursor:"pointer",fontWeight:700}}>{targetData.flagged?"UNBAN":"BAN"}</button>
          <button onClick={resetPlayer} style={{padding:"7px 14px",background:"linear-gradient(135deg,#78350F,#F59E0B)",border:"none",borderRadius:7,color:"white",fontFamily:"'Orbitron',monospace",fontSize:8,cursor:"pointer",fontWeight:700}}>RESET ACCOUNT</button>
          <button onClick={banPlayer} style={{padding:"7px 14px",background:"linear-gradient(135deg,#7f1d1d,#DC2626)",border:"none",borderRadius:7,color:"white",fontFamily:"'Orbitron',monospace",fontSize:8,cursor:"pointer",fontWeight:700}}>DELETE ACCOUNT</button>
        </div>
        {targetCol.length>0&&<div>
          <div style={{color:"#475569",fontFamily:"'Orbitron',monospace",fontSize:8,letterSpacing:2,marginBottom:8}}>COLLECTION ({targetCol.length}) — click to delete</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6,maxHeight:200,overflowY:"auto"}}>
            {targetCol.map(row=>(
              <button key={row.uid} onClick={()=>deleteCard(row.uid,row.card_name)} title={`Delete ${row.card_name}`}
                style={{background:"#1E293B",border:"1px solid #DC262633",borderRadius:6,padding:"4px 8px",color:"#94A3B8",cursor:"pointer",fontSize:10,fontFamily:"'Exo 2',sans-serif"}}
                onMouseEnter={e=>{e.currentTarget.style.background="#2d0000";e.currentTarget.style.color="#EF4444";}}
                onMouseLeave={e=>{e.currentTarget.style.background="#1E293B";e.currentTarget.style.color="#94A3B8";}}>
                {row.card_name||row.card_id}
              </button>
            ))}
          </div>
        </div>}
        <div style={{marginTop:14}}>
          <div style={{color:"#FF4500",fontFamily:"'Orbitron',monospace",fontSize:8,letterSpacing:2,marginBottom:8}}>GIVE MEGA CARD</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {MEGA_CARDS.map(m=>(
              <button key={m.id} onClick={()=>giveMega(m)}
                style={{background:"#1a0010",border:"1px solid #FF450044",borderRadius:6,padding:"5px 10px",color:"#FF4500",cursor:"pointer",fontSize:10,fontFamily:"'Exo 2',sans-serif",display:"flex",alignItems:"center",gap:5}}
                onMouseEnter={e=>e.currentTarget.style.background="#2d0018"}
                onMouseLeave={e=>e.currentTarget.style.background="#1a0010"}>
                <img src={MINI(m.id)} style={{width:20,height:20,imageRendering:"pixelated"}} onError={e=>e.target.style.display="none"}/>{m.name}
              </button>
            ))}
          </div>
        </div>
      </div>}
    </div>
  );
}

function TrainerSearch({stockPrices}){
  const [query,setQuery]=useState("");
  const [results,setResults]=useState([]);
  const [loading,setLoading]=useState(false);
  const [viewed,setViewed]=useState(null); // {player, collection}

  const doSearch=async()=>{
    const q=query.trim();
    if(!q)return;
    setLoading(true);setResults([]);setViewed(null);
    const{data}=await sb.from("players").select("id,username,coins,total_packs,total_cards,total_sold,won,join_date").ilike("username",`%${q}%`).limit(15);
    setResults(data||[]);setLoading(false);
  };

  const openTrainer=async(p)=>{
    setViewed(null);setLoading(true);
    const{data:col}=await sb.from("collection").select("*").eq("player_id",p.id);
    const collection=(col||[]).map(row=>{
      const base=ALL_CARDS.find(c=>String(c.id)===String(row.card_id))||GOLDEN_CHARIZARD;
      return{...base,uid:row.uid||row.id,obtainedAt:row.obtained_at,buyPrice:row.buy_price,rarity:row.rarity||base.rarity};
    });
    setViewed({player:p,collection});setLoading(false);

  if(viewed){
    const{player:vp,collection:vc}=viewed;

    const prizes=vc.filter(c=>["GOLDEN","Mega","Secret","Ultra Rare","Legendary"].includes(c.rarity));
    return(
      <div style={{animation:"fadeIn .3s ease"}}>
        <button onClick={()=>setViewed(null)} style={{background:"none",border:"1px solid #1E293B",borderRadius:7,color:"#60A5FA",padding:"6px 14px",cursor:"pointer",fontFamily:"'Orbitron',monospace",fontSize:9,marginBottom:18,letterSpacing:1}}>← BACK</button>
        <div style={{background:"linear-gradient(135deg,#0F172A,#1A2744)",border:"1px solid #1E3A5F",borderRadius:16,padding:22,display:"flex",gap:18,alignItems:"center",marginBottom:16,flexWrap:"wrap"}}>
          <div style={{width:64,height:64,borderRadius:"50%",background:"linear-gradient(135deg,#1E3A5F,#2563EB)",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 0 24px #2563EB44",flexShrink:0}}>
            <img src={ITEM("poke-ball")} alt="" style={{width:36,height:36,imageRendering:"pixelated"}} onError={e=>e.target.style.display="none"}/>
          </div>
          <div style={{flex:1}}>
            <div style={{display:"flex",gap:8,alignItems:"center"}}><span style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:20}}>{vp.username}</span>{vp.won&&<span style={{fontSize:18}}>🏆</span>}</div>
            <div style={{color:"#334155",fontSize:10,marginTop:3}}>Trainer since {vp.join_date||"?"}</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:22,color:"#FCD34D"}}>🪙{(vp.coins||0).toLocaleString()}</div>
            <div style={{color:"#334155",fontSize:9,marginTop:2}}>Portfolio: {totalVal.toLocaleString()}🪙</div>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(120px,1fr))",gap:10,marginBottom:16}}>
          {[{l:"Packs",v:vp.total_packs||0,c:"#60A5FA"},{l:"Cards Pulled",v:vp.total_cards||0,c:"#34D399"},{l:"In Collection",v:vc.length,c:"#C084FC"},{l:"Cards Sold",v:vp.total_sold||0,c:"#FCD34D"}].map(s=>(
            <div key={s.l} style={{background:"#080D1A",border:`1px solid ${s.c}18`,borderRadius:12,padding:14,textAlign:"center"}}>
              <div style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:20,color:s.c}}>{s.v}</div>
              <div style={{color:"#1E293B",fontSize:8,marginTop:2,letterSpacing:.5}}>{s.l.toUpperCase()}</div>

        </div>
        {prizes.length>0&&(
          <div style={{background:"#080D1A",border:"1px solid #FCD34D18",borderRadius:12,padding:18,marginBottom:16}}>
            <div style={{fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:8,color:"#475569",letterSpacing:3,marginBottom:12}}>🏆 PRIZE SHELF</div>
            <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>

          </div>
        )}
        <div style={{background:"#080D1A",border:"1px solid #0A0F1E",borderRadius:12,padding:18,marginBottom:16}}>
          <div style={{fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:8,color:"#475569",letterSpacing:3,marginBottom:12}}>COLLECTION BREAKDOWN</div>
          {Object.entries(RARITY_CFG).map(([rarity,cfg])=>{const count=rStats[rarity]||0;if(!count)return null;const pct=vc.length>0?(count/vc.length)*100:0;return(<div key={rarity} style={{marginBottom:8}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span style={{color:cfg.color,fontFamily:"'Orbitron',monospace",fontSize:8,fontWeight:700}}>{rarity.toUpperCase()}</span><span style={{color:"#334155",fontSize:8}}>{count}</span></div><div style={{background:"#0F172A",borderRadius:3,height:4,overflow:"hidden"}}><div style={{background:`linear-gradient(90deg,${cfg.color}77,${cfg.color})`,borderRadius:3,height:4,width:pct+"%"}}/></div></div>);})}
        </div>
        {vc.length>0&&(
          <div style={{background:"#080D1A",border:"1px solid #0A0F1E",borderRadius:12,padding:18}}>
            <div style={{fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:8,color:"#475569",letterSpacing:3,marginBottom:14}}>FULL COLLECTION ({vc.length} cards)</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:10}}>
              {[...vc].sort((a,b)=>rarOrd.indexOf(a.rarity)-rarOrd.indexOf(b.rarity)).map(card=><PokemonCard key={card.uid} card={card} currentPrice={stockPrices[cardKey(card)]||card.bp}/>)}
            </div>
          </div>
        )}
      </div>
    );
  }

  return(
    <div style={{animation:"fadeIn .35s ease"}}>
      <h1 style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:"clamp(20px,4vw,28px)",marginBottom:6}}>TRAINER <span style={{color:"#60A5FA"}}>SEARCH</span></h1>
      <p style={{color:"#334155",fontSize:12,marginBottom:20}}>Look up any trainer and browse their collection</p>
      <div style={{display:"flex",gap:10,marginBottom:20}}>
        <input value={query} onChange={e=>setQuery(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doSearch()} placeholder="Search by trainer name..." style={{flex:1,background:"#0F172A",border:"1px solid #1E293B",color:"#F1F5F9",borderRadius:9,padding:"12px 16px",fontFamily:"'Exo 2',sans-serif",fontSize:14,outline:"none"}} autoFocus/>
        <button onClick={doSearch} disabled={loading||!query.trim()} style={{padding:"12px 22px",background:loading||!query.trim()?"#1A2035":"linear-gradient(135deg,#1e3a6e,#2563EB)",border:"none",borderRadius:9,color:loading||!query.trim()?"#334155":"white",fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:10,cursor:loading||!query.trim()?"not-allowed":"pointer",letterSpacing:1}}>{loading?"...":"SEARCH"}</button>
      </div>
      {results.length>0&&(
        <div style={{background:"#080D1A",border:"1px solid #0A0F1E",borderRadius:14,overflow:"hidden"}}>
          {results.map((r,i)=>(
            <div key={r.id} onClick={()=>openTrainer(r)} style={{display:"flex",alignItems:"center",gap:14,padding:"14px 18px",borderBottom:i<results.length-1?"1px solid #050a14":"none",cursor:"pointer",transition:"background .15s"}}
              onMouseEnter={e=>e.currentTarget.style.background="rgba(255,255,255,.03)"}
              onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
              <div style={{width:40,height:40,borderRadius:"50%",background:"linear-gradient(135deg,#1E3A5F,#2563EB)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                <img src={ITEM("poke-ball")} alt="" style={{width:22,height:22,imageRendering:"pixelated"}} onError={e=>e.target.style.display="none"}/>
              </div>
              <div style={{flex:1}}>
                <div style={{display:"flex",gap:7,alignItems:"center"}}><span style={{fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:13}}>{r.username}</span>{r.won&&<span title="Has Golden Charizard">🏆</span>}</div>
                <div style={{color:"#334155",fontSize:10,marginTop:2}}>{r.total_packs||0} packs · {r.total_cards||0} cards pulled</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:13,color:"#FCD34D"}}>{(r.coins||0).toLocaleString()}🪙</div>
                <div style={{color:"#475569",fontSize:9,marginTop:2}}>VIEW →</div>
              </div>
            </div>
          ))}
        </div>
      )}
      {!loading&&results.length===0&&query&&<div style={{textAlign:"center",padding:"50px 0",color:"#1E293B",fontFamily:"'Orbitron',monospace",fontSize:11}}>No trainers found for "{query}"</div>}
    </div>
  );
}

function App(){
  const [dbPlayer,setDbPlayer]           =useState(null);
  const [collection,setCollection]       =useState([]);
  const [stockPrices,setStockPrices]     =useState({});
  const [stockHistory,setStockHistory]   =useState({});
  const [page,setPage]                   =useState("shop");
  const [opening,setOpening]             =useState(null);
  const [revealedCards,setRevealedCards] =useState([]);
  const [revealIdx,setRevealIdx]         =useState(0);
  const [toast,setToast]                 =useState(null);
  const [filterRarity,setFilter]         =useState("All");
  const [sortBy,setSort]                 =useState("recent");
  const [nameEdit,setNameEdit]           =useState(false);
  const [tempName,setTempName]           =useState("");
  const [sellConfirm,setSellConfirm]     =useState(false);
  const [showWin,setShowWin]             =useState(false);
  const [surge,setSurge]                 =useState(null);
  const [feedEvents,setFeedEvents]       =useState([]);
  const [pendingTrades,setPendingTrades] =useState([]);
  const timer=useRef(null);
  const isHost=useRef(false);
  const lastPackTime=useRef(0);
  const [musicMuted,setMusicMuted]=useState(()=>localStorage.getItem("music_muted")==="1");
  const [sfxMuted,setSfxMuted]=useState(()=>localStorage.getItem("sfx_muted")==="1");

  useEffect(()=>{SFX.sfxMuted=sfxMuted;localStorage.setItem("sfx_muted",sfxMuted?"1":"0");},[sfxMuted]);
  useEffect(()=>{SFX.musicMuted=musicMuted;localStorage.setItem("music_muted",musicMuted?"1":"0");if(dbPlayer){if(musicMuted)SFX.stopMusic();else SFX.startMusic();}},[musicMuted]);

  // Convenience: merge dbPlayer + collection into one object for child components
  const player = dbPlayer ? {...dbPlayer, collection} : null;

  const notify=(msg,color="#34D399")=>{setToast({msg,color});setTimeout(()=>setToast(null),3500);};

  // ── After login: load collection + prices + subscribe to realtime
  const onLogin=async(p)=>{
    setDbPlayer(p);
    await loadCollection(p.id);
    await loadPrices();
    await loadTrades(p.id);
    subscribeRealtime(p.id);
  };

  const loadCollection=async(pid)=>{
    const{data}=await sb.from("collection").select("*").eq("player_id",pid);
    if(data)setCollection(data.map(row=>{
      const base=ALL_CARDS.find(c=>String(c.id)===String(row.card_id))||(row.rarity==="GOLDEN"?GOLDEN_CHARIZARD:MEGA_CARDS.find(c=>c.rarity===row.rarity)||CARDS[0]);
      return{...base, dbId:row.id, uid:row.uid||row.id, obtainedAt:row.obtained_at, buyPrice:row.buy_price, player_id:row.player_id, rarity:row.rarity||base.rarity};
    }));
  };

  const loadPrices=async()=>{
    const{data}=await sb.from("stock_prices").select("*");
    if(data&&data.length>0){
      const prices={}; data.forEach(r=>{prices[r.card_key]=r.price;});
      setStockPrices(prices);
    } else {
      // Seed initial prices if empty
      const seeds=[...CARDS,GOLDEN_CHARIZARD].map(c=>({card_key:cardKey(c),price:c.bp}));
      await sb.from("stock_prices").upsert(seeds,{onConflict:"card_key"});
      const p={}; seeds.forEach(s=>{p[s.card_key]=s.price;}); setStockPrices(p);
    }
    // Load history
    const{data:hist}=await sb.from("stock_history").select("card_key,price").order("recorded_at",{ascending:false}).limit(5000);
    if(hist){
      const h={};
      hist.forEach(r=>{if(!h[r.card_key])h[r.card_key]=[];h[r.card_key].unshift(r.price);});
      setStockHistory(h);
    }
  };

  const subscribeRealtime=(pid)=>{
    sb.channel("stock_prices").on("postgres_changes",{event:"UPDATE",schema:"public",table:"stock_prices"},(payload)=>{
      setStockPrices(p=>({...p,[payload.new.card_key]:payload.new.price}));
      setStockHistory(h=>({...h,[payload.new.card_key]:[...(h[payload.new.card_key]||[]).slice(-80),payload.new.price]}));
    }).subscribe();

    sb.channel("market_events").on("postgres_changes",{event:"INSERT",schema:"public",table:"market_events"},(payload)=>{
      const typeColors={"Fire":"#EE8130","Water":"#6390F0","Electric":"#F7D02C","Psychic":"#F95587","Dark":"#705746","Dragon":"#6F35FC","Grass":"#7AC74C","Normal":"#A8A77A","Ghost":"#735797","Ice":"#96D9D6"};
      const obj={type:payload.new.surge_type,label:`⚡ ${payload.new.surge_type.toUpperCase()} SURGE! Cards 3× boosted!`,color:typeColors[payload.new.surge_type]||"#FCD34D",expiresAt:payload.new.expires_at};
      setSurge(obj);setTimeout(()=>setSurge(null),payload.new.expires_at-Date.now());
    }).subscribe();

    sb.channel("transactions").on("postgres_changes",{event:"INSERT",schema:"public",table:"transactions"},(payload)=>{
      if(payload.new.player_id===pid)return;
      setFeedEvents(f=>[{id:payload.new.id,detail:payload.new.detail,type:payload.new.type},...f.slice(0,19)]);
    }).subscribe();

    // Listen for incoming trade offers
    sb.channel("trades_"+pid).on("postgres_changes",{event:"*",schema:"public",table:"trades",filter:`to_id=eq.${pid}`},(payload)=>{
      if(payload.eventType==="INSERT"){
        setPendingTrades(t=>[payload.new,...t]);
        notify(`📦 Trade offer from ${payload.new.from_name}!`,"#C084FC");
        SFX.sell();
      } else if(payload.eventType==="UPDATE"){
        setPendingTrades(t=>t.map(x=>x.id===payload.new.id?payload.new:x));
      } else if(payload.eventType==="DELETE"){
        setPendingTrades(t=>t.filter(x=>x.id!==payload.old.id));
      }
    }).subscribe();
  };

  const loadTrades=async(pid)=>{
    const{data}=await sb.from("trades").select("*").eq("to_id",pid).eq("status","pending");
    setPendingTrades(data||[]);
  };

  // ── Stock tick: one random client becomes "host" and pushes prices
  useEffect(()=>{
    if(!dbPlayer)return;
    // Determine host: whoever loaded earliest. We use a simple coin flip with low probability so usually one person wins.
    isHost.current=Math.random()<0.3; // ~30% chance — ensures at least one host among a few players
    if(!isHost.current)return;
    const t=setInterval(async()=>{
      const{np,nh}=tickPrices(stockPrices,stockHistory);
      setStockPrices(np);setStockHistory(nh);
      // Push to Supabase (which broadcasts to all via realtime)
      const updates=Object.entries(np).map(([k,v])=>({card_key:k,price:v}));
      await sb.from("stock_prices").upsert(updates,{onConflict:"card_key"});
      // Record history samples (every other tick to save writes)
      if(Math.random()<0.5){
        const histRows=Object.entries(np).map(([k,v])=>({card_key:k,price:v}));
        await sb.from("stock_history").insert(histRows);
      }
    },10000);
    return()=>clearInterval(t);
  },[dbPlayer,stockPrices]);

  // ── Random surge (host only, every 60-120s)
  useEffect(()=>{
    if(!dbPlayer||!isHost.current)return;
    const schedule=()=>{
      const delay=60000+Math.random()*60000;
      return setTimeout(async()=>{
        const types=["Fire","Water","Electric","Psychic","Dark","Dragon","Grass","Normal","Ghost","Ice"];
        const t=types[Math.floor(Math.random()*types.length)];
        const expiresAt=Date.now()+20000;
        await sb.from("market_events").insert({surge_type:t,expires_at:expiresAt});
        schedule();
      },delay);
    };
    const t=schedule(); return()=>clearTimeout(t);
  },[dbPlayer]);

  // ── Win detection
  useEffect(()=>{
    if(player?.won&&collection.some(c=>c.isGolden)&&!showWin)setShowWin(true);
  },[player,collection]);

  // ── Buy pack
  const buyPack=async(crateId, qty=1)=>{
    const crate=CRATES.find(c=>c.id===crateId);
    const totalCost=crate.price*qty;
    if(player.coins<totalCost){SFX.error();notify("Not enough coins!","#EF4444");return;}
    // Rate limit
    const now=Date.now();
    if(now-lastPackTime.current<2500){notify("Slow down!","#EF4444");return;}
    lastPackTime.current=now;
    // Re-fetch coins from DB
    const{data:fresh}=await sb.from("players").select("coins,flagged").eq("id",player.id).single();
    if(!fresh||fresh.flagged){notify("Account flagged. Contact admin.","#EF4444");return;}
    if(fresh.coins<totalCost){notify("Not enough coins!","#EF4444");setDbPlayer(p=>({...p,coins:fresh.coins}));return;}
    SFX.packOpen();
    const activeSurge=surge&&Date.now()<surge.expiresAt?surge:null;
    // Roll all packs at once
    const allCards=[];
    for(let i=0;i<qty;i++) allCards.push(...rollPack(crateId,activeSurge));
    const withPrices=allCards.map(c=>({...c,buyPrice:stockPrices[cardKey(c)]||c.bp}));
    const newCoins=fresh.coins-totalCost;
    await sb.from("players").update({coins:newCoins,total_packs:player.total_packs+qty,total_cards:player.total_cards+allCards.length}).eq("id",player.id);
    setDbPlayer(p=>({...p,coins:newCoins,total_packs:p.total_packs+qty,total_cards:p.total_cards+allCards.length}));
    await sb.from("transactions").insert({player_id:player.id,type:"pack",detail:`Opened ${qty}× ${crate.name}`,tx_date:new Date().toLocaleDateString()});
    setRevealedCards(withPrices);setRevealIdx(0);
    setOpening({crate,phase:"opening",qty});
    clearTimeout(timer.current);
    timer.current=setTimeout(()=>setOpening(o=>o?{...o,phase:"reveal"}:null),1100);
  };

  const revealNext=async()=>{
    if(revealIdx<revealedCards.length-1){setRevealIdx(i=>i+1);}
    else{
      // Save cards to collection table
      const rows=revealedCards.map(c=>({player_id:player.id,card_id:c.id,card_name:c.name,rarity:c.rarity,buy_price:c.buyPrice||c.bp,obtained_at:c.obtainedAt,uid:c.uid}));
      await sb.from("collection").insert(rows);
      await loadCollection(player.id);
      setOpening(o=>({...o,phase:"done"}));
    }
  };
  const closeOpening=()=>{setOpening(null);setRevealedCards([]);setRevealIdx(0);};

  // ── Sell card at market price
  const sellCard=async(card)=>{
    const price=stockPrices[cardKey(card)]||card.bp||10;
    const newCoins=player.coins+price;
    await sb.from("collection").delete().eq("uid",card.uid);
    await sb.from("players").update({coins:newCoins,total_sold:player.total_sold+1}).eq("id",player.id);
    await sb.from("transactions").insert({player_id:player.id,type:"sell",detail:`${card.name} @ ${price}🪙`,coins:price,tx_date:new Date().toLocaleDateString()});
    setDbPlayer(p=>({...p,coins:newCoins,total_sold:p.total_sold+1}));
    setCollection(c=>c.filter(x=>x.uid!==card.uid));
    SFX.sell();notify(`+${price}🪙 from ${card.name}`,RARITY_CFG[card.rarity]?.color||"#FCD34D");
  };

  // ── Golden Charizard attempt
  const buyGolden=async()=>{
    const price=stockPrices["golden"]||GOLDEN_CHARIZARD.bp;
    if(player.coins<price){notify("Not enough coins!","#EF4444");return;}
    if(Math.random()>0.1){
      const fee=Math.round(price*.1);
      const nc=player.coins-fee;
      await sb.from("players").update({coins:nc}).eq("id",player.id);
      await sb.from("transactions").insert({player_id:player.id,type:"sell",detail:"Golden Charizard attempt failed",coins:-fee,tx_date:new Date().toLocaleDateString()});
      setDbPlayer(p=>({...p,coins:nc}));
      notify(`Slipped away! Fee: ${fee}🪙`,"#F59E0B"); return;
    }
    const gc={...GOLDEN_CHARIZARD,uid:crypto.randomUUID(),obtainedAt:new Date().toLocaleDateString(),buyPrice:price};
    const nc=player.coins-price;
    await sb.from("collection").insert({player_id:player.id,card_id:6,card_name:"Golden Charizard",rarity:"GOLDEN",buy_price:price,obtained_at:gc.obtainedAt,uid:gc.uid});
    await sb.from("players").update({coins:nc,won:true}).eq("id",player.id);
    await sb.from("transactions").insert({player_id:player.id,type:"buy",detail:"GOLDEN CHARIZARD ACQUIRED!",coins:-price,tx_date:new Date().toLocaleDateString()});
    setDbPlayer(p=>({...p,coins:nc,won:true}));
    setCollection(c=>[...c,gc]);
    notify("✨ GOLDEN CHARIZARD! ✨","#FFD700");
  };

  // ── EVOLUTION SYSTEM
  // Regular evo: need 2 of same Pokemon → fuses into next stage
  // Mega evo: need just 1 of a mega-eligible Pokemon → mega evolves it (consumes the card)
  const getEvoOpportunities=()=>{
    const counts={};
    collection.forEach(c=>{
      const k=String(c.id);
      if(!counts[k])counts[k]={card:c,uids:[]};
      counts[k].uids.push(c.uid);
    });
    const opps=[];
    Object.entries(counts).forEach(([id,{card,uids}])=>{
      const numId=Number(id);
      // Regular evo: need 2 copies
      const nextId=EVO_CHAIN[numId];
      if(nextId&&uids.length>=2){
        const nextIds=Array.isArray(nextId)?nextId:[nextId];
        const nextCards=nextIds.map(i=>ALL_CARDS.find(c=>c.id===i)).filter(Boolean);
        if(nextCards.length)opps.push({type:"evo",card,uids,nextCards,isChoice:Array.isArray(nextId)});
      }
      // Mega evo: need 50 copies — extremely rare achievement
      const megaId=MEGA_EVO_MAP[numId];
      if(megaId&&uids.length>=50){
        const megaCard=MEGA_CARDS.find(c=>c.id===megaId);
        if(megaCard)opps.push({type:"mega",card,uids,nextCards:[megaCard],isChoice:false,needed:50});
      }
    });
    return opps;
  };

  const [eeveeModal,setEeveeModal]=useState(null);

  const doEvolve=async(opp,chosenCard)=>{
    const evolved=chosenCard||opp.nextCards[0];
    const isMega=opp.type==="mega";
    if(!evolved||!evolved.id||!evolved.name){
      notify("Evolution target not found — nothing changed.","#EF4444");
      return;
    }
    const uidsToRemove=isMega?opp.uids.slice(0,50):opp.uids.slice(0,2);
    // Step 1: INSERT the evolved card first
    const evoCard={...evolved,uid:crypto.randomUUID(),obtainedAt:new Date().toLocaleDateString(),buyPrice:stockPrices[cardKey(evolved)]||evolved.bp};
    const insertRow={player_id:player.id,card_id:evoCard.id,card_name:evoCard.name,rarity:evoCard.rarity,buy_price:evoCard.buyPrice,obtained_at:evoCard.obtainedAt,uid:evoCard.uid};
    const{data:inserted,error:insertErr}=await sb.from("collection").insert(insertRow).select();
    if(insertErr||!inserted||inserted.length===0){
      notify(`❌ Evolution insert FAILED — your cards are safe. Error: ${insertErr?.message||"no data returned"}`,"#EF4444");
      return;
    }
    // Step 2: Verify the card actually exists in DB before deleting anything
    const{data:verify}=await sb.from("collection").select("id").eq("uid",evoCard.uid).maybeSingle();
    if(!verify){
      notify("❌ Could not verify new card in database — nothing deleted.","#EF4444");
      return;
    }
    // Step 3: Only NOW delete the source cards
    for(const uid of uidsToRemove){
      await sb.from("collection").delete().eq("uid",uid);
    }
    await sb.from("transactions").insert({player_id:player.id,type:"evolve",detail:`${opp.card.name} → ${evolved.name}`,tx_date:new Date().toLocaleDateString()});
    await loadCollection(player.id);
    if(isMega){SFX.megaEvolve();notify(`🌟 MEGA EVOLUTION! ${evolved.name}!`,"#FF4500");}
    else{SFX.evolve();notify(`✨ Evolved into ${evolved.name}!`,RARITY_CFG[evolved.rarity]?.color||"#34D399");}
    setEeveeModal(null);
  };

  const triggerEvolve=async(opp)=>{
    if(opp.type==="mega"){
      const mega=opp.nextCards[0];
      if(!window.confirm(`MEGA EVOLUTION\n\nConsume 50× ${opp.card.name} → ${mega?.name}\n\nAre you sure?`))return;
    }
    if(opp.isChoice){setEeveeModal(opp);}
    else{await doEvolve(opp);}
  };

  const getFiltered=()=>{
    let cards=[...collection];
    if(filterRarity!=="All")cards=cards.filter(c=>c.rarity===filterRarity);
    const o=["GOLDEN","Secret","Ultra Rare","Legendary","Epic","Rare","Uncommon","Common"];
    if(sortBy==="rarity")cards.sort((a,b)=>o.indexOf(a.rarity)-o.indexOf(b.rarity));
    else if(sortBy==="name")cards.sort((a,b)=>a.name.localeCompare(b.name));
    else if(sortBy==="value")cards.sort((a,b)=>(stockPrices[cardKey(b)]||b.bp)-(stockPrices[cardKey(a)]||a.bp));
    return cards;
  };

  const doSellAll=async()=>{
    const fc=getFiltered().filter(c=>!c.isGolden);
    const total=fc.reduce((s,c)=>s+(stockPrices[cardKey(c)]||c.bp||0),0);
    const uids=fc.map(c=>c.uid);
    for(const uid of uids) await sb.from("collection").delete().eq("uid",uid);
    const nc=player.coins+total;
    await sb.from("players").update({coins:nc,total_sold:player.total_sold+fc.length}).eq("id",player.id);
    await sb.from("transactions").insert({player_id:player.id,type:"sell",detail:`Bulk sold ${fc.length} cards`,coins:total,tx_date:new Date().toLocaleDateString()});
    setDbPlayer(p=>({...p,coins:nc,total_sold:p.total_sold+fc.length}));
    setCollection(c=>c.filter(x=>!uids.includes(x.uid)));
    notify(`+${total}🪙 bulk sell!`,"#FCD34D"); setSellConfirm(false);
  };

  const rStats=Object.fromEntries(Object.keys(RARITY_CFG).map(r=>[r,collection.filter(c=>c.rarity===r).length]));
  const currentCard=revealedCards[revealIdx];
  const navItems=[["shop","🏪","SHOP"],["stocks","📈","STOCKS"],["collection","📚","CARDS"],["leaderboard","🏆","RANKS"],["battle","⚔️","BATTLE"],["trade","🔄","TRADE"],["search","🔍","TRAINERS"],["profile","👤","PROFILE"]];

  if(!player) return <LoginScreen onLogin={onLogin}/>;

          <div style={{overflow:"hidden",flex:1}}>
            <div style={{display:"flex",gap:32,animation:"tickerScroll 20s linear infinite",whiteSpace:"nowrap",alignItems:"center",height:"100%"}}>
              {feedEvents.map((e,i)=><span key={i} style={{color:"#475569",fontFamily:"'Share Tech Mono',monospace",fontSize:10}}>· {e.detail}</span>)}

          </div>
        </div>
      )}

      {/* Opening modal */}
      {opening&&(
        <div style={{position:"fixed",inset:0,zIndex:1000,background:"radial-gradient(ellipse at center,#0a1525 0%,#020617 100%)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"20px",overflow:"hidden"}}>
          {opening.phase==="opening"&&(
            <div style={{textAlign:"center"}}>

              <div style={{color:opening.crate.color,fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:"24px",marginTop:"26px",animation:"pulse .5s ease infinite",letterSpacing:"6px"}}>OPENING...</div>
            </div>
          )}
          {opening.phase==="reveal"&&currentCard&&(()=>{

                {isEpic&&<div style={{position:"fixed",inset:0,zIndex:-1,pointerEvents:"none",background:`radial-gradient(circle at 50% 40%, ${rc.color}28 0%, transparent 55%)`,animation:"legFlash 1.4s ease forwards"}}/>}

                <div key={"c-"+revealIdx} style={{animation:"floatAnim 3s ease infinite"}}>
                  <PokemonCard card={currentCard} animIn large currentPrice={curPrice}/>

                {currentCard.rarity==="Secret"&&<div style={{color:"#E879F9",fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:"16px",letterSpacing:"4px",marginTop:"14px",animation:"epicPulse .8s ease infinite"}}>✦ SECRET RARE! ✦</div>}
                {currentCard.rarity==="Ultra Rare"&&<div style={{color:"#FF6B35",fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:"15px",letterSpacing:"3px",marginTop:"14px",animation:"epicPulse .9s ease infinite"}}>◈ ULTRA RARE! ◈</div>}
                {isLeg&&!["Secret","Ultra Rare"].includes(currentCard.rarity)&&<div style={{color:"#FCD34D",fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:"16px",letterSpacing:"5px",marginTop:"14px",animation:"epicPulse .9s ease infinite"}}>✨ LEGENDARY! ✨</div>}

              </div>
              <button onClick={closeOpening} style={{marginTop:"26px",padding:"13px 44px",background:"linear-gradient(135deg,#065F46,#10B981)",border:"none",borderRadius:"12px",color:"white",fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:"12px",cursor:"pointer",letterSpacing:"1px"}}>✓ ADD TO COLLECTION</button>
            </div>
          )}
        </div>
      )}

      {toast&&<div style={{position:"fixed",top:16,right:16,zIndex:999,background:"#080D1A",border:`1px solid ${toast.color}77`,borderRadius:"12px",padding:"11px 16px",color:toast.color,fontFamily:"'Orbitron',monospace",fontSize:"11px",fontWeight:700,letterSpacing:".5px",animation:"fadeIn .3s ease",boxShadow:`0 0 26px ${toast.color}44`,maxWidth:320}}>{toast.msg}</div>}

      <header style={{borderBottom:"1px solid #0A0F1E",background:"rgba(2,6,23,.97)",backdropFilter:"blur(14px)",position:"sticky",top:0,zIndex:100,padding:"0 14px"}}>
        <div style={{maxWidth:1200,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between",height:60,gap:8}}>
          <div style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:15,letterSpacing:2,userSelect:"none",display:"flex",alignItems:"center",gap:7,flexShrink:0}}>
            <img src={ITEM("poke-ball")} alt="" style={{width:22,height:22,imageRendering:"pixelated"}} onError={e=>e.target.style.display="none"}/>
            <span style={{color:"#FCD34D"}}>PKM</span><span style={{color:"#60A5FA"}}>TCG</span>
            {surge&&<span style={{background:surge.color+"22",border:`1px solid ${surge.color}`,borderRadius:20,padding:"2px 8px",fontSize:7,color:surge.color,animation:"pulse 1s ease infinite"}}>⚡{surge.type}</span>}
          </div>
          <nav style={{display:"flex",gap:2,flexWrap:"wrap"}}>
            {navItems.map(([id,icon,label])=>(

                {id==="trade"&&pendingTrades.length>0&&<span style={{position:"absolute",top:2,right:2,background:"#C084FC",color:"white",borderRadius:"50%",width:14,height:14,fontSize:7,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900}}>{pendingTrades.length}</span>}

          <div style={{display:"flex",alignItems:"center",gap:8}}>

            <button onClick={()=>setMusicMuted(m=>!m)} title={musicMuted?"Music Off":"Music On"} style={{background:"none",border:"1px solid #1E293B",borderRadius:7,color:musicMuted?"#334155":"#34D399",padding:"5px 8px",cursor:"pointer",fontSize:12}}>🎵</button>
            <span style={{color:"#475569",fontFamily:"'Orbitron',monospace",fontSize:9}}>{player.username}</span>
            <div style={{background:"rgba(252,211,77,.07)",border:"1px solid #FCD34D22",borderRadius:20,padding:"6px 12px",fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:12,color:"#FCD34D",flexShrink:0}}>🪙{player.coins.toLocaleString()}</div>
          </div>

        {/* SHOP */}

          <div style={{animation:"fadeIn .35s ease"}}>

            <p style={{color:"#334155",marginBottom:20,fontSize:12}}>Pure random · {CARDS.length} cards in pool · type surges fire randomly for all players</p>
            {surge&&<div style={{background:surge.color+"12",border:`2px solid ${surge.color}55`,borderRadius:12,padding:"12px 18px",marginBottom:18,display:"flex",alignItems:"center",gap:12}}>
              <div style={{fontSize:22}}>⚡</div><div><div style={{color:surge.color,fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:11,letterSpacing:1}}>ACTIVE SURGE: {surge.type.toUpperCase()}</div><div style={{color:"#94A3B8",fontSize:11,marginTop:2}}>{surge.type} cards appear 3× more often in all packs right now!</div></div>

            <div style={{background:"linear-gradient(135deg,#0b2318,#091b26)",border:"1px solid #10B98122",borderRadius:12,padding:"14px 20px",marginBottom:22,display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,flexWrap:"wrap"}}>

              </div>
              <button onClick={async()=>{
              const todayKey=`daily_${player.id}_${new Date().toDateString()}`;
              if(localStorage.getItem(todayKey)){notify("Already claimed today! Come back tomorrow.","#EF4444");return;}
              const nc=player.coins+200;
              await sb.from("players").update({coins:nc}).eq("id",player.id);
              setDbPlayer(p=>({...p,coins:nc}));
              localStorage.setItem(todayKey,"1");
              notify("+200🪙 Daily reward claimed!","#10B981");
            }} style={{padding:"9px 20px",background:"linear-gradient(135deg,#065F46,#10B981)",border:"none",borderRadius:8,color:"white",fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:9,cursor:"pointer"}}>CLAIM +200🪙</button>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(250px,1fr))",gap:14,marginBottom:32}}>

                    <img src={ITEM(crate.ball)} alt={crate.name} style={{width:60,height:60,objectFit:"contain",imageRendering:"pixelated",filter:`drop-shadow(0 0 14px ${crate.color}99)`}} onError={e=>e.target.style.display="none"}/>
                  </div>
                  <div style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:15,textAlign:"center",color:"#F1F5F9"}}>{crate.name}</div>
