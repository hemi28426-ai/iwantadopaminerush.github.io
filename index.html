<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Card Pack Opener</title>

<style>
body{
background:#121212;
color:white;
font-family:sans-serif;
text-align:center;
}

button{
padding:10px 20px;
font-size:16px;
margin:10px;
cursor:pointer;
}

.card{
width:140px;
height:200px;
border-radius:12px;
border:2px solid #444;
display:inline-flex;
flex-direction:column;
justify-content:center;
align-items:center;
margin:10px;
font-size:18px;
}

.common{background:#444}
.rare{background:#2b6cff}
.epic{background:#9b5cff}
.legendary{background:#ffb300;color:black}

#cards{
margin-top:20px;
}

#collection{
margin-top:30px;
font-size:14px;
}
</style>
</head>

<body>

<h1>Card Pack Opener</h1>

<button onclick="openPack()">Open Pack</button>

<div id="cards"></div>

<h2>Your Collection</h2>
<div id="collection"></div>

<script>

let cards = [
{name:"Flame Fox",rarity:"common",icon:"🔥"},
{name:"Leaf Turtle",rarity:"common",icon:"🌿"},
{name:"Stone Golem",rarity:"common",icon:"🪨"},
{name:"Volt Tiger",rarity:"rare",icon:"⚡"},
{name:"Frost Dragon",rarity:"rare",icon:"❄"},
{name:"Shadow Serpent",rarity:"epic",icon:"🌑"},
{name:"Celestial Lion",rarity:"legendary",icon:"⭐"}
]

let rates = {
common:0.65,
rare:0.25,
epic:0.08,
legendary:0.02
}

let collection={}

function pickRarity(){
let r=Math.random()
if(r<rates.legendary)return"legendary"
if(r<rates.legendary+rates.epic)return"epic"
if(r<rates.legendary+rates.epic+rates.rare)return"rare"
return"common"
}

function openPack(){

document.getElementById("cards").innerHTML=""

for(let i=0;i<5;i++){

let rarity=pickRarity()

let pool=cards.filter(c=>c.rarity===rarity)

let card=pool[Math.floor(Math.random()*pool.length)]

let div=document.createElement("div")
div.className="card "+rarity
div.innerHTML=card.icon+"<br>"+card.name

document.getElementById("cards").appendChild(div)

collection[card.name]=(collection[card.name]||0)+1
}

updateCollection()

}

function updateCollection(){

let html=""

for(let c in collection){

html+=c+" x"+collection[c]+"<br>"

}

document.getElementById("collection").innerHTML=html

}

</script>

</body>
</html>
