<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Element Pack Opener</title>

<style>
body{
background:#0f0f0f;
color:white;
font-family:sans-serif;
text-align:center;
}

button{
padding:12px 24px;
font-size:18px;
margin:20px;
cursor:pointer;
border-radius:8px;
border:none;
background:#2b6cff;
color:white;
}

#cards{
margin-top:20px;
}

.card{
width:140px;
height:200px;
border-radius:12px;
border:2px solid #444;
display:inline-flex;
flex-direction:column;
justify-content:center;
align-items:center;
margin:10px;
font-size:22px;
transition:transform .2s;
}

.card:hover{
transform:scale(1.05);
}

.common{background:#3a3a3a}
.rare{background:#2b6cff}
.epic{background:#8b3dff}
.legendary{background:gold;color:black}

#collection{
margin-top:30px;
max-width:800px;
margin-left:auto;
margin-right:auto;
text-align:left;
}
</style>
</head>

<body>

<h1>Card Pack Opener</h1>

<button onclick="openPack()">Open Pack</button>

<div id="cards"></div>

<h2>Collection</h2>
<div id="collection"></div>

<script>

let cards=[

{name:"Fire Fox",rarity:"common",icon:"🔥"},
{name:"Leaf Turtle",rarity:"common",icon:"🌿"},
{name:"Water Slime",rarity:"common",icon:"💧"},
{name:"Rock Bug",rarity:"common",icon:"🪨"},
{name:"Wind Bird",rarity:"common",icon:"🌪️"},
{name:"Spark Mouse",rarity:"common",icon:"⚡"},
{name:"Crystal Beetle",rarity:"common",icon:"💎"},
{name:"Moon Cat",rarity:"rare",icon:"🌙"},
{name:"Thunder Wolf",rarity:"rare",icon:"⚡🐺"},
{name:"Ice Dragon",rarity:"rare",icon:"❄🐉"},
{name:"Metal Rhino",rarity:"rare",icon:"🦏"},
{name:"Shadow Snake",rarity:"epic",icon:"🐍🌑"},
{name:"Spirit Owl",rarity:"epic",icon:"🦉✨"},
{name:"Cosmic Whale",rarity:"epic",icon:"🐋🌌"},
{name:"Golden Phoenix",rarity:"legendary",icon:"🔥🕊"},
{name:"Star Lion",rarity:"legendary",icon:"🦁⭐"},
{name:"Galaxy Serpent",rarity:"legendary",icon:"🐉🌠"}

]

let rates={
common:0.65,
rare:0.25,
epic:0.08,
legendary:0.02
}

let collection={}

function pickRarity(){

let r=Math.random()

if(r<rates.legendary)return"legendary"
if(r<rates.legendary+rates.epic)return"epic"
if(r<rates.legendary+rates.epic+rates.rare)return"rare"

return"common"

}

function openPack(){

document.getElementById("cards").innerHTML=""

for(let i=0;i<5;i++){

let rarity=pickRarity()

let pool=cards.filter(c=>c.rarity===rarity)

let card=pool[Math.floor(Math.random()*pool.length)]

let div=document.createElement("div")

div.className="card "+rarity

div.innerHTML="<div>"+card.icon+"</div><div>"+card.name+"</div>"

document.getElementById("cards").appendChild(div)

collection[card.name]=(collection[card.name]||0)+1

}

updateCollection()

}

function updateCollection(){

let html=""

for(let c in collection){

html+=c+" x"+collection[c]+"<br>"

}

document.getElementById("collection").innerHTML=html

}

</script>

</body>
</html>
