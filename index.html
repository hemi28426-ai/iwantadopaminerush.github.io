/* ══════════════════════════════════════════════════ MUSIC + SFX ENGINE */
const AudioEngine={
  ctx:null, sfxMuted:false, musicMuted:false,
  musicGain:null, musicNodes:[],
  init(){
    if(!this.ctx)try{this.ctx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}
  },
  resume(){if(this.ctx?.state==="suspended")this.ctx.resume();},

  // ── SFX
  tone(freq,type,atk,dec,sus,rel,dur,vol=0.3){
    if(this.sfxMuted||!this.ctx)return;
    this.resume();
    const now=this.ctx.currentTime;
    const o=this.ctx.createOscillator(),g=this.ctx.createGain();
    o.connect(g);g.connect(this.ctx.destination);
    o.type=type;o.frequency.setValueAtTime(freq,now);
    g.gain.setValueAtTime(0,now);g.gain.linearRampToValueAtTime(vol,now+atk);
    g.gain.linearRampToValueAtTime(vol*sus,now+atk+dec);g.gain.linearRampToValueAtTime(0,now+dur+rel);
    o.start(now);o.stop(now+dur+rel+0.05);
  },
  click(){this.init();this.tone(800,"sine",.001,.05,.3,.05,.06,.15);},
  sell(){this.init();this.tone(1047,"sine",.001,.05,.3,.1,.15,.2);setTimeout(()=>this.tone(1319,"sine",.001,.05,.2,.1,.1,.15),80);},
  error(){this.init();this.tone(200,"sawtooth",.001,.1,.5,.1,.3,.3);},
  packOpen(){this.init();for(let i=0;i<5;i++)setTimeout(()=>this.tone(200+i*60,"sawtooth",.001,.02,.1,.05,.06,.1),i*70);},
  common(){this.init();this.tone(523,"sine",.01,.1,.5,.2,.3,.2);},
  uncommon(){this.init();[523,659].forEach((f,i)=>setTimeout(()=>this.tone(f,"sine",.01,.1,.5,.2,.25,.22),i*90));},
  rare(){this.init();[523,659,784].forEach((f,i)=>setTimeout(()=>this.tone(f,"sine",.01,.1,.5,.2,.28,.26),i*80));},
  epic(){this.init();[392,494,587,784].forEach((f,i)=>setTimeout(()=>this.tone(f,"triangle",.01,.12,.6,.3,.35,.3),i*70));},
  legendary(){this.init();[261,329,392,523,659,784,1047].forEach((f,i)=>setTimeout(()=>this.tone(f,"triangle",.01,.1,.7,.3,.45,.28),i*55));},
  ultraRare(){this.init();this.tone(80,"sawtooth",.001,.3,.8,.5,.8,.35);[523,659,784,1047,1319].forEach((f,i)=>setTimeout(()=>this.tone(f,"square",.01,.1,.6,.4,.45,.28),100+i*65));},
  mega(){this.init();this.tone(55,"sawtooth",.001,.4,.9,.6,1,.4);[261,330,392,523,659,784,1047,1319].forEach((f,i)=>setTimeout(()=>this.tone(f,"triangle",.01,.12,.8,.4,.55,.3),150+i*60));},
  evolve(){this.init();[392,440,494,523,587,659,784].forEach((f,i)=>setTimeout(()=>this.tone(f,"sine",.01,.08,.5,.15,.22,.25),i*50));},
  megaEvolve(){this.init();this.tone(70,"sawtooth",.001,.5,.9,.7,1.6,.45);[261,330,392,523,659,784,1047,1319,1568].forEach((f,i)=>setTimeout(()=>this.tone(f,"triangle",.01,.12,.8,.4,.55,.32),200+i*60));},
  golden(){this.init();this.tone(55,"sawtooth",.001,.6,.95,.8,2,.45);[130,165,196,261,330,392,523,659,784,1047,1319].forEach((f,i)=>setTimeout(()=>this.tone(f,"triangle",.01,.1,.9,.5,.65,.36),100+i*55));},

  // ── CALMING MUSIC — layered ambient pads + gentle arp
  startMusic(){
    this.init();if(this.musicMuted||!this.ctx||this.musicNodes.length>0)return;
    this.resume();
    const ctx=this.ctx;
    // Master gain
    const master=ctx.createGain();master.gain.setValueAtTime(0,ctx.currentTime);master.gain.linearRampToValueAtTime(0.18,ctx.currentTime+3);master.connect(ctx.destination);
    this.musicGain=master;

    // Reverb convolver for lush atmosphere
    const rev=ctx.createConvolver();
    const buf=ctx.createBuffer(2,ctx.sampleRate*2,ctx.sampleRate);
    for(let c=0;c<2;c++){const d=buf.getChannelData(c);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2.5);}
    rev.buffer=buf;
    const revGain=ctx.createGain();revGain.gain.value=0.45;
    rev.connect(revGain);revGain.connect(master);

    // Chord pads — Am pentatonic: A2 C3 E3 G3 A3
    const padNotes=[110,130.81,164.81,196,220,261.63,329.63,392,440];
    const chord=[110,164.81,220,261.63,329.63]; // A minor

    const makeOsc=(freq,detune,vol)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type="sine";o.frequency.value=freq;o.detune.value=detune;
      g.gain.value=vol;o.connect(g);g.connect(rev);g.connect(master);
      o.start();this.musicNodes.push(o,g);return{o,g};
    };

    // Layered detuned pads
    chord.forEach(f=>{makeOsc(f,0,0.04);makeOsc(f,8,0.025);makeOsc(f,-7,0.025);});

    // Slow LFO filter sweep on a pad
    const sweepOsc=ctx.createOscillator(),sweepGain=ctx.createGain(),filt=ctx.createBiquadFilter();
    sweepOsc.frequency.value=0.05;sweepOsc.type="sine";sweepGain.gain.value=600;
    filt.type="lowpass";filt.frequency.value=800;filt.Q.value=2;
    sweepOsc.connect(sweepGain);sweepGain.connect(filt.frequency);
    const padOsc=ctx.createOscillator(),padG=ctx.createGain();
    padOsc.type="triangle";padOsc.frequency.value=220;padG.gain.value=0.06;
    padOsc.connect(filt);filt.connect(padG);padG.connect(rev);padG.connect(master);
    sweepOsc.start();padOsc.start();
    this.musicNodes.push(sweepOsc,sweepGain,filt,padOsc,padG);

    // Gentle arpeggio — 8 notes cycling slowly
    const arpNotes=[220,261.63,329.63,392,440,523.25,392,329.63];
    let arpIdx=0;
    const playArp=()=>{
      if(this.musicMuted||!this.ctx)return;
      const now=ctx.currentTime;
      const freq=arpNotes[arpIdx%arpNotes.length];arpIdx++;
      const ao=ctx.createOscillator(),ag=ctx.createGain();
      ao.type="sine";ao.frequency.value=freq;
      ag.gain.setValueAtTime(0,now);ag.gain.linearRampToValueAtTime(0.055,now+0.05);
      ag.gain.exponentialRampToValueAtTime(0.001,now+1.4);
      ao.connect(ag);ag.connect(rev);ag.connect(master);
      ao.start(now);ao.stop(now+1.5);
      this.arpTimer=setTimeout(playArp,1600+Math.random()*400);
    };
    this.arpTimer=setTimeout(playArp,1000);

    // Sub bass pulse — very subtle
    const bassNotes=[55,55,65.41,55];let bIdx=0;
    const playBass=()=>{
      if(this.musicMuted||!this.ctx)return;
      const now=ctx.currentTime;
      const bo=ctx.createOscillator(),bg=ctx.createGain();
      bo.type="sine";bo.frequency.value=bassNotes[bIdx%bassNotes.length];bIdx++;
      bg.gain.setValueAtTime(0,now);bg.gain.linearRampToValueAtTime(0.07,now+0.1);
      bg.gain.exponentialRampToValueAtTime(0.001,now+2.8);
      bo.connect(bg);bg.connect(master);bo.start(now);bo.stop(now+3);
      this.bassTimer=setTimeout(playBass,3200);
    };
    this.bassTimer=setTimeout(playBass,500);
  },

  stopMusic(){
    if(this.arpTimer)clearTimeout(this.arpTimer);
    if(this.bassTimer)clearTimeout(this.bassTimer);
    if(this.musicGain&&this.ctx){
      const now=this.ctx.currentTime;
      this.musicGain.gain.linearRampToValueAtTime(0,now+2);
      setTimeout(()=>{this.musicNodes.forEach(n=>{try{n.stop?.();n.disconnect?.();}catch(e){}});this.musicNodes=[];},2200);
    }else{this.musicNodes.forEach(n=>{try{n.stop?.();n.disconnect?.();}catch(e){}});this.musicNodes=[];}
  },

  setMusicMuted(v){
    this.musicMuted=v;
    if(v)this.stopMusic();
    else this.startMusic();
  },
};

const SFX=AudioEngine;

/* ══════════════════════════════════════════════════ ROLL */
// luck multiplier shifts odds toward rarer cards
const rollCard=(surgeType=null,packId=null,luck=1)=>{
  // ── Guaranteed pull (for video staging) ──
  const gpRaw=lsGet("guaranteedPull","");
  if(gpRaw){
    try{
      const gp=JSON.parse(gpRaw);
      lsSet("guaranteedPull",""); // consume it — one use only
      const found=ALL_CARDS.find(c=>String(c.id)===String(gp.id)&&c.rarity===gp.rarity);
      if(found) return{...found,uid:crypto.randomUUID(),obtainedAt:new Date().toLocaleDateString(),buyPrice:found.bp||10};
    }catch{}
  }
  const crate=CRATES.find(c=>c.id===packId);
  // Base rarity chances scaled by luck
  const base={"Common":.40,"Uncommon":.28,"Rare":.18,"Epic":.07,"Legendary":.026,"Ultra Rare":.005,"Secret":.001};
  const scaled={};
  Object.entries(base).forEach(([r,c])=>{
    const rarityRank={"Common":0,"Uncommon":1,"Rare":2,"Epic":3,"Legendary":4,"Ultra Rare":5,"Secret":6}[r]||0;
    scaled[r]=c*Math.pow(luck,rarityRank*0.18);
  });
  // Hard overrides for specific packs
  if(packId==="premium"){scaled["Common"]=0;scaled["Uncommon"]=0;}
  if(packId==="ultra"){scaled["Common"]=0;scaled["Uncommon"]=0;scaled["Rare"]=.35;}
  if(packId==="master"){scaled["Common"]=0;scaled["Uncommon"]=0;scaled["Rare"]=0;scaled["Epic"]=Math.max(scaled["Epic"],.40);}
  if(packId==="sinnoh"){scaled["Common"]=0;scaled["Uncommon"]=0;}
  if(packId==="legend"){scaled["Common"]=0;scaled["Uncommon"]=0;scaled["Rare"]=0;scaled["Epic"]=0;scaled["Legendary"]=Math.max(scaled["Legendary"]||0,.60);}
  // Inject special rarity chances for eligible packs
  const specialRolls=[];
  if(["radiant","crystal","prismatic"].includes(packId)){scaled["Radiant"]=1/3333;}
  if(["crystal","prismatic"].includes(packId)){scaled["Crystal"]=1/20000;}
  if(packId==="prismatic"){scaled["Rainbow"]=1/100000;}

  const tbl=Object.entries(RARITY_CFG).filter(([r])=>r!=="GOLDEN"&&r!=="Mega"&&r!=="Shiny"&&r!=="Radiant"&&r!=="Crystal"&&r!=="Rainbow").map(([r,c])=>[r,{...c,chance:scaled[r]??c.chance}]);
  // Roll special rarities first (independent chances)
  if(scaled["Rainbow"]&&Math.random()<scaled["Rainbow"])return{...RAINBOW_CARDS[Math.floor(Math.random()*RAINBOW_CARDS.length)],uid:crypto.randomUUID(),obtainedAt:new Date().toLocaleDateString()};
  if(scaled["Crystal"]&&Math.random()<scaled["Crystal"])return{...CRYSTAL_CARDS[Math.floor(Math.random()*CRYSTAL_CARDS.length)],uid:crypto.randomUUID(),obtainedAt:new Date().toLocaleDateString()};
  if(scaled["Radiant"]&&Math.random()<scaled["Radiant"])return{...RADIANT_CARDS[Math.floor(Math.random()*RADIANT_CARDS.length)],uid:crypto.randomUUID(),obtainedAt:new Date().toLocaleDateString()};

  const tot=tbl.reduce((s,[,c])=>s+c.chance,0);
  const rand=Math.random()*tot; let cum=0,chosen="Common";
  for(const[r,c]of tbl){cum+=c.chance;if(rand<cum){chosen=r;break;}}
  let pool=CARDS.filter(c=>c.rarity===chosen);
  if(!pool.length)pool=CARDS.filter(c=>c.rarity==="Common");
  const weighted=[]; pool.forEach(c=>{const w=(surgeType&&c.type===surgeType)?3:1;for(let i=0;i<w;i++)weighted.push(c);});
  const picked=weighted[Math.floor(Math.random()*weighted.length)];
  // 1/400 chance any card is shiny — 10× price, special glow
  const isShiny=Math.random()<0.0025;
  const rolled={...picked,uid:crypto.randomUUID(),obtainedAt:new Date().toLocaleDateString()};
  if(isShiny)return{...rolled,isShiny:true,rarity:"Shiny",bp:rolled.bp*10,origRarity:picked.rarity,tc:"#00FFAA",bg:"15deg,#001a0d,#003320"};
  return rolled;
};
const rollPack=(crateId)=>{
  const crate=CRATES.find(c=>c.id===crateId);
  if(!crate)return[];
  // Mega pack: guaranteed random Mega card
  if(crate.megaPack){
    const mega=MEGA_CARDS[Math.floor(Math.random()*MEGA_CARDS.length)];
    return[{...mega,uid:crypto.randomUUID(),obtainedAt:new Date().toLocaleDateString()}];
  }
  const activeSurge=crate.surgeType||null;
  return Array.from({length:crate.cards},()=>rollCard(activeSurge,crateId,crate.luck||1));
};

            background:"rgba(74,222,128,.12)",border:"1px solid #4ADE8033",borderRadius:"6px",padding:"1px 5px",
            flexShrink:0,
          }}>HP {card.hp}</span>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:3}}>
          <span style={{
            background:(TYPE_COLORS[card.type]||card.tc)+"25",
            color:TYPE_COLORS[card.type]||card.tc,
            border:`1px solid ${TYPE_COLORS[card.type]||card.tc}55`,
            borderRadius:"10px",padding:"1px 7px",fontSize:"7px",fontWeight:700,letterSpacing:".8px",
            display:"flex",alignItems:"center",gap:3,
          }}>{TYPE_EMOJI[card.type]||""} {card.type.toUpperCase()}</span>
          {tier>=1&&<span style={{color:color,fontSize:"9px",letterSpacing:"1px",textShadow:`0 0 8px ${color}`}}>{starDisplay}</span>}
        </div>
      </div>

      {/* ART ZONE */}
      <div style={{height:imgH+"px",position:"relative",display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden",zIndex:7}}>
        {/* Art background glow */}
        <div style={{position:"absolute",inset:0,background:
          tier>=3?`radial-gradient(ellipse at 50% 60%, ${color}40 0%, ${color}18 40%, transparent 70%)`
          :tier>=1?`radial-gradient(ellipse at 50% 60%, ${color}28 0%, transparent 65%)`
          :`radial-gradient(ellipse at 50% 60%, ${color}12 0%, transparent 60%)`
        }}/>
        {/* Scanlines for mega/high tier */}
        {tier>=2&&<div style={{position:"absolute",inset:0,backgroundImage:"repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.08) 3px,rgba(0,0,0,.08) 4px)",pointerEvents:"none",zIndex:1}}/>}
        {!err
          ?<img src={imgSrc} alt={card.name} onError={()=>setErr(true)} style={{
              height:(imgH-10)+"px",width:(imgH-10)+"px",objectFit:"contain",position:"relative",zIndex:2,
              filter:isShiny?`drop-shadow(0 0 18px #00FFAAcc) drop-shadow(0 0 36px #7fffd488) brightness(1.1)`
                :isRainbow?`drop-shadow(0 0 20px #FF69B4cc) drop-shadow(0 0 40px #cc77ffaa) saturate(1.3) brightness(1.15)`
                :isCrystal?`drop-shadow(0 0 18px #87CEEBcc) brightness(1.2) saturate(1.1)`
                :isRadiant?`drop-shadow(0 0 16px #FFD700cc) brightness(1.1) sepia(.15)`
                :tier>=1?`drop-shadow(0 0 12px ${color}bb) brightness(1.05)`
                :"drop-shadow(0 3px 10px rgba(0,0,0,.85))",
              transition:"filter .3s",
            }}/>
          :<img src={MINI(card.id)} alt={card.name} style={{height:"72px",width:"72px",objectFit:"contain",imageRendering:"pixelated",position:"relative",zIndex:2}}/>
        }
      </div>

      {/* ATTACK SECTION */}
      <div style={{
        padding:"5px 10px 4px",
        background:"rgba(0,0,0,.55)",
        borderTop:`1px solid ${color}22`,
        position:"relative",zIndex:7,
      }}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{color:"#475569",fontSize:"6px",letterSpacing:"1.5px",marginBottom:1,fontFamily:"'Orbitron',monospace"}}>ATTACK</div>
            <span style={{color:"#CBD5E1",fontSize:"8px",fontWeight:600}}>{card.atk}</span>
          </div>
          <span style={{
            color:color,fontFamily:"'Orbitron',monospace",fontWeight:900,
            fontSize:large?"18px":"13px",
            textShadow:tier>=1?`0 0 15px ${color}99`:undefined,
          }}>{card.dmg>0?card.dmg:"—"}</span>
        </div>
      </div>

      {/* FOOTER */}
      <div style={{
        padding:"3px 10px 5px",display:"flex",justifyContent:"space-between",alignItems:"center",
        background:`linear-gradient(135deg,rgba(0,0,0,.6),${color}12)`,
        borderTop:`1px solid ${color}22`,
        position:"relative",zIndex:7,
      }}>
        <span style={{
          color:color,fontFamily:"'Orbitron',monospace",fontSize:"6px",fontWeight:700,letterSpacing:"1.5px",
          textShadow:tier>=2?`0 0 8px ${color}88`:undefined,
        }}>{isShiny?`✦ SHINY ${(card.origRarity||"").toUpperCase()}`:card.rarity.toUpperCase()}</span>
        {currentPrice&&<span style={{
          fontFamily:"'Share Tech Mono',monospace",fontSize:"8px",
          color:priceDelta===null?"#475569":priceDelta>=0?"#10B981":"#EF4444",fontWeight:700,
        }}>{priceDelta!==null?`${priceDelta>=0?"+":""}${priceDelta}🪙`:currentPrice+"🪙"}</span>}
      </div>

      {onSell&&<button
        onClick={e=>{e.stopPropagation();onSell(card);}}
        style={{
          width:"100%",padding:"7px 0",
          background:`linear-gradient(135deg,#7f1d1d,#DC2626)`,
          border:"none",color:"white",cursor:"pointer",
          fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:"7px",letterSpacing:"1.5px",
          position:"relative",zIndex:7,
          transition:"background .2s",
        }}
        onMouseEnter={e=>e.target.style.background="linear-gradient(135deg,#991b1b,#ef4444)"}
        onMouseLeave={e=>e.target.style.background="linear-gradient(135deg,#7f1d1d,#DC2626)"}
      >SELL @ MARKET · {currentPrice||"?"}🪙</button>}
    </div>
  );
}

/* ── Move tables per type ── */
const TYPE_MOVES={
  Fire:    [{name:"Flamethrower",power:90,acc:100,pp:15},{name:"Fire Blast",power:110,acc:85,pp:5},{name:"Ember",power:40,acc:100,pp:25},{name:"Will-O-Wisp",power:0,acc:85,pp:15,status:"burn"}],
  Water:   [{name:"Surf",power:90,acc:100,pp:15},{name:"Hydro Pump",power:110,acc:80,pp:5},{name:"Water Gun",power:40,acc:100,pp:25},{name:"Rain Dance",power:0,acc:100,pp:5,boost:"spa"}],
  Grass:   [{name:"Solar Beam",power:120,acc:100,pp:10},{name:"Leaf Storm",power:130,acc:90,pp:5},{name:"Vine Whip",power:45,acc:100,pp:25},{name:"Leech Seed",power:0,acc:90,pp:10,status:"leech"}],
  Electric:[{name:"Thunderbolt",power:90,acc:100,pp:15},{name:"Thunder",power:110,acc:70,pp:10},{name:"Shock Wave",power:60,acc:100,pp:20},{name:"Thunder Wave",power:0,acc:90,pp:20,status:"paralyze"}],
  Psychic: [{name:"Psychic",power:90,acc:100,pp:10},{name:"Psyblast",power:100,acc:90,pp:5},{name:"Confusion",power:50,acc:100,pp:25},{name:"Hypnosis",power:0,acc:60,pp:20,status:"sleep"}],
  Ice:     [{name:"Blizzard",power:110,acc:70,pp:5},{name:"Ice Beam",power:90,acc:100,pp:10},{name:"Powder Snow",power:40,acc:100,pp:25},{name:"Hail",power:0,acc:100,pp:10,status:"freeze"}],
  Dragon:  [{name:"Draco Meteor",power:130,acc:90,pp:5},{name:"Dragon Pulse",power:85,acc:100,pp:10},{name:"Dragon Rage",power:60,acc:100,pp:20},{name:"Outrage",power:120,acc:100,pp:10}],
  Dark:    [{name:"Dark Pulse",power:80,acc:100,pp:15},{name:"Night Daze",power:85,acc:95,pp:10},{name:"Bite",power:60,acc:100,pp:25},{name:"Nasty Plot",power:0,acc:100,pp:20,boost:"atk"}],
  Fairy:   [{name:"Moonblast",power:95,acc:100,pp:15},{name:"Dazzling Gleam",power:80,acc:100,pp:10},{name:"Charm",power:0,acc:100,pp:20,status:"lower_atk"},{name:"Play Rough",power:90,acc:90,pp:10}],
  Fighting:[{name:"Close Combat",power:120,acc:100,pp:5},{name:"Aura Sphere",power:80,acc:100,pp:20},{name:"Karate Chop",power:50,acc:100,pp:25},{name:"Bulk Up",power:0,acc:100,pp:20,boost:"atk"}],
  Flying:  [{name:"Hurricane",power:110,acc:70,pp:10},{name:"Air Slash",power:75,acc:95,pp:15},{name:"Wing Attack",power:60,acc:100,pp:35},{name:"Tailwind",power:0,acc:100,pp:15,boost:"spd"}],
  Poison:  [{name:"Sludge Bomb",power:90,acc:100,pp:10},{name:"Gunk Shot",power:120,acc:80,pp:5},{name:"Acid",power:40,acc:100,pp:30},{name:"Toxic",power:0,acc:90,pp:10,status:"poison"}],
  Ground:  [{name:"Earthquake",power:100,acc:100,pp:10},{name:"Earth Power",power:90,acc:100,pp:10},{name:"Mud Shot",power:55,acc:95,pp:15},{name:"Sand Attack",power:0,acc:100,pp:15,status:"lower_acc"}],
  Rock:    [{name:"Stone Edge",power:100,acc:80,pp:5},{name:"Rock Slide",power:75,acc:90,pp:10},{name:"Rock Throw",power:50,acc:90,pp:15},{name:"Stealth Rock",power:0,acc:100,pp:20}],
  Bug:     [{name:"Bug Buzz",power:90,acc:100,pp:10},{name:"X-Scissor",power:80,acc:100,pp:15},{name:"Struggle Bug",power:50,acc:100,pp:20},{name:"String Shot",power:0,acc:95,pp:40,status:"lower_spd"}],
  Ghost:   [{name:"Shadow Ball",power:80,acc:100,pp:15},{name:"Hex",power:65,acc:100,pp:10},{name:"Lick",power:30,acc:100,pp:30},{name:"Confuse Ray",power:0,acc:100,pp:10,status:"confuse"}],
  Steel:   [{name:"Flash Cannon",power:80,acc:100,pp:10},{name:"Iron Head",power:80,acc:100,pp:15},{name:"Metal Claw",power:50,acc:95,pp:35},{name:"Iron Defense",power:0,acc:100,pp:15,boost:"def"}],
  Normal:  [{name:"Hyper Beam",power:150,acc:90,pp:5},{name:"Body Slam",power:85,acc:100,pp:15},{name:"Tackle",power:40,acc:100,pp:35},{name:"Growl",power:0,acc:100,pp:40,status:"lower_atk"}],
};
const getMoves=(card)=>{
  const base=TYPE_MOVES[card.type]||TYPE_MOVES.Normal;
  // Give higher rarity cards better moves (first 4 = best set)
  return base.slice(0,4);
};

/* ── Status effect helpers ── */
const STATUS_INFO={
  burn:     {label:"BRN",color:"#EF4444",emoji:"🔥",desc:"Loses HP each turn"},
  poison:   {label:"PSN",color:"#A33EA1",emoji:"☠️",desc:"Loses HP each turn"},
  paralyze: {label:"PAR",color:"#F7D02C",emoji:"⚡",desc:"May be unable to move"},
  sleep:    {label:"SLP",color:"#6390F0",emoji:"💤",desc:"Cannot move"},
  freeze:   {label:"FRZ",color:"#96D9D6",emoji:"❄️",desc:"Cannot move"},
  confuse:  {label:"CNF",color:"#F95587",emoji:"😵",desc:"May hurt itself"},
  leech:    {label:"LSH",color:"#7AC74C",emoji:"🌿",desc:"HP drained each turn"},
};

const applyStatusDmg=(poke)=>{
  if(!poke.status)return{poke,msg:null};
  let dmg=0,msg=null;
  if(poke.status==="burn"||poke.status==="poison"||poke.status==="leech"){
    dmg=Math.max(1,Math.floor(poke.maxHp/8));
    msg=`${poke.name} is hurt by ${poke.status}! -${dmg}HP`;
  }
  const newHp=Math.max(0,poke.hp-dmg);
  return{poke:{...poke,hp:newHp},msg};
};

function BattlePage({player,collection,notify,setDbPlayer}){
  const [screen,setScreen]         =useState("map");
  const [selectedArea,setSelectedArea]=useState(null);
  const [difficulty,setDifficulty] =useState(DIFFICULTIES[1]);
  const [team,setTeam]             =useState([]);   // player's chosen party
  const [run,setRun]               =useState(null);
  const [phase,setPhase]           =useState("action"); // action | moves | switch | message
  const [messages,setMessages]     =useState([]);
  const [msgIdx,setMsgIdx]         =useState(0);
  const [animShake,setAnimShake]   =useState(null); // "player"|"enemy"
  const msgTimer                   =useRef(null);
  const rarOrd=["GOLDEN","Mega","Secret","Ultra Rare","Legendary","Epic","Rare","Uncommon","Common"];
  const sortedCol=[...collection].sort((a,b)=>rarOrd.indexOf(a.rarity)-rarOrd.indexOf(b.rarity));

  /* Build a battle-ready Pokémon from a card */
  const makeBattlePoke=(card,scale=1)=>({
    ...card,
    hp:   Math.round(card.hp*scale),
    maxHp:Math.round(card.hp*scale),
    atk:  Math.round(card.dmg*scale),
    moves:getMoves(card),
    status:null,
    statusTurns:0,
    atkStage:0, // -6 to +6
  });

  /* Queue messages then resolve when done */
  const showMessages=(msgs, onDone)=>{
    setMessages(msgs);
    setMsgIdx(0);
    setPhase("message");
    let idx=0;
    const next=()=>{
      idx++;
      if(idx>=msgs.length){ clearTimeout(msgTimer.current); onDone&&onDone(); return; }
      setMsgIdx(idx);
      msgTimer.current=setTimeout(next, msgs[idx].length>40?2200:1600);
    };
    clearTimeout(msgTimer.current);
    msgTimer.current=setTimeout(next, msgs[0].length>40?2200:1600);
  };

  /* ── Start a run ── */
  const startRun=()=>{
    if(team.length===0){notify("Pick at least 1 card!","#EF4444");return;}
    const area=selectedArea;
    const areaIdx=AREAS.indexOf(area);
    const p=getPrestige(player.id,area.id);
    const ps=presScale(p);
    const ds=difficulty.scale;
    const enemyCard=makeEnemy(area.enemyRarities,0,areaIdx,ds,ps);
    const enemy=makeBattlePoke(enemyCard,1);
    const party=team.map(c=>makeBattlePoke(c,0.6));
    setRun({area,floor:1,coins:0,party,activeIdx:0,enemy,isBoss:false,diff:difficulty,ps,areaIdx});
    setPhase("action");
    setScreen("fight");
  };

  /* ── Use a move ── */
  const useMove=(move)=>{
    if(phase!=="moves"||!run)return;
    const{party,activeIdx,enemy}=run;
    const me={...party[activeIdx]};
    let foe={...enemy};
    const msgs=[];

    /* -- Player move -- */
    msgs.push(`${me.name} used ${move.name}!`);
    let hit=true;
    if(move.acc<100&&Math.random()*100>move.acc){ msgs.push("But it missed!"); hit=false; }

    if(hit){
      if(move.power>0){
        const typeMult=getTypeMultiplier(me.type,foe.type);
        const atkMult=1+me.atkStage*0.15;
        let dmg=Math.max(1,Math.round((me.atk/200)*move.power*atkMult));
        dmg=Math.round(dmg*typeMult);
        const crit=Math.random()<0.0625;
        if(crit){dmg=Math.round(dmg*1.5);msgs.push("A critical hit!");}
        if(typeMult>=2)msgs.push("It's super effective!");
        else if(typeMult<=0.5)msgs.push("It's not very effective...");
        foe={...foe,hp:Math.max(0,foe.hp-dmg)};
        msgs.push(`${foe.name} took ${dmg} damage!`);
      }
      if(move.status&&Math.random()<0.3&&!foe.status){
        foe={...foe,status:move.status,statusTurns:move.status==="sleep"?Math.floor(Math.random()*3)+1:0};
        msgs.push(`${foe.name} ${move.status==="burn"?"was burned!":move.status==="paralyze"?"is paralyzed!":move.status==="sleep"?"fell asleep!":move.status==="freeze"?"was frozen!":move.status==="confuse"?"became confused!":"was seeded!"}`);
      }
      if(move.boost==="atk"){me.atkStage=Math.min(6,me.atkStage+2);msgs.push(`${me.name}'s Attack rose!`);}
    }

    /* -- Check foe fainted -- */
    if(foe.hp<=0){
      const newParty=[...party];newParty[activeIdx]=me;
      showMessages([...msgs,`${foe.name} fainted!`],()=>handleEnemyFainted({...run,party:newParty,enemy:foe}));
      setRun(r=>({...r,party:newParty,enemy:foe}));
      return;
    }

    /* -- Status dmg on foe (end of player turn) -- */
    const{poke:foeAfterStatus,msg:statusMsg}=applyStatusDmg(foe);
    if(statusMsg)msgs.push(statusMsg);
    if(foeAfterStatus.hp<=0){
      const newParty=[...party];newParty[activeIdx]=me;
      showMessages([...msgs,`${foe.name} fainted!`],()=>handleEnemyFainted({...run,party:newParty,enemy:foeAfterStatus}));
      setRun(r=>({...r,party:newParty,enemy:foeAfterStatus}));
      return;
    }

    /* -- Enemy turn -- */
    let newMe={...me};
    let newFoe={...foeAfterStatus};
    let canAct=true;
    if(newFoe.status==="paralyze"&&Math.random()<0.25){msgs.push(`${newFoe.name} is paralyzed and can't move!`);canAct=false;}
    if(newFoe.status==="sleep"){msgs.push(`${newFoe.name} is fast asleep!`);canAct=false;newFoe={...newFoe,statusTurns:newFoe.statusTurns-1};if(newFoe.statusTurns<=0){newFoe={...newFoe,status:null};msgs.push(`${newFoe.name} woke up!`);}}
    if(newFoe.status==="freeze"){msgs.push(`${newFoe.name} is frozen solid!`);canAct=false;if(Math.random()<0.2){newFoe={...newFoe,status:null};msgs.push(`${newFoe.name} thawed out!`);canAct=false;}}

    if(canAct){
      const enemyMoves=getMoves(newFoe);
      const eMv=enemyMoves[Math.floor(Math.random()*enemyMoves.length)];
      msgs.push(`${newFoe.name} used ${eMv.name}!`);
      if(eMv.power>0){
        const eTm=getTypeMultiplier(newFoe.type,newMe.type);
        let eDmg=Math.max(1,Math.round((newFoe.atk/200)*eMv.power));
        eDmg=Math.round(eDmg*eTm);
        const eCrit=Math.random()<0.0625;
        if(eCrit){eDmg=Math.round(eDmg*1.5);msgs.push("A critical hit!");}
        if(eTm>=2)msgs.push("It's super effective!");
        else if(eTm<=0.5)msgs.push("It's not very effective...");
        newMe={...newMe,hp:Math.max(0,newMe.hp-eDmg)};
        msgs.push(`${newMe.name} took ${eDmg} damage!`);
      }
      if(eMv.status&&Math.random()<0.25&&!newMe.status){
        newMe={...newMe,status:eMv.status,statusTurns:eMv.status==="sleep"?Math.floor(Math.random()*3)+1:0};
        msgs.push(`${newMe.name} ${eMv.status==="burn"?"was burned!":eMv.status==="paralyze"?"is paralyzed!":eMv.status==="sleep"?"fell asleep!":"got a status!"}`);
      }
    }

    /* -- Status dmg on player (end of enemy turn) -- */
    const{poke:meAfterStatus,msg:meStatusMsg}=applyStatusDmg(newMe);
    if(meStatusMsg)msgs.push(meStatusMsg);

    /* -- Check player fainted -- */
    const newParty=[...party];newParty[activeIdx]=meAfterStatus;
    setRun(r=>({...r,party:newParty,enemy:newFoe}));
    if(meAfterStatus.hp<=0){
      msgs.push(`${meAfterStatus.name} fainted!`);
      const remaining=newParty.filter(c=>c.hp>0);
      showMessages(msgs,()=>{
        if(remaining.length===0){setScreen("result");}
        else{setPhase("forcedswitch");}
      });
      return;
    }
    showMessages(msgs,()=>setPhase("action"));
    setAnimShake("enemy");setTimeout(()=>setAnimShake(null),400);
  };

  /* ── Enemy fainted handler ── */
  const handleEnemyFainted=(runState)=>{
    const{area,floor,coins,diff,ps,areaIdx,isBoss}=runState;
    const presBonus=1+Math.min(getPrestige(player.id,area.id),40)*0.02;
    const base=isBoss?AREA_BOSSES[area.bossIdx]?.reward||500:({Common:5,Uncommon:10,Rare:20,Epic:40,Legendary:80,Secret:150,"Ultra Rare":200,Mega:250,GOLDEN:500})[runState.enemy.rarity]||15;
    const reward=Math.round(base*(diff?.coinMult||1)*presBonus);
    const newCoins=coins+reward;

    if(isBoss||floor>=area.floors){
      setRun(r=>({...r,...runState,coins:newCoins,won:true}));
      if(isBoss){setScreen("victory");return;}
      /* Final floor cleared — spawn boss */
      const boss=AREA_BOSSES[area.bossIdx]||AREA_BOSSES[AREA_BOSSES.length-1];
      const bEnemy=makeBattlePoke({...boss},diff.scale*ps);
      setRun(r=>({...r,...runState,enemy:bEnemy,floor:floor+1,isBoss:true,coins:newCoins}));
      showMessages([`⚠️ ${boss.name} appeared! It's the boss!`],()=>setPhase("action"));
      return;
    }
    const nextFloor=floor+1;
    const ec=makeEnemy(area.enemyRarities,nextFloor-1,areaIdx,diff.scale,ps);
    const nextEnemy=makeBattlePoke(ec,1);
    setRun(r=>({...r,...runState,enemy:nextEnemy,floor:nextFloor,isBoss:false,coins:newCoins}));
    showMessages([`+${reward}🪙  Floor ${nextFloor}!`,`A wild ${nextEnemy.name} appeared!`],()=>setPhase("action"));
  };

  /* ── Switch Pokémon ── */
  const switchTo=(idx)=>{
    if(!run)return;
    const{party,activeIdx}=run;
    if(idx===activeIdx||party[idx].hp<=0)return;
    const msgs=[`${party[activeIdx].name}, come back!`,`Go, ${party[idx].name}!`];
    setRun(r=>({...r,activeIdx:idx}));
    showMessages(msgs,()=>setPhase("action"));
  };

  /* ── Flee ── */
  const flee=()=>{
    setRun(r=>({...r,coins:Math.round((r.coins||0)*0.5)}));
    showMessages(["Got away safely!"],()=>setScreen("result"));
  };

  /* ── Claim rewards ── */
  const claimReward=async()=>{
    const bonus=run?.coins||0;
    const isWin=screen==="victory";
    const nc=player.coins+bonus;
    const newRuns=(player.battle_runs||0)+(isWin?1:0);
    await sb.from("players").update({coins:nc,battle_runs:newRuns}).eq("id",player.id);
    setDbPlayer(p=>({...p,coins:nc,battle_runs:newRuns}));
    if(isWin)addPrestige(player.id,run.area.id);
    if(bonus>0)notify(`+${bonus}🪙 battle rewards!`,"#FCD34D");
    setRun(null);setTeam([]);setSelectedArea(null);setScreen("map");
    setPhase("action");setMessages([]);
  };

  /* ══ MAP SCREEN ══ */
  if(screen==="map") return(
    <div style={{animation:"fadeIn .35s ease"}}>
      <h1 style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:"clamp(18px,4vw,28px)",marginBottom:4}}>⚔️ BATTLE <span style={{color:"#EE8130"}}>REGIONS</span></h1>
      <p style={{color:"#334155",fontSize:12,marginBottom:16}}>Pick a region · your Pokémon battle one-on-one just like the games</p>
      <div style={{background:"#080D1A",border:"1px solid #1E293B",borderRadius:12,padding:14,marginBottom:20}}>
        <div style={{fontFamily:"'Orbitron',monospace",fontSize:8,color:"#475569",letterSpacing:2,marginBottom:10}}>DIFFICULTY</div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          {DIFFICULTIES.map(d=>(
            <button key={d.id} onClick={()=>setDifficulty(d)}
              style={{padding:"8px 14px",background:difficulty.id===d.id?"linear-gradient(135deg,#1E293B,#334155)":"transparent",border:`1px solid ${difficulty.id===d.id?"#475569":"#1E293B"}`,borderRadius:8,color:difficulty.id===d.id?"#F1F5F9":"#475569",cursor:"pointer",textAlign:"center"}}>
              <div style={{fontSize:14,marginBottom:2}}>{d.emoji}</div>
              <div style={{fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:9}}>{d.name}</div>
              <div style={{color:"#334155",fontSize:7,marginTop:1}}>{d.coinMult}× coins</div>
            </button>
          ))}
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:12}}>
        {AREAS.map(area=>{
          const boss=AREA_BOSSES[area.bossIdx]||AREA_BOSSES[AREA_BOSSES.length-1];
          const p=getPrestige(player.id,area.id);
          return(
            <div key={area.id} onClick={()=>{setSelectedArea(area);setTeam([]);setScreen("deck");}}
              style={{background:area.bg,border:"1px solid rgba(255,255,255,.08)",borderRadius:16,padding:20,cursor:"pointer",position:"relative",transition:"transform .2s"}}
              onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-3px)"}}
              onMouseLeave={e=>{e.currentTarget.style.transform=""}}>
              {p>0&&<div style={{position:"absolute",top:8,right:8,background:"#FF450088",border:"1px solid #FF4500",borderRadius:8,padding:"2px 6px",color:"#FF4500",fontFamily:"'Orbitron',monospace",fontSize:7}}>✦ P{p}</div>}
              <div style={{fontSize:28,marginBottom:6}}>{area.emoji}</div>
              <div style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:13,color:"#F1F5F9",marginBottom:3}}>{area.name}</div>
              <div style={{color:"#475569",fontSize:10,marginBottom:10}}>{area.desc}</div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{fontSize:9,color:"#334155"}}>{area.floors} floors</div>
                <div style={{display:"flex",alignItems:"center",gap:5}}>
                  {boss&&<img src={`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${boss.id}.png`} style={{width:28,height:28,imageRendering:"pixelated"}} alt="" onError={e=>e.target.style.display="none"}/>}
                  <span style={{color:"#FF4500",fontFamily:"'Orbitron',monospace",fontSize:7,fontWeight:700}}>BOSS</span>
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );

  /* ══ DECK SCREEN ══ */
  if(screen==="deck"&&selectedArea) return(
    <div style={{animation:"fadeIn .35s ease"}}>
      <button onClick={()=>setScreen("map")} style={{background:"none",border:"1px solid #1E293B",borderRadius:7,color:"#475569",padding:"5px 12px",cursor:"pointer",marginBottom:16,fontFamily:"'Orbitron',monospace",fontSize:9}}>← BACK</button>
      <div style={{display:"flex",gap:14,alignItems:"center",marginBottom:16,flexWrap:"wrap"}}>
        <div style={{fontSize:28}}>{selectedArea.emoji}</div>
        <div>
          <div style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:18}}>{selectedArea.name}</div>
          <div style={{color:"#334155",fontSize:11,marginTop:2}}>Pick up to 6 Pokémon for your party</div>
        </div>
        <button onClick={startRun} disabled={team.length===0}
          style={{marginLeft:"auto",padding:"10px 24px",background:team.length===0?"#1A2035":"linear-gradient(135deg,#065F46,#10B981)",border:"none",borderRadius:10,color:team.length===0?"#334155":"white",fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:11,cursor:team.length===0?"not-allowed":"pointer",letterSpacing:1}}>
          {team.length===0?"SELECT TEAM":"⚔️ BATTLE!"}
        </button>
      </div>
      {team.length>0&&(
        <div style={{background:"#080D1A",border:"1px solid #1E293B",borderRadius:12,padding:12,marginBottom:14}}>
          <div style={{fontFamily:"'Orbitron',monospace",fontSize:8,color:"#475569",letterSpacing:2,marginBottom:8}}>YOUR PARTY ({team.length}/6)</div>
          <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
            {team.map((c,i)=>{const rc=RARITY_CFG[c.rarity]||RARITY_CFG.Common;return(
              <div key={c.uid} onClick={()=>setTeam(d=>d.filter(x=>x.uid!==c.uid))}
                style={{background:`${rc.color}18`,border:`1px solid ${rc.color}55`,borderRadius:8,padding:"5px 8px",cursor:"pointer",display:"flex",alignItems:"center",gap:6}}>
                <img src={`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${c.id}.png`} style={{width:24,height:24,imageRendering:"pixelated"}} alt="" onError={e=>e.target.style.display="none"}/>
                <span style={{color:rc.color,fontSize:9,fontFamily:"'Orbitron',monospace",fontWeight:700}}>{c.name}</span>
                <span style={{color:"#EF4444",fontSize:10}}>✕</span>
              </div>
            );})}
          </div>
        </div>
      )}
      <div style={{fontFamily:"'Orbitron',monospace",fontSize:8,color:"#475569",letterSpacing:2,marginBottom:10}}>YOUR COLLECTION</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
        {sortedCol.map(c=>{
          const rc=RARITY_CFG[c.rarity]||RARITY_CFG.Common;
          const inTeam=team.some(d=>d.uid===c.uid);
          return(
            <div key={c.uid} onClick={()=>{if(inTeam){setTeam(d=>d.filter(x=>x.uid!==c.uid));}else if(team.length<6){setTeam(d=>[...d,c]);}}}
              style={{background:inTeam?`${rc.color}22`:"#080D1A",border:`2px solid ${inTeam?rc.color:rc.color+"33"}`,borderRadius:10,padding:"8px 6px",width:76,textAlign:"center",cursor:"pointer",position:"relative"}}>
              <img src={`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${c.id}.png`} style={{width:48,height:48,objectFit:"contain"}} alt="" onError={e=>e.target.style.display="none"}/>
              <div style={{color:rc.color,fontSize:7,fontFamily:"'Orbitron',monospace",fontWeight:700,marginTop:2,lineHeight:1.2}}>{c.name}</div>
              <div style={{color:"#334155",fontSize:7}}>HP:{c.hp} ⚔️{c.dmg}</div>
              {inTeam&&<div style={{position:"absolute",top:2,right:4,color:rc.color,fontSize:12,fontWeight:900}}>✓</div>}
            </div>
          );
        })}
        {sortedCol.length===0&&<div style={{color:"#1E293B",fontFamily:"'Orbitron',monospace",fontSize:11,padding:"30px 0"}}>No cards yet — open some packs first!</div>}
      </div>
    </div>
  );

  /* ══ FIGHT SCREEN ══ */
  if((screen==="fight"||screen==="forcedswitch")&&run){
    const{party,activeIdx,enemy,floor,isBoss,area,coins}=run;
    const me=party[activeIdx]||party[0];
    const meRc=RARITY_CFG[me?.rarity]||RARITY_CFG.Common;
    const foeRc=RARITY_CFG[enemy?.rarity]||RARITY_CFG.Common;
    const meHpPct=me?(me.hp/me.maxHp):0;
    const foeHpPct=enemy?(enemy.hp/enemy.maxHp):0;
    const meHpColor=meHpPct>0.5?"#34D399":meHpPct>0.25?"#F59E0B":"#EF4444";
    const foeHpColor=foeHpPct>0.5?"#34D399":foeHpPct>0.25?"#F59E0B":"#EF4444";

    return(
      <div style={{background:"#020617",minHeight:"100%",display:"flex",flexDirection:"column",gap:0,fontFamily:"'Exo 2',sans-serif",maxWidth:600,margin:"0 auto"}}>

        {/* Floor / coins bar */}
        <div style={{display:"flex",justifyContent:"space-between",padding:"8px 12px",background:"#050a14",borderBottom:"1px solid #0A0F1E"}}>
          <span style={{fontFamily:"'Orbitron',monospace",fontSize:9,color:isBoss?"#FF4500":"#475569"}}>
            {isBoss?"⚠️ BOSS":"Floor "+floor+" / "+area.floors} · {area.name}
          </span>
          <span style={{fontFamily:"'Orbitron',monospace",fontSize:9,color:"#FCD34D"}}>🪙{coins}</span>
        </div>

        {/* Battle field */}
        <div style={{background:area.bg||"linear-gradient(180deg,#0a1525,#020617)",position:"relative",height:220,overflow:"hidden",flexShrink:0}}>

          {/* Enemy info box — top left */}
          <div style={{position:"absolute",top:14,left:12,background:"rgba(8,13,26,.92)",border:`2px solid ${isBoss?"#FF4500":foeRc.color}44`,borderRadius:12,padding:"8px 14px",minWidth:160}}>
            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
              <span style={{fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:11,color:isBoss?"#FF4500":foeRc.color}}>{enemy.name}</span>
              {enemy.status&&<span style={{background:STATUS_INFO[enemy.status]?.color+"33",color:STATUS_INFO[enemy.status]?.color,fontSize:7,padding:"1px 5px",borderRadius:4,fontFamily:"'Orbitron',monospace",fontWeight:700}}>{STATUS_INFO[enemy.status]?.label}</span>}
            </div>
            <div style={{background:"#0F172A",borderRadius:3,height:6,overflow:"hidden",width:"100%",marginBottom:3}}>
              <div style={{height:"100%",width:`${Math.max(0,foeHpPct*100)}%`,background:`linear-gradient(90deg,${foeHpColor}88,${foeHpColor})`,borderRadius:3,transition:"width .4s"}}/>
            </div>
            <div style={{fontSize:8,color:"#334155",fontFamily:"'Share Tech Mono',monospace"}}>{enemy.hp}/{enemy.maxHp} HP · {enemy.type}</div>
          </div>

          {/* Enemy sprite — top right */}
          <img
            src={`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${enemy.id}.png`}
            style={{position:"absolute",top:10,right:12,width:100,height:100,imageRendering:"pixelated",filter:`drop-shadow(0 4px 8px ${foeRc.color}66)`,animation:animShake==="enemy"?"shake .3s ease":"none"}}
            alt={enemy.name} onError={e=>e.target.style.display="none"}/>

          {/* Player sprite — bottom left (back sprite) */}
          <img
            src={`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/back/${me?.id}.png`}
            style={{position:"absolute",bottom:4,left:16,width:100,height:100,imageRendering:"pixelated",filter:`drop-shadow(0 4px 8px ${meRc.color}66)`,animation:animShake==="player"?"shake .3s ease":"none"}}
            alt={me?.name} onError={e=>e.target.style.display="none"}/>

          {/* Player info box — bottom right */}
          <div style={{position:"absolute",bottom:14,right:12,background:"rgba(8,13,26,.92)",border:`2px solid ${meRc.color}44`,borderRadius:12,padding:"8px 14px",minWidth:160}}>
            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
              <span style={{fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:11,color:meRc.color}}>{me?.name}</span>
              {me?.status&&<span style={{background:STATUS_INFO[me.status]?.color+"33",color:STATUS_INFO[me.status]?.color,fontSize:7,padding:"1px 5px",borderRadius:4,fontFamily:"'Orbitron',monospace",fontWeight:700}}>{STATUS_INFO[me.status]?.label}</span>}
            </div>
            <div style={{background:"#0F172A",borderRadius:3,height:6,overflow:"hidden",width:"100%",marginBottom:3}}>
              <div style={{height:"100%",width:`${Math.max(0,meHpPct*100)}%`,background:`linear-gradient(90deg,${meHpColor}88,${meHpColor})`,borderRadius:3,transition:"width .4s"}}/>
            </div>
            <div style={{fontSize:8,color:"#334155",fontFamily:"'Share Tech Mono',monospace"}}>{me?.hp}/{me?.maxHp} HP · {me?.type}</div>
          </div>
        </div>

        {/* Message box */}
        <div style={{background:"#080D1A",border:"1px solid #0A0F1E",borderTop:"2px solid #1E293B",padding:"14px 16px",minHeight:64,display:"flex",alignItems:"center"}}>
          {phase==="message"?(
            <div style={{color:"#F1F5F9",fontSize:14,lineHeight:1.5,cursor:"pointer"}} onClick={()=>{clearTimeout(msgTimer.current);}}>
              {messages[msgIdx]||"..."}
              <span style={{display:"inline-block",marginLeft:8,animation:"pulse .7s ease infinite",color:"#475569",fontSize:10}}>▼</span>
            </div>
          ):(
            <div style={{color:"#475569",fontSize:13}}>
              {phase==="action"&&`What will ${me?.name} do?`}
              {phase==="moves"&&"Choose a move:"}
              {(phase==="switch"||phase==="forcedswitch")&&(phase==="forcedswitch"?`${me?.name} fainted! Choose next Pokémon:`:"Switch to which Pokémon?")}
            </div>
          )}
        </div>

        {/* Action menu */}
        {phase==="action"&&(
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:2,background:"#050a14",padding:2}}>
            {[
              {label:"⚔️ FIGHT",   color:"#EF4444", action:()=>setPhase("moves")},
              {label:"🔄 POKÉMON", color:"#60A5FA", action:()=>setPhase("switch")},
              {label:"🏃 RUN",     color:"#94A3B8", action:flee},
            ].map(b=>(
              <button key={b.label} onClick={b.action}
                style={{padding:"16px 0",background:"#080D1A",border:`1px solid ${b.color}33`,color:b.color,fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:11,cursor:"pointer",letterSpacing:1,transition:"background .15s"}}
                onMouseEnter={e=>e.target.style.background=b.color+"18"}
                onMouseLeave={e=>e.target.style.background="#080D1A"}>
                {b.label}
              </button>
            ))}
            <button onClick={()=>setPhase("action")} style={{padding:"16px 0",background:"#080D1A",border:"1px solid #1E293B",color:"#334155",fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:11,cursor:"pointer"}}>✦ INFO</button>
          </div>
        )}

        {/* Move buttons */}
        {phase==="moves"&&me&&(
          <div style={{background:"#050a14",padding:2}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:2}}>
              {getMoves(me).map((mv,i)=>{
                const tm=getTypeMultiplier(me.type,enemy.type);
                const typeColor=TYPE_COLORS[me.type]||"#94A3B8";
                return(
                  <button key={i} onClick={()=>useMove(mv)}
                    style={{padding:"12px 10px",background:"#080D1A",border:`1px solid ${typeColor}33`,cursor:"pointer",textAlign:"left",transition:"background .15s"}}
                    onMouseEnter={e=>e.currentTarget.style.background=typeColor+"15"}
                    onMouseLeave={e=>e.currentTarget.style.background="#080D1A"}>
                    <div style={{color:"#F1F5F9",fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:11,marginBottom:3}}>{mv.name}</div>
                    <div style={{display:"flex",gap:8,alignItems:"center"}}>
                      <span style={{background:typeColor+"33",color:typeColor,fontSize:8,padding:"1px 6px",borderRadius:4,fontFamily:"'Orbitron',monospace"}}>{me.type}</span>
                      {mv.power>0&&<span style={{color:"#475569",fontSize:9}}>PWR {mv.power}</span>}
                      {mv.status&&<span style={{color:STATUS_INFO[mv.status]?.color||"#94A3B8",fontSize:9}}>{STATUS_INFO[mv.status]?.emoji} {mv.status}</span>}
                      <span style={{color:"#334155",fontSize:8,marginLeft:"auto"}}>PP {mv.pp}</span>
                    </div>
                  </button>
                );
              })}
            </div>
            <button onClick={()=>setPhase("action")} style={{width:"100%",padding:"10px",background:"#050a14",border:"1px solid #1E293B",color:"#475569",fontFamily:"'Orbitron',monospace",fontSize:9,cursor:"pointer"}}>← BACK</button>
          </div>
        )}

        {/* Switch screen */}
        {(phase==="switch"||phase==="forcedswitch")&&(
          <div style={{background:"#050a14",padding:8}}>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6}}>
              {party.map((poke,i)=>{
                const rc=RARITY_CFG[poke.rarity]||RARITY_CFG.Common;
                const fainted=poke.hp<=0;
                const active=i===activeIdx;
                return(
                  <button key={poke.uid} onClick={()=>!fainted&&!active&&(phase==="forcedswitch"?switchTo(i):switchTo(i))} disabled={fainted||active}
                    style={{background:active?"#1E293B":fainted?"#050a14":"#080D1A",border:`2px solid ${active?rc.color:fainted?"#1E293B":rc.color+"55"}`,borderRadius:10,padding:"8px 6px",textAlign:"center",cursor:fainted||active?"not-allowed":"pointer",opacity:fainted?0.4:1}}>
                    <img src={`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${poke.id}.png`} style={{width:36,height:36,imageRendering:"pixelated",filter:fainted?"grayscale(1)":""}} alt="" onError={e=>e.target.style.display="none"}/>
                    <div style={{color:active?rc.color:fainted?"#334155":rc.color,fontSize:7,fontFamily:"'Orbitron',monospace",fontWeight:700,marginTop:2}}>{poke.name}</div>
                    <div style={{background:"#0F172A",borderRadius:2,height:3,margin:"3px 0",overflow:"hidden"}}>
                      <div style={{height:"100%",width:`${Math.max(0,(poke.hp/poke.maxHp)*100)}%`,background:poke.hp/poke.maxHp>0.5?"#34D399":poke.hp/poke.maxHp>0.25?"#F59E0B":"#EF4444"}}/>
                    </div>
                    <div style={{color:"#334155",fontSize:7}}>{fainted?"FNT":active?"ACTIVE":`${poke.hp}/${poke.maxHp}`}</div>
                    {poke.status&&<div style={{color:STATUS_INFO[poke.status]?.color,fontSize:7}}>{STATUS_INFO[poke.status]?.label}</div>}
                  </button>
                );
              })}
            </div>
            {phase==="switch"&&<button onClick={()=>setPhase("action")} style={{width:"100%",marginTop:6,padding:"8px",background:"#050a14",border:"1px solid #1E293B",color:"#475569",fontFamily:"'Orbitron',monospace",fontSize:9,cursor:"pointer"}}>← BACK</button>}
          </div>
        )}
      </div>
    );
  }

  /* ══ VICTORY ══ */
  if(screen==="victory"&&run) return(
    <div style={{textAlign:"center",padding:"40px 20px",animation:"fadeIn .4s ease"}}>
      <div style={{fontSize:48,marginBottom:10}}>🏆</div>
      <div style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:24,color:"#FCD34D",marginBottom:4}}>AREA CLEARED!</div>
      <div style={{color:"#475569",fontSize:12,marginBottom:8}}>{run.area.name} conquered!</div>
      <div style={{color:"#FF4500",fontFamily:"'Orbitron',monospace",fontSize:10,marginBottom:20}}>⚡ Prestige {getPrestige(player.id,run.area.id)+1} unlocked</div>
      <div style={{background:"#080D1A",border:"1px solid #FCD34D33",borderRadius:14,padding:20,marginBottom:24,display:"inline-block",minWidth:180}}>
        <div style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:32,color:"#FCD34D"}}>+{run.coins}🪙</div>
        <div style={{color:"#475569",fontSize:10,marginTop:4}}>BATTLE REWARDS</div>
      </div><br/>
      <button onClick={claimReward} style={{padding:"13px 40px",background:"linear-gradient(135deg,#78350F,#F59E0B)",border:"none",borderRadius:12,color:"white",fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:13,cursor:"pointer",letterSpacing:1}}>CLAIM REWARD</button>
    </div>
  );

  /* ══ RESULT (LOSS) ══ */
  if(screen==="result"&&run) return(
    <div style={{textAlign:"center",padding:"40px 20px",animation:"fadeIn .4s ease"}}>
      <div style={{fontSize:48,marginBottom:10}}>💀</div>
      <div style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:24,color:"#EF4444",marginBottom:4}}>BLACKED OUT</div>
      <div style={{color:"#475569",fontSize:12,marginBottom:24}}>Reached floor {run.floor} of {run.area?.name}</div>
      <div style={{background:"#080D1A",border:"1px solid #FCD34D33",borderRadius:14,padding:20,marginBottom:24,display:"inline-block",minWidth:180}}>
        <div style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:32,color:"#FCD34D"}}>+{Math.round((run.coins||0)*0.5)}🪙</div>
        <div style={{color:"#475569",fontSize:10,marginTop:4}}>CONSOLATION (50%)</div>
      </div><br/>
      <button onClick={claimReward} style={{padding:"13px 40px",background:"linear-gradient(135deg,#1a0030,#4c1d95)",border:"none",borderRadius:12,color:"white",fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:13,cursor:"pointer",letterSpacing:1}}>TRY AGAIN</button>
    </div>
  );

  return null;
}

/* ══════════════════════════════════════════════════ LEADERBOARD */
function Leaderboard(){
  const [rows,setRows]=useState([]);
  const [loading,setLoading]=useState(true);
  useEffect(()=>{
    (async()=>{
      const{data}=await sb.from("players").select("username,coins,total_packs,total_cards,won").order("coins",{ascending:false}).limit(20);
      setRows(data||[]);setLoading(false);
    })();
  },[]);
  return(
    <div style={{animation:"fadeIn .35s ease"}}>
      <h1 style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:"clamp(20px,4vw,28px)",marginBottom:6}}>GLOBAL <span style={{color:"#FCD34D"}}>LEADERBOARD</span></h1>
      <p style={{color:"#334155",fontSize:12,marginBottom:20}}>Top trainers by coin balance · updates live</p>
      {loading?<div style={{color:"#334155",textAlign:"center",padding:40,fontFamily:"'Orbitron',monospace"}}>LOADING...</div>:(
        <div style={{background:"#080D1A",border:"1px solid #0A0F1E",borderRadius:14,overflow:"hidden"}}>
          <div style={{display:"grid",gridTemplateColumns:"40px 1fr 1fr 1fr 60px",padding:"9px 16px",background:"#050a14",borderBottom:"1px solid #0F172A"}}>
            {["#","TRAINER","COINS","PACKS","WIN"].map(h=><div key={h} style={{color:"#1E293B",fontFamily:"'Orbitron',monospace",fontSize:8,letterSpacing:1}}>{h}</div>)}
          </div>
          {rows.map((r,i)=>(
            <div key={r.username} style={{display:"grid",gridTemplateColumns:"40px 1fr 1fr 1fr 60px",padding:"10px 16px",borderBottom:"1px solid #050a14",background:i===0?"rgba(252,211,77,.04)":i===1?"rgba(148,163,184,.02)":i===2?"rgba(180,120,60,.03)":"transparent"}}>
              <div style={{color:i===0?"#FFD700":i===1?"#94A3B8":i===2?"#B47C3C":"#334155",fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:14,alignSelf:"center"}}>{i+1}</div>
              <div style={{color:"#F1F5F9",fontFamily:"'Orbitron',monospace",fontSize:11,fontWeight:700,alignSelf:"center"}}>{r.username}</div>
              <div style={{color:"#FCD34D",fontFamily:"'Share Tech Mono',monospace",fontSize:12,alignSelf:"center"}}>{(r.coins||0).toLocaleString()}🪙</div>

// SHA-256 hash using Web Crypto — never store plaintext passwords
const hashPassword=async(password,username)=>{
  const msg=password+"::ptcg::"+username.toLowerCase();
  const buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
};

function TradePage({player,collection,pendingTrades,setPendingTrades,loadCollection,notify}){
  const [tab,setTab]=useState("incoming");
  const [search,setSearch]=useState("");
  const [target,setTarget]=useState(null);
  const [searching,setSearching]=useState(false);
  const [myOffer,setMyOffer]=useState([]);
  const [theirRequest,setTheirRequest]=useState([]);
  const [outgoing,setOutgoing]=useState([]);
  const [sending,setSending]=useState(false);
  const rarOrd=["GOLDEN","Mega","Secret","Ultra Rare","Legendary","Epic","Rare","Uncommon","Common"];

  useEffect(()=>{if(tab!=="new")loadOutgoing();},[tab]);
  const loadOutgoing=async()=>{
    const{data}=await sb.from("trades").select("*").eq("from_id",player.id).order("id",{ascending:false}).limit(20);
    setOutgoing(data||[]);
  };

  const searchPlayer=async()=>{
    const q=search.trim();if(!q)return;
    setSearching(true);setTarget(null);setMyOffer([]);setTheirRequest([]);
    const{data:p}=await sb.from("players").select("id,username,coins").ilike("username",q).maybeSingle();
    if(!p){notify("Trainer not found","#EF4444");setSearching(false);return;}
    if(p.id===player.id){notify("Can't trade with yourself!","#EF4444");setSearching(false);return;}
    const{data:col}=await sb.from("collection").select("*").eq("player_id",p.id);
    const mapped=(col||[]).map(row=>{
      const base=ALL_CARDS.find(c=>String(c.id)===String(row.card_id));
      if(!base)return null;
      return{...base,uid:row.uid,rarity:row.rarity||base.rarity,isShiny:isShiny||undefined,origRarity:isShiny?base.rarity:undefined,bp:isShiny?base.bp*10:base.bp,tc:isShiny?"#00FFAA":base.tc,bg:isShiny?"15deg,#001a0d,#003320":base.bg};
    }).filter(Boolean).sort((a,b)=>rarOrd.indexOf(a.rarity)-rarOrd.indexOf(b.rarity));
    setTarget({...p,collection:mapped});setSearching(false);
  };

  const sendOffer=async()=>{
    if(!target){notify("Find a trainer first","#EF4444");return;}
    if(myOffer.length===0&&theirRequest.length===0){notify("Select cards to trade","#EF4444");return;}
    setSending(true);
    const offeredCards=collection.filter(c=>myOffer.includes(c.uid)).map(c=>({uid:c.uid,id:c.id,name:c.name,rarity:c.rarity,bp:c.bp}));
    const requestedCards=target.collection.filter(c=>theirRequest.includes(c.uid)).map(c=>({uid:c.uid,id:c.id,name:c.name,rarity:c.rarity,bp:c.bp}));
    const{error}=await sb.from("trades").insert({from_id:player.id,to_id:target.id,from_name:player.username,to_name:target.username,offered:offeredCards,requested:requestedCards,status:"pending"});
    if(error){notify("Error: "+error.message,"#EF4444");setSending(false);return;}
    notify(`📦 Offer sent to ${target.username}!`,"#C084FC");
    setMyOffer([]);setTheirRequest([]);setTarget(null);setSearch("");setSending(false);setTab("outgoing");
  };

  const acceptTrade=async(trade)=>{
    const offered=trade.offered||[];const requested=trade.requested||[];
    for(const c of requested)await sb.from("collection").delete().eq("uid",c.uid);
    for(const c of offered)await sb.from("collection").insert({player_id:player.id,card_id:c.id,card_name:c.name,rarity:c.rarity,buy_price:c.bp||0,obtained_at:new Date().toLocaleDateString(),uid:crypto.randomUUID()});
    for(const c of offered)await sb.from("collection").delete().eq("uid",c.uid);
    for(const c of requested)await sb.from("collection").insert({player_id:trade.from_id,card_id:c.id,card_name:c.name,rarity:c.rarity,buy_price:c.bp||0,obtained_at:new Date().toLocaleDateString(),uid:crypto.randomUUID()});
    await sb.from("trades").update({status:"accepted"}).eq("id",trade.id);
    setPendingTrades(t=>t.filter(x=>x.id!==trade.id));
    await loadCollection(player.id);
    notify("✅ Trade accepted!","#34D399");
  };
  const declineTrade=async(t)=>{await sb.from("trades").update({status:"declined"}).eq("id",t.id);setPendingTrades(p=>p.filter(x=>x.id!==t.id));notify("Declined","#475569");};

  const mySorted=[...collection].sort((a,b)=>rarOrd.indexOf(a.rarity)-rarOrd.indexOf(b.rarity));

        <img src={MINI(c.id)} style={{width:24,height:24,imageRendering:"pixelated"}} onError={e=>e.target.style.display="none"}/>
        <div>
          <div style={{color:rc.color,fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:8}}>{c.name}</div>
          <div style={{color:"#334155",fontSize:7}}>{c.rarity}</div>
        </div>
        {selected&&<span style={{color:rc.color,fontSize:10,marginLeft:2}}>✓</span>}

    );
