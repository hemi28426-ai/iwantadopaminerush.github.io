/* ══════════════════════════════════════════════════ INBOX */
function InboxPage({player,collection,notify,setDbPlayer,loadCollection,setPage,setBattleChallengeFromInbox}){
  const [items,setItems]=useState([]);
  const [loading,setLoading]=useState(true);
  const [tab,setTab]=useState("all");
  const [sendGiftTo,setSendGiftTo]=useState("");
  const [giftCoins,setGiftCoins]=useState("");
  const [giftCardUid,setGiftCardUid]=useState(null);
  const [giftTab,setGiftTab]=useState("coins");
  const [sending,setSending]=useState(false);
  const [giftTargetId,setGiftTargetId]=useState(null);

  const load=async()=>{
    setLoading(true);
    // Inbox = trades where to_id = me AND (status=pending OR type=gift/battle_invite/update)
    const{data}=await sb.from("trades").select("*").eq("to_id",player.id).in("status",["pending","unread"]).order("id",{ascending:false}).limit(50);
    // Also grab updates (sent to __inbox_updates__ special user or broadcast type)
    const{data:updates}=await sb.from("trades").select("*").eq("to_name","__broadcast__").eq("status","unread").order("id",{ascending:false}).limit(20);
    setItems([...(data||[]),...(updates||[])]);
    setLoading(false);
  };

  useEffect(()=>{load();},[]);

  const markRead=async(id)=>{
    await sb.from("trades").update({status:"read"}).eq("id",id);
    setItems(i=>i.filter(x=>x.id!==id));
  };

  const acceptBattleInvite=async(item)=>{
    const payload=item.offered||{};
    await markRead(item.id);
    // Pass challenge to PvP battle system
    setBattleChallengeFromInbox({from:item.from_name,fromId:item.from_id,battleId:payload.battleId,team:payload.team||[]});
    setPage("battle");
    notify(`⚔️ Accepting battle from ${item.from_name}!`,"#F472B6");
  };

  const declineBattleInvite=async(item)=>{
    await sb.from("trades").update({status:"declined"}).eq("id",item.id);
    // Notify challenger via a broadcast
    try{
      sb.channel("pvp_lobby_v2").send({type:"broadcast",event:"challenge_declined",payload:{from:player.username,challengerId:item.from_id}});
    }catch{}
    setItems(i=>i.filter(x=>x.id!==item.id));
    notify("Battle declined","#475569");
  };

  const claimGift=async(item)=>{
    const payload=item.offered||{};
    setSending(true);
    if(payload.coins>0){
      const nc=(player.coins||0)+payload.coins;
      await sb.from("players").update({coins:nc}).eq("id",player.id);
      setDbPlayer(p=>({...p,coins:nc}));
      notify(`🎁 Claimed ${payload.coins}🪙 from ${item.from_name}!`,"#FCD34D");
    }
    if(payload.cardId){
      const cardDef=ALL_CARDS.find(c=>String(c.id)===String(payload.cardId))||CARDS.find(c=>String(c.id)===String(payload.cardId));
      if(cardDef){
        await sb.from("collection").insert({player_id:player.id,card_id:cardDef.id,card_name:cardDef.name,rarity:cardDef.rarity,buy_price:cardDef.bp||10,obtained_at:new Date().toLocaleDateString(),uid:crypto.randomUUID()});
        await loadCollection(player.id);
        notify(`🎁 Received ${cardDef.name} from ${item.from_name}!`,"#34D399");
      }
    }
    await markRead(item.id);
    setSending(false);
  };

  // Send gift
  const sendGift=async()=>{
    if(!giftTargetId){notify("Find a trainer first","#EF4444");return;}
    const coins=parseInt(giftCoins)||0;
    if(giftTab==="coins"&&coins<=0){notify("Enter coin amount","#EF4444");return;}
    if(giftTab==="coins"&&coins>player.coins){notify("Not enough coins","#EF4444");return;}
    if(giftTab==="card"&&!giftCardUid){notify("Select a card","#EF4444");return;}
    setSending(true);
    let payload={type:"gift",coins:0};
    if(giftTab==="coins"){
      payload.coins=coins;
      const nc=player.coins-coins;
      await sb.from("players").update({coins:nc}).eq("id",player.id);
      setDbPlayer(p=>({...p,coins:nc}));
    } else {
      const card=collection.find(c=>c.uid===giftCardUid);
      if(!card){notify("Card not found","#EF4444");setSending(false);return;}
      // Transfer the card
      await sb.from("collection").update({player_id:giftTargetId}).eq("uid",giftCardUid);
      await loadCollection(player.id);
      payload.cardId=card.id;payload.cardName=card.name;payload.cardRarity=card.rarity;
    }
    await sb.from("trades").insert({from_id:player.id,to_id:giftTargetId,from_name:player.username,to_name:sendGiftTo,offered:payload,requested:{},status:"unread"});
    notify(`🎁 Gift sent to ${sendGiftTo}!`,"#34D399");
    setSendGiftTo("");setGiftCoins("");setGiftCardUid(null);setGiftTargetId(null);setSending(false);
  };

  // Send battle invite from inbox
  const sendBattleInvite=async(toName,toId,team)=>{
    if(team.length===0){notify("Select a team in Battle tab first","#EF4444");return;}
    const battleId=`pvp_${player.id}_${Date.now()}`;
    await sb.from("trades").insert({from_id:player.id,to_id:toId,from_name:player.username,to_name:toName,offered:{type:"battle_invite",battleId,team:team.map(c=>c.id)},requested:{},status:"unread"});
    // Also broadcast in case they're online
    try{sb.channel("pvp_lobby_v2").send({type:"broadcast",event:"challenge",payload:{from:player.username,fromId:player.id,to:toName,battleId,team:team.map(c=>c.id)}});}catch{}
    notify(`⚔️ Battle invite sent to ${toName}!`,"#F472B6");
  };

  const battles=items.filter(i=>(i.offered?.type||"trade")==="battle_invite");
  const gifts=items.filter(i=>(i.offered?.type||"trade")==="gift");
  const updates=items.filter(i=>(i.offered?.type||"trade")==="update");
  const trades=items.filter(i=>!(i.offered?.type));
  const unread=items.length;

  const tabItems=tab==="all"?items:tab==="battles"?battles:tab==="gifts"?gifts:tab==="updates"?updates:trades;

  const ItemCard=({item})=>{
    const type=item.offered?.type||"trade";
    const payload=item.offered||{};
    const colors={battle_invite:"#F472B6",gift:"#FCD34D",update:"#60A5FA",trade:"#C084FC"};
    const icons={battle_invite:"⚔️",gift:"🎁",update:"📢",trade:"🔄"};
    const labels={battle_invite:"Battle Invite",gift:"Gift",update:"Announcement",trade:"Trade Offer"};
    const color=colors[type]||"#C084FC";

    return(
      <div style={{background:"#080D1A",border:`2px solid ${color}33`,borderRadius:14,padding:16,marginBottom:10,animation:"fadeIn .3s ease"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
          <div style={{fontSize:22,flexShrink:0}}>{icons[type]}</div>
          <div style={{flex:1}}>
            <div style={{fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:11,color}}>{labels[type]}</div>
            <div style={{color:"#475569",fontSize:10,marginTop:1}}>from <b style={{color:"#F1F5F9"}}>{item.from_name}</b></div>
          </div>
          <div style={{color:"#1E293B",fontSize:8,fontFamily:"'Orbitron',monospace"}}>#{item.id}</div>
        </div>

        {type==="battle_invite"&&(
          <div>
            <div style={{color:"#94A3B8",fontSize:10,marginBottom:10}}>{item.from_name} has challenged you to a Pokémon battle!</div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>acceptBattleInvite(item)} style={{flex:1,padding:"9px",background:"linear-gradient(135deg,#065F46,#10B981)",border:"none",borderRadius:9,color:"white",fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:10,cursor:"pointer"}}>⚔️ ACCEPT</button>
              <button onClick={()=>declineBattleInvite(item)} style={{padding:"9px 16px",background:"none",border:"1px solid #EF4444",borderRadius:9,color:"#EF4444",fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:10,cursor:"pointer"}}>DECLINE</button>
            </div>
          </div>
        )}

        {type==="gift"&&(
          <div>
            {payload.coins>0&&<div style={{color:"#FCD34D",fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:18,marginBottom:8}}>+{payload.coins.toLocaleString()}🪙</div>}
            {payload.cardName&&<div style={{color:"#34D399",fontSize:11,marginBottom:8}}>📦 {payload.cardName} <span style={{color:"#475569"}}>({payload.cardRarity})</span></div>}
            <button onClick={()=>claimGift(item)} disabled={sending} style={{width:"100%",padding:"9px",background:"linear-gradient(135deg,#78350F,#F59E0B)",border:"none",borderRadius:9,color:"white",fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:10,cursor:"pointer"}}>🎁 CLAIM</button>
          </div>
        )}

        {type==="update"&&(
          <div>
            <div style={{color:"#94A3B8",fontSize:11,lineHeight:1.6,marginBottom:8}}>{payload.message||"New update available!"}</div>
            <button onClick={()=>markRead(item.id)} style={{padding:"6px 16px",background:"transparent",border:`1px solid ${color}55`,borderRadius:8,color,fontFamily:"'Orbitron',monospace",fontSize:9,cursor:"pointer"}}>DISMISS</button>
          </div>
        )}

        {type==="trade"&&(
          <div>
            <div style={{color:"#94A3B8",fontSize:10,marginBottom:8}}>Trade offer — check the Trade tab for details.</div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>{markRead(item.id);}} style={{padding:"6px 14px",background:"transparent",border:"1px solid #475569",borderRadius:8,color:"#475569",fontFamily:"'Orbitron',monospace",fontSize:9,cursor:"pointer"}}>DISMISS</button>
            </div>
          </div>
        )}
      </div>
    );
  };

  return(
    <div style={{animation:"fadeIn .3s ease"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:8}}>
        <div>
          <h1 style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:"clamp(18px,4vw,26px)"}}>📬 <span style={{color:"#60A5FA"}}>INBOX</span></h1>
          <p style={{color:"#334155",fontSize:11,marginTop:3}}>Battle invites · Gifts · Announcements</p>
        </div>
        {unread>0&&<div style={{background:"#60A5FA22",border:"1px solid #60A5FA55",borderRadius:10,padding:"6px 14px",fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:13,color:"#60A5FA"}}>{unread} unread</div>}
      </div>

      {/* Tabs */}
      <div style={{display:"flex",gap:3,marginBottom:16,flexWrap:"wrap"}}>
        {[["all","ALL",items.length],["battles","⚔️ BATTLES",battles.length],["gifts","🎁 GIFTS",gifts.length],["updates","📢 UPDATES",updates.length],["send","📤 SEND GIFT",0]].map(([t,l,cnt])=>(
          <button key={t} onClick={()=>setTab(t)}
            style={{padding:"6px 12px",borderRadius:8,border:`1px solid ${tab===t?"#60A5FA55":"#1E293B"}`,background:tab===t?"#60A5FA18":"transparent",color:tab===t?"#60A5FA":"#475569",fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:8,cursor:"pointer",position:"relative"}}>
            {l}{cnt>0&&<span style={{marginLeft:5,background:"#60A5FA",color:"white",borderRadius:"50%",padding:"1px 5px",fontSize:7}}>{cnt}</span>}
          </button>
        ))}
      </div>

      {/* Send Gift tab */}
      {tab==="send"&&(
        <div style={{background:"#080D1A",border:"1px solid #FCD34D33",borderRadius:14,padding:18}}>
          <div style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:11,color:"#FCD34D",marginBottom:14}}>🎁 SEND A GIFT</div>

          {/* Find trainer */}
          <div style={{marginBottom:14}}>
            <div style={{color:"#475569",fontSize:9,fontFamily:"'Orbitron',monospace",letterSpacing:1,marginBottom:6}}>RECIPIENT</div>
            <div style={{display:"flex",gap:8}}>
              <input value={sendGiftTo} onChange={e=>{setSendGiftTo(e.target.value);setGiftTargetId(null);}} placeholder="Trainer username..." style={{flex:1,background:"#0F172A",border:`1px solid ${giftTargetId?"#34D399":"#1E293B"}`,color:"#F1F5F9",borderRadius:8,padding:"9px 12px",fontFamily:"'Exo 2',sans-serif",fontSize:13,outline:"none"}}/>
              <button onClick={async()=>{
                if(!sendGiftTo.trim()){return;}
                const{data}=await sb.from("players").select("id,username").ilike("username",sendGiftTo.trim()).maybeSingle();
                if(!data){notify("Trainer not found","#EF4444");return;}
                if(data.id===player.id){notify("Can't gift yourself!","#EF4444");return;}
                setGiftTargetId(data.id);setSendGiftTo(data.username);notify(`✓ Found ${data.username}`,"#34D399");
              }} style={{padding:"9px 16px",background:"#1e3a6e",border:"none",borderRadius:8,color:"#60A5FA",fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:9,cursor:"pointer"}}>FIND</button>
            </div>
            {giftTargetId&&<div style={{color:"#34D399",fontSize:9,marginTop:4,fontFamily:"'Orbitron',monospace"}}>✓ Sending to: {sendGiftTo}</div>}
          </div>

          {/* Gift type */}
          <div style={{display:"flex",gap:4,marginBottom:14}}>
            {[["coins","🪙 COINS"],["card","📦 CARD"]].map(([t,l])=>(
              <button key={t} onClick={()=>setGiftTab(t)} style={{flex:1,padding:"8px",background:giftTab===t?"#FCD34D22":"transparent",border:`1px solid ${giftTab===t?"#FCD34D55":"#1E293B"}`,borderRadius:8,color:giftTab===t?"#FCD34D":"#475569",fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:9,cursor:"pointer"}}>{l}</button>
            ))}
          </div>

          {giftTab==="coins"&&(
            <div style={{marginBottom:14}}>
              <div style={{color:"#475569",fontSize:9,fontFamily:"'Orbitron',monospace",letterSpacing:1,marginBottom:6}}>AMOUNT (you have {player.coins.toLocaleString()}🪙)</div>
              <div style={{display:"flex",gap:6,marginBottom:8,flexWrap:"wrap"}}>
                {[100,500,1000,5000,10000].map(n=>(
                  <button key={n} onClick={()=>setGiftCoins(String(n))} style={{padding:"4px 10px",borderRadius:6,background:giftCoins===String(n)?"#FCD34D22":"#0F172A",border:`1px solid ${giftCoins===String(n)?"#FCD34D55":"#1E293B"}`,color:giftCoins===String(n)?"#FCD34D":"#475569",fontFamily:"'Orbitron',monospace",fontSize:8,cursor:"pointer"}}>{n.toLocaleString()}</button>
                ))}
              </div>
              <input value={giftCoins} onChange={e=>setGiftCoins(e.target.value)} placeholder="Or enter custom amount..." type="number" style={{width:"100%",background:"#0F172A",border:"1px solid #1E293B",color:"#F1F5F9",borderRadius:8,padding:"9px 12px",fontFamily:"'Exo 2',sans-serif",fontSize:13,outline:"none",boxSizing:"border-box"}}/>
            </div>
          )}

          {giftTab==="card"&&(
            <div style={{marginBottom:14}}>
              <div style={{color:"#475569",fontSize:9,fontFamily:"'Orbitron',monospace",letterSpacing:1,marginBottom:8}}>SELECT A CARD TO GIFT</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(72px,1fr))",gap:6,maxHeight:200,overflowY:"auto"}}>
                {collection.filter(c=>!c.isPersonal).map(card=>{
                  const rc=RARITY_CFG[card.rarity]||RARITY_CFG.Common;
                  const sel=giftCardUid===card.uid;
                  return(
                    <div key={card.uid} onClick={()=>setGiftCardUid(sel?null:card.uid)}
                      style={{background:sel?rc.color+"22":"#0F172A",border:`2px solid ${sel?rc.color:rc.color+"33"}`,borderRadius:8,padding:5,textAlign:"center",cursor:"pointer",transform:sel?"scale(1.05)":"scale(1)",transition:"all .15s"}}>
                      <img src={ART(card.id)} style={{width:40,height:40,objectFit:"contain",imageRendering:"pixelated"}} alt="" onError={e=>{e.target.src=MINI(card.id);e.target.style.imageRendering="pixelated";}}/>
                      <div style={{color:sel?rc.color:"#94A3B8",fontFamily:"'Orbitron',monospace",fontSize:6,fontWeight:700,marginTop:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{card.name}</div>
                    </div>
                  );
                })}
              </div>
              {giftCardUid&&<div style={{color:"#34D399",fontSize:9,marginTop:6,fontFamily:"'Orbitron',monospace"}}>✓ {collection.find(c=>c.uid===giftCardUid)?.name} selected</div>}
            </div>
          )}

          <button onClick={sendGift} disabled={!giftTargetId||sending}
            style={{width:"100%",padding:"11px",background:giftTargetId&&!sending?"linear-gradient(135deg,#78350F,#F59E0B)":"#0F172A",border:"none",borderRadius:10,color:giftTargetId&&!sending?"white":"#334155",fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:11,cursor:giftTargetId&&!sending?"pointer":"not-allowed",letterSpacing:1}}>
            {sending?"SENDING...":"🎁 SEND GIFT"}
          </button>
        </div>
      )}

      {/* Message list */}
      {tab!=="send"&&(
        loading?<div style={{color:"#334155",textAlign:"center",padding:40,fontFamily:"'Orbitron',monospace",fontSize:11}}>LOADING...</div>
        :tabItems.length===0?
          <div style={{textAlign:"center",padding:"50px 0"}}>
            <div style={{fontSize:36,marginBottom:10,opacity:.3}}>📭</div>
            <div style={{color:"#1E293B",fontFamily:"'Orbitron',monospace",fontSize:11}}>Inbox empty</div>
          </div>
        :<div>{tabItems.map(item=><ItemCard key={item.id} item={item}/>)}</div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════════ TRADE PAGE */
function TradePage({player,collection,pendingTrades,setPendingTrades,loadCollection,notify}){
  const [tab,setTab]=useState("incoming");
  const [search,setSearch]=useState("");
  const [target,setTarget]=useState(null);
  const [searching,setSearching]=useState(false);
  const [myOffer,setMyOffer]=useState([]);
  const [theirRequest,setTheirRequest]=useState([]);
  const [outgoing,setOutgoing]=useState([]);
  const [sending,setSending]=useState(false);
  const rarOrd=["GOLDEN","Mega","Secret","Ultra Rare","Legendary","Epic","Rare","Uncommon","Common"];

  useEffect(()=>{if(tab!=="new")loadOutgoing();},[tab]);
  const loadOutgoing=async()=>{
    const{data}=await sb.from("trades").select("*").eq("from_id",player.id).order("id",{ascending:false}).limit(20);
    setOutgoing(data||[]);
  };

  const searchPlayer=async()=>{
    const q=search.trim();if(!q)return;
    setSearching(true);setTarget(null);setMyOffer([]);setTheirRequest([]);
    const{data:p}=await sb.from("players").select("id,username,coins").ilike("username",q).maybeSingle();
    if(!p){notify("Trainer not found","#EF4444");setSearching(false);return;}
    if(p.id===player.id){notify("Can't trade with yourself!","#EF4444");setSearching(false);return;}
    const{data:col}=await sb.from("collection").select("*").eq("player_id",p.id);
    const mapped=(col||[]).map(row=>{
      const base=ALL_CARDS.find(c=>String(c.id)===String(row.card_id));
      if(!base)return null;
      return{...base,uid:row.uid,rarity:row.rarity||base.rarity,isShiny:row.rarity==="Shiny"||undefined,origRarity:row.rarity==="Shiny"?base.rarity:undefined,bp:row.rarity==="Shiny"?base.bp*10:base.bp,tc:row.rarity==="Shiny"?"#00FFAA":base.tc,bg:row.rarity==="Shiny"?"15deg,#001a0d,#003320":base.bg};
    }).filter(Boolean).sort((a,b)=>rarOrd.indexOf(a.rarity)-rarOrd.indexOf(b.rarity));
    setTarget({...p,collection:mapped});setSearching(false);
  };

  const sendOffer=async()=>{
    if(!target){notify("Find a trainer first","#EF4444");return;}
    if(myOffer.length===0&&theirRequest.length===0){notify("Select cards to trade","#EF4444");return;}
    setSending(true);
    const offeredCards=collection.filter(c=>myOffer.includes(c.uid)).map(c=>({uid:c.uid,id:c.id,name:c.name,rarity:c.rarity,bp:c.bp}));
    const requestedCards=target.collection.filter(c=>theirRequest.includes(c.uid)).map(c=>({uid:c.uid,id:c.id,name:c.name,rarity:c.rarity,bp:c.bp}));
    const{error}=await sb.from("trades").insert({from_id:player.id,to_id:target.id,from_name:player.username,to_name:target.username,offered:offeredCards,requested:requestedCards,status:"pending"});
    if(error){notify("Error: "+error.message,"#EF4444");setSending(false);return;}
    notify(`📦 Offer sent to ${target.username}!`,"#C084FC");
    setMyOffer([]);setTheirRequest([]);setTarget(null);setSearch("");setSending(false);setTab("outgoing");
  };

  const acceptTrade=async(trade)=>{
    const offered=trade.offered||[];const requested=trade.requested||[];
    for(const c of requested)await sb.from("collection").delete().eq("uid",c.uid);
    for(const c of offered)await sb.from("collection").insert({player_id:player.id,card_id:c.id,card_name:c.name,rarity:c.rarity,buy_price:c.bp||0,obtained_at:new Date().toLocaleDateString(),uid:crypto.randomUUID()});
    for(const c of offered)await sb.from("collection").delete().eq("uid",c.uid);
    for(const c of requested)await sb.from("collection").insert({player_id:trade.from_id,card_id:c.id,card_name:c.name,rarity:c.rarity,buy_price:c.bp||0,obtained_at:new Date().toLocaleDateString(),uid:crypto.randomUUID()});
    await sb.from("trades").update({status:"accepted"}).eq("id",trade.id);
    setPendingTrades(t=>t.filter(x=>x.id!==trade.id));
    await loadCollection(player.id);
    notify("✅ Trade accepted!","#34D399");
  };
  const declineTrade=async(t)=>{await sb.from("trades").update({status:"declined"}).eq("id",t.id);setPendingTrades(p=>p.filter(x=>x.id!==t.id));notify("Declined","#475569");};
  const cancelTrade=async(t)=>{await sb.from("trades").update({status:"cancelled"}).eq("id",t.id);setOutgoing(o=>o.filter(x=>x.id!==t.id));notify("Cancelled","#475569");};

  const mySorted=[...collection].sort((a,b)=>rarOrd.indexOf(a.rarity)-rarOrd.indexOf(b.rarity));

  const CardChip=({c,selected,onClick})=>{
    const rc=RARITY_CFG[c.rarity]||RARITY_CFG.Common;
    return(
      <div onClick={onClick} style={{display:"flex",alignItems:"center",gap:6,padding:"5px 8px",borderRadius:8,border:`1px solid ${selected?rc.color:rc.color+"33"}`,background:selected?rc.color+"18":"#080D1A",cursor:"pointer",transition:"all .12s",flexShrink:0}}
        onMouseEnter={e=>e.currentTarget.style.borderColor=rc.color}
        onMouseLeave={e=>e.currentTarget.style.borderColor=selected?rc.color:rc.color+"33"}>
        <img src={MINI(c.id)} style={{width:24,height:24,imageRendering:"pixelated"}} onError={e=>e.target.style.display="none"}/>
        <div>
          <div style={{color:rc.color,fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:8}}>{c.name}</div>
          <div style={{color:"#334155",fontSize:7}}>{c.rarity}</div>
        </div>
        {selected&&<span style={{color:rc.color,fontSize:10,marginLeft:2}}>✓</span>}
      </div>
    );
  };

  const OfferCard=({trade,isIncoming})=>{
    const o=trade.offered||[];const r=trade.requested||[];
    const sc={pending:"#C084FC",accepted:"#34D399",declined:"#EF4444",cancelled:"#475569"}[trade.status]||"#475569";
    return(
      <div style={{background:"#080D1A",border:`1px solid ${sc}22`,borderRadius:14,padding:16,marginBottom:10}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,flexWrap:"wrap",gap:6}}>
          <div>
            <span style={{fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:12}}>{isIncoming?`📦 ${trade.from_name} offers:`:`📤 To ${trade.to_name}`}</span>
            <span style={{marginLeft:8,fontSize:7,fontFamily:"'Orbitron',monospace",color:sc,fontWeight:700}}>{trade.status.toUpperCase()}</span>
          </div>
          <div style={{display:"flex",gap:6}}>
            {isIncoming&&trade.status==="pending"&&<>
              <button onClick={()=>acceptTrade(trade)} style={{padding:"5px 12px",background:"linear-gradient(135deg,#065F46,#10B981)",border:"none",borderRadius:6,color:"white",fontFamily:"'Orbitron',monospace",fontSize:8,cursor:"pointer",fontWeight:700}}>ACCEPT</button>
              <button onClick={()=>declineTrade(trade)} style={{padding:"5px 10px",background:"none",border:"1px solid #EF444455",borderRadius:6,color:"#EF4444",fontFamily:"'Orbitron',monospace",fontSize:8,cursor:"pointer"}}>DECLINE</button>
            </>}
            {!isIncoming&&trade.status==="pending"&&<button onClick={()=>cancelTrade(trade)} style={{padding:"5px 10px",background:"none",border:"1px solid #33415555",borderRadius:6,color:"#475569",fontFamily:"'Orbitron',monospace",fontSize:8,cursor:"pointer"}}>CANCEL</button>}
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 28px 1fr",gap:8,alignItems:"center"}}>
          <div>
            <div style={{color:"#475569",fontFamily:"'Orbitron',monospace",fontSize:7,letterSpacing:1,marginBottom:5}}>{isIncoming?"THEY GIVE":"YOU GIVE"}</div>
            <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{(isIncoming?o:o).length===0?<span style={{color:"#1E293B",fontSize:9}}>Nothing</span>:(isIncoming?o:o).map((c,i)=>{const rc=RARITY_CFG[c.rarity]||RARITY_CFG.Common;return<div key={i} style={{display:"flex",alignItems:"center",gap:4,background:rc.color+"12",border:`1px solid ${rc.color}44`,borderRadius:6,padding:"3px 6px"}}><img src={MINI(c.id)} style={{width:18,height:18,imageRendering:"pixelated"}} onError={e=>e.target.style.display="none"}/><span style={{color:rc.color,fontFamily:"'Orbitron',monospace",fontSize:7,fontWeight:700}}>{c.name}</span></div>;})}</div>
          </div>
          <div style={{textAlign:"center",color:"#334155",fontSize:16}}>⇄</div>
          <div>
            <div style={{color:"#475569",fontFamily:"'Orbitron',monospace",fontSize:7,letterSpacing:1,marginBottom:5}}>{isIncoming?"YOU GIVE":"THEY GIVE"}</div>
            <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{r.length===0?<span style={{color:"#1E293B",fontSize:9}}>Nothing</span>:r.map((c,i)=>{const rc=RARITY_CFG[c.rarity]||RARITY_CFG.Common;return<div key={i} style={{display:"flex",alignItems:"center",gap:4,background:rc.color+"12",border:`1px solid ${rc.color}44`,borderRadius:6,padding:"3px 6px"}}><img src={MINI(c.id)} style={{width:18,height:18,imageRendering:"pixelated"}} onError={e=>e.target.style.display="none"}/><span style={{color:rc.color,fontFamily:"'Orbitron',monospace",fontSize:7,fontWeight:700}}>{c.name}</span></div>;})}</div>
          </div>
        </div>
      </div>
    );
  };

  return(
    <div style={{animation:"fadeIn .3s ease"}}>
      <h1 style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:"clamp(18px,4vw,26px)",marginBottom:4}}>CARD <span style={{color:"#C084FC"}}>TRADING</span></h1>
      <p style={{color:"#334155",fontSize:11,marginBottom:16}}>Swap cards with other trainers · trades are instant on acceptance</p>
      <div style={{display:"flex",gap:4,marginBottom:18,background:"#080D1A",padding:3,borderRadius:9,width:"fit-content"}}>
        {[["incoming","📥 INCOMING",pendingTrades.length],["outgoing","📤 SENT",0],["new","➕ NEW",0]].map(([id,label,cnt])=>(
          <button key={id} onClick={()=>setTab(id)} style={{padding:"7px 14px",background:tab===id?"#1E3A5F":"transparent",border:"none",borderRadius:7,color:tab===id?"#60A5FA":"#475569",fontFamily:"'Orbitron',monospace",fontSize:8,fontWeight:700,cursor:"pointer",position:"relative",whiteSpace:"nowrap"}}>
            {label}{cnt>0&&<span style={{marginLeft:4,background:"#C084FC",color:"white",borderRadius:9,padding:"1px 5px",fontSize:7}}>{cnt}</span>}
          </button>
        ))}
      </div>

      {tab==="incoming"&&(
        pendingTrades.length===0
          ?<div style={{textAlign:"center",padding:"60px 0",color:"#1E293B",fontFamily:"'Orbitron',monospace",fontSize:11}}>No incoming offers</div>
          :pendingTrades.map(t=><OfferCard key={t.id} trade={t} isIncoming={true}/>)
      )}

      {tab==="outgoing"&&(
        outgoing.length===0
          ?<div style={{textAlign:"center",padding:"60px 0",color:"#1E293B",fontFamily:"'Orbitron',monospace",fontSize:11}}>No sent offers</div>
          :outgoing.map(t=><OfferCard key={t.id} trade={t} isIncoming={false}/>)
      )}

      {tab==="new"&&(
        <div>
          {/* Step 1: Find trainer */}
          <div style={{background:"#080D1A",border:"1px solid #1E293B",borderRadius:12,padding:16,marginBottom:14}}>
            <div style={{fontFamily:"'Orbitron',monospace",fontSize:8,color:"#475569",letterSpacing:2,marginBottom:8}}>STEP 1 — FIND TRAINER</div>
            <div style={{display:"flex",gap:8}}>
              <input value={search} onChange={e=>setSearch(e.target.value)} onKeyDown={e=>e.key==="Enter"&&searchPlayer()} placeholder="Exact username..." style={{flex:1,background:"#0F172A",border:"1px solid #1E293B",color:"#F1F5F9",borderRadius:8,padding:"10px 14px",fontFamily:"'Exo 2',sans-serif",fontSize:13,outline:"none"}}/>
              <button onClick={searchPlayer} disabled={searching} style={{padding:"10px 18px",background:searching?"#1A2035":"linear-gradient(135deg,#4c1d95,#7C3AED)",border:"none",borderRadius:8,color:searching?"#334155":"white",fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:9,cursor:searching?"not-allowed":"pointer"}}>{searching?"...":"FIND"}</button>
            </div>
            {target&&(
              <div style={{marginTop:10,display:"flex",alignItems:"center",gap:10,background:"#0F172A",borderRadius:8,padding:"8px 12px"}}>
                <img src={ITEM("poke-ball")} style={{width:24,height:24,imageRendering:"pixelated"}} onError={e=>e.target.style.display="none"}/>
                <span style={{fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:12,color:"#34D399"}}>{target.username}</span>
                <span style={{color:"#334155",fontSize:10}}>{target.collection.length} cards</span>
                <button onClick={()=>{setTarget(null);setMyOffer([]);setTheirRequest([]);setSearch("");}} style={{marginLeft:"auto",background:"none",border:"1px solid #1E293B",borderRadius:6,color:"#475569",padding:"3px 8px",cursor:"pointer",fontFamily:"'Orbitron',monospace",fontSize:7}}>✕</button>
              </div>
            )}
          </div>

          {target&&(<>
            {/* Step 2: Pick cards */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
              <div style={{background:"#080D1A",border:"1px solid #1E293B",borderRadius:12,padding:14}}>
                <div style={{fontFamily:"'Orbitron',monospace",fontSize:8,color:"#60A5FA",letterSpacing:2,marginBottom:8}}>YOUR OFFER <span style={{color:"#334155"}}>({myOffer.length} selected)</span></div>
                <div style={{display:"flex",flexDirection:"column",gap:4,maxHeight:280,overflowY:"auto"}}>
                  {mySorted.length===0?<div style={{color:"#1E293B",fontSize:10,padding:8}}>No cards</div>
                  :mySorted.map(c=><CardChip key={c.uid} c={c} selected={myOffer.includes(c.uid)} onClick={()=>setMyOffer(o=>o.includes(c.uid)?o.filter(x=>x!==c.uid):[...o,c.uid])}/>)}
                </div>
              </div>
              <div style={{background:"#080D1A",border:"1px solid #1E293B",borderRadius:12,padding:14}}>
                <div style={{fontFamily:"'Orbitron',monospace",fontSize:8,color:"#C084FC",letterSpacing:2,marginBottom:8}}>REQUEST FROM {target.username.toUpperCase()} <span style={{color:"#334155"}}>({theirRequest.length})</span></div>
                <div style={{display:"flex",flexDirection:"column",gap:4,maxHeight:280,overflowY:"auto"}}>
                  {target.collection.length===0?<div style={{color:"#1E293B",fontSize:10,padding:8}}>Empty collection</div>
                  :target.collection.map(c=><CardChip key={c.uid} c={c} selected={theirRequest.includes(c.uid)} onClick={()=>setTheirRequest(o=>o.includes(c.uid)?o.filter(x=>x!==c.uid):[...o,c.uid])}/>)}
                </div>
              </div>
            </div>

            {/* Step 3: Summary + send */}
            <div style={{background:"#080D1A",border:"1px solid #C084FC33",borderRadius:12,padding:14}}>
              <div style={{fontFamily:"'Orbitron',monospace",fontSize:8,color:"#475569",letterSpacing:2,marginBottom:10}}>STEP 3 — REVIEW & SEND</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 28px 1fr",gap:10,alignItems:"center",marginBottom:12}}>
                <div>
                  <div style={{color:"#60A5FA",fontSize:7,fontFamily:"'Orbitron',monospace",letterSpacing:1,marginBottom:5}}>YOU GIVE ({myOffer.length})</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:3}}>{myOffer.length===0?<span style={{color:"#1E293B",fontSize:9}}>Nothing</span>:collection.filter(c=>myOffer.includes(c.uid)).map(c=>{const rc=RARITY_CFG[c.rarity]||RARITY_CFG.Common;return<span key={c.uid} style={{color:rc.color,fontSize:8,background:rc.color+"15",borderRadius:4,padding:"2px 6px",fontFamily:"'Orbitron',monospace",fontWeight:700}}>{c.name}</span>})}</div>
                </div>
                <div style={{fontSize:16,color:"#334155",textAlign:"center"}}>⇄</div>
                <div>
                  <div style={{color:"#C084FC",fontSize:7,fontFamily:"'Orbitron',monospace",letterSpacing:1,marginBottom:5}}>YOU GET ({theirRequest.length})</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:3}}>{theirRequest.length===0?<span style={{color:"#1E293B",fontSize:9}}>Nothing</span>:target.collection.filter(c=>theirRequest.includes(c.uid)).map(c=>{const rc=RARITY_CFG[c.rarity]||RARITY_CFG.Common;return<span key={c.uid} style={{color:rc.color,fontSize:8,background:rc.color+"15",borderRadius:4,padding:"2px 6px",fontFamily:"'Orbitron',monospace",fontWeight:700}}>{c.name}</span>})}</div>
                </div>
              </div>
              <button onClick={sendOffer} disabled={sending||(myOffer.length===0&&theirRequest.length===0)} style={{width:"100%",padding:"11px",background:sending?"#1A2035":"linear-gradient(135deg,#4c1d95,#7C3AED)",border:"none",borderRadius:9,color:"white",fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:11,cursor:sending?"not-allowed":"pointer",letterSpacing:1,opacity:myOffer.length===0&&theirRequest.length===0?.4:1}}>
                {sending?"SENDING...":"📦 SEND OFFER"}
              </button>
            </div>
          </>)}
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════════ DUKE ADMIN PANEL */
function DukeAdminPanel({notify,player,loadCollection}){
  const [target,setTarget]=useState("");
  const [targetData,setTargetData]=useState(null);
  const [targetCol,setTargetCol]=useState([]);
  const [loading,setLoading]=useState(false);
  const [coins,setCoins]=useState("");
  const [cardSearch,setCardSearch]=useState("");
  const [bulkCount,setBulkCount]=useState("50");
  const [bulkRarity,setBulkRarity]=useState("Any");
  const [giving,setGiving]=useState(false);
  const [giveTarget,setGiveTarget]=useState(""); // username to give cards to
  const [giveTargetId,setGiveTargetId]=useState(null); // resolved player id

  // Always operate on self (duke) — no need to lookup
  const selfId = player?.id;
  const selfName = player?.username;

  const lookup=async()=>{
    const n=target.trim();if(!n)return;
    setLoading(true);setTargetData(null);setTargetCol([]);
    const{data:p}=await sb.from("players").select("*").eq("username",n).maybeSingle();
    if(!p){notify("User not found","#EF4444");setLoading(false);return;}
    const{data:col}=await sb.from("collection").select("*").eq("player_id",p.id);
    setTargetData(p);setTargetCol(col||[]);setLoading(false);
  };

  const setCoinsAdmin=async()=>{
    const c=parseInt(coins);if(isNaN(c)||!targetData)return;
    await sb.from("players").update({coins:c}).eq("id",targetData.id);
    setTargetData(p=>({...p,coins:c}));notify(`Set ${targetData.username} coins to ${c}`,"#10B981");
  };

  const resetPlayer=async()=>{
    if(!targetData||!window.confirm(`Reset ${targetData.username}?`))return;
    await sb.from("collection").delete().eq("player_id",targetData.id);
    await sb.from("players").update({coins:1000,total_packs:0,total_cards:0,total_sold:0,won:false}).eq("id",targetData.id);
    setTargetData(p=>({...p,coins:1000}));setTargetCol([]);
    notify(`Reset ${targetData.username}`,"#F59E0B");
  };

  const deleteCard=async(uid,name)=>{
    await sb.from("collection").delete().eq("uid",uid);
    setTargetCol(c=>c.filter(x=>x.uid!==uid));
    notify(`Deleted ${name}`,"#EF4444");
  };

  const banPlayer=async()=>{
    if(!targetData||!window.confirm(`Delete account for ${targetData.username}?`))return;
    await sb.from("collection").delete().eq("player_id",targetData.id);
    await sb.from("players").delete().eq("id",targetData.id);
    setTargetData(null);setTargetCol([]);
    notify(`Deleted ${target}`,"#EF4444");
  };

  // Give a specific card (any card from ALL_CARDS pool) to self
  const giveCard=async(card, targetId=null)=>{
    const pid=targetId||selfId;
    if(!pid||giving)return;
    setGiving(true);
    const row={player_id:pid,card_id:card.id,card_name:card.name,rarity:card.rarity,buy_price:card.bp||10,obtained_at:new Date().toLocaleDateString(),uid:crypto.randomUUID()};
    const{error}=await sb.from("collection").insert(row);
    if(error){notify("Failed: "+error.message,"#EF4444");setGiving(false);return;}
    notify(`✅ Gave ${card.name} (${card.rarity})${targetId?" to "+giveTarget:""}`, "#10B981");
    if(!targetId&&loadCollection)loadCollection(selfId);
    setGiving(false);
  };

  // Bulk give random cards to self
  const bulkGive=async()=>{
    const count=Math.min(2000,Math.max(1,parseInt(bulkCount)||50));
    if(!selfId){notify("Log in first","#EF4444");return;}
    setGiving(true);
    notify(`Adding ${count} cards...`,"#7C3AED");
    const pool=bulkRarity==="Any"?CARDS:CARDS.filter(c=>c.rarity===bulkRarity);
    if(pool.length===0){notify("No cards in that rarity","#EF4444");setGiving(false);return;}
    const rows=Array.from({length:count},()=>{
      const card=pool[Math.floor(Math.random()*pool.length)];
      return{player_id:selfId,card_id:card.id,card_name:card.name,rarity:card.rarity,buy_price:card.bp||10,obtained_at:new Date().toLocaleDateString(),uid:crypto.randomUUID()};
    });
    // Insert in chunks of 200
    for(let i=0;i<rows.length;i+=200){
      await sb.from("collection").insert(rows.slice(i,i+200));
    }
    if(loadCollection)loadCollection(selfId);
    notify(`✅ Added ${count} cards to your collection!`,"#10B981");
    setGiving(false);
  };

  // Clear own collection
  const clearSelf=async()=>{
    if(!window.confirm("Clear YOUR entire collection?"))return;
    await sb.from("collection").delete().eq("player_id",selfId);
    if(loadCollection)loadCollection(selfId);
    notify("Collection cleared","#F59E0B");
  };

  const stageForVideo=async(card)=>{
    if(!selfId||giving)return;
    if(!window.confirm(`Stage for video:\n\n"${card.name}" (${card.rarity}) will be your guaranteed next pull.\n\nThis will fill your collection with ALL other cards first.\n\nReady?`))return;
    setGiving(true);
    notify("Staging collection...","#7C3AED");

    // Get current collection to avoid duplicates
    const{data:existing}=await sb.from("collection").select("card_id,rarity").eq("player_id",selfId);
    const ownedKeys=new Set((existing||[]).map(r=>r.card_id+"_"+r.rarity));

    // Build rows for every card except the target
    const allPool=[...CARDS,...(MEGA_CARDS||[]),...(RADIANT_CARDS||[]),...(CRYSTAL_CARDS||[]),...(RAINBOW_CARDS||[])];
    const rows=allPool
      .filter(c=>!(String(c.id)===String(card.id)&&c.rarity===card.rarity))
      .filter(c=>!ownedKeys.has(c.id+"_"+c.rarity))
      .map(c=>({player_id:selfId,card_id:c.id,card_name:c.name,rarity:c.rarity,buy_price:c.bp||10,obtained_at:new Date().toLocaleDateString(),uid:crypto.randomUUID()}));

    // Insert in chunks
    for(let i=0;i<rows.length;i+=200){
      await sb.from("collection").insert(rows.slice(i,i+200));
    }

    // Set the guaranteed pull in localStorage
    lsSet("guaranteedPull",JSON.stringify({id:card.id,rarity:card.rarity}));

    if(loadCollection)loadCollection(selfId);
    notify(`🎬 Staged! ${rows.length} cards added. Next pack pull = ${card.name}!`,"#FCD34D");
    setGiving(false);
  };

  const clearGuaranteed=()=>{
    lsSet("guaranteedPull","");
    notify("Guaranteed pull cleared","#475569");
  };
  const rarities=["Any","Common","Uncommon","Rare","Epic","Legendary","Ultra Rare","Secret","GOLDEN"];
  const allCardsPool=[...CARDS,...MEGA_CARDS,...(RADIANT_CARDS||[]),...(CRYSTAL_CARDS||[]),...(RAINBOW_CARDS||[])];
  const filteredCards=allCardsPool.filter(c=>
    !cardSearch||(c.name.toLowerCase().includes(cardSearch.toLowerCase())||c.type?.toLowerCase().includes(cardSearch.toLowerCase())||(c.rarity||"").toLowerCase().includes(cardSearch.toLowerCase()))
  ).slice(0,80);

  return(
    <div style={{marginTop:20,background:"#0a0010",border:"2px solid #7C3AED44",borderRadius:12,padding:20}}>
      <div style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:10,color:"#7C3AED",letterSpacing:3,marginBottom:16}}>👑 DUKE ADMIN PANEL</div>

      {/* ── GIVE SELF CARDS ── */}
      <div style={{background:"#0d001a",border:"1px solid #7C3AED33",borderRadius:10,padding:14,marginBottom:16}}>
        <div style={{fontFamily:"'Orbitron',monospace",fontSize:8,color:"#7C3AED",letterSpacing:2,marginBottom:10}}>🎴 GIVE YOURSELF CARDS</div>

        {/* Bulk add */}
        <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap",marginBottom:10}}>
          <input value={bulkCount} onChange={e=>setBulkCount(e.target.value)} placeholder="Count" style={{width:70,background:"#0F172A",border:"1px solid #334155",color:"#F1F5F9",borderRadius:7,padding:"7px 10px",fontSize:12,outline:"none"}}/>
          <select value={bulkRarity} onChange={e=>setBulkRarity(e.target.value)} style={{background:"#0F172A",border:"1px solid #334155",color:"#F1F5F9",borderRadius:7,padding:"7px 10px",fontSize:12,outline:"none"}}>
            {rarities.map(r=><option key={r} value={r}>{r}</option>)}
          </select>
          <button onClick={bulkGive} disabled={giving} style={{padding:"7px 18px",background:"linear-gradient(135deg,#4c1d95,#7C3AED)",border:"none",borderRadius:7,color:"white",fontFamily:"'Orbitron',monospace",fontSize:9,cursor:"pointer",fontWeight:700,opacity:giving?0.6:1}}>
            {giving?"ADDING...":"BULK ADD"}
          </button>
          <button onClick={clearSelf} style={{padding:"7px 14px",background:"linear-gradient(135deg,#7f1d1d,#EF4444)",border:"none",borderRadius:7,color:"white",fontFamily:"'Orbitron',monospace",fontSize:8,cursor:"pointer",fontWeight:700}}>CLEAR MINE</button>
          <button onClick={()=>giveCard(DUKE_CARD,giveTargetId)} style={{padding:"7px 14px",background:"linear-gradient(135deg,#2d0050,#9F00FF)",border:"none",borderRadius:7,color:"white",fontFamily:"'Orbitron',monospace",fontSize:8,cursor:"pointer",fontWeight:700}}>👑 DUKE CARD</button>
          <button onClick={()=>giveCard(ETERNAMAX_CARD)} style={{padding:"7px 14px",background:"linear-gradient(135deg,#04000f,#6600cc)",border:"1px solid #9900ff88",borderRadius:7,color:"#cc88ff",fontFamily:"'Orbitron',monospace",fontSize:8,cursor:"pointer",fontWeight:700}}>∞ ETERNAMAX</button>
        </div>

        {/* Stage for video */}
        <div style={{background:"#1a0a00",border:"1px solid #FCD34D44",borderRadius:8,padding:12,marginBottom:10}}>
          <div style={{fontFamily:"'Orbitron',monospace",fontSize:8,color:"#FCD34D",letterSpacing:2,marginBottom:6}}>🎬 STAGE FOR VIDEO</div>
          <div style={{color:"#94A3B8",fontSize:11,marginBottom:8}}>Search a card below → click <b style={{color:"#FCD34D"}}>🎬 STAGE</b> to fill every other card into your collection and guarantee that card as your next pull.</div>
          {lsGet("guaranteedPull")&&<div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{color:"#FCD34D",fontSize:11}}>⚡ Guaranteed pull is SET — open any pack for the video!</span>
            <button onClick={clearGuaranteed} style={{padding:"3px 10px",background:"#7f1d1d",border:"none",borderRadius:5,color:"white",fontSize:9,cursor:"pointer",fontFamily:"'Orbitron',monospace"}}>CLEAR</button>
          </div>}
        </div>

        {/* Give to player */}
        <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:10,flexWrap:"wrap"}}>
          <span style={{color:"#7C3AED",fontFamily:"'Orbitron',monospace",fontSize:8,fontWeight:700}}>GIVE TO:</span>
          <input value={giveTarget} onChange={e=>{setGiveTarget(e.target.value);setGiveTargetId(null);}} placeholder="Username (blank = yourself)" style={{flex:1,minWidth:120,background:"#0F172A",border:`1px solid ${giveTargetId?"#10B981":"#334155"}`,borderRadius:6,padding:"6px 10px",color:"#F1F5F9",fontFamily:"'Share Tech Mono',monospace",fontSize:11}}/>
          <button onClick={async()=>{
            if(!giveTarget.trim()){setGiveTargetId(null);notify("Giving to yourself","#7C3AED");return;}
            const{data}=await sb.from("players").select("id,username").ilike("username",giveTarget.trim()).maybeSingle();
            if(!data){notify("Player not found","#EF4444");setGiveTargetId(null);return;}
            setGiveTargetId(data.id);setGiveTarget(data.username);
            notify(`✅ Target: ${data.username}`,"#10B981");
          }} style={{padding:"6px 12px",background:"#1e1040",border:"1px solid #7C3AED55",borderRadius:6,color:"#7C3AED",fontFamily:"'Orbitron',monospace",fontSize:8,cursor:"pointer",fontWeight:700}}>FIND</button>
          {giveTargetId&&<span style={{color:"#10B981",fontSize:9,fontFamily:"'Orbitron',monospace"}}>✓ {giveTarget}</span>}
        </div>

        {/* Search and give specific card */}
        <input value={cardSearch} onChange={e=>setCardSearch(e.target.value)} placeholder="Search any card by name, type, or rarity..." style={{width:"100%",boxSizing:"border-box",background:"#0F172A",border:"1px solid #334155",color:"#F1F5F9",borderRadius:7,padding:"8px 12px",fontSize:12,outline:"none",marginBottom:8}}/>
        {cardSearch&&(
          <div style={{display:"flex",flexWrap:"wrap",gap:6,maxHeight:260,overflowY:"auto",padding:4}}>
            {filteredCards.map(card=>{
              const rc=RARITY_CFG[card.rarity]||RARITY_CFG.Common;
              return(
                <button key={card.id+card.rarity} disabled={giving}
                  style={{background:`${rc.color}12`,border:`1px solid ${rc.color}44`,borderRadius:8,padding:"6px 10px",cursor:"pointer",display:"flex",alignItems:"center",gap:7,opacity:giving?0.6:1,transition:"background .15s"}}
                  onMouseEnter={e=>e.currentTarget.style.background=rc.color+"28"}
                  onMouseLeave={e=>e.currentTarget.style.background=rc.color+"12"}>
                  <img src={`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${card.id}.png`} style={{width:28,height:28,imageRendering:"pixelated"}} onError={e=>e.target.style.display="none"} alt=""/>
                  <div style={{textAlign:"left"}}>
                    <div style={{color:rc.color,fontFamily:"'Orbitron',monospace",fontSize:8,fontWeight:700}}>{card.name}</div>
                    <div style={{color:"#475569",fontSize:8}}>{card.rarity} · {card.type}</div>
                  </div>
                  <div style={{display:"flex",flexDirection:"column",gap:3,marginLeft:4}}>
                    <button onClick={e=>{e.stopPropagation();giveCard(card,giveTargetId);}} disabled={giving} style={{padding:"2px 7px",background:"#065F46",border:"none",borderRadius:4,color:"white",fontSize:8,cursor:"pointer",fontFamily:"'Orbitron',monospace",fontWeight:700}}>+1</button>
                    <button onClick={e=>{e.stopPropagation();stageForVideo(card);}} disabled={giving} style={{padding:"2px 7px",background:"#78350F",border:"none",borderRadius:4,color:"#FCD34D",fontSize:8,cursor:"pointer",fontFamily:"'Orbitron',monospace",fontWeight:700}}>🎬</button>
                  </div>
                </button>
              );
            })}
            {filteredCards.length===0&&<div style={{color:"#334155",fontSize:11,padding:8}}>No cards found</div>}
          </div>
        )}
      </div>

      {/* ── MANAGE OTHER USERS ── */}
      <div style={{background:"#0d001a",border:"1px solid #7C3AED33",borderRadius:10,padding:14}}>
        <div style={{fontFamily:"'Orbitron',monospace",fontSize:8,color:"#7C3AED",letterSpacing:2,marginBottom:10}}>👤 MANAGE OTHER USERS</div>
        <div style={{display:"flex",gap:8,marginBottom:14}}>
          <input value={target} onChange={e=>setTarget(e.target.value)} onKeyDown={e=>e.key==="Enter"&&lookup()} placeholder="Username to manage..." style={{flex:1,background:"#0F172A",border:"1px solid #334155",color:"#F1F5F9",borderRadius:7,padding:"9px 12px",fontFamily:"'Exo 2',sans-serif",fontSize:13,outline:"none"}}/>
          <button onClick={lookup} disabled={loading} style={{padding:"9px 16px",background:"linear-gradient(135deg,#4c1d95,#7C3AED)",border:"none",borderRadius:7,color:"white",fontFamily:"'Orbitron',monospace",fontSize:9,cursor:"pointer",fontWeight:700}}>{loading?"...":"LOOKUP"}</button>
        </div>
        {targetData&&<div>
          <div style={{background:"#0F172A",borderRadius:9,padding:12,marginBottom:12}}>
            <div style={{color:"#F1F5F9",fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:13,marginBottom:4}}>{targetData.username}</div>
            <div style={{color:"#475569",fontSize:11}}>Coins: {targetData.coins} · Cards: {targetCol.length}</div>
          </div>
          <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
            <input value={coins} onChange={e=>setCoins(e.target.value)} placeholder="Set coins..." style={{background:"#0F172A",border:"1px solid #334155",color:"#F1F5F9",borderRadius:7,padding:"7px 10px",fontSize:12,outline:"none",width:120}}/>
            <button onClick={setCoinsAdmin} style={{padding:"7px 14px",background:"linear-gradient(135deg,#065F46,#10B981)",border:"none",borderRadius:7,color:"white",fontFamily:"'Orbitron',monospace",fontSize:8,cursor:"pointer",fontWeight:700}}>SET COINS</button>
            <button onClick={async()=>{const f=!targetData.flagged;await sb.from("players").update({flagged:f}).eq("id",targetData.id);setTargetData(p=>({...p,flagged:f}));notify(`${targetData.username} ${f?"BANNED":"UNBANNED"}`,f?"#EF4444":"#10B981");}} style={{padding:"7px 14px",background:targetData.flagged?"linear-gradient(135deg,#065F46,#10B981)":"linear-gradient(135deg,#7f1d1d,#EF4444)",border:"none",borderRadius:7,color:"white",fontFamily:"'Orbitron',monospace",fontSize:8,cursor:"pointer",fontWeight:700}}>{targetData.flagged?"UNBAN":"BAN"}</button>
            <button onClick={resetPlayer} style={{padding:"7px 14px",background:"linear-gradient(135deg,#78350F,#F59E0B)",border:"none",borderRadius:7,color:"white",fontFamily:"'Orbitron',monospace",fontSize:8,cursor:"pointer",fontWeight:700}}>RESET</button>
            <button onClick={banPlayer} style={{padding:"7px 14px",background:"linear-gradient(135deg,#7f1d1d,#DC2626)",border:"none",borderRadius:7,color:"white",fontFamily:"'Orbitron',monospace",fontSize:8,cursor:"pointer",fontWeight:700}}>DELETE</button>
          </div>
          {targetCol.length>0&&<div>
            <div style={{color:"#475569",fontFamily:"'Orbitron',monospace",fontSize:8,letterSpacing:2,marginBottom:8}}>COLLECTION ({targetCol.length}) — click to delete</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6,maxHeight:160,overflowY:"auto"}}>
              {targetCol.map(row=>(
                <button key={row.uid} onClick={()=>deleteCard(row.uid,row.card_name)}
                  style={{background:"#1E293B",border:"1px solid #DC262633",borderRadius:6,padding:"4px 8px",color:"#94A3B8",cursor:"pointer",fontSize:10,fontFamily:"'Exo 2',sans-serif"}}
                  onMouseEnter={e=>{e.currentTarget.style.background="#2d0000";e.currentTarget.style.color="#EF4444";}}
                  onMouseLeave={e=>{e.currentTarget.style.background="#1E293B";e.currentTarget.style.color="#94A3B8";}}>
                  {row.card_name||row.card_id}
                </button>
              ))}
            </div>
          </div>}
        </div>}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════ TRAINER SEARCH */
function TrainerSearch(){
  const [query,setQuery]=useState("");
  const [results,setResults]=useState([]);
  const [loading,setLoading]=useState(false);
  const [viewed,setViewed]=useState(null);
  const [showAll,setShowAll]=useState(false);

  const doSearch=async()=>{
    const q=query.trim();
    if(!q)return;
    setLoading(true);setResults([]);setViewed(null);setShowAll(false);
    const{data}=await sb.from("players").select("id,username,coins,total_packs,total_cards,total_sold,won,join_date").ilike("username",`%${q}%`).limit(15);
    setResults(data||[]);setLoading(false);
  };

  const openTrainer=async(p)=>{
    setViewed(null);setLoading(true);setShowAll(false);
    const{data:col}=await sb.from("collection").select("*").eq("player_id",p.id);
    const collection=(col||[]).map(row=>{
      const base=ALL_CARDS.find(c=>String(c.id)===String(row.card_id));
      if(!base)return null;
      return{...base,uid:row.uid||row.id,obtainedAt:row.obtained_at,buyPrice:row.buy_price,rarity:row.rarity||base.rarity};
    }).filter(Boolean);
    setViewed({player:p,collection});setLoading(false);
  };

  if(viewed){
    const{player:vp,collection:vc}=viewed;
    const rarOrd=["GOLDEN","Mega","Secret","Ultra Rare","Legendary","Epic","Rare","Uncommon","Common"];
    const rStats={};vc.forEach(c=>{rStats[c.rarity]=(rStats[c.rarity]||0)+1;});
    const totalVal=vc.reduce((s,c)=>s+(c.bp||0),0);
    const prizes=vc.filter(c=>["GOLDEN","Mega","Secret","Ultra Rare","Legendary"].includes(c.rarity));
    return(
      <div style={{animation:"fadeIn .3s ease"}}>
        <button onClick={()=>setViewed(null)} style={{background:"none",border:"1px solid #1E293B",borderRadius:7,color:"#60A5FA",padding:"6px 14px",cursor:"pointer",fontFamily:"'Orbitron',monospace",fontSize:9,marginBottom:18,letterSpacing:1}}>← BACK</button>
        <div style={{background:"linear-gradient(135deg,#0F172A,#1A2744)",border:"1px solid #1E3A5F",borderRadius:16,padding:22,display:"flex",gap:18,alignItems:"center",marginBottom:16,flexWrap:"wrap"}}>
          <div style={{width:64,height:64,borderRadius:"50%",background:"linear-gradient(135deg,#1E3A5F,#2563EB)",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 0 24px #2563EB44",flexShrink:0}}>
            <img src={ITEM("poke-ball")} alt="" style={{width:36,height:36,imageRendering:"pixelated"}} onError={e=>e.target.style.display="none"}/>
          </div>
          <div style={{flex:1}}>
            <div style={{display:"flex",gap:8,alignItems:"center"}}><span style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:20}}>{vp.username}</span>{vp.won&&<span style={{fontSize:18}}>🏆</span>}</div>
            <div style={{color:"#334155",fontSize:10,marginTop:3}}>Trainer since {vp.join_date||"?"}</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:22,color:"#FCD34D"}}>🪙{(vp.coins||0).toLocaleString()}</div>
            <div style={{color:"#334155",fontSize:9,marginTop:2}}>Portfolio: {totalVal.toLocaleString()}🪙</div>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(120px,1fr))",gap:10,marginBottom:16}}>
          {[{l:"Packs",v:vp.total_packs||0,c:"#60A5FA"},{l:"Cards Pulled",v:vp.total_cards||0,c:"#34D399"},{l:"In Collection",v:vc.length,c:"#C084FC"},{l:"Cards Sold",v:vp.total_sold||0,c:"#FCD34D"}].map(s=>(
            <div key={s.l} style={{background:"#080D1A",border:`1px solid ${s.c}18`,borderRadius:12,padding:14,textAlign:"center"}}>
              <div style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:20,color:s.c}}>{s.v}</div>
              <div style={{color:"#1E293B",fontSize:8,marginTop:2,letterSpacing:.5}}>{s.l.toUpperCase()}</div>
            </div>
          ))}
        </div>
        {prizes.length>0&&(
          <div style={{background:"#080D1A",border:"1px solid #FCD34D18",borderRadius:12,padding:18,marginBottom:16}}>
            <div style={{fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:8,color:"#475569",letterSpacing:3,marginBottom:12}}>🏆 PRIZE SHELF</div>
            <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
              {prizes.map(card=><PokemonCard key={card.uid} card={card} currentPrice={card.bp}/>)}
            </div>
          </div>
        )}
        <div style={{background:"#080D1A",border:"1px solid #0A0F1E",borderRadius:12,padding:18,marginBottom:16}}>
          <div style={{fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:8,color:"#475569",letterSpacing:3,marginBottom:12}}>COLLECTION BREAKDOWN</div>
          {Object.entries(RARITY_CFG).map(([rarity,cfg])=>{const count=rStats[rarity]||0;if(!count)return null;const pct=vc.length>0?(count/vc.length)*100:0;return(<div key={rarity} style={{marginBottom:8}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span style={{color:cfg.color,fontFamily:"'Orbitron',monospace",fontSize:8,fontWeight:700}}>{rarity.toUpperCase()}</span><span style={{color:"#334155",fontSize:8}}>{count}</span></div><div style={{background:"#0F172A",borderRadius:3,height:4,overflow:"hidden"}}><div style={{background:`linear-gradient(90deg,${cfg.color}77,${cfg.color})`,borderRadius:3,height:4,width:pct+"%"}}/></div></div>);})}
        </div>
        {vc.length>0&&(
          <div style={{background:"#080D1A",border:"1px solid #0A0F1E",borderRadius:12,padding:18}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <div style={{fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:8,color:"#475569",letterSpacing:3}}>FULL COLLECTION ({vc.length} cards)</div>
              {vc.length>30&&<button onClick={()=>setShowAll(s=>!s)} style={{background:"none",border:"1px solid #1E293B",borderRadius:6,color:"#60A5FA",padding:"4px 10px",cursor:"pointer",fontFamily:"'Orbitron',monospace",fontSize:7}}>{showAll?"SHOW LESS":"SHOW ALL"}</button>}
            </div>
            <div style={{display:"flex",flexWrap:"wrap",gap:10}}>
              {[...vc].sort((a,b)=>rarOrd.indexOf(a.rarity)-rarOrd.indexOf(b.rarity)).slice(0,showAll?9999:30).map(card=><PokemonCard key={card.uid} card={card} currentPrice={card.bp}/>)}
            </div>
            {!showAll&&vc.length>30&&<div style={{color:"#334155",fontFamily:"'Orbitron',monospace",fontSize:9,textAlign:"center",marginTop:12}}>+{vc.length-30} more cards — click SHOW ALL</div>}
          </div>
        )}
      </div>
    );
  }

  return(
    <div style={{animation:"fadeIn .35s ease"}}>
      <h1 style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:"clamp(20px,4vw,28px)",marginBottom:6}}>TRAINER <span style={{color:"#60A5FA"}}>SEARCH</span></h1>
      <p style={{color:"#334155",fontSize:12,marginBottom:20}}>Look up any trainer and browse their collection</p>
      <div style={{display:"flex",gap:10,marginBottom:20}}>
        <input value={query} onChange={e=>setQuery(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doSearch()} placeholder="Search by trainer name..." style={{flex:1,background:"#0F172A",border:"1px solid #1E293B",color:"#F1F5F9",borderRadius:9,padding:"12px 16px",fontFamily:"'Exo 2',sans-serif",fontSize:14,outline:"none"}} autoFocus/>
        <button onClick={doSearch} disabled={loading||!query.trim()} style={{padding:"12px 22px",background:loading||!query.trim()?"#1A2035":"linear-gradient(135deg,#1e3a6e,#2563EB)",border:"none",borderRadius:9,color:loading||!query.trim()?"#334155":"white",fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:10,cursor:loading||!query.trim()?"not-allowed":"pointer",letterSpacing:1}}>{loading?"...":"SEARCH"}</button>
      </div>
      {results.length>0&&(
        <div style={{background:"#080D1A",border:"1px solid #0A0F1E",borderRadius:14,overflow:"hidden"}}>
          {results.map((r,i)=>(
            <div key={r.id} onClick={()=>openTrainer(r)} style={{display:"flex",alignItems:"center",gap:14,padding:"14px 18px",borderBottom:i<results.length-1?"1px solid #050a14":"none",cursor:"pointer",transition:"background .15s"}}
              onMouseEnter={e=>e.currentTarget.style.background="rgba(255,255,255,.03)"}
              onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
              <div style={{width:40,height:40,borderRadius:"50%",background:"linear-gradient(135deg,#1E3A5F,#2563EB)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                <img src={ITEM("poke-ball")} alt="" style={{width:22,height:22,imageRendering:"pixelated"}} onError={e=>e.target.style.display="none"}/>
              </div>
              <div style={{flex:1}}>
                <div style={{display:"flex",gap:7,alignItems:"center"}}><span style={{fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:13}}>{r.username}</span></div>
                <div style={{color:"#334155",fontSize:10,marginTop:2}}>{r.total_packs||0} packs · {r.total_cards||0} cards pulled</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:13,color:"#FCD34D"}}>{(r.coins||0).toLocaleString()}🪙</div>
                <div style={{color:"#475569",fontSize:9,marginTop:2}}>VIEW →</div>
              </div>
            </div>
          ))}
        </div>
      )}
      {!loading&&results.length===0&&query&&<div style={{textAlign:"center",padding:"50px 0",color:"#1E293B",fontFamily:"'Orbitron',monospace",fontSize:11}}>No trainers found for "{query}"</div>}
    </div>
  );
}

/* ══════════════════════════════════════════════════ CARD INDEX */
// Registry of all limited event pools — add future events here
const LIMITED_EVENTS=[
  {
    id:"easter_2026",
    name:"Easter 2026",
    color:"#FFB7C5",
    icon:"🌸",
    cards:LIMITED_CARDS,
    tiers:[
      {label:"COMMON",    color:"#A8D8A8", rarity:"Common"},
      {label:"EPIC",      color:"#C084FC", rarity:"Epic"},
      {label:"LEGENDARY", color:"#FCD34D", rarity:"Legendary"},
      {label:"ULTRA RARE",color:"#FF6B35", rarity:"Ultra Rare"},
      {label:"SECRET",    color:"#E879F9", rarity:"Secret"},
    ],
  },
];

function CardIndex({collection}){
  const [tab,setTab]=useState("dex");
  const [filter,setFilter]=useState("All");
  const [search,setSearch]=useState("");
  const [eventFilter,setEventFilter]=useState("all");

  // BASE DEX — only standard pullable rarities, no event cards
  const BASE_RARITIES=["Common","Uncommon","Rare","Epic","Legendary","Ultra Rare","Secret","Radiant","Crystal","Rainbow","Shiny","Mega","Mythic","GOLDEN"];
  const baseCards=ALL_CARDS.filter(c=>!c.isPersonal&&!c.isEaster&&BASE_RARITIES.includes(c.rarity));
  const ownedBaseIds=new Set(collection.filter(c=>!c.isEaster).map(c=>String(c.id)));
  const totalBase=new Set(baseCards.map(c=>String(c.id))).size;
  const ownedBase=new Set([...ownedBaseIds].filter(id=>baseCards.some(c=>String(c.id)===id))).size;
  const basePct=Math.floor(ownedBase/totalBase*100);

  // LIMITEDS — all event cards across all events
  const allLimitedCards=LIMITED_EVENTS.flatMap(e=>e.cards);
  const ownedLimitedUids=new Set(collection.filter(c=>c.isEaster).map(c=>c.id+"_"+c.rarity));
  const totalLimited=allLimitedCards.length;
  const ownedLimited=allLimitedCards.filter(c=>collection.some(col=>String(col.id)===String(c.id)&&col.rarity===c.rarity)).length;

  const baseDexFilters=["All","Common","Uncommon","Rare","Epic","Legendary","Ultra Rare","Secret","Radiant","Crystal","Rainbow","Mega","GOLDEN"];
  const filteredBase=baseCards
    .filter(c=>filter==="All"||c.rarity===filter)
    .filter(c=>!search||c.name.toLowerCase().includes(search.toLowerCase()))
    .sort((a,b)=>{
      const ro=["GOLDEN","Mega","Secret","Ultra Rare","Legendary","Epic","Rare","Uncommon","Common","Radiant","Crystal","Rainbow","Shiny","Mythic"];
      const ai=ro.indexOf(a.rarity);const bi=ro.indexOf(b.rarity);
      return (ai===-1?99:ai)-(bi===-1?99:bi);
    });

  return(
    <div style={{animation:"fadeIn .3s ease"}}>
      <h1 style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:"clamp(18px,4vw,26px)",marginBottom:4}}>CARD <span style={{color:"#34D399"}}>INDEX</span></h1>

      {/* Tab bar */}
      <div style={{display:"flex",gap:4,marginBottom:18,background:"#080D1A",border:"1px solid #1E293B",borderRadius:10,padding:4}}>
        <button onClick={()=>setTab("dex")} style={{flex:1,padding:"9px",background:tab==="dex"?"linear-gradient(135deg,#34D39922,#34D39911)":"transparent",border:`1px solid ${tab==="dex"?"#34D39955":"transparent"}`,borderRadius:7,color:tab==="dex"?"#34D399":"#475569",fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:10,cursor:"pointer"}}>
          📖 BASE DEX
        </button>
        <button onClick={()=>setTab("limiteds")} style={{flex:1,padding:"9px",background:tab==="limiteds"?"linear-gradient(135deg,#FFB7C522,#FFB7C511)":"transparent",border:`1px solid ${tab==="limiteds"?"#FFB7C555":"transparent"}`,borderRadius:7,color:tab==="limiteds"?"#FFB7C5":"#475569",fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:10,cursor:"pointer"}}>
          ✦ LIMITEDS
        </button>
      </div>

      {/* ── BASE DEX TAB ── */}
      {tab==="dex"&&(
        <>
          <p style={{color:"#334155",fontSize:11,marginBottom:14}}>Standard pullable Pokémon only · event cards tracked separately</p>
          <div style={{background:"#080D1A",border:"1px solid #34D39922",borderRadius:14,padding:18,marginBottom:18}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:8}}>
              <span style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:14,color:"#34D399"}}>{ownedBase} <span style={{fontSize:10,color:"#475569"}}>/ {totalBase} discovered</span></span>
              <span style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:22,color:basePct===100?"#FFD700":basePct>50?"#34D399":"#60A5FA"}}>{basePct}%</span>
            </div>
            <div style={{background:"#0F172A",borderRadius:8,height:12,overflow:"hidden",marginBottom:12}}>
              <div style={{background:"linear-gradient(90deg,#10B98188,#34D399)",height:"100%",width:basePct+"%",borderRadius:8,transition:"width 1s ease",boxShadow:"0 0 12px #34D39955"}}/>
            </div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {baseDexFilters.filter(r=>r!=="All").map(r=>{
                const cfg=RARITY_CFG[r];if(!cfg)return null;
                const tot=baseCards.filter(c=>c.rarity===r).length;if(!tot)return null;
                const own=baseCards.filter(c=>c.rarity===r&&ownedBaseIds.has(String(c.id))).length;
                return(
                  <div key={r} style={{background:cfg.color+"12",border:`1px solid ${cfg.color}33`,borderRadius:6,padding:"3px 8px",display:"flex",gap:5,alignItems:"center"}}>
                    <span style={{color:cfg.color,fontFamily:"'Orbitron',monospace",fontSize:7,fontWeight:700}}>{r}</span>
                    <span style={{color:"#334155",fontSize:8}}>{own}/{tot}</span>
                  </div>
                );
              })}
            </div>
          </div>
          <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search cards..." style={{background:"#080D1A",border:"1px solid #1E293B",color:"#F1F5F9",borderRadius:8,padding:"7px 12px",fontFamily:"'Exo 2',sans-serif",fontSize:12,outline:"none",width:160}}/>
            <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
              {baseDexFilters.map(r=>{const cfg=r!=="All"?RARITY_CFG[r]:null;const active=filter===r;return(
                <button key={r} onClick={()=>setFilter(r)} style={{padding:"4px 9px",borderRadius:16,border:`1px solid ${active?(cfg?.color||"#64748B"):"#1E293B"}`,background:active?(cfg?cfg.color+"18":"#334155"):"transparent",color:active?(cfg?.color||"#F1F5F9"):"#334155",fontFamily:"'Orbitron',monospace",fontSize:7,fontWeight:700,cursor:"pointer"}}>{r}</button>
              );})}
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(90px,1fr))",gap:8}}>
            {filteredBase.map(card=>{
              const rc=RARITY_CFG[card.rarity]||RARITY_CFG.Common;
              const isOwned=ownedBaseIds.has(String(card.id));
              const ownedCount=collection.filter(c=>String(c.id)===String(card.id)&&!c.isEaster).length;
              return(
                <div key={card.id} style={{background:isOwned?rc.color+"10":"#050a14",border:`1px solid ${isOwned?rc.color+"44":"#0A0F1E"}`,borderRadius:10,padding:"8px 6px",textAlign:"center",position:"relative",opacity:isOwned?1:0.45,transition:"all .2s"}}>
                  {isOwned&&ownedCount>1&&<div style={{position:"absolute",top:3,right:4,background:rc.color,color:"white",borderRadius:"50%",width:14,height:14,fontSize:7,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontFamily:"'Orbitron',monospace"}}>×{ownedCount}</div>}
                  <img src={isOwned?ART(card.id):MINI(card.id)} alt={card.name}
                    style={{width:isOwned?56:40,height:isOwned?56:40,objectFit:"contain",imageRendering:"pixelated",filter:isOwned?"none":"grayscale(1) brightness(0.3)"}}
                    onError={e=>{e.target.src=MINI(card.id);e.target.style.imageRendering="pixelated";}}/>
                  <div style={{color:isOwned?rc.color:"#1E293B",fontFamily:"'Orbitron',monospace",fontSize:6,fontWeight:700,marginTop:3,lineHeight:1.3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{isOwned?card.name:"???"}</div>
                  {isOwned&&<div style={{color:"#334155",fontSize:6,marginTop:1}}>{card.rarity}</div>}
                </div>
              );
            })}
          </div>
        </>
      )}

      {/* ── LIMITEDS TAB ── */}
      {tab==="limiteds"&&(
        <>
          <p style={{color:"#334155",fontSize:11,marginBottom:14}}>Exclusive event cards · not available in standard packs · may never return</p>

          {/* Overall limited progress */}
          <div style={{background:"#080D1A",border:"1px solid #FFB7C522",borderRadius:14,padding:18,marginBottom:18}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:8}}>
              <span style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:14,color:"#FFB7C5"}}>{ownedLimited} <span style={{fontSize:10,color:"#475569"}}>/ {totalLimited} limiteds owned</span></span>
              <span style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:18,color:"#FFE566"}}>{totalLimited>0?Math.floor(ownedLimited/totalLimited*100):0}%</span>
            </div>
            <div style={{background:"#0F172A",borderRadius:8,height:10,overflow:"hidden"}}>
              <div style={{background:"linear-gradient(90deg,#FFB7C588,#FFE566)",height:"100%",width:(totalLimited>0?ownedLimited/totalLimited*100:0)+"%",borderRadius:8,transition:"width 1s ease"}}/>
            </div>
          </div>

          {/* Event filter pills */}
          <div style={{display:"flex",gap:6,marginBottom:16,flexWrap:"wrap"}}>
            <button onClick={()=>setEventFilter("all")} style={{padding:"4px 12px",borderRadius:16,border:`1px solid ${eventFilter==="all"?"#FFB7C555":"#1E293B"}`,background:eventFilter==="all"?"#FFB7C518":"transparent",color:eventFilter==="all"?"#FFB7C5":"#475569",fontFamily:"'Orbitron',monospace",fontSize:8,fontWeight:700,cursor:"pointer"}}>ALL EVENTS</button>
            {LIMITED_EVENTS.map(ev=>(
