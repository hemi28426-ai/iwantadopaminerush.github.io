                            </div>
                            <div>
                              <div style={{color:"#F1F5F9",fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:10}}>
                                {opp.card.name} {isMega?`+ ${opp.stone?.emoji} ${opp.stone?.name} → MEGA`:"× 2 → "+toCard?.name}{opp.isChoice?" (choose)":""}
                              </div>
                              <div style={{color:isMega?"#FF4500":rc.color,fontSize:8,marginTop:2,letterSpacing:1}}>
                                {isMega?"⚡ MEGA — consumes 1 card + 1 stone":"Fuses 2 cards into "+toCard?.rarity}
                              </div>
                            </div>
                            <button onClick={()=>triggerEvolve(opp)} style={{padding:"8px 16px",background:isMega?"linear-gradient(135deg,#7c1d0a,#ea4900)":"linear-gradient(135deg,#14532d,#16a34a)",border:"none",borderRadius:8,color:"white",fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:9,cursor:"pointer",whiteSpace:"nowrap",boxShadow:isMega?`0 0 12px #FF450088`:`0 0 12px ${rc.color}44`}}>
                              {isMega?"MEGA EVOLVE ⚡":"EVOLVE ✨"}
                            </button>
                          </div>
                        );
                      })}
                    </div>
                  </>}
                  {hasAnyStone&&<>
                    <div style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:10,color:"#FF4500",letterSpacing:2,marginBottom:10}}>💎 MEGA STONES</div>
                    <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                      {MEGA_STONES.filter(s=>(myStones[s.id]||0)>0).map(stone=>(
                        <div key={stone.id} style={{background:`${stone.color}18`,border:`1px solid ${stone.color}55`,borderRadius:9,padding:"6px 10px",display:"flex",alignItems:"center",gap:6}}>
                          <span style={{fontSize:16}}>{stone.emoji}</span>
                          <div>
                            <div style={{color:stone.color,fontFamily:"'Orbitron',monospace",fontSize:8,fontWeight:700}}>{stone.name}</div>
                            <div style={{color:"#334155",fontSize:7}}>×{myStones[stone.id]}</div>
                          </div>
                        </div>
                      ))}
                    </div>
                  </>}
                </div>
              );
            })()}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:18,flexWrap:"wrap",gap:10}}>
              <div>
                <h1 style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:"clamp(20px,4vw,28px)"}}>MY <span style={{color:"#FCD34D"}}>COLLECTION</span></h1>
                <p style={{color:"#334155",fontSize:11,marginTop:3}}>{collection.length} cards · Market value: {collection.reduce((s,c)=>s+(c.bp||0),0).toLocaleString()}🪙</p>
              </div>
              <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                {["All",...Object.keys(RARITY_CFG)].map(r=>{const rc=r!=="All"?RARITY_CFG[r]:null;const active=filterRarity===r;return<button key={r} onClick={()=>setFilter(r)} style={{padding:"4px 10px",borderRadius:20,cursor:"pointer",border:`1px solid ${active?(rc?.color||"#64748B"):"#1E293B"}`,background:active?(rc?rc.color+"18":"#334155"):"transparent",color:active?(rc?.color||"#F1F5F9"):"#334155",fontFamily:"'Orbitron',monospace",fontSize:7,fontWeight:700}}>{r} ({r==="All"?collection.length:rStats[r]||0})</button>;})}
              </div>
            </div>
            <div style={{display:"flex",gap:8,marginBottom:14,alignItems:"center",flexWrap:"wrap"}}>
              <select value={sortBy} onChange={e=>setSort(e.target.value)} style={{background:"#1E293B",border:"1px solid #334155",color:"#F1F5F9",borderRadius:7,padding:"6px 10px",fontFamily:"'Exo 2',sans-serif",fontSize:11,cursor:"pointer"}}>
                <option value="recent">Newest First</option>
                <option value="rarity">By Rarity</option>
                <option value="name">By Name</option>
                <option value="value">By Market Value</option>
              </select>
  
            {getFiltered().length>0&&<button onClick={()=>setSellConfirm(true)} style={{padding:"6px 12px",background:"linear-gradient(135deg,#7f1d1d,#DC2626)",border:"none",borderRadius:7,color:"white",fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:8,cursor:"pointer"}}>SELL ALL ({getFiltered().length})</button>}
            </div>
            {sellConfirm&&<div style={{background:"#1E293B",border:"1px solid #EF444466",borderRadius:10,padding:"12px 16px",marginBottom:14,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}><span style={{color:"#F1F5F9",fontSize:12}}>Sell <b>{getFiltered().length}</b> for <b style={{color:"#FCD34D"}}>{getFiltered().reduce((s,c)=>s+(c.bp||0),0)}🪙</b>?</span><div style={{display:"flex",gap:7}}><button onClick={doSellAll} style={{padding:"6px 12px",background:"#DC2626",border:"none",borderRadius:6,color:"white",fontFamily:"'Orbitron',monospace",fontSize:8,fontWeight:700,cursor:"pointer"}}>CONFIRM</button><button onClick={()=>setSellConfirm(false)} style={{padding:"6px 10px",background:"#334155",border:"none",borderRadius:6,color:"#94A3B8",fontSize:10,cursor:"pointer"}}>Cancel</button></div></div>}
            {collection.length===0?<div style={{textAlign:"center",padding:"70px 0"}}><img src={MINI(129)} alt="" style={{width:70,imageRendering:"pixelated",opacity:.2}} onError={e=>e.target.style.display="none"}/><div style={{color:"#1E293B",fontFamily:"'Orbitron',monospace",marginTop:14}}>Empty — open some packs!</div><button onClick={()=>setPage("shop")} style={{marginTop:12,padding:"9px 20px",background:"linear-gradient(135deg,#92400E,#F59E0B)",border:"none",borderRadius:8,color:"#1C1917",fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:10,cursor:"pointer"}}>SHOP →</button></div>
            :<div style={{display:"flex",flexWrap:"wrap",gap:12}}>
                {collection.filter(c=>c.isPersonal).map(card=><PokemonCard key={card.uid} card={card} currentPrice={0}/>)}
                {getFiltered().map(card=><PokemonCard key={card.uid} card={card} onSell={sellCard} currentPrice={card.bp}/>)}
              </div>}
          </div>
        )}

        {/* PROFILE */}
        {page==="profile"&&(
          <div style={{animation:"fadeIn .35s ease"}}>
            <h1 style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:"clamp(20px,4vw,28px)",marginBottom:16}}>TRAINER <span style={{color:"#FCD34D"}}>PROFILE</span></h1>

            {/* Level card */}
            {(()=>{
              const lxp=getXPProgress(player);
              const nextReward=LEVEL_MILESTONES.filter(m=>m.level>lxp.level&&m.unlock).sort((a,b)=>a.level-b.level)[0];
              return(
                <div style={{background:"linear-gradient(135deg,#1a1200,#2a1e00)",border:"2px solid #FCD34D44",borderRadius:16,padding:20,marginBottom:16}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,flexWrap:"wrap",gap:8}}>
                    <div style={{display:"flex",alignItems:"center",gap:12}}>
                      <div style={{width:56,height:56,borderRadius:14,background:"linear-gradient(135deg,#FCD34D,#F59E0B)",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 0 20px #FCD34D44",flexShrink:0}}>
                        <span style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:22,color:"#1a1000"}}>{lxp.level}</span>
                      </div>
                      <div>
                        <div style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:18,color:"#FCD34D"}}>LEVEL {lxp.level}</div>
                        <div style={{color:"#94A3B8",fontSize:10,marginTop:2}}>{lxp.xp.toLocaleString()} total XP</div>
                      </div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{color:"#475569",fontSize:9,fontFamily:"'Orbitron',monospace",marginBottom:3}}>{lxp.current} / {lxp.needed} XP to Level {lxp.level+1}</div>
                      <div style={{background:"#0F172A",borderRadius:6,height:10,width:200,overflow:"hidden",maxWidth:"100%"}}>
                        <div style={{height:"100%",width:lxp.pct+"%",background:"linear-gradient(90deg,#FCD34D,#F59E0B)",borderRadius:6,transition:"width .8s ease",boxShadow:"0 0 8px #FCD34D55"}}/>
                      </div>
                    </div>
                  </div>
                  <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:nextReward?12:0}}>
                    <div style={{background:"#0F172A",borderRadius:8,padding:"6px 12px",fontSize:9,color:"#475569"}}>📦 Packs → <b style={{color:"#FCD34D"}}>10 XP</b></div>
                    <div style={{background:"#0F172A",borderRadius:8,padding:"6px 12px",fontSize:9,color:"#475569"}}>💰 Sells → <b style={{color:"#34D399"}}>3 XP</b></div>
                    <div style={{background:"#0F172A",borderRadius:8,padding:"6px 12px",fontSize:9,color:"#475569"}}>⚔️ Battles → <b style={{color:"#F472B6"}}>20 XP</b></div>
                  </div>
                  {nextReward&&(
                    <div style={{background:"#FCD34D11",border:"1px solid #FCD34D33",borderRadius:10,padding:"8px 12px",display:"flex",alignItems:"center",gap:8}}>
                      <span style={{fontSize:14}}>🔓</span>
                      <div>
                        <div style={{fontFamily:"'Orbitron',monospace",fontSize:8,color:"#FCD34D"}}>NEXT UNLOCK — LEVEL {nextReward.level}</div>
                        <div style={{color:"#94A3B8",fontSize:10,marginTop:1}}>{nextReward.unlock}</div>
                      </div>
                    </div>
                  )}
                </div>
              );
            })()}

            <div style={{background:"linear-gradient(135deg,#0F172A,#1A2744)",border:"1px solid #1E3A5F",borderRadius:16,padding:22,display:"flex",gap:18,alignItems:"center",marginBottom:16,flexWrap:"wrap"}}>
              <div style={{width:68,height:68,borderRadius:"50%",background:"linear-gradient(135deg,#1E3A5F,#2563EB)",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 0 24px #2563EB44",flexShrink:0}}><img src={ITEM("poke-ball")} alt="" style={{width:38,height:38,imageRendering:"pixelated"}} onError={e=>e.target.style.display="none"}/></div>
              <div style={{flex:1}}>
                <div style={{display:"flex",gap:9,alignItems:"center"}}><span style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:20}}>{player.username}</span></div>
                <div style={{color:"#334155",fontSize:10,marginTop:3}}>Since {player.join_date}</div>
              </div>
              <div style={{textAlign:"right"}}><div style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:24,color:"#FCD34D"}}>🪙{player.coins.toLocaleString()}</div></div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:10,marginBottom:16}}>
              {[{label:"Packs",value:player.total_packs,img:"poke-ball",color:"#60A5FA"},{label:"Cards Pulled",value:player.total_cards,img:"master-ball",color:"#34D399"},{label:"Cards Sold",value:player.total_sold,img:"nugget",color:"#FCD34D"},{label:"In Collection",value:collection.length,img:"great-ball",color:"#C084FC"}].map(s=>(
                <div key={s.label} style={{background:"#080D1A",border:`1px solid ${s.color}18`,borderRadius:12,padding:16,textAlign:"center"}}><img src={ITEM(s.img)} alt="" style={{width:28,height:28,imageRendering:"pixelated",filter:`drop-shadow(0 0 7px ${s.color}88)`}} onError={e=>e.target.style.display="none"}/><div style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:22,color:s.color,marginTop:5}}>{s.value}</div><div style={{color:"#1E293B",fontSize:8,marginTop:2,letterSpacing:.5}}>{s.label.toUpperCase()}</div></div>
              ))}
            </div>
            <div style={{background:"#080D1A",border:"1px solid #0A0F1E",borderRadius:12,padding:18,marginBottom:16}}>
              <div style={{fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:8,color:"#1E293B",letterSpacing:3,marginBottom:12}}>COLLECTION BREAKDOWN</div>
              {Object.entries(RARITY_CFG).map(([rarity,cfg])=>{const count=rStats[rarity]||0;const pct=collection.length>0?(count/collection.length)*100:0;return(<div key={rarity} style={{marginBottom:9}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span style={{color:cfg.color,fontFamily:"'Orbitron',monospace",fontSize:8,fontWeight:700}}>{rarity.toUpperCase()}</span><span style={{color:"#1E293B",fontSize:8}}>{count}</span></div><div style={{background:"#0F172A",borderRadius:3,height:4,overflow:"hidden"}}><div style={{background:`linear-gradient(90deg,${cfg.color}77,${cfg.color})`,borderRadius:3,height:4,width:pct+"%",transition:"width .8s ease"}}/></div></div>);})}
            </div>
            {collection.filter(c=>["Secret","Ultra Rare","Legendary","GOLDEN"].includes(c.rarity)).length>0&&(
              <div style={{background:"#080D1A",border:"1px solid #FCD34D12",borderRadius:12,padding:18,marginBottom:16}}>
                <div style={{fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:8,color:"#1E293B",letterSpacing:3,marginBottom:12}}>🏆 PRIZE SHELF</div>
                <div style={{display:"flex",gap:12,overflowX:"auto",paddingBottom:6}}>{collection.filter(c=>["Secret","Ultra Rare","Legendary","GOLDEN"].includes(c.rarity)).map(card=><PokemonCard key={card.uid} card={card} currentPrice={card.bp}/>)}</div>
              </div>
            )}
            {/* Milestone rewards */}
            <div style={{background:"#080D1A",border:"1px solid #FCD34D22",borderRadius:14,padding:18,marginBottom:16}}>
              <div style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:11,color:"#FCD34D",letterSpacing:2,marginBottom:14}}>🏆 LEVEL MILESTONES</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:8}}>
                {LEVEL_MILESTONES.map(m=>{
                  const reached=playerLevel>=m.level;
                  const claimed=getMilestoneClaimed(player.id,m.level);
                  const rc=RARITY_CFG[m.pokemon?.rarity]||RARITY_CFG.Common;
                  return(
                    <div key={m.level} style={{background:claimed?"rgba(52,211,153,.06)":reached?"rgba(252,211,77,.05)":"#050a14",border:`1px solid ${claimed?"#10B98133":reached?"#FCD34D33":"#0A0F1E"}`,borderRadius:10,padding:"10px 12px",display:"flex",alignItems:"center",gap:10}}>
                      <div style={{width:28,height:28,borderRadius:8,background:claimed?"linear-gradient(135deg,#065F46,#10B981)":reached?"linear-gradient(135deg,#FCD34D,#F59E0B)":"#0F172A",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                        <span style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:9,color:claimed?"white":reached?"#1a1000":"#334155"}}>{claimed?"✓":m.level}</span>
                      </div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:2}}>
                          {m.pokemon&&<img src={MINI(m.pokemon.id)} alt={m.pokemon.name} style={{width:22,height:22,imageRendering:"pixelated",opacity:reached?1:0.2,filter:reached?`drop-shadow(0 0 3px ${rc.color}88)`:"grayscale(1)"}} onError={e=>e.target.style.display="none"}/>}
                          <div>
                            <div style={{color:reached?rc.color:"#334155",fontFamily:"'Orbitron',monospace",fontSize:7,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{reached?(m.pokemon?.name||"Reward"):"???"}</div>
                            <div style={{color:"#FCD34D",fontSize:6,fontFamily:"'Orbitron',monospace"}}>+{m.coins.toLocaleString()}🪙</div>
                          </div>
                        </div>
                        {m.unlock&&<div style={{color:"#60A5FA",fontSize:6,fontFamily:"'Orbitron',monospace",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>🔓 {m.unlock}</div>}
                      </div>
                      {reached&&!claimed&&(
                        <button onClick={async()=>{
                          if(getMilestoneClaimed(player.id,m.level))return;
                          if(m.coins>0){const nc=player.coins+m.coins;await sb.from("players").update({coins:nc}).eq("id",player.id);setDbPlayer(p=>({...p,coins:nc}));}
                          if(m.pokemon){const cardDef=ALL_CARDS.find(c=>String(c.id)===String(m.pokemon.id))||CARDS.find(c=>String(c.id)===String(m.pokemon.id));if(cardDef){await sb.from("collection").insert({player_id:player.id,card_id:cardDef.id,card_name:cardDef.name,rarity:cardDef.rarity,buy_price:cardDef.bp||10,obtained_at:new Date().toLocaleDateString(),uid:crypto.randomUUID()});await loadCollection(player.id);}}
                          setMilestoneClaimed(player.id,m.level);
                          notify(`🎉 Level ${m.level}! +${m.coins.toLocaleString()}🪙${m.pokemon?` + ${m.pokemon.name}`:""}`,RARITY_CFG[m.pokemon?.rarity]?.color||"#FCD34D");
                        }} style={{padding:"4px 10px",background:"linear-gradient(135deg,#78350F,#F59E0B)",border:"none",borderRadius:7,color:"white",fontFamily:"'Orbitron',monospace",fontSize:8,fontWeight:700,cursor:"pointer",flexShrink:0}}>CLAIM</button>
                      )}
                      {!reached&&<span style={{color:"#1E293B",fontFamily:"'Orbitron',monospace",fontSize:7,flexShrink:0}}>LV{m.level}</span>}
                      {claimed&&<span style={{color:"#10B981",fontSize:12,flexShrink:0}}>✓</span>}
                    </div>
                  );
                })}
              </div>
            </div>
            <div style={{background:"#080D1A",border:"1px solid #DC262612",borderRadius:12,padding:16}}>
              <div style={{fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:8,color:"#2d0000",letterSpacing:2,marginBottom:10}}>DANGER ZONE</div>
              <button onClick={async()=>{if(window.confirm("Delete account and all data?")){await sb.from("collection").delete().eq("player_id",player.id);await sb.from("transactions").delete().eq("player_id",player.id);await sb.from("players").delete().eq("id",player.id);setDbPlayer(null);setCollection([]);}}} style={{padding:"7px 18px",background:"none",border:"1px solid #DC262644",borderRadius:7,color:"#DC2626",fontFamily:"'Orbitron',monospace",fontSize:8,cursor:"pointer",fontWeight:700}}>DELETE ACCOUNT</button>
              {["duke","admin"].includes(player.username.toLowerCase())&&<DukeAdminPanel notify={notify} player={player} loadCollection={loadCollection}/>}
            </div>
          </div>
        )}
        </main>
      </div>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));

// Animate the preload bar while Babel/React is spinning up
(()=>{
  const bar=document.getElementById('preload-bar');
  const msg=document.getElementById('preload-msg');
  const msgs=["LOADING...","COMPILING SCRIPTS...","FETCHING CARDS...","ALMOST THERE..."];
  let w=0,mi=0;
  const iv=setInterval(()=>{
    w=Math.min(w+(Math.random()*8),92);
    if(bar)bar.style.width=w+"%";
    mi++;
    if(msg&&msgs[mi%msgs.length])msg.textContent=msgs[mi%msgs.length];
  },600);
  window.__hidePreload=()=>{
    clearInterval(iv);
    if(bar)bar.style.width="100%";
    setTimeout(()=>{
      const s=document.getElementById('preload-screen');
      if(s){s.style.transition="opacity .4s";s.style.opacity="0";setTimeout(()=>s.remove(),400);}
    },300);
  };
})();
root.render(React.createElement(App));
// Hide loading screen once React has painted
requestAnimationFrame(()=>requestAnimationFrame(()=>{if(window.__hidePreload)window.__hidePreload();}));
// Hide loader once React has painted
requestAnimationFrame(()=>requestAnimationFrame(()=>{
  const l=document.getElementById('loading-screen');
  if(l){l.style.transition='opacity .5s ease';l.style.opacity='0';setTimeout(()=>l.remove(),520);}
}));
</script>
</body>
</html>
