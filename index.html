// localStorage helpers for stones (keyed per player)
const stonesKey=(pid)=>"mega_stones_"+pid;
const getStones=(pid)=>{try{return JSON.parse(lsGet(stonesKey(pid),"{}"))||{};}catch{return {};}};
const addStone=(pid,stoneId)=>{const s=getStones(pid);s[stoneId]=(s[stoneId]||0)+1;lsSet(stonesKey(pid),JSON.stringify(s));};
const useStone=(pid,stoneId)=>{const s=getStones(pid);if((s[stoneId]||0)<=0)return false;s[stoneId]--;lsSet(stonesKey(pid),JSON.stringify(s));return true;};

/* ══════════════════════════════════════════════════ LEVEL SYSTEM */
// XP derived entirely from existing DB stats — no new storage needed
const getPlayerXP=(p)=>p?(p.total_packs||0)*10+(p.total_cards||0)*1+(p.total_sold||0)*3+(p.battle_runs||0)*20:0;
// Quadratic curve: total XP to reach level N = 50 * (N-1)^2
// Level 5=800, 10=4050, 15=9800, 20=19050, 35=58800
const xpForLevel=(n)=>Math.floor(50*Math.pow(Math.max(0,n-1),2));
const getPlayerLevel=(p)=>{
  if(!p)return 1;
  const xp=getPlayerXP(p);
  let level=1;
  while(xpForLevel(level+1)<=xp)level++;
  return Math.max(1,level);
};
const getXPProgress=(p)=>{
  const xp=getPlayerXP(p);
  const level=getPlayerLevel(p);
  const levelFloor=xpForLevel(level);
  const levelCeil=xpForLevel(level+1);
  return{xp,level,current:xp-levelFloor,needed:levelCeil-levelFloor,pct:Math.min(100,Math.round((xp-levelFloor)/(levelCeil-levelFloor)*100))};
};

// Track which milestones a player has claimed (localStorage per player)
const getMilestoneClaimed=(pid,level)=>{try{const k=`ms_${pid}`;const d=JSON.parse(lsGet(k,"[]"));return d.includes(level);}catch{return false;}};

function LevelSidebar({player,collection,notify,setDbPlayer,loadCollection}){
  const [open,setOpen]=useState(true);
  const [claiming,setClaiming]=useState(null);
  const lxp=getXPProgress(player);
  const curLevel=lxp.level;
  const claimedKey=`ms_${player.id}`;

  const claim=async(m)=>{
    if(getMilestoneClaimed(player.id,m.level)){notify("Already claimed!","#EF4444");return;}
    if(curLevel<m.level){notify(`Reach Level ${m.level} first!`,"#EF4444");return;}
    setClaiming(m.level);
    // Give coins
    if(m.coins>0){
      const nc=player.coins+m.coins;
      await sb.from("players").update({coins:nc}).eq("id",player.id);
      setDbPlayer(p=>({...p,coins:nc}));
    }
    // Give pokemon card
    if(m.pokemon){
      const cardDef=ALL_CARDS.find(c=>String(c.id)===String(m.pokemon.id))||CARDS.find(c=>String(c.id)===String(m.pokemon.id));
      if(cardDef){
        await sb.from("collection").insert({player_id:player.id,card_id:cardDef.id,card_name:cardDef.name,rarity:cardDef.rarity,buy_price:cardDef.bp||10,obtained_at:new Date().toLocaleDateString(),uid:crypto.randomUUID()});
        await loadCollection(player.id);
      }
    }
    setMilestoneClaimed(player.id,m.level);
    notify(`🎉 Level ${m.level} reward claimed! +${m.coins.toLocaleString()}🪙${m.pokemon?` + ${m.pokemon.name}`:""}`,RARITY_CFG[m.pokemon?.rarity]?.color||"#FCD34D");
    setClaiming(null);
  };

  const unclaimedCount=LEVEL_MILESTONES.filter(m=>m.level<=curLevel&&!getMilestoneClaimed(player.id,m.level)).length;

  return(
    <div style={{width:open?220:44,minWidth:open?220:44,flexShrink:0,transition:"width .3s ease, min-width .3s ease",position:"sticky",top:80,alignSelf:"flex-start",maxHeight:"calc(100vh - 100px)"}}>
      {/* Toggle tab */}
      <button onClick={()=>setOpen(o=>!o)}
        style={{width:"100%",display:"flex",alignItems:"center",justifyContent:open?"space-between":"center",gap:6,padding:open?"8px 12px":"10px 0",background:"linear-gradient(135deg,#0d1428,#1a2040)",border:"1px solid #FCD34D33",borderRadius:open?"12px 12px 0 0":"12px",cursor:"pointer",marginBottom:open?0:8,position:"relative"}}>
        {open&&<span style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:9,color:"#FCD34D",letterSpacing:1}}>MILESTONES</span>}
        <div style={{display:"flex",alignItems:"center",gap:4}}>
          {unclaimedCount>0&&<span style={{background:"#FCD34D",color:"#1a1000",borderRadius:"50%",width:16,height:16,fontSize:8,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900}}>{unclaimedCount}</span>}
          <span style={{color:"#FCD34D",fontSize:12,transition:"transform .3s",display:"inline-block",transform:open?"rotate(0)":"rotate(180deg)"}}>◀</span>
        </div>
      </button>

      {open&&(
        <div style={{background:"rgba(2,6,23,.96)",border:"1px solid #FCD34D22",borderTop:"none",borderRadius:"0 0 12px 12px",overflow:"hidden"}}>
          {/* XP bar */}
          <div style={{padding:"10px 12px",borderBottom:"1px solid #0d1428"}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
              <span style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:11,color:"#FCD34D"}}>LV {curLevel}</span>
              <span style={{color:"#475569",fontSize:8,fontFamily:"'Orbitron',monospace"}}>{lxp.current}/{lxp.needed} XP</span>
            </div>
            <div style={{background:"#0F172A",borderRadius:4,height:6,overflow:"hidden"}}>
              <div style={{height:"100%",width:lxp.pct+"%",background:"linear-gradient(90deg,#FCD34D,#F59E0B)",borderRadius:4,transition:"width .6s ease"}}/>
            </div>
          </div>

          {/* Milestone list */}
          <div style={{overflowY:"auto",maxHeight:"calc(100vh - 220px)"}}>
            {LEVEL_MILESTONES.map(m=>{
              const reached=curLevel>=m.level;
              const claimed=getMilestoneClaimed(player.id,m.level);
              const rc=RARITY_CFG[m.pokemon?.rarity]||RARITY_CFG.Common;
              const isClaiming=claiming===m.level;
              return(
                <div key={m.level} style={{padding:"8px 10px",borderBottom:"1px solid #0a0f1e",background:m.level===curLevel?"rgba(252,211,77,.06)":claimed?"rgba(52,211,153,.04)":"transparent",position:"relative"}}>
                  {/* Level number + status */}
                  <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
                    <div style={{width:22,height:22,borderRadius:6,background:claimed?"linear-gradient(135deg,#065F46,#10B981)":reached?"linear-gradient(135deg,#FCD34D,#F59E0B)":"#0F172A",border:reached&&!claimed?"none":"1px solid #1E293B",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                      <span style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:8,color:claimed?"white":reached?"#1a1000":"#334155"}}>{claimed?"✓":m.level}</span>
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",gap:4,alignItems:"center"}}>
                        <span style={{color:"#FCD34D",fontFamily:"'Orbitron',monospace",fontSize:8,fontWeight:700}}>+{m.coins.toLocaleString()}🪙</span>
                      </div>
                      {m.unlock&&<div style={{color:"#60A5FA",fontSize:7,fontFamily:"'Orbitron',monospace",marginTop:1,letterSpacing:.3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={m.unlock}>🔓 {m.unlock}</div>}
                    </div>
                  </div>

                  {/* Pokemon reward */}
                  {m.pokemon&&(
                    <div style={{display:"flex",alignItems:"center",gap:6}}>
                      <img src={MINI(m.pokemon.id)} alt={m.pokemon.name}
                        style={{width:28,height:28,imageRendering:"pixelated",opacity:reached?1:0.3,filter:reached?`drop-shadow(0 0 4px ${rc.color}88)`:"grayscale(1)"}}
                        onError={e=>e.target.style.display="none"}/>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{color:reached?rc.color:"#334155",fontFamily:"'Orbitron',monospace",fontSize:7,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{reached?m.pokemon.name:"???"}</div>
                        <div style={{color:"#1E293B",fontSize:6,fontFamily:"'Orbitron',monospace"}}>{reached?m.pokemon.rarity:"???"}</div>
                      </div>
                      {reached&&!claimed&&(
                        <button onClick={()=>claim(m)} disabled={!!claiming}
                          style={{padding:"3px 7px",background:"linear-gradient(135deg,#78350F,#F59E0B)",border:"none",borderRadius:6,color:"white",fontFamily:"'Orbitron',monospace",fontSize:7,fontWeight:700,cursor:"pointer",flexShrink:0,whiteSpace:"nowrap"}}>
                          {isClaiming?"...":"CLAIM"}
                        </button>
                      )}
                      {claimed&&<span style={{color:"#10B981",fontSize:9}}>✓</span>}
                      {!reached&&<span style={{color:"#1E293B",fontFamily:"'Orbitron',monospace",fontSize:7}}>LV{m.level}</span>}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

// Easter 2026 = April 5, 2026
const EASTER_END=new Date("2026-04-08T23:59:59");
function EasterCountdownMini(){
  const [t,setT]=useState(()=>Math.max(0,EASTER_END-Date.now()));
  useEffect(()=>{const iv=setInterval(()=>setT(Math.max(0,EASTER_END-Date.now())),60000);return()=>clearInterval(iv);},[]);
  const days=Math.floor(t/86400000);
  const hrs=Math.floor((t%86400000)/3600000);
  if(t<=0)return<div style={{fontFamily:"'Orbitron',monospace",fontSize:6,color:"#EF4444"}}>ENDED</div>;
  return<div style={{fontFamily:"'Orbitron',monospace",fontSize:6,color:"#FFE566",letterSpacing:.5}}>{days}d {hrs}h left</div>;
}

function EasterCountdownFull(){
  const [t,setT]=useState(()=>Math.max(0,EASTER_END-Date.now()));
  useEffect(()=>{const iv=setInterval(()=>setT(Math.max(0,EASTER_END-Date.now())),1000);return()=>clearInterval(iv);},[]);
  if(t<=0)return<span style={{color:"#EF4444",fontFamily:"'Orbitron',monospace",fontSize:11}}>EVENT ENDED</span>;
  const days=Math.floor(t/86400000);
  const hrs=Math.floor((t%86400000)/3600000);
  const mins=Math.floor((t%3600000)/60000);
  const secs=Math.floor((t%60000)/1000);
  return(
    <div style={{display:"flex",gap:6,alignItems:"center"}}>
      {[[days,"DAYS"],[hrs,"HRS"],[mins,"MIN"],[secs,"SEC"]].map(([v,l])=>(
        <div key={l} style={{textAlign:"center",background:"rgba(0,0,0,.3)",borderRadius:8,padding:"6px 10px",minWidth:42}}>
          <div style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:18,color:"#FFE566",lineHeight:1}}>{String(v).padStart(2,"0")}</div>
          <div style={{fontFamily:"'Orbitron',monospace",fontSize:6,color:"#FFB7C5",letterSpacing:1,marginTop:2}}>{l}</div>
        </div>
      ))}
    </div>
  );
}

const AudioEngine={
  ctx:null, sfxMuted:false, musicMuted:false,
  musicGain:null, musicNodes:[],
  init(){
    if(!this.ctx)try{this.ctx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}
  },
  resume(){if(this.ctx?.state==="suspended")this.ctx.resume();},

  // ── SFX
  tone(freq,type,atk,dec,sus,rel,dur,vol=0.3){
    if(this.sfxMuted||!this.ctx)return;
    this.resume();
    const now=this.ctx.currentTime;
    const o=this.ctx.createOscillator(),g=this.ctx.createGain();

    g.gain.linearRampToValueAtTime(vol*sus,now+atk+dec);g.gain.linearRampToValueAtTime(0,now+dur+rel);
    o.start(now);o.stop(now+dur+rel+0.05);
  },
  click(){this.init();this.tone(800,"sine",.001,.05,.3,.05,.06,.15);},
  sell(){this.init();this.tone(1047,"sine",.001,.05,.3,.1,.15,.2);setTimeout(()=>this.tone(1319,"sine",.001,.05,.2,.1,.1,.15),80);},
  error(){this.init();this.tone(200,"sawtooth",.001,.1,.5,.1,.3,.3);},
  packOpen(){this.init();for(let i=0;i<5;i++)setTimeout(()=>this.tone(200+i*60,"sawtooth",.001,.02,.1,.05,.06,.1),i*70);},
  common(){this.init();this.tone(523,"sine",.01,.1,.5,.2,.3,.2);},
  uncommon(){this.init();[523,659].forEach((f,i)=>setTimeout(()=>this.tone(f,"sine",.01,.1,.5,.2,.25,.22),i*90));},
  rare(){this.init();[523,659,784].forEach((f,i)=>setTimeout(()=>this.tone(f,"sine",.01,.1,.5,.2,.28,.26),i*80));},
  epic(){this.init();[392,494,587,784].forEach((f,i)=>setTimeout(()=>this.tone(f,"triangle",.01,.12,.6,.3,.35,.3),i*70));},
  legendary(){this.init();[261,329,392,523,659,784,1047].forEach((f,i)=>setTimeout(()=>this.tone(f,"triangle",.01,.1,.7,.3,.45,.28),i*55));},
  ultraRare(){this.init();this.tone(80,"sawtooth",.001,.3,.8,.5,.8,.35);[523,659,784,1047,1319].forEach((f,i)=>setTimeout(()=>this.tone(f,"square",.01,.1,.6,.4,.45,.28),100+i*65));},
  mega(){this.init();this.tone(55,"sawtooth",.001,.4,.9,.6,1,.4);[261,330,392,523,659,784,1047,1319].forEach((f,i)=>setTimeout(()=>this.tone(f,"triangle",.01,.12,.8,.4,.55,.3),150+i*60));},
  evolve(){this.init();[392,440,494,523,587,659,784].forEach((f,i)=>setTimeout(()=>this.tone(f,"sine",.01,.08,.5,.15,.22,.25),i*50));},
  megaEvolve(){this.init();this.tone(70,"sawtooth",.001,.5,.9,.7,1.6,.45);[261,330,392,523,659,784,1047,1319,1568].forEach((f,i)=>setTimeout(()=>this.tone(f,"triangle",.01,.12,.8,.4,.55,.32),200+i*60));},
  golden(){this.init();this.tone(55,"sawtooth",.001,.6,.95,.8,2,.45);[130,165,196,261,330,392,523,659,784,1047,1319].forEach((f,i)=>setTimeout(()=>this.tone(f,"triangle",.01,.1,.9,.5,.65,.36),100+i*55));},

  // ── CALMING MUSIC — layered ambient pads + gentle arp
  startMusic(){
    this.init();if(this.musicMuted||!this.ctx||this.musicNodes.length>0)return;
    this.resume();
    const ctx=this.ctx;
    // Master gain
    const master=ctx.createGain();master.gain.setValueAtTime(0,ctx.currentTime);master.gain.linearRampToValueAtTime(0.18,ctx.currentTime+3);master.connect(ctx.destination);
    this.musicGain=master;

    // Reverb convolver for lush atmosphere
    const rev=ctx.createConvolver();
    const buf=ctx.createBuffer(2,ctx.sampleRate*2,ctx.sampleRate);
    for(let c=0;c<2;c++){const d=buf.getChannelData(c);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2.5);}
    rev.buffer=buf;
    const revGain=ctx.createGain();revGain.gain.value=0.45;
    rev.connect(revGain);revGain.connect(master);

    // Chord pads — Am pentatonic: A2 C3 E3 G3 A3
    const padNotes=[110,130.81,164.81,196,220,261.63,329.63,392,440];
    const chord=[110,164.81,220,261.63,329.63]; // A minor

    const makeOsc=(freq,detune,vol)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type="sine";o.frequency.value=freq;o.detune.value=detune;
      g.gain.value=vol;o.connect(g);g.connect(rev);g.connect(master);
      o.start();this.musicNodes.push(o,g);return{o,g};
    };

    // Layered detuned pads
    chord.forEach(f=>{makeOsc(f,0,0.04);makeOsc(f,8,0.025);makeOsc(f,-7,0.025);});

    // Slow LFO filter sweep on a pad
    const sweepOsc=ctx.createOscillator(),sweepGain=ctx.createGain(),filt=ctx.createBiquadFilter();
    sweepOsc.frequency.value=0.05;sweepOsc.type="sine";sweepGain.gain.value=600;
    filt.type="lowpass";filt.frequency.value=800;filt.Q.value=2;
    sweepOsc.connect(sweepGain);sweepGain.connect(filt.frequency);
    const padOsc=ctx.createOscillator(),padG=ctx.createGain();
    padOsc.type="triangle";padOsc.frequency.value=220;padG.gain.value=0.06;
    padOsc.connect(filt);filt.connect(padG);padG.connect(rev);padG.connect(master);
    sweepOsc.start();padOsc.start();
    this.musicNodes.push(sweepOsc,sweepGain,filt,padOsc,padG);

    // Gentle arpeggio — 8 notes cycling slowly
    const arpNotes=[220,261.63,329.63,392,440,523.25,392,329.63];
    let arpIdx=0;
    const playArp=()=>{
      if(this.musicMuted||!this.ctx)return;
      const now=ctx.currentTime;
      const freq=arpNotes[arpIdx%arpNotes.length];arpIdx++;
      const ao=ctx.createOscillator(),ag=ctx.createGain();
      ao.type="sine";ao.frequency.value=freq;
      ag.gain.setValueAtTime(0,now);ag.gain.linearRampToValueAtTime(0.055,now+0.05);
      ag.gain.exponentialRampToValueAtTime(0.001,now+1.4);
      ao.connect(ag);ag.connect(rev);ag.connect(master);
      ao.start(now);ao.stop(now+1.5);
      this.arpTimer=setTimeout(playArp,1600+Math.random()*400);
    };
    this.arpTimer=setTimeout(playArp,1000);

    // Sub bass pulse — very subtle
    const bassNotes=[55,55,65.41,55];let bIdx=0;
    const playBass=()=>{
      if(this.musicMuted||!this.ctx)return;
      const now=ctx.currentTime;
      const bo=ctx.createOscillator(),bg=ctx.createGain();
      bo.type="sine";bo.frequency.value=bassNotes[bIdx%bassNotes.length];bIdx++;
      bg.gain.setValueAtTime(0,now);bg.gain.linearRampToValueAtTime(0.07,now+0.1);
      bg.gain.exponentialRampToValueAtTime(0.001,now+2.8);
      bo.connect(bg);bg.connect(master);bo.start(now);bo.stop(now+3);
      this.bassTimer=setTimeout(playBass,3200);
    };
    this.bassTimer=setTimeout(playBass,500);
  },

  stopMusic(){
    if(this.arpTimer)clearTimeout(this.arpTimer);
    if(this.bassTimer)clearTimeout(this.bassTimer);
    if(this.musicGain&&this.ctx){
      const now=this.ctx.currentTime;
      this.musicGain.gain.linearRampToValueAtTime(0,now+2);
      setTimeout(()=>{this.musicNodes.forEach(n=>{try{n.stop?.();n.disconnect?.();}catch(e){}});this.musicNodes=[];},2200);
    }else{this.musicNodes.forEach(n=>{try{n.stop?.();n.disconnect?.();}catch(e){}});this.musicNodes=[];}
  },

  setMusicMuted(v){
    this.musicMuted=v;
    if(v)this.stopMusic();
    else this.startMusic();
  },
};

const rollCard=(surgeType=null,packId=null,luck=1,mythicMult=1,goldenMult=1,specialty=null)=>{
  // ── Guaranteed pull (for video staging) ──
  const gpRaw=lsGet("guaranteedPull","");
  if(gpRaw){
    try{
      const gp=JSON.parse(gpRaw);
      lsSet("guaranteedPull",""); // consume it — one use only
      const found=ALL_CARDS.find(c=>String(c.id)===String(gp.id)&&c.rarity===gp.rarity);
      if(found) return{...found,uid:crypto.randomUUID(),obtainedAt:new Date().toLocaleDateString(),buyPrice:found.bp||10};
    }catch{}
  }
  const crate=CRATES.find(c=>c.id===packId);
  // Legendary and above only available from Legend pack and higher
  const LEGEND_PACKS=["legend","apex","radiant","crystal","prismatic","void"];
  const legendaryUnlocked=LEGEND_PACKS.includes(packId);

  // Base rarity chances scaled by luck — Secret is now an independent roll, not in this table
  const base={"Common":.40,"Uncommon":.28,"Rare":.18,"Epic":.07,"Legendary":.026,"Ultra Rare":.0015};
  const scaled={};
  Object.entries(base).forEach(([r,c])=>{
    const rarityRank={"Common":0,"Uncommon":0,"Rare":1,"Epic":2,"Legendary":3,"Ultra Rare":4}[r]??0;
    scaled[r]=c*Math.pow(luck,rarityRank*0.28);
  });
  const luckMult = Math.pow(luck, 0.5);
  // New order: Ultra Rare < Crystal < Radiant < Rainbow < Secret
  scaled["Crystal"] = (1/400)   * luckMult;
  scaled["Radiant"] = (1/1500)  * luckMult;
  scaled["Rainbow"] = (1/800)   * luckMult;
  scaled["Secret"]  = (1/15000) * luckMult;
  scaled["GOLDEN"]  = (1/200000)* luckMult;
  // All packs can get any rarity — luck alone determines odds, no pack-specific gates

  const tbl=Object.entries(RARITY_CFG).filter(([r])=>r!=="GOLDEN"&&r!=="Mega"&&r!=="Shiny"&&r!=="Radiant"&&r!=="Crystal"&&r!=="Rainbow"&&r!=="Secret"&&r!=="Mythic"&&(legendaryUnlocked||r!=="Ultra Rare")).map(([r,c])=>[r,{...c,chance:scaled[r]??c.chance}]);
  // Roll special rarities — all packs can hit these if they roll lucky enough, but only if legend+ pack
  const mythicChance=(1/60000)*luckMult*mythicMult*(["crystal","prismatic","void"].includes(packId)?5:1);
  if(legendaryUnlocked&&Math.random()<mythicChance){const mc=MYTHIC_CARDS[Math.floor(Math.random()*MYTHIC_CARDS.length)];return{...mc,uid:crypto.randomUUID(),obtainedAt:new Date().toLocaleDateString()};}
  if(legendaryUnlocked&&Math.random()<scaled["GOLDEN"]*goldenMult)return{...SECRET_CARDS[Math.floor(Math.random()*SECRET_CARDS.length)],uid:crypto.randomUUID(),obtainedAt:new Date().toLocaleDateString(),rarity:"GOLDEN"};
  if(legendaryUnlocked&&Math.random()<scaled["Secret"]) return{...SECRET_CARDS[Math.floor(Math.random()*SECRET_CARDS.length)],uid:crypto.randomUUID(),obtainedAt:new Date().toLocaleDateString()};
  if(legendaryUnlocked&&Math.random()<scaled["Rainbow"])return{...RAINBOW_CARDS[Math.floor(Math.random()*RAINBOW_CARDS.length)],uid:crypto.randomUUID(),obtainedAt:new Date().toLocaleDateString()};
  if(legendaryUnlocked&&Math.random()<scaled["Radiant"])return{...RADIANT_CARDS[Math.floor(Math.random()*RADIANT_CARDS.length)],uid:crypto.randomUUID(),obtainedAt:new Date().toLocaleDateString()};
  if(legendaryUnlocked&&Math.random()<scaled["Crystal"])return{...CRYSTAL_CARDS[Math.floor(Math.random()*CRYSTAL_CARDS.length)],uid:crypto.randomUUID(),obtainedAt:new Date().toLocaleDateString()};

  const tot=tbl.reduce((s,[,c])=>s+c.chance,0);
  const rand=Math.random()*tot; let cum=0,chosen="Common";
  for(const[r,c]of tbl){cum+=c.chance;if(rand<cum){chosen=r;break;}}
  let pool=CARDS.filter(c=>c.rarity===chosen&&c.id<=(crate?.genMax||999));
  if(!pool.length)pool=CARDS.filter(c=>c.rarity==="Common"&&c.id<=(crate?.genMax||999));
  if(!pool.length)pool=CARDS.filter(c=>c.rarity==="Common");
  // Specialty types get 4× weight; surgeType gets 3× on top
  const weighted=[];
  pool.forEach(c=>{
    const isSpecialty=specialty&&specialty.includes(c.type);
    const isSurge=surgeType&&c.type===surgeType;
    const w=isSurge?3:isSpecialty?4:1;
    for(let i=0;i<w;i++)weighted.push(c);
  });
  const picked=weighted[Math.floor(Math.random()*weighted.length)];
  // 1/400 chance any card is shiny — only in legend pack and above
  const isShiny=legendaryUnlocked&&Math.random()<0.0025;
  const rolled={...picked,uid:crypto.randomUUID(),obtainedAt:new Date().toLocaleDateString()};
  if(isShiny)return{...rolled,isShiny:true,rarity:"Shiny",bp:rolled.bp*10,origRarity:picked.rarity,tc:"#00FFAA",bg:"15deg,#001a0d,#003320"};
  return rolled;
};
const rollPack=(crateId,extSurge)=>{
  const crate=CRATES.find(c=>c.id===crateId);
  if(!crate)return[];
  // Mega pack: guaranteed random Mega card
  if(crate.megaPack){
    const mega=MEGA_CARDS[Math.floor(Math.random()*MEGA_CARDS.length)];
    return[{...mega,uid:crypto.randomUUID(),obtainedAt:new Date().toLocaleDateString()}];
  }
  // ── EASTER / LIMITED PACKS — fixed odds, NO luck, NO potions ──────
  if(crate.easterPack){
    const lCommon=LIMITED_CARDS.filter(c=>c.rarity==="Common");
    const lEpic=LIMITED_CARDS.filter(c=>c.rarity==="Epic");
    const lLeg=LIMITED_CARDS.filter(c=>c.rarity==="Legendary");
    const lUR=LIMITED_CARDS.filter(c=>c.rarity==="Ultra Rare");
    const lSec=LIMITED_CARDS.filter(c=>c.rarity==="Secret");
    const rollLimited=()=>{
      const r=Math.random();
      // Secret: 1/300 per card only in golden egg pack
      if(crateId==="easter_golden"&&r<(1/300)){
        return lSec[Math.floor(Math.random()*lSec.length)];
      }
      // Ultra Rare: 1/150 in basket+golden
      if((crateId==="easter_basket"||crateId==="easter_golden")&&r<(1/150)){
        return lUR[Math.floor(Math.random()*lUR.length)];
      }
      // Legendary: 1/50 in hunt+basket+golden
      if(crateId!=="easter_spring"&&r<(1/50)){
        return lLeg[Math.floor(Math.random()*lLeg.length)];
      }
      // Epic: 35% in hunt+, 15% in spring
      const epicChance=crateId==="easter_spring"?0.15:0.35;
      if(Math.random()<epicChance){
        return lEpic[Math.floor(Math.random()*lEpic.length)];
      }
      // Common: fallback
      return lCommon[Math.floor(Math.random()*lCommon.length)];
    };
    return Array.from({length:crate.cards},()=>({
      ...rollLimited(),
      uid:crypto.randomUUID(),
      obtainedAt:new Date().toLocaleDateString(),
    }));
  }
  const activeSurge=extSurge||crate.surgeType||null;
  // Apply potion luck bonus (consumed on use)
  const potLuckKey="potion_luck_"+(window.__currentPlayerId||"");
  const potLuck=parseInt(lsGet(potLuckKey,"0"))||0;
  if(potLuck>0)lsSet(potLuckKey,"0"); // consume it
  const globalEv=getGlobalEvent();
  const globalLuckMult=globalEv?.luckMult||1;
  const globalMythicMult=globalEv?.mythicMult||1;
  const globalGoldenMult=globalEv?.goldenMult||1;
  const finalLuck=(potLuck>0?(crate.luck||1)*potLuck:(crate.luck||1))*globalLuckMult;
  // Specialty types get 4× weight in the card pool
  const finalSurge=(globalEv?.typeSurge&&!activeSurge)?SURGE_TYPES_ALL[Math.floor(Math.random()*SURGE_TYPES_ALL.length)]:activeSurge;

  const cards=Array.from({length:crate.cards},()=>rollCard(finalSurge,crateId,finalLuck,globalMythicMult,globalGoldenMult,crate.specialty));

  // Enforce guaranteed minimum rarity — skip Easter packs
  if(crate.guaranteedMin&&!crate.easterPack){
    const RARITY_RANK={"Common":0,"Uncommon":1,"Rare":2,"Epic":3,"Legendary":4,"Ultra Rare":5,"Crystal":6,"Radiant":7,"Rainbow":8,"Secret":9,"Shiny":10,"Mega":11,"Mythic":12,"GOLDEN":13};
    const minRank=RARITY_RANK[crate.guaranteedMin]??0;
    const hasMin=cards.some(c=>(RARITY_RANK[c.rarity]??0)>=minRank);
    if(!hasMin){
      // Force a card of exactly the guaranteed rarity
      const pool=CARDS.filter(c=>c.rarity===crate.guaranteedMin&&c.id<=(crate.genMax||999));
      if(pool.length>0){
        const forced={...pool[Math.floor(Math.random()*pool.length)],uid:crypto.randomUUID(),obtainedAt:new Date().toLocaleDateString()};
        // Replace the lowest-rarity card in the pack
        let lowestIdx=0;let lowestRank=999;
        cards.forEach((c,i)=>{const r=RARITY_RANK[c.rarity]??0;if(r<lowestRank){lowestRank=r;lowestIdx=i;}});
        cards[lowestIdx]=forced;
      }
    }
  }
  // Roll for a bonus Mega Stone — ~1/300 per card (only on ultra+)
  const stoneDrops=[];
  if(["ultra","master","legend","apex","radiant","crystal","prismatic","void"].includes(crateId)){
    cards.forEach(()=>{const s=rollMegaStone();if(s)stoneDrops.push(s);});
  }
  if(stoneDrops.length>0) cards.__megaStones=stoneDrops;
  return cards;
};

  const nameColor=isRainbow?"#FF69B4":isCrystal?"#87CEEB":isShiny?"#00FFAA":isRadiant?"#FFD700":isMega?"#FF4500":rc.color;

        }}>{isShiny?`✦ SHINY ${(card.origRarity||"").toUpperCase()}`:card.rarity.toUpperCase()}</span>
        {currentPrice&&<span style={{
          fontFamily:"'Share Tech Mono',monospace",fontSize:"8px",
          color:priceDelta===null?"#475569":priceDelta>=0?"#10B981":"#EF4444",fontWeight:700,
        }}>{priceDelta!==null?`${priceDelta>=0?"+":""}${priceDelta}🪙`:currentPrice+"🪙"}</span>}
      </div>

      {onSell&&<button
        onClick={e=>{e.stopPropagation();onSell(card);}}
        style={{
          width:"100%",padding:"7px 0",
          background:`linear-gradient(135deg,#7f1d1d,#DC2626)`,

          fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:"7px",letterSpacing:"1.5px",

        onMouseLeave={e=>e.target.style.background="linear-gradient(135deg,#7f1d1d,#DC2626)"}
      >SELL @ MARKET · {currentPrice||"?"}🪙</button>}
    </div>
  );
}

const getMoves=(card)=>{
  const base=TYPE_MOVES[card.type]||TYPE_MOVES.Normal;
  // Give higher rarity cards better moves (first 4 = best set)
  return base.slice(0,4);
};

/* ── Status effect helpers ── */
const STATUS_INFO={
  burn:     {label:"BRN",color:"#EF4444",emoji:"🔥",desc:"Loses HP each turn"},
  poison:   {label:"PSN",color:"#A33EA1",emoji:"☠️",desc:"Loses HP each turn"},
  paralyze: {label:"PAR",color:"#F7D02C",emoji:"⚡",desc:"May be unable to move"},
  sleep:    {label:"SLP",color:"#6390F0",emoji:"💤",desc:"Cannot move"},
  freeze:   {label:"FRZ",color:"#96D9D6",emoji:"❄️",desc:"Cannot move"},
  confuse:  {label:"CNF",color:"#F95587",emoji:"😵",desc:"May hurt itself"},
  leech:    {label:"LSH",color:"#7AC74C",emoji:"🌿",desc:"HP drained each turn"},
};

const applyStatusDmg=(poke)=>{
  if(!poke.status)return{poke,msg:null};
  let dmg=0,msg=null;
  if(poke.status==="burn"||poke.status==="poison"||poke.status==="leech"){
    dmg=Math.max(1,Math.floor(poke.maxHp/8));
    msg=`${poke.name} is hurt by ${poke.status}! -${dmg}HP`;
  }
  const newHp=Math.max(0,poke.hp-dmg);
  return{poke:{...poke,hp:newHp},msg};
};

function BattlePage({player,collection,notify,setDbPlayer,pvpChallenge,setPvpChallenge}){
  const [battleTab,setBattleTab]=useState("pve");
  const [screen,setScreen]         =useState("map");
  const [selectedArea,setSelectedArea]=useState(null);
  const [difficulty,setDifficulty] =useState(DIFFICULTIES[1]);
  const [team,setTeam]             =useState([]);   // player's chosen party
  const [run,setRun]               =useState(null);
  const [phase,setPhase]           =useState("action"); // action | moves | switch | message
  const [messages,setMessages]     =useState([]);
  const [msgIdx,setMsgIdx]         =useState(0);
  const [animShake,setAnimShake]   =useState(null); // "player"|"enemy"
  const msgTimer                   =useRef(null);
  const rarOrd=["GOLDEN","Mega","Secret","Ultra Rare","Legendary","Epic","Rare","Uncommon","Common"];
  const sortedCol=[...collection].sort((a,b)=>rarOrd.indexOf(a.rarity)-rarOrd.indexOf(b.rarity));

  /* Build a battle-ready Pokémon from a card */
  const makeBattlePoke=(card,scale=1)=>({
    ...card,
    hp:   Math.round(card.hp*scale),
    maxHp:Math.round(card.hp*scale),
    atk:  Math.round(card.dmg*scale),
    moves:getMoves(card),
    status:null,
    statusTurns:0,
    atkStage:0, // -6 to +6
  });

  /* Queue messages then resolve when done */
  const showMessages=(msgs, onDone)=>{
    setMessages(msgs);
    setMsgIdx(0);
    setPhase("message");
    let idx=0;
    const next=()=>{
      idx++;
      if(idx>=msgs.length){ clearTimeout(msgTimer.current); onDone&&onDone(); return; }
      setMsgIdx(idx);
      msgTimer.current=setTimeout(next, msgs[idx].length>40?2200:1600);
    };
    clearTimeout(msgTimer.current);
    msgTimer.current=setTimeout(next, msgs[0].length>40?2200:1600);
  };

  /* ── Start a run ── */
  const startRun=()=>{
    if(team.length===0){notify("Pick at least 1 card!","#EF4444");return;}
    const area=selectedArea;
    const areaIdx=AREAS.indexOf(area);
    const p=getPrestige(player.id,area.id);
    const ps=presScale(p);
    const ds=difficulty.scale;
    const enemyCard=makeEnemy(area.enemyRarities,0,areaIdx,ds,ps);
    const enemy=makeBattlePoke(enemyCard,1);
    const party=team.map(c=>makeBattlePoke(c,0.6));
    setRun({area,floor:1,coins:0,party,activeIdx:0,enemy,isBoss:false,diff:difficulty,ps,areaIdx});
    setPhase("action");
    setScreen("fight");
  };

  /* ── Use a move ── */
  const useMove=(move)=>{
    if(phase!=="moves"||!run)return;
    const{party,activeIdx,enemy}=run;
    const me={...party[activeIdx]};
    let foe={...enemy};
    const msgs=[];

    /* -- Player move -- */
    msgs.push(`${me.name} used ${move.name}!`);
    let hit=true;
    if(move.acc<100&&Math.random()*100>move.acc){ msgs.push("But it missed!"); hit=false; }

    if(hit){
      if(move.power>0){
        const typeMult=getTypeMultiplier(me.type,foe.type);
        const atkMult=1+me.atkStage*0.15;
        let dmg=Math.max(1,Math.round((me.atk/200)*move.power*atkMult));
        dmg=Math.round(dmg*typeMult);
        const crit=Math.random()<0.0625;
        if(crit){dmg=Math.round(dmg*1.5);msgs.push("A critical hit!");}
        if(typeMult>=2)msgs.push("It's super effective!");
        else if(typeMult<=0.5)msgs.push("It's not very effective...");
        foe={...foe,hp:Math.max(0,foe.hp-dmg)};
        msgs.push(`${foe.name} took ${dmg} damage!`);
      }
      if(move.status&&Math.random()<0.3&&!foe.status){
        foe={...foe,status:move.status,statusTurns:move.status==="sleep"?Math.floor(Math.random()*3)+1:0};
        msgs.push(`${foe.name} ${move.status==="burn"?"was burned!":move.status==="paralyze"?"is paralyzed!":move.status==="sleep"?"fell asleep!":move.status==="freeze"?"was frozen!":move.status==="confuse"?"became confused!":"was seeded!"}`);
      }
      if(move.boost==="atk"){me.atkStage=Math.min(6,me.atkStage+2);msgs.push(`${me.name}'s Attack rose!`);}
    }

    /* -- Check foe fainted -- */
    if(foe.hp<=0){
      const newParty=[...party];newParty[activeIdx]=me;
      showMessages([...msgs,`${foe.name} fainted!`],()=>handleEnemyFainted({...run,party:newParty,enemy:foe}));
      setRun(r=>({...r,party:newParty,enemy:foe}));
      return;
    }

    /* -- Status dmg on foe (end of player turn) -- */
    const{poke:foeAfterStatus,msg:statusMsg}=applyStatusDmg(foe);
    if(statusMsg)msgs.push(statusMsg);
    if(foeAfterStatus.hp<=0){
      const newParty=[...party];newParty[activeIdx]=me;
      showMessages([...msgs,`${foe.name} fainted!`],()=>handleEnemyFainted({...run,party:newParty,enemy:foeAfterStatus}));
      setRun(r=>({...r,party:newParty,enemy:foeAfterStatus}));
      return;
    }

    /* -- Enemy turn -- */
    let newMe={...me};
    let newFoe={...foeAfterStatus};
    let canAct=true;
    if(newFoe.status==="paralyze"&&Math.random()<0.25){msgs.push(`${newFoe.name} is paralyzed and can't move!`);canAct=false;}
    if(newFoe.status==="sleep"){msgs.push(`${newFoe.name} is fast asleep!`);canAct=false;newFoe={...newFoe,statusTurns:newFoe.statusTurns-1};if(newFoe.statusTurns<=0){newFoe={...newFoe,status:null};msgs.push(`${newFoe.name} woke up!`);}}
    if(newFoe.status==="freeze"){msgs.push(`${newFoe.name} is frozen solid!`);canAct=false;if(Math.random()<0.2){newFoe={...newFoe,status:null};msgs.push(`${newFoe.name} thawed out!`);canAct=false;}}

    if(canAct){
      const enemyMoves=getMoves(newFoe);
      const eMv=enemyMoves[Math.floor(Math.random()*enemyMoves.length)];
      msgs.push(`${newFoe.name} used ${eMv.name}!`);
      if(eMv.power>0){
        const eTm=getTypeMultiplier(newFoe.type,newMe.type);
        let eDmg=Math.max(1,Math.round((newFoe.atk/200)*eMv.power));
        eDmg=Math.round(eDmg*eTm);
        const eCrit=Math.random()<0.0625;
        if(eCrit){eDmg=Math.round(eDmg*1.5);msgs.push("A critical hit!");}
        if(eTm>=2)msgs.push("It's super effective!");
        else if(eTm<=0.5)msgs.push("It's not very effective...");
        newMe={...newMe,hp:Math.max(0,newMe.hp-eDmg)};
        msgs.push(`${newMe.name} took ${eDmg} damage!`);
      }
      if(eMv.status&&Math.random()<0.25&&!newMe.status){
        newMe={...newMe,status:eMv.status,statusTurns:eMv.status==="sleep"?Math.floor(Math.random()*3)+1:0};
        msgs.push(`${newMe.name} ${eMv.status==="burn"?"was burned!":eMv.status==="paralyze"?"is paralyzed!":eMv.status==="sleep"?"fell asleep!":"got a status!"}`);
      }
    }

    /* -- Status dmg on player (end of enemy turn) -- */
    const{poke:meAfterStatus,msg:meStatusMsg}=applyStatusDmg(newMe);
    if(meStatusMsg)msgs.push(meStatusMsg);

    /* -- Check player fainted -- */
    const newParty=[...party];newParty[activeIdx]=meAfterStatus;
    setRun(r=>({...r,party:newParty,enemy:newFoe}));
    if(meAfterStatus.hp<=0){
      msgs.push(`${meAfterStatus.name} fainted!`);
      const remaining=newParty.filter(c=>c.hp>0);
      showMessages(msgs,()=>{
        if(remaining.length===0){setScreen("result");}
        else{setPhase("forcedswitch");}
      });
      return;
    }
    showMessages(msgs,()=>setPhase("action"));
    setAnimShake("enemy");setTimeout(()=>setAnimShake(null),400);
  };

  /* ── Enemy fainted handler ── */
  const handleEnemyFainted=(runState)=>{
    const{area,floor,coins,diff,ps,areaIdx,isBoss}=runState;
    const presBonus=1+Math.min(getPrestige(player.id,area.id),40)*0.02;
    const base=isBoss?AREA_BOSSES[area.bossIdx]?.reward||500:({Common:5,Uncommon:10,Rare:20,Epic:40,Legendary:80,Secret:150,"Ultra Rare":200,Mega:250,GOLDEN:500})[runState.enemy.rarity]||15;
    const reward=Math.round(base*(diff?.coinMult||1)*presBonus);
    const newCoins=coins+reward;

    if(isBoss||floor>=area.floors){
      setRun(r=>({...r,...runState,coins:newCoins,won:true}));
      if(isBoss){setScreen("victory");return;}
      /* Final floor cleared — spawn boss */
      const boss=AREA_BOSSES[area.bossIdx]||AREA_BOSSES[AREA_BOSSES.length-1];
      const bEnemy=makeBattlePoke({...boss},diff.scale*ps);
      setRun(r=>({...r,...runState,enemy:bEnemy,floor:floor+1,isBoss:true,coins:newCoins}));
      showMessages([`⚠️ ${boss.name} appeared! It's the boss!`],()=>setPhase("action"));
      return;
    }
    const nextFloor=floor+1;
    const ec=makeEnemy(area.enemyRarities,nextFloor-1,areaIdx,diff.scale,ps);
    const nextEnemy=makeBattlePoke(ec,1);
    setRun(r=>({...r,...runState,enemy:nextEnemy,floor:nextFloor,isBoss:false,coins:newCoins}));
    showMessages([`+${reward}🪙  Floor ${nextFloor}!`,`A wild ${nextEnemy.name} appeared!`],()=>setPhase("action"));
  };

  /* ── Switch Pokémon ── */
  const switchTo=(idx)=>{
    if(!run)return;
    const{party,activeIdx}=run;
    if(idx===activeIdx||party[idx].hp<=0)return;
    const msgs=[`${party[activeIdx].name}, come back!`,`Go, ${party[idx].name}!`];
    setRun(r=>({...r,activeIdx:idx}));
    showMessages(msgs,()=>setPhase("action"));
  };

  /* ── Flee ── */
  const flee=()=>{
    setRun(r=>({...r,coins:Math.round((r.coins||0)*0.5)}));
    showMessages(["Got away safely!"],()=>setScreen("result"));
  };

  /* ── Claim rewards ── */
  const claimReward=async()=>{
    const bonus=run?.coins||0;
    const isWin=screen==="victory";
    const nc=player.coins+bonus;
    const newRuns=(player.battle_runs||0)+(isWin?1:0);
    await sb.from("players").update({coins:nc,battle_runs:newRuns}).eq("id",player.id);
    setDbPlayer(p=>({...p,coins:nc,battle_runs:newRuns}));
    if(isWin)addPrestige(player.id,run.area.id);
    if(bonus>0)notify(`+${bonus}🪙 battle rewards!`,"#FCD34D");
    setRun(null);setTeam([]);setSelectedArea(null);setScreen("map");
    setPhase("action");setMessages([]);
  };

  /* ══ MAP SCREEN ══ */
  if(screen==="map") return(
    <div style={{animation:"fadeIn .35s ease"}}>
      {/* Tab bar */}
      <div style={{display:"flex",gap:4,marginBottom:20,background:"#080D1A",border:"1px solid #1E293B",borderRadius:12,padding:4}}>
        {[["pve","⚔️ ADVENTURE","#EE8130"],["pvp","👥 PvP BATTLE","#F472B6"]].map(([t,l,c])=>(
          <button key={t} onClick={()=>setBattleTab(t)}
            style={{flex:1,padding:"10px",background:battleTab===t?`linear-gradient(135deg,${c}22,${c}11)`:"transparent",border:`1px solid ${battleTab===t?c+"55":"transparent"}`,borderRadius:9,color:battleTab===t?c:"#475569",fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:11,cursor:"pointer",letterSpacing:1,transition:"all .2s",position:"relative"}}>
            {l}
            {t==="pvp"&&pvpChallenge&&<span style={{position:"absolute",top:2,right:6,background:"#F472B6",color:"white",borderRadius:"50%",width:14,height:14,fontSize:7,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900}}>!</span>}
          </button>
        ))}
      </div>

      {battleTab==="pvp"&&<PvPBattle player={player} collection={collection} notify={notify} pvpChallenge={pvpChallenge} setPvpChallenge={setPvpChallenge}/>}

      {battleTab==="pve"&&<>
      <h1 style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:"clamp(18px,4vw,28px)",marginBottom:4}}>⚔️ BATTLE <span style={{color:"#EE8130"}}>REGIONS</span></h1>
      <p style={{color:"#334155",fontSize:12,marginBottom:16}}>Pick a region · your Pokémon battle one-on-one just like the games</p>
      <div style={{background:"#080D1A",border:"1px solid #1E293B",borderRadius:12,padding:14,marginBottom:20}}>
        <div style={{fontFamily:"'Orbitron',monospace",fontSize:8,color:"#475569",letterSpacing:2,marginBottom:10}}>DIFFICULTY</div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          {DIFFICULTIES.map(d=>(
            <button key={d.id} onClick={()=>setDifficulty(d)}
              style={{padding:"8px 14px",background:difficulty.id===d.id?"linear-gradient(135deg,#1E293B,#334155)":"transparent",border:`1px solid ${difficulty.id===d.id?"#475569":"#1E293B"}`,borderRadius:8,color:difficulty.id===d.id?"#F1F5F9":"#475569",cursor:"pointer",textAlign:"center"}}>
              <div style={{fontSize:14,marginBottom:2}}>{d.emoji}</div>
              <div style={{fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:9}}>{d.name}</div>
              <div style={{color:"#334155",fontSize:7,marginTop:1}}>{d.coinMult}× coins</div>
            </button>
          ))}
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:12}}>
        {AREAS.map(area=>{
          const boss=AREA_BOSSES[area.bossIdx]||AREA_BOSSES[AREA_BOSSES.length-1];
          const p=getPrestige(player.id,area.id);
          return(
            <div key={area.id} onClick={()=>{setSelectedArea(area);setTeam([]);setScreen("deck");}}
              style={{background:area.bg,border:"1px solid rgba(255,255,255,.08)",borderRadius:16,padding:20,cursor:"pointer",position:"relative",transition:"transform .2s"}}
              onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-3px)"}}
              onMouseLeave={e=>{e.currentTarget.style.transform=""}}>
              {p>0&&<div style={{position:"absolute",top:8,right:8,background:"#FF450088",border:"1px solid #FF4500",borderRadius:8,padding:"2px 6px",color:"#FF4500",fontFamily:"'Orbitron',monospace",fontSize:7}}>✦ P{p}</div>}
              <div style={{fontSize:28,marginBottom:6}}>{area.emoji}</div>
              <div style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:13,color:"#F1F5F9",marginBottom:3}}>{area.name}</div>
              <div style={{color:"#475569",fontSize:10,marginBottom:10}}>{area.desc}</div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{fontSize:9,color:"#334155"}}>{area.floors} floors</div>
                <div style={{display:"flex",alignItems:"center",gap:5}}>
                  {boss&&<img src={`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${boss.id}.png`} style={{width:28,height:28,imageRendering:"pixelated"}} alt="" onError={e=>e.target.style.display="none"}/>}
                  <span style={{color:"#FF4500",fontFamily:"'Orbitron',monospace",fontSize:7,fontWeight:700}}>BOSS</span>
                </div>
              </div>
            </div>
          );
        })}
      </div>
      </>}
    </div>
  );

  /* ══ DECK SCREEN ══ */
  if(screen==="deck"&&selectedArea) return(
    <div style={{animation:"fadeIn .35s ease"}}>
      <button onClick={()=>setScreen("map")} style={{background:"none",border:"1px solid #1E293B",borderRadius:7,color:"#475569",padding:"5px 12px",cursor:"pointer",marginBottom:16,fontFamily:"'Orbitron',monospace",fontSize:9}}>← BACK</button>
      <div style={{display:"flex",gap:14,alignItems:"center",marginBottom:16,flexWrap:"wrap"}}>
        <div style={{fontSize:28}}>{selectedArea.emoji}</div>
        <div>
          <div style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:18}}>{selectedArea.name}</div>
          <div style={{color:"#334155",fontSize:11,marginTop:2}}>Pick up to 6 Pokémon for your party</div>
        </div>
        <button onClick={startRun} disabled={team.length===0}
          style={{marginLeft:"auto",padding:"10px 24px",background:team.length===0?"#1A2035":"linear-gradient(135deg,#065F46,#10B981)",border:"none",borderRadius:10,color:team.length===0?"#334155":"white",fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:11,cursor:team.length===0?"not-allowed":"pointer",letterSpacing:1}}>
          {team.length===0?"SELECT TEAM":"⚔️ BATTLE!"}
        </button>
      </div>
      {team.length>0&&(
        <div style={{background:"#080D1A",border:"1px solid #1E293B",borderRadius:12,padding:12,marginBottom:14}}>
          <div style={{fontFamily:"'Orbitron',monospace",fontSize:8,color:"#475569",letterSpacing:2,marginBottom:8}}>YOUR PARTY ({team.length}/6)</div>
          <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
            {team.map((c,i)=>{const rc=RARITY_CFG[c.rarity]||RARITY_CFG.Common;return(
              <div key={c.uid} onClick={()=>setTeam(d=>d.filter(x=>x.uid!==c.uid))}
                style={{background:`${rc.color}18`,border:`1px solid ${rc.color}55`,borderRadius:8,padding:"5px 8px",cursor:"pointer",display:"flex",alignItems:"center",gap:6}}>
                <img src={`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${c.id}.png`} style={{width:24,height:24,imageRendering:"pixelated"}} alt="" onError={e=>e.target.style.display="none"}/>
                <span style={{color:rc.color,fontSize:9,fontFamily:"'Orbitron',monospace",fontWeight:700}}>{c.name}</span>
                <span style={{color:"#EF4444",fontSize:10}}>✕</span>
              </div>
            );})}
          </div>
        </div>
      )}
      <div style={{fontFamily:"'Orbitron',monospace",fontSize:8,color:"#475569",letterSpacing:2,marginBottom:10}}>YOUR COLLECTION</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
        {sortedCol.map(c=>{
          const rc=RARITY_CFG[c.rarity]||RARITY_CFG.Common;
          const inTeam=team.some(d=>d.uid===c.uid);
          return(
            <div key={c.uid} onClick={()=>{if(inTeam){setTeam(d=>d.filter(x=>x.uid!==c.uid));}else if(team.length<6){setTeam(d=>[...d,c]);}}}
              style={{background:inTeam?`${rc.color}22`:"#080D1A",border:`2px solid ${inTeam?rc.color:rc.color+"33"}`,borderRadius:10,padding:"8px 6px",width:76,textAlign:"center",cursor:"pointer",position:"relative"}}>
              <img src={`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${c.id}.png`} style={{width:48,height:48,objectFit:"contain"}} alt="" onError={e=>e.target.style.display="none"}/>
              <div style={{color:rc.color,fontSize:7,fontFamily:"'Orbitron',monospace",fontWeight:700,marginTop:2,lineHeight:1.2}}>{c.name}</div>
              <div style={{color:"#334155",fontSize:7}}>HP:{c.hp} ⚔️{c.dmg}</div>
              {inTeam&&<div style={{position:"absolute",top:2,right:4,color:rc.color,fontSize:12,fontWeight:900}}>✓</div>}
            </div>
          );
        })}
        {sortedCol.length===0&&<div style={{color:"#1E293B",fontFamily:"'Orbitron',monospace",fontSize:11,padding:"30px 0"}}>No cards yet — open some packs first!</div>}
      </div>
    </div>
  );

  /* ══ FIGHT SCREEN ══ */
  if((screen==="fight"||screen==="forcedswitch")&&run){
    const{party,activeIdx,enemy,floor,isBoss,area,coins}=run;
    const me=party[activeIdx]||party[0];
    const meRc=RARITY_CFG[me?.rarity]||RARITY_CFG.Common;
    const foeRc=RARITY_CFG[enemy?.rarity]||RARITY_CFG.Common;
    const meHpPct=me?(me.hp/me.maxHp):0;
    const foeHpPct=enemy?(enemy.hp/enemy.maxHp):0;
    const meHpColor=meHpPct>0.5?"#34D399":meHpPct>0.25?"#F59E0B":"#EF4444";
    const foeHpColor=foeHpPct>0.5?"#34D399":foeHpPct>0.25?"#F59E0B":"#EF4444";

    return(
      <div style={{background:"#020617",minHeight:"100%",display:"flex",flexDirection:"column",gap:0,fontFamily:"'Exo 2',sans-serif",maxWidth:600,margin:"0 auto"}}>

        {/* Floor / coins bar */}
        <div style={{display:"flex",justifyContent:"space-between",padding:"8px 12px",background:"#050a14",borderBottom:"1px solid #0A0F1E"}}>
          <span style={{fontFamily:"'Orbitron',monospace",fontSize:9,color:isBoss?"#FF4500":"#475569"}}>
            {isBoss?"⚠️ BOSS":"Floor "+floor+" / "+area.floors} · {area.name}
          </span>
          <span style={{fontFamily:"'Orbitron',monospace",fontSize:9,color:"#FCD34D"}}>🪙{coins}</span>
        </div>

        {/* Battle field */}
        <div style={{background:area.bg||"linear-gradient(180deg,#0a1525,#020617)",position:"relative",height:220,overflow:"hidden",flexShrink:0}}>

          {/* Enemy info box — top left */}
          <div style={{position:"absolute",top:14,left:12,background:"rgba(8,13,26,.92)",border:`2px solid ${isBoss?"#FF4500":foeRc.color}44`,borderRadius:12,padding:"8px 14px",minWidth:160}}>
            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
              <span style={{fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:11,color:isBoss?"#FF4500":foeRc.color}}>{enemy.name}</span>
              {enemy.status&&<span style={{background:STATUS_INFO[enemy.status]?.color+"33",color:STATUS_INFO[enemy.status]?.color,fontSize:7,padding:"1px 5px",borderRadius:4,fontFamily:"'Orbitron',monospace",fontWeight:700}}>{STATUS_INFO[enemy.status]?.label}</span>}
            </div>
            <div style={{background:"#0F172A",borderRadius:3,height:6,overflow:"hidden",width:"100%",marginBottom:3}}>
              <div style={{height:"100%",width:`${Math.max(0,foeHpPct*100)}%`,background:`linear-gradient(90deg,${foeHpColor}88,${foeHpColor})`,borderRadius:3,transition:"width .4s"}}/>
            </div>
            <div style={{fontSize:8,color:"#334155",fontFamily:"'Share Tech Mono',monospace"}}>{enemy.hp}/{enemy.maxHp} HP · {enemy.type}</div>
          </div>

          {/* Enemy sprite — top right */}
          <img
            src={`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${enemy.id}.png`}
            style={{position:"absolute",top:10,right:12,width:100,height:100,imageRendering:"pixelated",filter:`drop-shadow(0 4px 8px ${foeRc.color}66)`,animation:animShake==="enemy"?"shake .3s ease":"none"}}
            alt={enemy.name} onError={e=>e.target.style.display="none"}/>

          {/* Player sprite — bottom left (back sprite) */}
          <img
            src={`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/back/${me?.id}.png`}
            style={{position:"absolute",bottom:4,left:16,width:100,height:100,imageRendering:"pixelated",filter:`drop-shadow(0 4px 8px ${meRc.color}66)`,animation:animShake==="player"?"shake .3s ease":"none"}}
            alt={me?.name} onError={e=>e.target.style.display="none"}/>

          {/* Player info box — bottom right */}
          <div style={{position:"absolute",bottom:14,right:12,background:"rgba(8,13,26,.92)",border:`2px solid ${meRc.color}44`,borderRadius:12,padding:"8px 14px",minWidth:160}}>
            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
              <span style={{fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:11,color:meRc.color}}>{me?.name}</span>
              {me?.status&&<span style={{background:STATUS_INFO[me.status]?.color+"33",color:STATUS_INFO[me.status]?.color,fontSize:7,padding:"1px 5px",borderRadius:4,fontFamily:"'Orbitron',monospace",fontWeight:700}}>{STATUS_INFO[me.status]?.label}</span>}
            </div>
            <div style={{background:"#0F172A",borderRadius:3,height:6,overflow:"hidden",width:"100%",marginBottom:3}}>
              <div style={{height:"100%",width:`${Math.max(0,meHpPct*100)}%`,background:`linear-gradient(90deg,${meHpColor}88,${meHpColor})`,borderRadius:3,transition:"width .4s"}}/>
            </div>
            <div style={{fontSize:8,color:"#334155",fontFamily:"'Share Tech Mono',monospace"}}>{me?.hp}/{me?.maxHp} HP · {me?.type}</div>
          </div>
        </div>

        {/* Message box */}
        <div style={{background:"#080D1A",border:"1px solid #0A0F1E",borderTop:"2px solid #1E293B",padding:"14px 16px",minHeight:64,display:"flex",alignItems:"center"}}>
          {phase==="message"?(
            <div style={{color:"#F1F5F9",fontSize:14,lineHeight:1.5,cursor:"pointer"}} onClick={()=>{clearTimeout(msgTimer.current);}}>
              {messages[msgIdx]||"..."}
              <span style={{display:"inline-block",marginLeft:8,animation:"pulse .7s ease infinite",color:"#475569",fontSize:10}}>▼</span>
            </div>
          ):(
            <div style={{color:"#475569",fontSize:13}}>
              {phase==="action"&&`What will ${me?.name} do?`}
              {phase==="moves"&&"Choose a move:"}
              {(phase==="switch"||phase==="forcedswitch")&&(phase==="forcedswitch"?`${me?.name} fainted! Choose next Pokémon:`:"Switch to which Pokémon?")}
            </div>
          )}
        </div>

        {/* Action menu */}
        {phase==="action"&&(
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:2,background:"#050a14",padding:2}}>
            {[
              {label:"⚔️ FIGHT",   color:"#EF4444", action:()=>setPhase("moves")},
              {label:"🔄 POKÉMON", color:"#60A5FA", action:()=>setPhase("switch")},
              {label:"🏃 RUN",     color:"#94A3B8", action:flee},
            ].map(b=>(
              <button key={b.label} onClick={b.action}
                style={{padding:"16px 0",background:"#080D1A",border:`1px solid ${b.color}33`,color:b.color,fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:11,cursor:"pointer",letterSpacing:1,transition:"background .15s"}}
                onMouseEnter={e=>e.target.style.background=b.color+"18"}
                onMouseLeave={e=>e.target.style.background="#080D1A"}>
                {b.label}
              </button>
            ))}
            <button onClick={()=>setPhase("action")} style={{padding:"16px 0",background:"#080D1A",border:"1px solid #1E293B",color:"#334155",fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:11,cursor:"pointer"}}>✦ INFO</button>
          </div>
        )}

        {/* Move buttons */}
        {phase==="moves"&&me&&(
          <div style={{background:"#050a14",padding:2}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:2}}>
              {getMoves(me).map((mv,i)=>{
                const tm=getTypeMultiplier(me.type,enemy.type);
                const typeColor=TYPE_COLORS[me.type]||"#94A3B8";
                return(
                  <button key={i} onClick={()=>useMove(mv)}
                    style={{padding:"12px 10px",background:"#080D1A",border:`1px solid ${typeColor}33`,cursor:"pointer",textAlign:"left",transition:"background .15s"}}
                    onMouseEnter={e=>e.currentTarget.style.background=typeColor+"15"}
                    onMouseLeave={e=>e.currentTarget.style.background="#080D1A"}>
                    <div style={{color:"#F1F5F9",fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:11,marginBottom:3}}>{mv.name}</div>
                    <div style={{display:"flex",gap:8,alignItems:"center"}}>
                      <span style={{background:typeColor+"33",color:typeColor,fontSize:8,padding:"1px 6px",borderRadius:4,fontFamily:"'Orbitron',monospace"}}>{me.type}</span>
                      {mv.power>0&&<span style={{color:"#475569",fontSize:9}}>PWR {mv.power}</span>}
                      {mv.status&&<span style={{color:STATUS_INFO[mv.status]?.color||"#94A3B8",fontSize:9}}>{STATUS_INFO[mv.status]?.emoji} {mv.status}</span>}
                      <span style={{color:"#334155",fontSize:8,marginLeft:"auto"}}>PP {mv.pp}</span>
                    </div>
                  </button>
                );
              })}
            </div>
            <button onClick={()=>setPhase("action")} style={{width:"100%",padding:"10px",background:"#050a14",border:"1px solid #1E293B",color:"#475569",fontFamily:"'Orbitron',monospace",fontSize:9,cursor:"pointer"}}>← BACK</button>
          </div>
        )}

        {/* Switch screen */}
        {(phase==="switch"||phase==="forcedswitch")&&(
          <div style={{background:"#050a14",padding:8}}>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6}}>
              {party.map((poke,i)=>{
                const rc=RARITY_CFG[poke.rarity]||RARITY_CFG.Common;
                const fainted=poke.hp<=0;
                const active=i===activeIdx;
                return(
                  <button key={poke.uid} onClick={()=>!fainted&&!active&&(phase==="forcedswitch"?switchTo(i):switchTo(i))} disabled={fainted||active}
                    style={{background:active?"#1E293B":fainted?"#050a14":"#080D1A",border:`2px solid ${active?rc.color:fainted?"#1E293B":rc.color+"55"}`,borderRadius:10,padding:"8px 6px",textAlign:"center",cursor:fainted||active?"not-allowed":"pointer",opacity:fainted?0.4:1}}>
                    <img src={`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${poke.id}.png`} style={{width:36,height:36,imageRendering:"pixelated",filter:fainted?"grayscale(1)":""}} alt="" onError={e=>e.target.style.display="none"}/>
                    <div style={{color:active?rc.color:fainted?"#334155":rc.color,fontSize:7,fontFamily:"'Orbitron',monospace",fontWeight:700,marginTop:2}}>{poke.name}</div>
                    <div style={{background:"#0F172A",borderRadius:2,height:3,margin:"3px 0",overflow:"hidden"}}>
                      <div style={{height:"100%",width:`${Math.max(0,(poke.hp/poke.maxHp)*100)}%`,background:poke.hp/poke.maxHp>0.5?"#34D399":poke.hp/poke.maxHp>0.25?"#F59E0B":"#EF4444"}}/>
                    </div>
                    <div style={{color:"#334155",fontSize:7}}>{fainted?"FNT":active?"ACTIVE":`${poke.hp}/${poke.maxHp}`}</div>
                    {poke.status&&<div style={{color:STATUS_INFO[poke.status]?.color,fontSize:7}}>{STATUS_INFO[poke.status]?.label}</div>}
                  </button>
                );
              })}
            </div>
            {phase==="switch"&&<button onClick={()=>setPhase("action")} style={{width:"100%",marginTop:6,padding:"8px",background:"#050a14",border:"1px solid #1E293B",color:"#475569",fontFamily:"'Orbitron',monospace",fontSize:9,cursor:"pointer"}}>← BACK</button>}
          </div>
        )}
      </div>
    );
  }

  /* ══ VICTORY ══ */
  if(screen==="victory"&&run) return(
    <div style={{textAlign:"center",padding:"40px 20px",animation:"fadeIn .4s ease"}}>
      <div style={{fontSize:48,marginBottom:10}}>🏆</div>
      <div style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:24,color:"#FCD34D",marginBottom:4}}>AREA CLEARED!</div>
      <div style={{color:"#475569",fontSize:12,marginBottom:8}}>{run.area.name} conquered!</div>
      <div style={{color:"#FF4500",fontFamily:"'Orbitron',monospace",fontSize:10,marginBottom:20}}>⚡ Prestige {getPrestige(player.id,run.area.id)+1} unlocked</div>
      <div style={{background:"#080D1A",border:"1px solid #FCD34D33",borderRadius:14,padding:20,marginBottom:24,display:"inline-block",minWidth:180}}>
        <div style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:32,color:"#FCD34D"}}>+{run.coins}🪙</div>
        <div style={{color:"#475569",fontSize:10,marginTop:4}}>BATTLE REWARDS</div>
      </div><br/>
      <button onClick={claimReward} style={{padding:"13px 40px",background:"linear-gradient(135deg,#78350F,#F59E0B)",border:"none",borderRadius:12,color:"white",fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:13,cursor:"pointer",letterSpacing:1}}>CLAIM REWARD</button>
    </div>
  );

  /* ══ RESULT (LOSS) ══ */
  if(screen==="result"&&run) return(
    <div style={{textAlign:"center",padding:"40px 20px",animation:"fadeIn .4s ease"}}>
      <div style={{fontSize:48,marginBottom:10}}>💀</div>
      <div style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:24,color:"#EF4444",marginBottom:4}}>BLACKED OUT</div>
      <div style={{color:"#475569",fontSize:12,marginBottom:24}}>Reached floor {run.floor} of {run.area?.name}</div>
      <div style={{background:"#080D1A",border:"1px solid #FCD34D33",borderRadius:14,padding:20,marginBottom:24,display:"inline-block",minWidth:180}}>
        <div style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:32,color:"#FCD34D"}}>+{Math.round((run.coins||0)*0.5)}🪙</div>
        <div style={{color:"#475569",fontSize:10,marginTop:4}}>CONSOLATION (50%)</div>
      </div><br/>
      <button onClick={claimReward} style={{padding:"13px 40px",background:"linear-gradient(135deg,#1a0030,#4c1d95)",border:"none",borderRadius:12,color:"white",fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:13,cursor:"pointer",letterSpacing:1}}>TRY AGAIN</button>
    </div>
  );

  return null;
}

/* ══════════════════════════════════════════════════ PVP BATTLE */
function PvPBattle({player,collection,notify,pvpChallenge,setPvpChallenge}){
  const rarOrd=["GOLDEN","Secret","Rainbow","Radiant","Crystal","Mega","Ultra Rare","Legendary","Epic","Rare","Uncommon","Common"];
  const sortedCol=[...collection].filter(c=>!c.isPersonal).sort((a,b)=>rarOrd.indexOf(a.rarity)-rarOrd.indexOf(b.rarity));
  const [screen,setScreen]=useState("lobby");
  const [mode,setMode]=useState("pvp");
  const [targetName,setTargetName]=useState("");
  const [myTeam,setMyTeam]=useState([]);
  const [battle,setBattle]=useState(null);
  const [phase,setPhase]=useState("action");
  const [messages,setMessages]=useState([]);
  const [msgIdx,setMsgIdx]=useState(0);
  const [waitMsg,setWaitMsg]=useState("");
  const lobbyRef=useRef(null);
  const battleRef=useRef(null);
  const battleStateRef=useRef(null);
  const myMoveRef=useRef(null);
  const oppMoveRef=useRef(null);
  const msgTimer=useRef(null);

  const makePvpPoke=(card)=>({...card,hp:Math.max(1,card.hp),maxHp:Math.max(1,card.hp),atk:card.dmg,moves:getMoves(card),status:null,statusTurns:0,atkStage:0});

  useEffect(()=>{
    const ch=sb.channel("pvp_lobby_v2",{config:{broadcast:{self:false,ack:false}}});
    ch.on("broadcast",{event:"challenge"},({payload})=>{
      if(payload.to===player.username){setPvpChallenge(payload);notify(`⚔️ ${payload.from} challenges you!`,"#F472B6");SFX.evolve();}
    });
    ch.on("broadcast",{event:"challenge_accepted"},({payload})=>{
      if(payload.challengerId===player.id){
        const oppTeam=payload.team.map(id=>{const card=ALL_CARDS.find(c=>String(c.id)===String(id))||CARDS[0];return makePvpPoke(card);});
        const myParty=(window.__pvpMyTeam||myTeam).map(makePvpPoke);
        startBattle({isHost:true,battleId:payload.battleId,opponentName:payload.from,myParty,oppParty:oppTeam});
      }
    });
    ch.on("broadcast",{event:"challenge_declined"},({payload})=>{
      if(payload.challengerId===player.id){notify(`${payload.from} declined.`,"#EF4444");setScreen("lobby");setWaitMsg("");}
    });
    ch.subscribe();lobbyRef.current=ch;
    return()=>{try{ch.unsubscribe();}catch{}};
  },[player.username,player.id]);

  const sendChallenge=async()=>{
    if(!targetName.trim()){notify("Enter a trainer name!","#EF4444");return;}
    if(myTeam.length===0){notify("Pick your team first!","#EF4444");return;}
    if(targetName.trim().toLowerCase()===player.username.toLowerCase()){notify("Can't battle yourself!","#EF4444");return;}
    const battleId=`pvp_${player.id}_${Date.now()}`;
    window.__pvpMyTeam=myTeam;
    // Look up target player id for persistent inbox delivery
    const{data:target}=await sb.from("players").select("id,username").ilike("username",targetName.trim()).maybeSingle();
    if(target){
      await sb.from("trades").insert({from_id:player.id,to_id:target.id,from_name:player.username,to_name:target.username,offered:{type:"battle_invite",battleId,team:myTeam.map(c=>c.id)},requested:{},status:"unread"});
    }
    // Also broadcast live in case they're on the page right now
    lobbyRef.current.send({type:"broadcast",event:"challenge",payload:{from:player.username,fromId:player.id,to:targetName.trim(),battleId,team:myTeam.map(c=>c.id)}});
    setScreen("waiting");setWaitMsg(`Waiting for ${targetName.trim()} to accept...`);
  };

  // Handle challenge accepted from inbox (not just live broadcast)
  useEffect(()=>{
    if(!pvpChallenge)return;
    // If it came from inbox, pvpChallenge is already set — just let the banner handle it
  },[pvpChallenge]);

  const acceptChallenge=()=>{
    if(myTeam.length===0){notify("Pick your team first!","#EF4444");return;}
    const ch=pvpChallenge;
    lobbyRef.current.send({type:"broadcast",event:"challenge_accepted",payload:{from:player.username,challengerId:ch.fromId,battleId:ch.battleId,team:myTeam.map(c=>c.id)}});
    const oppTeamCards=ch.team.map(id=>{const card=ALL_CARDS.find(c=>String(c.id)===String(id))||CARDS[0];return makePvpPoke(card);});
    startBattle({isHost:false,battleId:ch.battleId,opponentName:ch.from,myParty:myTeam.map(makePvpPoke),oppParty:oppTeamCards});
    setPvpChallenge(null);
  };

  const declineChallenge=()=>{
    lobbyRef.current.send({type:"broadcast",event:"challenge_declined",payload:{from:player.username,challengerId:pvpChallenge.fromId}});
    setPvpChallenge(null);
  };

  const startCPU=()=>{
    if(myTeam.length===0){notify("Pick your team first!","#EF4444");return;}
    const cpuPool=[...CARDS].sort(()=>Math.random()-0.5).slice(0,myTeam.length);
    startBattle({isHost:true,battleId:"cpu",opponentName:"CPU",myParty:myTeam.map(makePvpPoke),oppParty:cpuPool.map(makePvpPoke),isCPU:true});
  };

  const startBattle=({isHost,battleId,opponentName,myParty,oppParty,isCPU=false})=>{
    const state={isHost,isCPU,battleId,opponentName,myParty,oppParty,myIdx:0,oppIdx:0,turn:1,result:null};
    setBattle(state);battleStateRef.current=state;
    myMoveRef.current=null;oppMoveRef.current=null;
    setPhase("action");setMessages([]);setScreen("battle");
    if(!isCPU){
      if(battleRef.current){try{battleRef.current.unsubscribe();}catch{}}
      const bch=sb.channel(battleId,{config:{broadcast:{self:false,ack:false}}});
      bch.on("broadcast",{event:"move"},({payload})=>{
        oppMoveRef.current=payload.move;
        if(myMoveRef.current&&battleStateRef.current?.isHost){resolveTurn(myMoveRef.current,payload.move,battleStateRef.current);myMoveRef.current=null;oppMoveRef.current=null;}
      });
      bch.on("broadcast",{event:"state_update"},({payload})=>{
        if(!battleStateRef.current?.isHost){
          const ns={...payload.state,isHost:false,isCPU:false,battleId,opponentName};
          setBattle(ns);battleStateRef.current=ns;myMoveRef.current=null;oppMoveRef.current=null;
          showPvpMessages(payload.msgs,()=>{if(ns.result)setScreen("result");else if(payload.nextPhase==="forcedswitch")setPhase("forcedswitch");else setPhase("action");});
        }
      });
      bch.on("broadcast",{event:"switch_poke"},({payload})=>{
        setBattle(b=>{if(!b)return b;const ns={...b,oppIdx:payload.newIdx};battleStateRef.current=ns;return ns;});
        showPvpMessages([`${opponentName} sent out ${payload.pokeName}!`],()=>setPhase("action"));
      });
      bch.on("broadcast",{event:"forfeit"},()=>{showPvpMessages([`${opponentName} forfeited!`],()=>{setBattle(b=>({...b,result:"win"}));setScreen("result");});});
      bch.subscribe();battleRef.current=bch;
    }
  };

  const showPvpMessages=(msgs,onDone)=>{
    if(!msgs||msgs.length===0){onDone&&onDone();return;}
    setMessages(msgs);setMsgIdx(0);setPhase("message");
    let idx=0;
    const next=()=>{idx++;if(idx>=msgs.length){clearTimeout(msgTimer.current);onDone&&onDone();return;}setMsgIdx(idx);msgTimer.current=setTimeout(next,msgs[idx].length>40?2000:1400);};
    clearTimeout(msgTimer.current);msgTimer.current=setTimeout(next,msgs[0].length>40?2000:1400);
  };

  const applyOneMove=(attacker,defender,move,aLabel,dLabel)=>{
    const msgs=[];msgs.push(`${aLabel} used ${move.name}!`);
    let a={...attacker},d={...defender};
    if(move.power>0){
      if(move.acc<100&&Math.random()*100>move.acc){msgs.push("But it missed!");return{a,d,msgs};}
      const tm=getTypeMultiplier(a.type,d.type);
      let dmg=Math.max(1,Math.round((a.atk/200)*move.power*(1+a.atkStage*0.15)));
      dmg=Math.round(dmg*tm);
      if(Math.random()<0.0625){dmg=Math.round(dmg*1.5);msgs.push("A critical hit!");}
      if(tm>=2)msgs.push("It's super effective!");else if(tm<=0.5)msgs.push("Not very effective...");
      d={...d,hp:Math.max(0,d.hp-dmg)};
      msgs.push(`${dLabel} took ${dmg} damage!`);
      if(d.hp<=0)msgs.push(`${dLabel} fainted!`);
    }
    if(move.boost==="atk"){a={...a,atkStage:Math.min(6,a.atkStage+2)};msgs.push(`${aLabel}'s Attack rose!`);}
    return{a,d,msgs};
  };

  const resolveTurn=(myMove,oppMove,state)=>{
    const{myParty,oppParty,myIdx,oppIdx,opponentName,isCPU}=state;
    let me={...myParty[myIdx]},opp={...oppParty[oppIdx]};
    const allMsgs=[];
    const myLabel="Your "+me.name;const oppLabel=(isCPU?"CPU ":"Foe ")+opp.name;
    const myFirst=me.atk>=opp.atk;
    if(myFirst){
      const r1=applyOneMove(me,opp,myMove,myLabel,oppLabel);me=r1.a;opp=r1.d;allMsgs.push(...r1.msgs);
      if(opp.hp>0){const r2=applyOneMove(opp,me,oppMove,oppLabel,myLabel);opp=r2.a;me=r2.d;allMsgs.push(...r2.msgs);}
    }else{
      const r1=applyOneMove(opp,me,oppMove,oppLabel,myLabel);opp=r1.a;me=r1.d;allMsgs.push(...r1.msgs);
      if(me.hp>0){const r2=applyOneMove(me,opp,myMove,myLabel,oppLabel);me=r2.a;opp=r2.d;allMsgs.push(...r2.msgs);}
    }
    const newMyParty=[...myParty];newMyParty[myIdx]=me;
    const newOppParty=[...oppParty];newOppParty[oppIdx]=opp;
    const myAlive=newMyParty.some(p=>p.hp>0);const oppAlive=newOppParty.some(p=>p.hp>0);
    let result=null;
    if(!myAlive&&!oppAlive)result="draw";else if(!myAlive)result="loss";else if(!oppAlive)result="win";
    const newState={...state,myParty:newMyParty,oppParty:newOppParty,turn:state.turn+1,result};
    setBattle(newState);battleStateRef.current=newState;
    if(!isCPU&&battleRef.current){
      const flippedMsgs=allMsgs.map(m=>m.replace(new RegExp(myLabel.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"),"g"),"\x00").replace(new RegExp(oppLabel.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"),"g"),"Your "+opp.name).replace(/\x00/g,"Foe "+me.name));
      const flipped={...newState,myParty:newOppParty,oppParty:newMyParty,myIdx:oppIdx,oppIdx:myIdx,opponentName:player.username};
      const oppNextPhase=result?"done":opp.hp<=0&&oppAlive?"forcedswitch":"action";
      battleRef.current.send({type:"broadcast",event:"state_update",payload:{state:flipped,msgs:flippedMsgs,nextPhase:oppNextPhase}});
    }
    showPvpMessages(allMsgs,()=>{
      if(result)setScreen("result");
      else if(me.hp<=0&&myAlive)setPhase("forcedswitch");
      else if(isCPU&&opp.hp<=0&&oppAlive){const ni=newOppParty.findIndex(p=>p.hp>0);if(ni>=0){const ns={...battleStateRef.current,oppIdx:ni};setBattle(ns);battleStateRef.current=ns;}setPhase("action");}
      else setPhase("action");
    });
  };

  const submitMove=(move)=>{
    const state=battleStateRef.current;if(!state)return;
    if(state.isCPU){
      const cpuMoves=getMoves(state.oppParty[state.oppIdx]);
      resolveTurn(move,cpuMoves[Math.floor(Math.random()*cpuMoves.length)],state);
      return;
    }
    setPhase("waiting");myMoveRef.current=move;
    if(battleRef.current)battleRef.current.send({type:"broadcast",event:"move",payload:{move,playerId:player.id}});
    if(state.isHost&&oppMoveRef.current){resolveTurn(move,oppMoveRef.current,state);myMoveRef.current=null;oppMoveRef.current=null;}
  };

  const switchPokemon=(idx)=>{
    const state=battleStateRef.current;const poke=state.myParty[idx];
    const ns={...state,myIdx:idx};setBattle(ns);battleStateRef.current=ns;
    setPhase("action");
    if(!state.isCPU&&battleRef.current)battleRef.current.send({type:"broadcast",event:"switch_poke",payload:{newIdx:idx,pokeName:poke.name}});
    showPvpMessages([`Go, ${poke.name}!`],()=>setPhase("action"));
  };

  if(screen==="result"){
    const won=battle?.result==="win";const draw=battle?.result==="draw";
    return(
      <div style={{textAlign:"center",padding:"40px 20px",animation:"fadeIn .4s ease"}}>
        <div style={{fontSize:56,marginBottom:10}}>{won?"🏆":draw?"🤝":"💀"}</div>
        <div style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:26,color:won?"#FCD34D":draw?"#60A5FA":"#EF4444",marginBottom:8}}>{won?"VICTORY!":draw?"DRAW!":"DEFEATED!"}</div>
        <div style={{color:"#475569",fontSize:13,marginBottom:24}}>{won?`You defeated ${battle?.opponentName}!`:draw?"A fierce battle!":battle?`${battle.opponentName} wins!`:""}</div>
        <button onClick={()=>{setScreen("lobby");setBattle(null);setMyTeam([]);myMoveRef.current=null;oppMoveRef.current=null;try{battleRef.current?.unsubscribe();}catch{}}}
          style={{padding:"12px 40px",background:"linear-gradient(135deg,#1a0050,#4c1d95)",border:"none",borderRadius:12,color:"white",fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:13,cursor:"pointer"}}>
          ← BACK TO LOBBY
        </button>
      </div>
    );
  }

  if(screen==="battle"&&battle){
    const me=battle.myParty[battle.myIdx];const opp=battle.oppParty[battle.oppIdx];
    if(!me||!opp)return null;
    const HpBar=({poke})=>{const pct=Math.max(0,(poke.hp/poke.maxHp)*100);const col=pct>50?"#34D399":pct>20?"#F59E0B":"#EF4444";return(<div style={{background:"#0F172A",borderRadius:3,height:6,overflow:"hidden",margin:"3px 0"}}><div style={{width:pct+"%",height:"100%",background:col,borderRadius:3,transition:"width .3s"}}/></div>);};
    return(
      <div style={{maxWidth:600,margin:"0 auto",fontFamily:"'Orbitron',monospace"}}>
        <div style={{background:"#080D1A",border:"1px solid #EF444433",borderRadius:14,padding:14,marginBottom:8}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
            <div><div style={{color:"#EF4444",fontSize:8}}>⚔️ {battle.opponentName.toUpperCase()}{battle.isCPU?" (CPU)":""}</div><div style={{color:"#F1F5F9",fontWeight:900,fontSize:14}}>{opp.name}</div></div>
            <div style={{color:"#94A3B8",fontSize:10}}>HP {opp.hp}/{opp.maxHp}</div>
          </div>
          <HpBar poke={opp}/>

// SHA-256 hash using Web Crypto — never store plaintext passwords
const hashPassword=async(password,username)=>{
  const msg=password+"::ptcg::"+username.toLowerCase();
  const buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
};

function LoginScreen({onLogin}){
  const [step,setStep]       =useState("name");
  const [name,setName]       =useState("");
  const [password,setPassword]=useState("");
  const [confirm,setConfirm] =useState("");
  const [isNew,setIsNew]     =useState(false);
  const [loading,setLoading] =useState(false);
  const [err,setErr]         =useState("");

  const checkName=async()=>{
    const n=name.trim();
    if(!n||n.length<2){setErr("At least 2 characters");return;}
    if(n.length>20){setErr("Max 20 characters");return;}
    if(!/^[a-zA-Z0-9_\- ]+$/.test(n)){setErr("Letters, numbers, spaces, _ and - only");return;}
    const banned=["cock","dick","pussy","cunt","fuck","shit","ass","bitch","nigger","nigga","fag","faggot","whore","slut","rape","retard","tranny","bastard","piss","cum","jizz","dildo","penis","vagina","anus","tit","boob","porn","sex","nude","naked","sniffer","licker","sucker","fucker"];
    const normalize=s=>s.toLowerCase().replace(/0/g,"o").replace(/1/g,"i").replace(/3/g,"e").replace(/4/g,"a").replace(/5/g,"s").replace(/6/g,"g").replace(/7/g,"t").replace(/8/g,"b").replace(/9/g,"g").replace(/\$/g,"s").replace(/@/g,"a").replace(/!/g,"i").replace(/\|/g,"i").replace(/\+/g,"t").replace(/[^a-z]/g,"");
    const normalized=normalize(n);
    if(banned.some(w=>normalized.includes(w))){setErr("That username isn't allowed. Please choose another.");return;}
    setLoading(true);setErr("");
    const{data}=await sb.from("players").select("id").eq("username",n).maybeSingle();
    setIsNew(!data);setStep("password");setLoading(false);
  };

  useEffect(()=>{
    const saved=lsGet("saved_creds","");
    if(saved){try{const{u,p}=JSON.parse(saved);setName(u);setPassword(p);}catch{}}
  },[]);

    const n=name.trim();
    if(!password){setErr("Enter a password");return;}

    setLoading(true);setErr("");
    AudioEngine.init();AudioEngine.resume();
    const hash=await hashPassword(password,n);

      const{data:created,error}=await sb.from("players").insert({username:n,password_hash:hash,coins:1000,total_packs:0,total_cards:0,total_sold:0,won:false,battle_runs:0,join_date:new Date().toLocaleDateString(),coins_gained_today:0,gain_date:"",flagged:false}).select().single();

      AudioEngine.startMusic();
      lsSet("saved_creds",JSON.stringify({u:n,p:password}));
      onLogin(created);
    } else {
      const{data}=await sb.from("players").select("*").eq("username",n).eq("password_hash",hash).maybeSingle();

      AudioEngine.startMusic();
      lsSet("saved_creds",JSON.stringify({u:n,p:password}));
      onLogin(data);
    }
  };

  return(
    <div style={{minHeight:"100vh",background:"radial-gradient(ellipse 120% 60% at 50% -5%,#0d1f3a,#04080f 55%)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:20,position:"relative",overflow:"hidden"}}>

      {[["🔥","15%","20%"],["💧","80%","15%"],["⚡","25%","75%"],["🌿","70%","70%"],["🔮","50%","88%"],["🐉","88%","45%"]].map(([e,t,l],i)=>(
        <div key={i} style={{position:"absolute",top:t,left:l,fontSize:32,opacity:.06,animation:`floatAnim ${3+i*.4}s ease-in-out infinite`,animationDelay:`${i*.5}s`,pointerEvents:"none"}}>{e}</div>

/* Type advantage chart — attacker type → types it hits for 2× */
const TYPE_CHART={
  Fire:    ["Grass","Ice","Bug","Steel"],
  Water:   ["Fire","Ground","Rock"],
  Electric:["Water","Flying"],
  Grass:   ["Water","Ground","Rock"],
  Ice:     ["Grass","Ground","Dragon","Flying"],
  Fighting:["Normal","Ice","Rock","Dark","Steel"],
  Poison:  ["Grass","Fairy"],
  Ground:  ["Fire","Electric","Poison","Rock","Steel"],
  Flying:  ["Grass","Fighting","Bug"],
  Psychic: ["Fighting","Poison"],
  Bug:     ["Grass","Psychic","Dark"],
  Rock:    ["Fire","Ice","Flying","Bug"],
  Ghost:   ["Psychic","Ghost"],
  Dragon:  ["Dragon"],
  Dark:    ["Psychic","Ghost"],
  Steel:   ["Ice","Rock","Fairy"],
  Fairy:   ["Fighting","Dragon","Dark"],
  Normal:  [],
};
const getTypeMultiplier=(atkType,defType)=>{
  if(!atkType||!defType)return 1;
  return (TYPE_CHART[atkType]||[]).includes(defType)?2:1;
};

  const r=card.rarity;
  if(r==="GOLDEN"||r==="Mega")    return{name:"Rampage", desc:"Hits twice!", icon:"💥", color:"#FF4500"};

  return null;
};

const makeEnemy=(rarities,floor,areaIdx,diffScale=1,presScale=1)=>{
  const pool=CARDS.filter(c=>rarities.includes(c.rarity));
  const base=pool[Math.floor(Math.random()*pool.length)]||CARDS[0];
  const scale=(1+areaIdx*0.08+floor*0.04)*diffScale*presScale;
  return{...base,uid:"enemy",hp:Math.round(base.hp*0.3*scale),maxHp:Math.round(base.hp*0.3*scale),dmg:Math.round(base.dmg*0.2*scale+3),isEnemy:true};
};
