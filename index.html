                              {owned&&<div style={{color:"#334155",fontSize:6,marginTop:1}}>{card.bp.toLocaleString()}🪙</div>}
                              {!owned&&<div style={{color:"#1E293B",fontSize:6,marginTop:1}}>not found</div>}
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  );
                })}
              </div>
            );
          })}
        </>
      )}
    </div>
  );
}



/* ══════════════════════════════════════════════════ STOCK MARKET */
// All pokemon stocks — derived from CARDS at runtime so it's always complete
const getStockList=()=>CARDS; // all 352+ pokemon

const BANK_LEVEL=10;
const CC_MARKET_CAP=100+3*(BANK_LEVEL-1); // 127

// Resting value based on rarity rather than index (so it scales nicely)
const RARITY_REST={Common:8,Uncommon:14,Rare:22,Epic:40,Legendary:70,"Ultra Rare":95,Secret:110,Mega:400};
const ccRest2=card=>RARITY_REST[card.rarity]||10;

const ccRnd=(a,b)=>a+(b-a)*Math.random();

function ccPickMode(){
  const r=Math.random();
  if(r<.125)return 0; if(r<.375)return 1; if(r<.625)return 2;
  if(r<.750)return 3; if(r<.875)return 4; return 5;
}

function ccInitStock2(card){
  return{id:card.id,value:ccRest2(card),delta:0,mode:ccPickMode(),modeTicks:Math.floor(ccRnd(10,299))};
}

function ccLoadStocks2(){
  try{
    const s=lsGet("cc_stocks_v3","");
    if(s){
      const p=JSON.parse(s);
      const list=getStockList();
      if(Array.isArray(p)&&p.length===list.length)return p;
    }
  }catch{}
  return getStockList().map(c=>ccInitStock2(c));
}
function ccSaveStocks2(st){lsSet("cc_stocks_v3",JSON.stringify(st));}

function ccTick2(stocks){
  const globalEvent=Math.random()<0.10;
  let globD=0; if(globalEvent) globD=ccRnd(-1,1);
  const list=getStockList();
  return stocks.map((s,idx)=>{
    const card=list.find(c=>c.id===s.id)||list[idx]||list[0];
    let{value,delta,mode,modeTicks}=s;
    delta*=0.97;
    value+=(ccRest2(card)-value)*0.01;
    value+=3*Math.pow(ccRnd(-1,1),11);
    delta+=ccRnd(-0.05,0.05);
    if(Math.random()<0.15)value+=ccRnd(-1.5,1.5);
    if(Math.random()<0.03)value+=ccRnd(-5,5);
    if(Math.random()<0.10)delta+=ccRnd(-0.15,0.15);
    modeTicks--;
    if(modeTicks<=0){
      if(mode===3||mode===4){mode=Math.random()<0.70?5:ccPickMode();}
      else{mode=ccPickMode();}
      modeTicks=Math.floor(ccRnd(10,299));
    }
    if(mode===0){delta*=0.95;delta+=ccRnd(-0.025,0.025);}
    else if(mode===1){delta*=0.99;delta+=ccRnd(-0.005,0.045);}
    else if(mode===2){delta*=0.99;delta+=ccRnd(-0.045,0.005);}
    else if(mode===3){value+=ccRnd(0,5);delta+=ccRnd(-0.015,0.135);if(Math.random()<0.30){value+=ccRnd(-7,3);delta+=ccRnd(-0.05,0.05);}if(Math.random()<0.03){mode=4;modeTicks=Math.floor(ccRnd(10,299));}}
    else if(mode===4){value+=ccRnd(-5,0);delta+=ccRnd(-0.135,0.015);if(Math.random()<0.30){value+=ccRnd(-3,7);delta+=ccRnd(-0.05,0.05);}}
    else if(mode===5){delta+=ccRnd(-0.15,0.15);if(Math.random()<0.50)value+=ccRnd(-5,5);if(Math.random()<0.20)delta=ccRnd(-1,1);}
    value+=delta;
    if(globalEvent&&Math.random()<0.25){
      value+=-globD*(2+7*Math.pow(Math.random(),3)+7*delta*Math.pow(Math.random(),3));
      delta+=globD*ccRnd(1,5);
      mode=ccPickMode();modeTicks=Math.floor(ccRnd(10,299));
    }
    if(value<5){value+=(5-value)/2;if(delta<0)delta*=0.95;}
    if(value<1)value=1;
    if(value>CC_MARKET_CAP&&delta>0)delta*=0.90;
    // Mega cards hard cap at 80,000
    if(card?.rarity==="Mega"&&value>80000){value=80000;delta=delta>0?0:delta;}
    return{id:s.id,value:Math.round(value*10)/10,delta,mode,modeTicks};
  });
}

const CC_MODE_INFO=[
  {name:"STABLE",color:"#60A5FA"},{name:"SLOW RISE",color:"#34D399"},
  {name:"SLOW FALL",color:"#F87171"},{name:"FAST RISE",color:"#10B981"},
  {name:"FAST FALL",color:"#EF4444"},{name:"CHAOTIC",color:"#C084FC"},
];

function StockMarket({player,notify,setDbPlayer}){
  const [stocks,  setStocks  ]=React.useState(()=>ccLoadStocks2());
  const [history, setHistory ]=React.useState(()=>{try{return JSON.parse(lsGet("cc_hist_v3","{}"));}catch{return {};}});
  const [holdings,setHoldings]=React.useState(()=>{try{return JSON.parse(lsGet("cc_hold2_"+(player?.id||""),"{}"));}catch{return {};}});
  const [qty,     setQty     ]=React.useState(1);
  const [tab,     setTab     ]=React.useState("market");
  const [selId,   setSelId   ]=React.useState(null);
  const [ticker,  setTicker  ]=React.useState(60);
  const [search,  setSearch  ]=React.useState("");
  const [rarFilter,setRarFilter]=React.useState("All");
  const [page,    setPage    ]=React.useState(0);
  const PAGE_SIZE=30;
  const playerRef=React.useRef(player);
  React.useEffect(()=>{playerRef.current=player;},[player]);

  React.useEffect(()=>{
    const iv=setInterval(()=>{
      setStocks(prev=>{
        // Run 12 ticks worth of simulation per 60s interval (same per-minute movement as old 5s ticks)
        let next=prev;
        for(let i=0;i<12;i++) next=ccTick2(next);
        ccSaveStocks2(next);
        setHistory(h=>{
          const nh={...h};
          next.forEach(s=>{const a=[...(nh[s.id]||[]),s.value];nh[s.id]=a.slice(-40);});
          lsSet("cc_hist_v3",JSON.stringify(nh));
          return nh;
        });
        return next;
      });
      setTicker(60);
    },60000);
    const cd=setInterval(()=>setTicker(t=>t>1?t-1:60),1000);
    return()=>{clearInterval(iv);clearInterval(cd);};
    return()=>{clearInterval(iv);clearInterval(cd);};
  },[]);

  const saveHoldings=h=>{setHoldings(h);lsSet("cc_hold2_"+(player?.id||""),JSON.stringify(h));};

  const buy=(cardId,shares)=>{
    const s=stocks.find(x=>x.id===cardId);if(!s)return;
    const total=Math.round(s.value*shares);
    if((playerRef.current?.coins||0)<total){notify("Not enough coins!","#EF4444");return;}
    const h={...holdings};
    const cur=h[cardId]||{shares:0,avgBuy:s.value};
    const ns=cur.shares+shares;
    h[cardId]={shares:ns,avgBuy:Math.round((cur.shares*cur.avgBuy+shares*s.value)/ns*10)/10};
    saveHoldings(h);
    const newCoinsB=Math.round((playerRef.current.coins||0)-total);
    sb.from("players").update({coins:newCoinsB}).eq("id",playerRef.current.id);
    setDbPlayer(p=>({...p,coins:newCoinsB}));
    updateDailyStat(playerRef.current.id,"stocksBought",shares);
    notify(`Bought ${shares}× ${CARDS.find(c=>c.id===cardId)?.name} for ${total}🪙`,"#34D399");
  };

  const sell=(cardId,shares)=>{
    const h={...holdings};const cur=h[cardId];
    if(!cur||cur.shares<shares){notify("Not enough shares!","#EF4444");return;}
    const s=stocks.find(x=>x.id===cardId);
    const total=Math.round((s?.value||10)*shares);
    const ns=cur.shares-shares;
    if(ns===0)delete h[cardId];else h[cardId]={...cur,shares:ns};
    saveHoldings(h);
    const newCoinsS=Math.round((playerRef.current.coins||0)+total);
    sb.from("players").update({coins:newCoinsS}).eq("id",playerRef.current.id);
    setDbPlayer(p=>({...p,coins:newCoinsS}));
    notify(`Sold ${shares}× ${CARDS.find(c=>c.id===cardId)?.name} for ${total}🪙`,"#34D399");
  };

  const portValue=Object.entries(holdings).reduce((s,[id,h])=>s+h.shares*(stocks.find(x=>x.id===parseInt(id))?.value||0),0);
  const portCost =Object.entries(holdings).reduce((s,[id,h])=>s+h.shares*h.avgBuy,0);
  const pnl=Math.round(portValue-portCost);

  const MiniChart=({cardId,width=90,height=28})=>{
    const hist=(history[cardId]||[]).slice(-15);
    if(hist.length<2)return <div style={{height}}/>;
    const mn=Math.min(...hist),mx=Math.max(...hist),range=mx-mn||1;
    const pts=hist.map((v,i)=>`${Math.round(i/(hist.length-1)*width)},${Math.round(height-((v-mn)/range)*(height-2)+1)}`).join(" ");
    const up=hist[hist.length-1]>=hist[0];
    const col=up?"#34D399":"#EF4444";
    return(
      <svg width={width} height={height} style={{display:"block",overflow:"hidden"}}>
        <defs><linearGradient id={`g2_${cardId}`} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={col} stopOpacity=".3"/><stop offset="100%" stopColor={col} stopOpacity="0"/></linearGradient></defs>
        <polygon points={`0,${height} ${pts} ${width},${height}`} fill={`url(#g2_${cardId})`}/>
        <polyline points={pts} fill="none" stroke={col} strokeWidth="1.5" strokeLinejoin="round"/>
      </svg>
    );
  };

  // Filtered + paginated list for market tab

    if(rarFilter!=="All"&&card.rarity!==rarFilter)return false;
    return true;
  });

  React.useEffect(()=>setPage(0),[search,rarFilter]);

  // Top movers

    const ah=history[a.id]||[];const bh=history[b.id]||[];
    const aChg=ah.length>1?((ah[ah.length-1]-ah[ah.length-2])/ah[ah.length-2]*100):0;
    const bChg=bh.length>1?((bh[bh.length-1]-bh[bh.length-2])/bh[bh.length-2]*100):0;
    return Math.abs(bChg)-Math.abs(aChg);
  }).slice(0,5);

  return(
    <div style={{animation:"fadeIn .3s ease"}}>

          <h1 style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:"clamp(18px,4vw,26px)",margin:0}}>
            📈 <span style={{color:"#34D399"}}>PIKA</span><span style={{color:"#60A5FA"}}>STOCKS</span>

          <p style={{color:"#334155",fontSize:10,margin:"3px 0 0"}}>{allCards.length} Pokémon · Cookie Clicker engine · 6 modes · global events · 60s ticks</p>
        </div>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          <div style={{background:"#080D1A",border:"1px solid #1E293B",borderRadius:8,padding:"5px 10px",textAlign:"center"}}>
            <div style={{color:"#475569",fontSize:7,fontFamily:"'Orbitron',monospace"}}>CAP</div>
            <div style={{color:"#60A5FA",fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:14,lineHeight:1}}>{CC_MARKET_CAP}🪙</div>
          </div>
        </div>
      </div>

      {/* Stats + tabs */}
      <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap",alignItems:"center"}}>

          <span style={{color:"#FCD34D",fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:13}}>{Math.round(portValue)}🪙</span>
        </div>
        <div style={{background:"#080D1A",border:`1px solid ${pnl>=0?"#34D39933":"#EF444433"}`,borderRadius:9,padding:"6px 12px"}}>

          <span style={{color:pnl>=0?"#34D399":"#EF4444",fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:13}}>{pnl>=0?"+":""}{pnl}🪙</span>
        </div>
        {[["market","📊 MARKET"],["movers","🔥 MOVERS"],["portfolio","💼 MINE"]].map(([t,l])=>(
          <button key={t} onClick={()=>setTab(t)} style={{padding:"6px 12px",borderRadius:8,border:`1px solid ${tab===t?"#60A5FA55":"#1E293B"}`,background:tab===t?"#60A5FA14":"transparent",color:tab===t?"#60A5FA":"#475569",fontFamily:"'Orbitron',monospace",fontSize:9,fontWeight:700,cursor:"pointer"}}>{l}</button>

function CookPage({collection,player,notify,setDbPlayer,loadCollection}){
  const [selected,setSelected]=useState([]);
  const [cooking,setCooking]=useState(false);
  const [usedBrews,setUsedBrews]=useState([]);
  const [potions,setPotions]=useState(()=>{try{return parseInt(lsGet("potions_"+lsGet("current_uid",""),"0"))||0;}catch{return 0;}});

  const RECIPES=[
    {name:"Weak Brew",    count:3, rarity:"Rare",      luck:3,  color:"#60A5FA", desc:"3 Rares → +3 luck on next pack",          emoji:"🧪"},
    {name:"Lucky Stew",   count:3, rarity:"Epic",      luck:6,  color:"#C084FC", desc:"3 Epics → +6 luck on next pack",           emoji:"🍲"},
    {name:"Power Potion", count:3, rarity:"Legendary", luck:10, color:"#FCD34D", desc:"3 Legendaries → +10 luck on next pack",    emoji:"⚗️"},
    {name:"Mega Elixir",  count:2, rarity:"Ultra Rare",luck:18, color:"#FF6B35", desc:"2 Ultra Rares → +18 luck on next pack",    emoji:"✨"},
  ];

  const getCookable=(rarity)=>collection.filter(c=>!c.isPersonal&&c.rarity===rarity);
  const cookable=collection.filter(c=>!c.isPersonal&&RECIPES.some(r=>r.rarity===c.rarity));
  const toggle=(uid)=>setSelected(s=>s.includes(uid)?s.filter(x=>x!==uid):[...s,uid]);

  const cook=async(recipe)=>{
    const validSelected=selected.filter(uid=>{const card=cookable.find(c=>c.uid===uid);return card&&card.rarity===recipe.rarity;});
    if(validSelected.length<recipe.count){notify(`Need ${recipe.count} ${recipe.rarity} cards selected!`,"#EF4444");return;}
    const toUse=validSelected.slice(0,recipe.count);
    setCooking(true);
    for(let i=0;i<toUse.length;i+=100) await sb.from("collection").delete().in("uid",toUse.slice(i,i+100));
    const uid=lsGet("current_uid","");
    const newPotions=potions+1;
    const luckKey="potion_luck_"+(player?.id||"");
    const curLuck=parseInt(lsGet(luckKey,"0"))||0;
    const MAX_POTION_LUCK=25;
    const newLuck=Math.min(MAX_POTION_LUCK,curLuck+recipe.luck);
    lsSet(luckKey,String(newLuck));
    lsSet("potions_"+uid,String(newPotions));
    setPotions(newPotions);
    setUsedBrews(u=>[...u,recipe.name]);
    setSelected([]);
    await loadCollection(player.id);
    updateDailyStat(player.id,"brewsToday");
    notify(`${recipe.emoji} ${recipe.name} brewed! +${recipe.luck} luck → ${newLuck}× total (max ${MAX_POTION_LUCK}×)`,"#34D399");
    setCooking(false);
  };

  const activeLuck=parseInt(lsGet("potion_luck_"+(player?.id||""),"0"))||0;

  return(
    <div style={{animation:"fadeIn .3s ease"}}>
      <h1 style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:"clamp(18px,4vw,24px)",marginBottom:4}}>⚗️ <span style={{color:"#F472B6"}}>POTIONS</span></h1>
      <p style={{color:"#334155",fontSize:11,marginBottom:16}}>Sacrifice higher-rarity cards to brew luck potions · luck adds up (max 25×) · consumed on next pack</p>
      {activeLuck>0&&(
        <div style={{background:"linear-gradient(135deg,#0a1a0a,#0f2a10)",border:"2px solid #34D39988",borderRadius:12,padding:"12px 16px",marginBottom:16,display:"flex",alignItems:"center",gap:12}}>
          <span style={{fontSize:28}}>✨</span>
          <div>
            <div style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:12,color:"#34D399"}}>POTION ACTIVE: +{activeLuck}× LUCK</div>
            <div style={{color:"#1e4a1e",fontSize:10,marginTop:2}}>Will be consumed on your next pack open</div>
          </div>
        </div>
      )}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:10,marginBottom:20}}>
        {RECIPES.map(r=>{
          const validCount=selected.filter(uid=>{const card=cookable.find(c=>c.uid===uid);return card&&card.rarity===r.rarity;}).length;
          const canMake=validCount>=r.count;
          const availableCount=getCookable(r.rarity).length;
          const rc=RARITY_CFG[r.rarity]||RARITY_CFG.Common;
          return(
            <div key={r.name} style={{background:"#080D1A",border:`1px solid ${r.color}33`,borderRadius:12,padding:16}}>
              <div style={{fontSize:28,marginBottom:6,textAlign:"center"}}>{r.emoji}</div>
              <div style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:11,color:r.color,textAlign:"center",marginBottom:4}}>{r.name}</div>
              <div style={{color:"#334155",fontSize:9,textAlign:"center",marginBottom:6,lineHeight:1.5}}>{r.desc}</div>
              <div style={{textAlign:"center",marginBottom:10}}>
                <span style={{background:rc.color+"18",border:`1px solid ${rc.color}44`,borderRadius:6,padding:"2px 8px",color:rc.color,fontSize:7,fontFamily:"'Orbitron',monospace"}}>{r.rarity} only · you have {availableCount}</span>
              </div>
              {(()=>{
                const already=usedBrews.includes(r.name);
                const disabled=already||!canMake||cooking;
                return(
                  <button onClick={()=>cook(r)} disabled={disabled} style={{width:"100%",padding:"8px",background:already?"#0a0a15":canMake?`linear-gradient(135deg,${r.color}44,${r.color}22)`:"#0F172A",border:`1px solid ${already?"#1E293B":canMake?r.color+"88":"#1E293B"}`,borderRadius:8,color:already?"#1E293B":canMake?r.color:"#334155",fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:9,cursor:disabled?"not-allowed":"pointer"}}>
                    {already?"✓ ALREADY BREWED":cooking?"BREWING...":canMake?`BREW (${r.count} ${r.rarity}s)`:`NEED ${r.count-validCount} MORE ${r.rarity.toUpperCase()}`}
                  </button>
                );
              })()}
            </div>
          );
        })}
      </div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10,flexWrap:"wrap",gap:8}}>
        <div style={{fontFamily:"'Orbitron',monospace",fontSize:10,color:"#475569",letterSpacing:2}}>SELECT CARDS ({selected.length} selected)</div>
        <div style={{display:"flex",gap:6}}>
          <button onClick={()=>setSelected(cookable.map(c=>c.uid))} style={{padding:"4px 12px",borderRadius:8,border:"1px solid #34D39955",background:"#34D39918",color:"#34D399",fontFamily:"'Orbitron',monospace",fontSize:8,fontWeight:700,cursor:"pointer"}}>SELECT ALL</button>
          {selected.length>0&&<button onClick={()=>setSelected([])} style={{padding:"4px 12px",borderRadius:8,border:"1px solid #EF444455",background:"#EF444418",color:"#EF4444",fontFamily:"'Orbitron',monospace",fontSize:8,fontWeight:700,cursor:"pointer"}}>CLEAR</button>}
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(80px,1fr))",gap:6,maxHeight:400,overflowY:"auto",padding:4}}>
        {cookable.map(card=>{
          const rc=RARITY_CFG[card.rarity]||RARITY_CFG.Common;
          const sel=selected.includes(card.uid);
          return(
            <div key={card.uid} onClick={()=>toggle(card.uid)} style={{background:sel?rc.color+"22":rc.color+"08",border:`2px solid ${sel?rc.color:rc.color+"33"}`,borderRadius:8,padding:6,cursor:"pointer",textAlign:"center",transition:"all .15s",transform:sel?"scale(1.05)":"scale(1)"}}>
              <img src={ART(card.id)} alt={card.name} style={{width:44,height:44,objectFit:"contain",imageRendering:"pixelated",opacity:sel?1:.7}} onError={e=>{e.target.src=MINI(card.id);e.target.style.imageRendering="pixelated";}}/>
              <div style={{color:sel?rc.color:"#94A3B8",fontFamily:"'Orbitron',monospace",fontSize:6,fontWeight:700,marginTop:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{card.name}</div>
              <div style={{color:rc.color,fontSize:6,opacity:.7}}>{card.rarity}</div>
              {sel&&<div style={{color:rc.color,fontSize:8}}>✓</div>}
            </div>
          );
        })}
        {cookable.length===0&&<div style={{color:"#1E293B",fontSize:11,padding:20,gridColumn:"1/-1",textAlign:"center",fontFamily:"'Orbitron',monospace"}}>No Rare+ cards to brew with</div>}
      </div>
    </div>
  );
}

const getDailySeed=()=>{const d=new Date();return d.getFullYear()*10000+d.getMonth()*100+d.getDate();};
const seededRand=(seed,i)=>{let x=Math.sin(seed*9301+i*49297+233)*233280;return x-Math.floor(x);};
const updateDailyStat=(pid,key,n=1)=>{const sk=`daily_stats_${pid}_${getDailySeed()}`;try{const s=JSON.parse(lsGet(sk,"{}"));s[key]=(s[key]||0)+n;lsSet(sk,JSON.stringify(s));}catch{}};
const _cpKey=(pid)=>"challenge_pts_"+pid;
const getChallengePoints=(pid)=>{try{return parseInt(lsGet(_cpKey(pid),"0"))||0;}catch{return 0;}};
const addChallengePoints=(pid,n)=>lsSet(_cpKey(pid),String(getChallengePoints(pid)+n));
const spendChallengePoints=(pid,n)=>{const cur=getChallengePoints(pid);if(cur<n)return false;lsSet(_cpKey(pid),String(cur-n));return true;};

const getTodaysChallenges=()=>{
  const seed=getDailySeed();const picked=[];const used=new Set();
  for(let i=0;picked.length<3;i++){const idx=Math.floor(seededRand(seed,i)*ALL_CHALLENGES.length);if(!used.has(idx)){used.add(idx);picked.push(ALL_CHALLENGES[idx]);}}
  return picked;
};

function DailyChallenges({player,collection,notify,loadCollection}){
  const todaysKey=`daily_ch_${player.id}_${getDailySeed()}`;
  const [completed,setCompleted]=useState(()=>{try{return JSON.parse(lsGet(todaysKey,"[]"));}catch{return [];}});
  const [pts,setPts]=useState(()=>getChallengePoints(player.id));
  const [tab,setTab]=useState("challenges");
  const [redeeming,setRedeeming]=useState(null);
  const challenges=getTodaysChallenges();
  const statsKey=`daily_stats_${player.id}_${getDailySeed()}`;
  const getStats=()=>{try{return JSON.parse(lsGet(statsKey,"{}"));}catch{return {};}};

  React.useEffect(()=>{
    const stats=getStats();
    const newCompleted=[...completed];let earned=0;
    challenges.forEach(ch=>{
      if(newCompleted.includes(ch.id))return;
      if(ch.check(player,collection,stats)){newCompleted.push(ch.id);earned+=ch.pts;}
    });
    if(earned>0){
      addChallengePoints(player.id,earned);
      const np=getChallengePoints(player.id);setPts(np);
      setCompleted(newCompleted);lsSet(todaysKey,JSON.stringify(newCompleted));
      notify(`🏅 Challenge complete! +${earned} pts → ${np} total`,"#FCD34D");
    }
  },[collection.length,player.coins]);

  const redeem=async(item)=>{
    if(pts<item.pts){notify("Not enough points!","#EF4444");return;}
    if(!spendChallengePoints(player.id,item.pts)){notify("Not enough points!","#EF4444");return;}
    setRedeeming(item.id);
    const cardDef=ALL_CARDS.find(c=>c.id===item.cardId)||CARDS.find(c=>c.id===item.cardId);
    if(!cardDef){notify("Card not found","#EF4444");addChallengePoints(player.id,item.pts);setRedeeming(null);return;}
    const row={player_id:player.id,card_id:cardDef.id,card_name:cardDef.name,rarity:cardDef.rarity,buy_price:cardDef.bp||10,obtained_at:new Date().toLocaleDateString(),uid:crypto.randomUUID()};
    const{error}=await sb.from("collection").insert(row);
    if(error){notify("Failed: "+error.message,"#EF4444");addChallengePoints(player.id,item.pts);setRedeeming(null);return;}
    const np=getChallengePoints(player.id);setPts(np);
    await loadCollection(player.id);
    notify(`✅ Redeemed ${item.name}! (${np} pts remaining)`,"#34D399");
    setRedeeming(null);
  };

                  </div>
                </div>
              );
            })}
          </div>
          <div style={{background:"#080D1A",border:"1px solid #1E293B33",borderRadius:10,padding:"12px 16px"}}>
            <div style={{color:"#334155",fontSize:10,fontFamily:"'Orbitron',monospace",letterSpacing:1,marginBottom:6}}>HOW TO EARN POINTS</div>
            <div style={{color:"#475569",fontSize:10,lineHeight:1.7}}>Open packs · Sell cards · Win battles · Evolve Pokémon · Brew potions · Buy stocks<br/>Challenges refresh daily. Points carry over forever.</div>
          </div>
        </>
      )}
      {tab==="shop"&&(
        <>
          <div style={{color:"#334155",fontFamily:"'Orbitron',monospace",fontSize:8,letterSpacing:1,marginBottom:12}}>REDEEM POINTS FOR SPECIFIC POKÉMON · YOU HAVE {pts} PTS</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:10}}>
            {CHALLENGE_SHOP.map(item=>{
              const rc=RARITY_CFG[item.rarity]||RARITY_CFG.Common;
              const canAfford=pts>=item.pts;
              const isRedeeming=redeeming===item.id;
              return(
                <div key={item.id} style={{background:"#080D1A",border:`2px solid ${rc.color}33`,borderRadius:14,padding:14,textAlign:"center",opacity:canAfford?1:0.6,transition:"border .2s"}}
                  onMouseEnter={e=>{if(canAfford)e.currentTarget.style.border=`2px solid ${rc.color}88`;}}
                  onMouseLeave={e=>{e.currentTarget.style.border=`2px solid ${rc.color}33`;}}>
                  <img src={ART(item.cardId)} alt={item.name} style={{width:64,height:64,objectFit:"contain",imageRendering:"pixelated",filter:`drop-shadow(0 0 8px ${rc.color}66)`}} onError={e=>{e.target.src=MINI(item.cardId);e.target.style.imageRendering="pixelated";}}/>
                  <div style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:11,color:rc.color,marginTop:6,marginBottom:2}}>{item.name}</div>
                  <div style={{color:"#475569",fontSize:8,marginBottom:8}}>{item.desc}</div>
                  <div style={{background:"#FCD34D18",border:"1px solid #FCD34D44",borderRadius:6,padding:"3px 0",color:"#FCD34D",fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:11,marginBottom:8}}>{item.pts} pts</div>
                  <button onClick={()=>redeem(item)} disabled={!canAfford||!!redeeming}
                    style={{width:"100%",padding:"7px",background:canAfford&&!redeeming?`linear-gradient(135deg,${rc.color}44,${rc.color}22)`:"#0F172A",border:`1px solid ${canAfford&&!redeeming?rc.color+"88":"#1E293B"}`,borderRadius:8,color:canAfford&&!redeeming?rc.color:"#334155",fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:9,cursor:canAfford&&!redeeming?"pointer":"not-allowed"}}>
                    {isRedeeming?"REDEEMING...":canAfford?"REDEEM":"NEED MORE PTS"}
                  </button>
                </div>
              );
            })}
          </div>
        </>
      )}
    </div>
  );
}

function AchievementsPage({player,collection,notify,setDbPlayer}){
  const [claimed,setClaimed]=useState(()=>{
    try{return JSON.parse(lsGet(`ach_${player.id}`)||"[]");}catch{return[];}
  });
  const [claiming,setClaiming]=useState(null);

  const cats=["all","collection","rarity","economy","battle","special"];
  const [catFilter,setCatFilter]=useState("all");

  const claimAch=async(ach)=>{
    if(claiming)return;
    setClaiming(ach.id);
    const newCoins=player.coins+ach.reward;
    await sb.from("players").update({coins:newCoins}).eq("id",player.id);
    setDbPlayer(p=>({...p,coins:newCoins}));
    const newClaimed=[...claimed,ach.id];
    setClaimed(newClaimed);
    lsSet(`ach_${player.id}`,JSON.stringify(newClaimed));
    notify(`🏆 ${ach.name} · +${ach.reward}🪙`,"#FCD34D");
    setClaiming(null);
  };

  const completed=ACHIEVEMENTS.filter(a=>a.check(player,collection));
  const claimable=completed.filter(a=>!claimed.includes(a.id));
  const filtered=ACHIEVEMENTS.filter(a=>catFilter==="all"||a.cat===catFilter);
  const totalReward=ACHIEVEMENTS.reduce((s,a)=>s+a.reward,0);
  const claimedReward=ACHIEVEMENTS.filter(a=>claimed.includes(a.id)).reduce((s,a)=>s+a.reward,0);

  return(
    <div style={{animation:"fadeIn .3s ease"}}>
      <h1 style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:"clamp(18px,4vw,26px)",marginBottom:4}}>
        ACHIEVEMENTS <span style={{color:"#FCD34D"}}>{claimable.length>0&&`(${claimable.length} ready!)`}</span>
      </h1>
      <p style={{color:"#334155",fontSize:11,marginBottom:16}}>Complete goals to earn bonus coins · {claimed.length}/{ACHIEVEMENTS.length} done</p>

      {/* Progress */}
      <div style={{background:"#080D1A",border:"1px solid #FCD34D22",borderRadius:14,padding:16,marginBottom:16}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
          <span style={{fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:12,color:"#FCD34D"}}>{claimed.length} / {ACHIEVEMENTS.length}</span>
          <span style={{fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:11,color:"#10B981"}}>{claimedReward.toLocaleString()} / {totalReward.toLocaleString()}🪙 earned</span>
        </div>
        <div style={{background:"#0F172A",borderRadius:6,height:8,overflow:"hidden"}}>
          <div style={{background:"linear-gradient(90deg,#92400e,#FCD34D)",height:"100%",width:(claimed.length/ACHIEVEMENTS.length*100)+"%",borderRadius:6,transition:"width .8s ease"}}/>
        </div>
      </div>

      {/* Claim all button */}
      {claimable.length>0&&(
        <button onClick={async()=>{for(const a of claimable)await claimAch(a);}} style={{width:"100%",padding:"11px",background:"linear-gradient(135deg,#78350F,#F59E0B)",border:"none",borderRadius:10,color:"white",fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:11,cursor:"pointer",letterSpacing:1,marginBottom:14}}>
          🎁 CLAIM ALL ({claimable.reduce((s,a)=>s+a.reward,0).toLocaleString()}🪙)
        </button>
      )}

      {/* Category filter */}
      <div style={{display:"flex",gap:5,marginBottom:14,flexWrap:"wrap"}}>
        {cats.map(c=>{
          const colors={all:"#60A5FA",collection:"#34D399",rarity:"#C084FC",economy:"#FCD34D",battle:"#EF4444",special:"#FF4500"};
          const col=colors[c]||"#60A5FA";
          const active=catFilter===c;
          return<button key={c} onClick={()=>setCatFilter(c)} style={{padding:"5px 12px",borderRadius:16,border:`1px solid ${active?col:col+"33"}`,background:active?col+"18":"transparent",color:active?col:"#334155",fontFamily:"'Orbitron',monospace",fontSize:7,fontWeight:700,cursor:"pointer",textTransform:"uppercase"}}>{c}</button>;
        })}
      </div>

      {/* Achievement list */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:10}}>
        {filtered.map(ach=>{
          const done=completed.some(a=>a.id===ach.id);
          const isClaimed=claimed.includes(ach.id);
          const readyToClaim=done&&!isClaimed;
          const colors={collection:"#34D399",rarity:"#C084FC",economy:"#FCD34D",battle:"#EF4444",special:"#FF4500"};
          const catColor=colors[ach.cat]||"#60A5FA";
          return(
            <div key={ach.id} style={{background:readyToClaim?"linear-gradient(135deg,#1a1200,#2a1e00)":isClaimed?"#05080f":"#080D1A",border:`1px solid ${readyToClaim?"#FCD34D44":isClaimed?"#1E293B":"#0A0F1E"}`,borderRadius:12,padding:14,display:"flex",gap:12,alignItems:"center",transition:"all .2s",opacity:isClaimed?0.6:1}}>
              <div style={{fontSize:28,flexShrink:0,filter:!done&&!isClaimed?"grayscale(1) opacity(0.3)":"none"}}>{ach.icon}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:10,color:isClaimed?"#475569":readyToClaim?"#FCD34D":"#94A3B8",marginBottom:2}}>{ach.name}</div>
                <div style={{color:"#334155",fontSize:9,marginBottom:4}}>{ach.desc}</div>
                <div style={{display:"flex",gap:6,alignItems:"center"}}>
                  <span style={{color:catColor,fontSize:7,fontFamily:"'Orbitron',monospace",fontWeight:700,background:catColor+"15",borderRadius:4,padding:"1px 5px"}}>{ach.cat.toUpperCase()}</span>
                  <span style={{color:"#FCD34D",fontFamily:"'Share Tech Mono',monospace",fontSize:9,fontWeight:700}}>+{ach.reward}🪙</span>
                </div>
              </div>
              <div style={{flexShrink:0}}>
                {isClaimed?<span style={{color:"#334155",fontSize:14}}>✓</span>
                :readyToClaim?<button onClick={()=>claimAch(ach)} disabled={!!claiming} style={{padding:"6px 12px",background:"linear-gradient(135deg,#78350F,#F59E0B)",border:"none",borderRadius:7,color:"white",fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:8,cursor:"pointer",whiteSpace:"nowrap"}}>CLAIM</button>
                :<span style={{color:"#1E293B",fontSize:12}}>🔒</span>}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function SurgeSelector(){
  const SURGE_TYPES=["None","Fire","Water","Grass","Electric","Psychic","Ice","Dragon","Dark","Fairy","Normal","Fighting","Rock","Ground","Steel","Ghost","Bug","Flying","Poison"];
  const [surgeType,setSurgeType]=useState(()=>lsGet("surge_type","None"));
  const surgeActive=surgeType!=="None";
  return(
    <div style={{background:"linear-gradient(135deg,#0a0f1a,#111827)",border:`1px solid ${surgeActive?"#F59E0B88":"#1E293B"}`,borderRadius:14,padding:"14px 16px",marginBottom:16}}>
      <div style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:9,color:"#F59E0B",letterSpacing:2,marginBottom:6}}>⚡ TYPE SURGE · boost a type drop rate · costs +200🪙/pack</div>
      <div style={{color:"#334155",fontSize:9,marginBottom:10}}>Pick a type — cards of that type get 3× weight in every pack you open</div>
      <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:6}}>
        {SURGE_TYPES.map(t=>{
          const active=surgeType===t;
          const emoji={Fire:"🔥",Water:"💧",Grass:"🌿",Electric:"⚡",Psychic:"🔮",Ice:"❄️",Dragon:"🐉",Dark:"🌑",Fairy:"✨",Normal:"⭐",Fighting:"👊",Rock:"🪨",Ground:"🏜️",Steel:"⚙️",Ghost:"👻",Bug:"🐛",Flying:"🌪️",Poison:"☠️",None:"🚫"}[t]||"";
          const tc=TYPE_COLORS[t]||"#475569";
          return <button key={t} onClick={()=>{setSurgeType(t);lsSet("surge_type",t);}} style={{padding:"3px 8px",borderRadius:12,border:`1px solid ${active?tc:tc+"33"}`,background:active?tc+"22":"transparent",color:active?tc:"#334155",fontFamily:"'Orbitron',monospace",fontSize:7,fontWeight:700,cursor:"pointer"}}>{emoji} {t}</button>;
        })}
      </div>
      {surgeActive&&<div style={{color:"#F59E0B",fontSize:9,fontFamily:"'Orbitron',monospace"}}>⚡ {surgeType} surge active · +200🪙/pack · 3× {surgeType} weight</div>}
    </div>
  );
}

/* ══════════════════ CSGO CASE REVEAL ══════════════════ */
function CsgoReveal({cards,onDone}){
  const CARD_W=120;const GAP=8;const VISIBLE=7;const WIN_IDX=Math.floor(VISIBLE/2); // center
  const TOTAL=VISIBLE*3+1; // total slots in strip
  // Build strip: random filler on left, winner in center, random filler on right
  const strip=React.useMemo(()=>{
    const winCard=cards[cards.length-1]; // last card is the "win"
    const pool=[...cards,...cards,...cards]; // repeat pool for fillers
    const arr=[];
    for(let i=0;i<TOTAL;i++){
      if(i===WIN_IDX+Math.floor(TOTAL/2)){arr.push({...winCard,_win:true});}
      else{arr.push({...pool[Math.floor(Math.random()*pool.length)],_win:false});}
    }
    return arr;
  },[]);
  const [phase,setPhase]=React.useState("spin"); // spin | stop | done
  const [offset,setOffset]=React.useState(0);
  const containerRef=React.useRef(null);

  React.useEffect(()=>{
    // Calculate target offset to land on winner
    const winPos=WIN_IDX+Math.floor(TOTAL/2);
    const targetX=-((winPos*(CARD_W+GAP))-(Math.floor(VISIBLE/2)*(CARD_W+GAP)));
    // Animate via JS for smooth deceleration
    let start=null;
    const duration=4500;
    const startX=0;
    const animate=(ts)=>{
      if(!start)start=ts;
      const elapsed=ts-start;
      const progress=Math.min(elapsed/duration,1);
      // Ease out quint
      const eased=1-Math.pow(1-progress,5);
      const cur=startX+(targetX-startX)*eased;
      setOffset(cur);
      if(progress<1){requestAnimationFrame(animate);}
      else{setPhase("stop");setTimeout(()=>setPhase("done"),1200);}
    };
    requestAnimationFrame(animate);
  },[]);

  const winCard=strip.find(c=>c._win);
  const rc=RARITY_CFG[winCard?.isShiny?"Shiny":winCard?.rarity]||RARITY_CFG.Common;

  if(phase==="done")return(
    <div style={{textAlign:"center",animation:"fadeIn .5s ease"}}>
      <div style={{color:rc.color,fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:20,marginBottom:16,letterSpacing:2}}>YOU GOT!</div>
      <PokemonCard card={winCard} animIn large currentPrice={winCard?.bp}/>
      <button onClick={onDone} style={{marginTop:20,padding:"12px 40px",background:`linear-gradient(135deg,${rc.color}44,${rc.color}22)`,border:`2px solid ${rc.color}`,borderRadius:10,color:rc.color,fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:12,cursor:"pointer",letterSpacing:2}}>
        NEXT →
      </button>
    </div>
  );

  return(
    <div style={{width:"100%",maxWidth:860,margin:"0 auto"}}>
      {/* Pointer */}
      <div style={{position:"relative",display:"flex",justifyContent:"center",marginBottom:4}}>
        <div style={{width:0,height:0,borderLeft:"10px solid transparent",borderRight:"10px solid transparent",borderTop:"18px solid #FCD34D"}}/>
      </div>
      {/* Strip container */}
      <div style={{overflow:"hidden",borderRadius:12,border:"2px solid #1E293B",position:"relative",background:"#050a14"}}>
        {/* Center highlight */}
        <div style={{position:"absolute",left:"50%",top:0,bottom:0,width:CARD_W+GAP*2,transform:"translateX(-50%)",background:"rgba(252,211,77,0.06)",border:"2px solid #FCD34D44",zIndex:2,pointerEvents:"none",borderRadius:4}}/>
        <div style={{display:"flex",gap:GAP,padding:`${GAP}px`,transform:`translateX(${offset}px)`,willChange:"transform"}}>
          {strip.map((card,i)=>{
            const cr=RARITY_CFG[card.isShiny?"Shiny":card.rarity]||RARITY_CFG.Common;
            return(
              <div key={i} style={{flexShrink:0,width:CARD_W,background:"linear-gradient(160deg,#0a1020,#0d1830)",border:`2px solid ${cr.color}44`,borderRadius:10,padding:6,textAlign:"center",animation:phase==="stop"&&card._win?"csgoWinPulse 0.6s ease 3":"none"}}>
                <img src={ART(card.id)} style={{width:CARD_W-16,height:CARD_W-16,objectFit:"contain",imageRendering:"pixelated"}} onError={e=>{e.target.src=MINI(card.id);}}/>
                <div style={{color:cr.color,fontFamily:"'Orbitron',monospace",fontSize:7,fontWeight:700,marginTop:3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{card.name}</div>
                <div style={{color:cr.color,fontSize:6,opacity:.7}}>{card.isShiny?"Shiny":card.rarity}</div>
              </div>
            );
          })}
        </div>
      </div>
      {/* Bottom pointer */}
      <div style={{display:"flex",justifyContent:"center",marginTop:4}}>
        <div style={{width:0,height:0,borderLeft:"10px solid transparent",borderRight:"10px solid transparent",borderBottom:"18px solid #FCD34D"}}/>
      </div>
    </div>
  );
}

function MerchantShop({player,notify,onBack}){
  const [buying,setBuying]=React.useState(null);
  const [activeEvent,setActiveEvent]=React.useState(()=>getGlobalEvent());

  React.useEffect(()=>{
    const iv=setInterval(()=>setActiveEvent(getGlobalEvent()),5000);
    return()=>clearInterval(iv);
  },[]);

  const ITEMS=[
    {id:"luck_boost",   name:"LUCK SURGE",        price:5000000,  icon:"🍀", color:"#34D399", desc:"Activates 5× luck boost for ALL players for 10 minutes", eventId:"luck_boost"},
    {id:"type_surge",   name:"GLOBAL TYPE SURGE", price:10000000, icon:"⚡", color:"#FBBF24", desc:"Random type gets 3× weight in ALL packs for 10 minutes",  eventId:"type_surge"},
    {id:"price_drop",   name:"PRICE DROP EVENT",  price:50000000, icon:"💸", color:"#F472B6", desc:"All pack prices cut in half for 5 minutes for everyone",   eventId:"price_drop"},
    {id:"mythic_rain",  name:"MYTHIC RAIN",        price:75000000, icon:"🌟", color:"#FF00AA", desc:"Mythic card drop rate boosted 10× for 5 minutes globally", eventId:"mythic_rain"},
    {id:"golden_hour",  name:"GOLDEN HOUR",        price:100000000,icon:"👑", color:"#FFD700", desc:"Golden card drop rate boosted 5× for 3 minutes globally",  eventId:"golden_hour"},
  ];

  const buy=async(item)=>{
    if((player?.coins||0)<item.price){notify("Not enough coins! You need "+item.price.toLocaleString()+"🪙","#EF4444");return;}
    setBuying(item.id);
    const evDef=GLOBAL_EVENTS.find(e=>e.id===item.eventId);
    const ev={...evDef,...evDef.effect,id:item.id,expires:Date.now()+evDef.effect.duration,activatedBy:player.username,activatedAt:Date.now()};
    // Save globally via a shared Supabase key — use a single row in players table won't work
    // Use localStorage broadcast via BroadcastChannel for same-device + Supabase for cross-device
    setGlobalEvent(ev);
    // Broadcast to other tabs
    try{new BroadcastChannel("dopamine_events").postMessage(ev);}catch{}
    // Store in Supabase so ALL players get it via syncGlobalEvent polling
    await sb.from("players").upsert({
      username:"__global_events__",password_hash:"system",coins:0,total_packs:0,total_cards:0,
      display_name:JSON.stringify({...ev,expires:ev.expires})
    },{onConflict:"username"});
    await sb.from("players").update({coins:(player.coins||0)-item.price}).eq("id",player.id);
    notify(`${item.icon} ${item.name} activated! Everyone benefits!`,item.color);
    setActiveEvent(ev);
    setBuying(null);
  };

  const timeLeft=activeEvent?Math.max(0,Math.round((activeEvent.expires-Date.now())/1000)):0;

  return(
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#050008,#0a0015,#050008)",position:"relative",overflow:"hidden"}}>
      {/* Atmospheric particles */}
      {[...Array(20)].map((_,i)=>(
        <div key={i} style={{position:"fixed",top:Math.random()*100+"%",left:Math.random()*100+"%",width:2,height:2,borderRadius:"50%",background:"#FF00AA",opacity:.3,animation:`pulse ${1+Math.random()*2}s ease infinite`,animationDelay:Math.random()*2+"s",pointerEvents:"none"}}/>
      ))}

      <div style={{position:"relative",zIndex:1,maxWidth:700,margin:"0 auto",padding:"20px 16px"}}>
        {/* Header */}
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:24}}>
          <button onClick={onBack} style={{padding:"8px 16px",background:"#0F172A",border:"1px solid #1E293B",borderRadius:8,color:"#60A5FA",fontFamily:"'Orbitron',monospace",fontSize:9,fontWeight:700,cursor:"pointer",letterSpacing:1}}>← BACK</button>
          <div>
            <div style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:"clamp(16px,4vw,24px)",color:"#FF00AA"}}>MYSTERY MERCHANT</div>
            <div style={{color:"#334155",fontSize:9,fontFamily:"'Orbitron',monospace"}}>GLOBAL EVENTS · AFFECTS ALL PLAYERS</div>
          </div>
        </div>

        {/* Stick figure merchant */}
        <div style={{textAlign:"center",marginBottom:28,position:"relative"}}>
          <svg width="120" height="160" viewBox="0 0 120 160" style={{filter:"drop-shadow(0 0 20px #FF00AA)"}}>
            {/* Head */}
            <circle cx="60" cy="28" r="18" fill="none" stroke="#FF00AA" strokeWidth="2.5"/>
            {/* Eyes */}
            <circle cx="54" cy="26" r="2.5" fill="#FF00AA"/>
            <circle cx="66" cy="26" r="2.5" fill="#FF00AA"/>
            {/* Smile */}
            <path d="M52 33 Q60 40 68 33" fill="none" stroke="#FF00AA" strokeWidth="2"/>
            {/* Body */}
            <line x1="60" y1="46" x2="60" y2="100" stroke="#FF00AA" strokeWidth="2.5"/>
            {/* Arms */}
            <line x1="60" y1="60" x2="30" y2="85" stroke="#FF00AA" strokeWidth="2.5"/>
            <line x1="60" y1="60" x2="90" y2="85" stroke="#FF00AA" strokeWidth="2.5"/>
            {/* Hands holding bag */}
            <circle cx="30" cy="87" r="4" fill="#FF00AA"/>
            <rect x="82" y="80" width="16" height="12" rx="3" fill="none" stroke="#FFD700" strokeWidth="2"/>
            <text x="90" y="90" textAnchor="middle" fill="#FFD700" fontSize="8" fontFamily="monospace">$</text>
            {/* Legs */}
            <line x1="60" y1="100" x2="40" y2="140" stroke="#FF00AA" strokeWidth="2.5"/>
            <line x1="60" y1="100" x2="80" y2="140" stroke="#FF00AA" strokeWidth="2.5"/>
            {/* Hat */}
            <rect x="42" y="8" width="36" height="6" rx="2" fill="#FF00AA"/>
            <rect x="48" y="-4" width="24" height="14" rx="2" fill="#FF00AA"/>
            {/* Star */}
            <text x="60" y="4" textAnchor="middle" fontSize="10" fill="#FFD700">★</text>
          </svg>
          <div style={{fontFamily:"'Orbitron',monospace",fontSize:10,color:"#FF00AA",marginTop:8,fontWeight:700}}>"Got something special for ya..."</div>
          <div style={{color:"#1E293B",fontSize:8,fontFamily:"'Orbitron',monospace",marginTop:4}}>Your coins: <span style={{color:"#FCD34D"}}>{(player?.coins||0).toLocaleString()}🪙</span></div>
        </div>

        {/* Active event banner */}
        {activeEvent&&timeLeft>0&&(()=>{
          const evDef=GLOBAL_EVENTS.find(e=>e.id===activeEvent.id)||GLOBAL_EVENTS[0];
          return(
            <div style={{background:`linear-gradient(135deg,${evDef.color}22,${evDef.color}11)`,border:`2px solid ${evDef.color}88`,borderRadius:14,padding:"14px 18px",marginBottom:20,textAlign:"center",animation:"pulse .8s ease infinite"}}>
              <div style={{fontSize:28}}>{evDef.icon}</div>
              <div style={{fontFamily:"'Orbitron',monospace",fontWeight:900,color:evDef.color,fontSize:14,letterSpacing:2}}>{evDef.name} ACTIVE!</div>
              <div style={{color:"#94A3B8",fontSize:10,marginTop:4}}>{evDef.desc}</div>
              <div style={{color:evDef.color,fontFamily:"'Orbitron',monospace",fontSize:11,marginTop:6}}>⏱ {Math.floor(timeLeft/60)}:{String(timeLeft%60).padStart(2,"0")} remaining · activated by {activeEvent.activatedBy}</div>
            </div>
          );
        })()}

        {/* Items */}
        <div style={{display:"grid",gap:12}}>
          {ITEMS.map(item=>{
            const canAfford=(player?.coins||0)>=item.price;
            const isActive=activeEvent?.id===item.id&&timeLeft>0;
            return(
              <div key={item.id} style={{background:`linear-gradient(135deg,#08001a,#0f0025)`,border:`2px solid ${isActive?item.color:item.color+"44"}`,borderRadius:16,padding:"18px 20px",opacity:isActive?.6:1,transition:"all .2s"}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12}}>
                  <div style={{display:"flex",alignItems:"center",gap:14}}>
                    <div style={{fontSize:36,filter:`drop-shadow(0 0 12px ${item.color})`}}>{item.icon}</div>
                    <div>
                      <div style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:13,color:item.color,letterSpacing:1}}>{item.name}</div>
                      <div style={{color:"#475569",fontSize:10,marginTop:3,maxWidth:320}}>{item.desc}</div>
                      <div style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:12,color:"#FCD34D",marginTop:6}}>{item.price.toLocaleString()}🪙</div>
                    </div>
                  </div>
                  <button onClick={()=>buy(item)} disabled={!canAfford||isActive||buying===item.id}
                    style={{padding:"10px 22px",background:canAfford&&!isActive?`linear-gradient(135deg,${item.color}44,${item.color}22)`:"#0F172A",border:`2px solid ${canAfford&&!isActive?item.color:"#1E293B"}`,borderRadius:10,color:canAfford&&!isActive?item.color:"#1E293B",fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:10,cursor:canAfford&&!isActive?"pointer":"not-allowed",letterSpacing:1,whiteSpace:"nowrap"}}>
                    {isActive?"ACTIVE":buying===item.id?"BUYING...":canAfford?"ACTIVATE":"CAN'T AFFORD"}
                  </button>
                </div>
              </div>
            );
          })}
        </div>

        <div style={{textAlign:"center",marginTop:30,color:"#1E293B",fontFamily:"'Orbitron',monospace",fontSize:8}}>Events affect ALL players · Prices are one-time activations</div>
      </div>
    </div>
  );
}

function App(){
  const [dbPlayer,setDbPlayer]           =useState(null);
  const [collection,setCollection]       =useState([]);
  const [page,setPage]                   =useState("shop");
  const [opening,setOpening]             =useState(null);
  const [revealedCards,setRevealedCards] =useState([]);
  const [revealIdx,setRevealIdx]         =useState(0);
  const [toast,setToast]                 =useState(null);
  const [filterRarity,setFilter]         =useState("All");
  const [sortBy,setSort]                 =useState("recent");
  const [nameEdit,setNameEdit]           =useState(false);
  const [tempName,setTempName]           =useState("");
  const [sellConfirm,setSellConfirm]     =useState(false);
  const [finishing,setFinishing]         =useState(false);
  const [autoLogging,setAutoLogging]     =useState(true);

  // Auto-login on mount if saved creds exist
  useEffect(()=>{
    const tryAutoLogin=async()=>{
      const saved=lsGet("saved_creds","");
      if(!saved){setAutoLogging(false);return;}
      try{
        const{u,p}=JSON.parse(saved);
        if(!u||!p){setAutoLogging(false);return;}
        const hash=await hashPassword(p,u);
        const{data}=await sb.from("players").select("*").eq("username",u).eq("password_hash",hash).maybeSingle();
        if(data){AudioEngine.init();onLogin(data);}
        else{setAutoLogging(false);}
      }catch{setAutoLogging(false);}
    };
    tryAutoLogin();
  },[]);
  
  const [pendingTrades,setPendingTrades] =useState([]);
  const [pvpChallenge,setPvpChallenge]   =useState(null);
  const [inboxUnread,setInboxUnread]     =useState(0);
  const [battleChallengeFromInbox,setBattleChallengeFromInbox]=useState(null);
  const [lbRank,setLbRank]             =useState(null);
  const [autoSellRarities,setAutoSellRarities]=useState(()=>{try{return JSON.parse(lsGet("auto_sell_rar","[]"));}catch{return [];}});
  const timer=useRef(null);
  const lastPackTime=useRef(0);
  const playerCoinsRef=useRef(0);
  const [autoOpen,setAutoOpen]=useState(null); // {crateId, intervalId}
  const autoOpenRef=useRef(null);
  const [musicMuted,setMusicMuted]=useState(()=>lsGet("music_muted")==="1");
  const [sfxMuted,setSfxMuted]=useState(()=>lsGet("sfx_muted")==="1");
  const [showSettings,setShowSettings]=useState(false);
  const [csgoMode,setCsgoMode]=useState(()=>lsGet("csgo_mode","0")==="1");
  const [showMerchant,setShowMerchant]=useState(false);
  const [showTutorial,setShowTutorial]=useState(false);
  const [tutStep,setTutStep]=useState(0);
  const [animSettings,setAnimSettings]=useState(()=>{
    try{return JSON.parse(lsGet("tcg_anim_settings")||"{}");}catch{return {};}
  });
  const saveAnimSettings=(k,v)=>{
    const ns={...animSettings,[k]:v};
    setAnimSettings(ns);
    lsSet("tcg_anim_settings",JSON.stringify(ns));
  };
  const skipAnim=(rarity)=>{
    if(animSettings.skipAll)return true;
    if(rarity==="Shiny")return animSettings.skipShiny||false;
    if(rarity==="Rainbow")return animSettings.skipRainbow||false;
    if(rarity==="Crystal")return animSettings.skipCrystal||false;
    if(rarity==="Radiant")return animSettings.skipRadiant||false;
    if(rarity==="Mega")return animSettings.skipMega||false;
    if(rarity==="Secret")return animSettings.skipSecret||false;
    if(rarity==="Ultra Rare")return animSettings.skipUltraRare||false;
    return true; // skip for lower rarities
  };
  const [solsPhase,setSolsPhase]=useState(null); // null | "build" | "explode"
  const solsTimer=useRef(null);

  useEffect(()=>{SFX.sfxMuted=sfxMuted;lsSet("sfx_muted",sfxMuted?"1":"0");},[sfxMuted]);
  useEffect(()=>{SFX.musicMuted=musicMuted;lsSet("music_muted",musicMuted?"1":"0");if(dbPlayer){if(musicMuted)SFX.stopMusic();else SFX.startMusic();}},[musicMuted]);

  // Convenience: merge dbPlayer + collection into one object for child components
  const player = dbPlayer ? {...dbPlayer, collection} : null;
  useEffect(()=>{if(player)playerCoinsRef.current=player.coins;},[player?.coins]);

  const notify=(msg,color="#34D399")=>{setToast({msg,color});setTimeout(()=>setToast(null),3500);};

  // ── After login: load collection + prices + subscribe to realtime
  const onLogin=async(p)=>{
    window.__currentPlayerId=p.id;
    lsSet('current_uid',p.id);
    setDbPlayer(p);
    await loadCollection(p.id);
    await loadTrades(p.id);
    subscribeRealtime(p.id);
    // Check leaderboard rank
    const{data:lbData}=await sb.from("players").select("id").order("coins",{ascending:false}).limit(3);
    if(lbData){const idx=lbData.findIndex(r=>r.id===p.id);setLbRank(idx>=0?idx+1:null);}
    // Duke's personal card — auto-give if he doesn't have it yet (only one ever)
    if(p.username==="duke"||p.username==="admin"){
      const{data:existing}=await sb.from("collection").select("id").eq("card_id",9999).limit(1);
      if(!existing||existing.length===0){
        await sb.from("collection").insert({player_id:p.id,card_id:9999,card_name:DUKE_CARD.name,rarity:DUKE_CARD.rarity,buy_price:0,obtained_at:new Date().toLocaleDateString(),uid:crypto.randomUUID()});
        await loadCollection(p.id);
      }
    }
    // Show tutorial for brand-new accounts
    if(!lsGet("tut_done_"+p.id)){setShowTutorial(true);setTutStep(0);}
  };

  const loadCollection=async(pid)=>{
    const{data}=await sb.from("collection").select("*").eq("player_id",pid);
    if(data)setCollection(data.map(row=>{
      const base=ALL_CARDS.find(c=>String(c.id)===String(row.card_id))
        ||LIMITED_CARDS.find(c=>String(c.id)===String(row.card_id)&&c.rarity===row.rarity)
        ||LIMITED_CARDS.find(c=>String(c.id)===String(row.card_id))
        ||(String(row.card_id)==="9999"?DUKE_CARD:null)
        ||(String(row.card_id)==="9998"?ETERNAMAX_CARD:null)
        ||MYTHIC_CARDS.find(c=>String(c.id)===String(row.card_id))
        ||MEGA_CARDS.find(c=>c.rarity===row.rarity)
        ||CARDS[0];
      return{...base, dbId:row.id, uid:row.uid||row.id, obtainedAt:row.obtained_at, buyPrice:row.buy_price, player_id:row.player_id, rarity:row.rarity||base.rarity};
    }));
  };

  const subscribeRealtime=(pid)=>{
    // ── Incoming trade offers
    sb.channel("trades_in_"+pid)
      .on("postgres_changes",{event:"*",schema:"public",table:"trades",filter:`to_id=eq.${pid}`},(payload)=>{
        if(payload.eventType==="INSERT"){
          const type=payload.new.offered?.type;
          if(type==="battle_invite"){
            setInboxUnread(n=>n+1);
            notify(`⚔️ Battle invite from ${payload.new.from_name}!`,"#F472B6");
            SFX.evolve();
          } else if(type==="gift"){
            setInboxUnread(n=>n+1);
            notify(`🎁 Gift from ${payload.new.from_name}!`,"#FCD34D");
            SFX.evolve();
          } else if(type==="update"){
            setInboxUnread(n=>n+1);
            notify(`📢 ${payload.new.offered?.title||"New announcement"}!`,"#60A5FA");
          } else {
            setPendingTrades(t=>[payload.new,...t]);
            notify(`📦 Trade offer from ${payload.new.from_name}!`,"#C084FC");
            SFX.sell();
          }
        } else if(payload.eventType==="UPDATE"){
          setPendingTrades(t=>t.map(x=>x.id===payload.new.id?payload.new:x));
        } else if(payload.eventType==="DELETE"){
          setPendingTrades(t=>t.filter(x=>x.id!==payload.old.id));
        }
      }).subscribe();

    // ── Sent trade responses (accepted/declined)
    sb.channel("trades_out_"+pid)
      .on("postgres_changes",{event:"UPDATE",schema:"public",table:"trades",filter:`from_id=eq.${pid}`},(payload)=>{
        if(payload.new.status==="accepted"){
          notify(`✅ ${payload.new.to_name} accepted your trade!`,"#34D399");
          SFX.evolve();
          loadCollection(pid);
        } else if(payload.new.status==="declined"){
          notify(`❌ ${payload.new.to_name} declined your trade.`,"#EF4444");
          SFX.error();
        }
      }).subscribe();

    // ── Collection changes (trade completions, admin gifts, etc.)
    sb.channel("collection_"+pid)
      .on("postgres_changes",{event:"INSERT",schema:"public",table:"collection",filter:`player_id=eq.${pid}`},(payload)=>{
        // New card arrived — reload silently
        loadCollection(pid);
      })
      .on("postgres_changes",{event:"DELETE",schema:"public",table:"collection",filter:`player_id=eq.${pid}`},(payload)=>{
        loadCollection(pid);
      }).subscribe();

    // ── Coin / player data changes (someone sends coins, leaderboard, etc.)
    sb.channel("player_"+pid)
      .on("postgres_changes",{event:"UPDATE",schema:"public",table:"players",filter:`id=eq.${pid}`},(payload)=>{
        setDbPlayer(p=>({...p,...payload.new}));
      }).subscribe();
  };

  const loadTrades=async(pid)=>{
    const{data}=await sb.from("trades").select("*").eq("to_id",pid).eq("status","pending");
    setPendingTrades((data||[]).filter(t=>!(t.offered?.type)));
    // Count inbox unread (battle invites, gifts, updates)
    const{data:inbox}=await sb.from("trades").select("id").eq("to_id",pid).eq("status","unread");
    setInboxUnread((inbox||[]).length);
  };

  const loadInboxUnread=async(pid)=>{
    const{data}=await sb.from("trades").select("id").eq("to_id",pid).eq("status","unread");
    setInboxUnread((data||[]).length);
  };

  // When inbox hands us a battle challenge, route it through the normal pvpChallenge flow
  useEffect(()=>{
    if(battleChallengeFromInbox){
      setPvpChallenge(battleChallengeFromInbox);
      setBattleChallengeFromInbox(null);
    }
  },[battleChallengeFromInbox]);
  useEffect(()=>{
    if(!player)return;
    syncGlobalEvent(); // immediate on login
    const iv=setInterval(()=>{if(!window.__globalEventSyncDisabled)syncGlobalEvent();},10000);
    return()=>clearInterval(iv);
  },[player?.id]);

  // ── Periodic refresh every 30s as fallback (keeps data fresh without full page reload)
  useEffect(()=>{
    if(!player)return;
    const iv=setInterval(async()=>{
      await loadCollection(player.id);
      const{data}=await sb.from("players").select("*").eq("id",player.id).maybeSingle();
      if(data)setDbPlayer(data);
    },30000);
    return()=>clearInterval(iv);
  },[player?.id]);

  // ── Win detection
  useEffect(()=>{
    
  },[player,collection]);

  // ── Buy pack
  const buyPack=async(crateId, qty=1)=>{
    const crate=CRATES.find(c=>c.id===crateId);
    const playerLevel=getPlayerLevel(player);
    if((crate.reqLevel||1)>playerLevel){SFX.error();notify(`🔒 Reach Level ${crate.reqLevel} to open this pack!`,"#EF4444");return;}
    const activeSurgeType=lsGet("surge_type","None");
    const surgeCostExtra=activeSurgeType!=="None"?200:0;
    const totalCost=(crate.price+surgeCostExtra)*qty;
    if(player.coins<totalCost){SFX.error();notify("Not enough coins!","#EF4444");return;}
    // Check and announce potion (Easter packs ignore potions)
    const potKey="potion_luck_"+(player?.id||"");
    const potLuck=parseInt(lsGet(potKey,"0"))||0;
    if(potLuck>0&&!crate.easterPack)notify(`✨ Potion active! +${potLuck}× luck this pack!`,"#34D399");
    // Rate limit
    const now=Date.now();
    if(now-lastPackTime.current<1500){notify("Slow down!","#EF4444");return;}
    lastPackTime.current=now;
    // Re-fetch coins from DB
    const{data:fresh}=await sb.from("players").select("coins,flagged").eq("id",player.id).single();
    if(!fresh||fresh.flagged){notify("Account flagged. Contact admin.","#EF4444");return;}
    if(fresh.coins<totalCost){notify("Not enough coins!","#EF4444");setDbPlayer(p=>({...p,coins:fresh.coins}));return;}
    const COIN_FLOOR=50;
    if(fresh.coins-totalCost<COIN_FLOOR){notify(`🛡️ Can't go below ${COIN_FLOOR}🪙 — sell cards, battle, or check stocks first!`,"#F59E0B");return;}
    SFX.packOpen();
    // Mega Crates always use CSGO reveal
    if(crate.isMegaCrate)setCsgoMode(true);
        // Roll all packs at once
    const allCards=[];
    for(let i=0;i<qty;i++) allCards.push(...rollPack(crateId,activeSurgeType==="None"?null:activeSurgeType));
    const withPrices=allCards.map(c=>({...c,buyPrice:c.bp}));
    // Save any Mega Stone drops
    const allStones=allCards.__megaStones||[];
    allStones.forEach(s=>addStone(player.id,s.id));
    if(allStones.length>0) notify(`💎 Mega Stone found: ${allStones.map(s=>s.name).join(", ")}!`,"#FF4500");

    const newCoins=fresh.coins-totalCost;
    await sb.from("players").update({coins:newCoins,total_packs:player.total_packs+qty,total_cards:player.total_cards+allCards.length}).eq("id",player.id);
    setDbPlayer(p=>({...p,coins:newCoins,total_packs:p.total_packs+qty,total_cards:p.total_cards+allCards.length}));
    updateDailyStat(player.id,"packsToday",qty);
    const raresInPack=allCards.filter(c=>["Rare","Epic","Legendary","Ultra Rare","Secret","Radiant","Crystal","Rainbow","Mythic","Mega","GOLDEN"].includes(c.rarity)).length;
    const epicsInPack=allCards.filter(c=>["Epic","Legendary","Ultra Rare","Secret","Radiant","Crystal","Rainbow","Mythic","Mega","GOLDEN"].includes(c.rarity)).length;
    if(raresInPack>0)updateDailyStat(player.id,"raresPulled",raresInPack);
    if(epicsInPack>0)updateDailyStat(player.id,"epicsPulled",epicsInPack);
    await sb.from("transactions").insert({player_id:player.id,type:"pack",detail:`Opened ${qty}× ${crate.name}`,tx_date:new Date().toLocaleDateString()});
    setRevealedCards(withPrices);setRevealIdx(0);
    setOpening({crate,phase:"opening",qty});
    clearTimeout(timer.current);
    timer.current=setTimeout(()=>{
      const firstCard=withPrices[0];
      const needsSols=!skipAnim(firstCard?.isShiny?"Shiny":firstCard?.rarity);
      if(needsSols){
        setOpening(o=>o?{...o,phase:"reveal"}:null);
        setSolsPhase("build");
        clearTimeout(solsTimer.current);
        solsTimer.current=setTimeout(()=>{
          setSolsPhase("explode");
          solsTimer.current=setTimeout(()=>setSolsPhase(null),600);
        },2200);
      } else {
        setOpening(o=>o?{...o,phase:"reveal"}:null);
      }
    },1100);
  };

  const revealNext=()=>{
    if(revealIdx<revealedCards.length-1){
      const nextIdx=revealIdx+1;
      const nextCard=revealedCards[nextIdx];
      const needsSols=!skipAnim(nextCard?.isShiny?"Shiny":nextCard?.rarity);
      if(needsSols){
        // Set index first so animation reads the correct card
        setRevealIdx(nextIdx);
        setSolsPhase("build");
        clearTimeout(solsTimer.current);
        solsTimer.current=setTimeout(()=>{
          setSolsPhase("explode");
          solsTimer.current=setTimeout(()=>setSolsPhase(null),600);
        },2200);
      } else {
        setRevealIdx(nextIdx);
      }
    }
    else{setOpening(o=>({...o,phase:"done"}));}
  };
  const closeOpening=async()=>{
    if(finishing)return;
    setFinishing(true);
    const rows=revealedCards.map(c=>({player_id:player.id,card_id:c.id,card_name:c.name,rarity:c.rarity,buy_price:c.buyPrice||c.bp,obtained_at:c.obtainedAt,uid:c.uid}));
    // Insert in chunks of 50 to handle large packs
    const CHUNK=50;
    for(let ci=0;ci<rows.length;ci+=CHUNK){
      const chunk=rows.slice(ci,ci+CHUNK);
      const{error:insErr}=await sb.from("collection").insert(chunk);
      if(insErr){
        console.error("Chunk insert failed, trying one by one:",insErr.message);
        for(const row of chunk){
          const{error:e}=await sb.from("collection").insert(row);
          if(e)console.warn("Row fail:",row.card_name,e.message);
        }
      }
    }
    await loadCollection(player.id);
    // Auto-sell cards matching autoSellRarities
    if(autoSellRarities.length>0){
      const toAutoSell=rows.filter(r=>autoSellRarities.includes(r.rarity));
      if(toAutoSell.length>0){
        const autoTotal=toAutoSell.reduce((s,c)=>s+(c.buy_price||0),0);
        for(let i=0;i<toAutoSell.length;i+=100)
          await sb.from("collection").delete().in("uid",toAutoSell.slice(i,i+100).map(c=>c.uid));
        const nc2=(player.coins||0)+autoTotal;
        await sb.from("players").update({coins:nc2}).eq("id",player.id);

  // ── EVOLUTION SYSTEM
  // Regular evo: need 2 of same Pokemon → fuses into next stage
  // Mega evo: need just 1 of a mega-eligible Pokemon → mega evolves it (consumes the card)
  const getEvoOpportunities=()=>{
    const counts={};
    collection.forEach(c=>{
      const k=String(c.id);
      if(!counts[k])counts[k]={card:c,uids:[]};
      counts[k].uids.push(c.uid);
    });
    const opps=[];
    Object.entries(counts).forEach(([id,{card,uids}])=>{
      const numId=Number(id);
      // Regular evo: need 2 copies
      const nextId=EVO_CHAIN[numId];
      if(nextId&&uids.length>=2){
        const nextIds=Array.isArray(nextId)?nextId:[nextId];
        const nextCards=nextIds.map(i=>ALL_CARDS.find(c=>c.id===i)).filter(Boolean);
        if(nextCards.length)opps.push({type:"evo",card,uids,nextCards,isChoice:Array.isArray(nextId)});
      }
      // Mega evo: need 1 copy + matching Mega Stone
      const megaId=MEGA_EVO_MAP[numId];
      if(megaId){
        const stones=getStones(player.id);
        // Find all stones that can produce a mega for this pokemon
        const matchingStones=MEGA_STONES.filter(s=>s.forId===numId&&(stones[s.id]||0)>0);
        matchingStones.forEach(stone=>{
          const megaCard=MEGA_CARDS.find(c=>c.id===stone.megaId);
          if(megaCard)opps.push({type:"mega",card,uids,nextCards:[megaCard],isChoice:false,needed:1,stone});
        });
      }
    });
    return opps;
  };

  const doEvolve=async(opp,chosenCard)=>{
    const evolved=chosenCard||opp.nextCards[0];
    const isMega=opp.type==="mega";
    if(!evolved||!evolved.id||!evolved.name){
      notify("Evolution target not found — nothing changed.","#EF4444");
      return;
    }
    const uidsToRemove=isMega?opp.uids.slice(0,1):opp.uids.slice(0,2);
    // Consume the Mega Stone if this is a mega evo
    if(isMega&&opp.stone){
      const consumed=useStone(player.id,opp.stone.id);
      if(!consumed){notify("❌ Mega Stone not found — evolution cancelled.","#EF4444");return;}
    }
    // Step 1: INSERT the evolved card first
    const srcIsShiny=opp.card.isShiny||opp.card.rarity==="Shiny";
    const evoBase={...evolved,uid:crypto.randomUUID(),obtainedAt:new Date().toLocaleDateString(),buyPrice:evolved.bp};
    const evoCard=srcIsShiny?{...evoBase,isShiny:true,rarity:"Shiny",bp:evolved.bp*10,origRarity:evolved.rarity,tc:"#00FFAA",bg:"15deg,#001a0d,#003320"}:evoBase;
    const insertRow={player_id:player.id,card_id:evoCard.id,card_name:evoCard.name,rarity:evoCard.rarity,buy_price:evoCard.buyPrice,obtained_at:evoCard.obtainedAt,uid:evoCard.uid};
    const{data:inserted,error:insertErr}=await sb.from("collection").insert(insertRow).select();
    if(insertErr||!inserted||inserted.length===0){
      notify(`❌ Evolution insert FAILED — your cards are safe. Error: ${insertErr?.message||"no data returned"}`,"#EF4444");
      return;
    }
    // Step 2: Verify the card actually exists in DB before deleting anything
    const{data:verify}=await sb.from("collection").select("id").eq("uid",evoCard.uid).maybeSingle();
    if(!verify){
      notify("❌ Could not verify new card in database — nothing deleted.","#EF4444");
      return;
    }
    // Step 3: Only NOW delete the source cards
    for(const uid of uidsToRemove){
      await sb.from("collection").delete().eq("uid",uid);
    }
    await sb.from("transactions").insert({player_id:player.id,type:"evolve",detail:`${opp.card.name} → ${evolved.name}`,tx_date:new Date().toLocaleDateString()});
    await loadCollection(player.id);
    if(isMega){SFX.megaEvolve();notify(`🌟 MEGA EVOLUTION! ${evolved.name}!`,"#FF4500");}
    else{SFX.evolve();notify(`✨ Evolved into ${evolved.name}!`,RARITY_CFG[evolved.rarity]?.color||"#34D399");}
    updateDailyStat(player.id,"evolvesToday");
    setEeveeModal(null);
  };
