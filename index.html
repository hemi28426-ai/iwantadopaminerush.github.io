/* ══════════════════════════════════════════════════ STOCK ENGINE (shared via Supabase) */
const tickPrices = (prices, history) => {
  const np={...prices}, nh={...history};
  [...CARDS,GOLDEN_CHARIZARD].forEach(card=>{
    const k=cardKey(card);
    const cur=np[k]||card.bp;
    const vol={"Common":.04,"Uncommon":.05,"Rare":.07,"Epic":.10,"Legendary":.14,"Ultra Rare":.18,"Secret":.22,"GOLDEN":.20}[card.rarity]||.06;
    const meanRev=(card.bp-cur)/card.bp*0.03;
    const drift=(Math.random()-.5)*2*vol+meanRev;
    np[k]=Math.max(Math.round(card.bp*.25),Math.min(Math.round(card.bp*8),Math.round(cur*(1+drift))));
    nh[k]=[...(nh[k]||[card.bp]).slice(-80),np[k]];
  });
  return{np,nh};
};

/* ══════════════════════════════════════════════════ ROLL */
const rollCard=(surgeType=null,packId=null)=>{
  const overrides={};
  if(packId==="ultra"){overrides["Ultra Rare"]=.025;overrides["Secret"]=.005;overrides["Legendary"]=.06;}
  if(packId==="master"){overrides["Ultra Rare"]=.04;overrides["Secret"]=.012;overrides["Legendary"]=.08;overrides["Epic"]=.12;}
  if(packId==="premium"){overrides["Rare"]=.25;overrides["Epic"]=.12;}
  const tbl=Object.entries(RARITY_CFG).filter(([r])=>r!=="GOLDEN").map(([r,c])=>[r,{...c,chance:overrides[r]??c.chance}]);
  const tot=tbl.reduce((s,[,c])=>s+c.chance,0);
  const rand=Math.random()*tot; let cum=0,chosen="Common";
  for(const[r,c]of tbl){cum+=c.chance;if(rand<cum){chosen=r;break;}}
  let pool=CARDS.filter(c=>c.rarity===chosen);
  if(!pool.length)pool=CARDS.filter(c=>c.rarity==="Common");
  const weighted=[]; pool.forEach(c=>{const w=(surgeType&&c.type===surgeType)?3:1;for(let i=0;i<w;i++)weighted.push(c);});
  const base=weighted[Math.floor(Math.random()*weighted.length)];
  return{...base,uid:crypto.randomUUID(),obtainedAt:new Date().toLocaleDateString()};
};
const rollPack=(crateId,surge)=>{
  const crate=CRATES.find(c=>c.id===crateId);
  const activeSurge=surge&&Date.now()<surge.expiresAt?surge.type:crate.surgeType;
  return Array.from({length:crate.cards},()=>rollCard(activeSurge,crateId));
};

/* ══════════════════════════════════════════════════ SPARKLINE */
function Sparkline({data,color,w=80,h=28}){
  if(!data||data.length<2)return null;
  const mn=Math.min(...data),mx=Math.max(...data),rng=mx-mn||1;
  const pts=data.map((v,i)=>`${(i/(data.length-1))*w},${h-((v-mn)/rng)*h}`).join(" ");
  const up=data[data.length-1]>=data[Math.max(0,data.length-10)];
  return <svg width={w} height={h} style={{display:"block"}}><polyline points={pts} fill="none" stroke={up?"#10B981":"#EF4444"} strokeWidth="1.5" strokeLinejoin="round"/></svg>;
}

              const rc=RARITY_CFG[pos.card.rarity]||RARITY_CFG.Common;
              return(
                <div key={pos.k} style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr 1fr 80px",padding:"9px 14px",borderBottom:"1px solid #050a14",alignItems:"center"}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}><img src={MINI(pos.card.id)} alt="" style={{width:26,height:26,imageRendering:"pixelated"}} onError={e=>e.target.style.display="none"}/><div><div style={{color:rc.color,fontFamily:"'Orbitron',monospace",fontSize:9,fontWeight:700}}>{pos.card.name}</div><div style={{color:"#1E293B",fontSize:7}}>{pos.card.rarity}</div></div></div>
                  <div style={{color:"#F1F5F9",fontFamily:"'Share Tech Mono',monospace",fontSize:12}}>{pos.count}x</div>
                  <div style={{color:"#94A3B8",fontFamily:"'Share Tech Mono',monospace",fontSize:11}}>{pos.avg}</div>
                  <div style={{color:"#F1F5F9",fontFamily:"'Share Tech Mono',monospace",fontSize:11}}>{pos.cur}</div>
                  <div style={{color:pos.pnl>=0?"#10B981":"#EF4444",fontFamily:"'Share Tech Mono',monospace",fontSize:11,fontWeight:700}}>{pos.pnl>=0?"+":""}{Math.round(pos.pnl)}</div>
                  {!pos.card.isGolden&&<button onClick={()=>onSell((player.collection||[]).find(c=>cardKey(c)===pos.k))} style={{padding:"5px 8px",background:"linear-gradient(135deg,#7f1d1d,#DC2626)",border:"none",borderRadius:5,color:"white",fontFamily:"'Orbitron',monospace",fontSize:7,cursor:"pointer"}}>SELL</button>}
                </div>
              );
            })}
          </div>
        )
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════════ LOGIN SCREEN */
function LoginScreen({onLogin}){
  const [name,setName]=useState("");
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState("");
  const go=async()=>{
    const n=name.trim();
    if(!n||n.length<2){setErr("Name must be at least 2 characters");return;}
    if(n.length>20){setErr("Name must be 20 characters or less");return;}
    setLoading(true);setErr("");
    // Check if player exists
    const{data:existing}=await sb.from("players").select("*").eq("username",n).maybeSingle();
    if(existing){onLogin(existing);return;}
    // Create new player
    const{data:created,error}=await sb.from("players").insert({username:n,coins:500,total_packs:0,total_cards:0,total_sold:0,won:false,join_date:new Date().toLocaleDateString()}).select().single();
    if(error){setErr("Error: "+error.message+" (code: "+error.code+")");setLoading(false);return;}
    onLogin(created);
  };
  return(
    <div style={{minHeight:"100vh",background:"#020617",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{width:"100%",maxWidth:400,textAlign:"center"}}>
        <img src={ITEM("poke-ball")} alt="" style={{width:60,height:60,imageRendering:"pixelated",filter:"drop-shadow(0 0 20px #FCD34Daa)",marginBottom:16}} onError={e=>e.target.style.display="none"}/>
        <h1 style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:28,marginBottom:6}}><span style={{color:"#FCD34D"}}>PKM</span><span style={{color:"#60A5FA"}}>TCG</span></h1>
        <p style={{color:"#334155",fontSize:13,marginBottom:32}}>Multiplayer · PikaStocks · Golden Charizard Hunt</p>
        <div style={{background:"#080D1A",border:"1px solid #1E293B",borderRadius:16,padding:28}}>
          <div style={{color:"#94A3B8",fontFamily:"'Orbitron',monospace",fontSize:10,letterSpacing:2,marginBottom:12,textAlign:"left"}}>TRAINER NAME</div>
          <input
            value={name} onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()}
            placeholder="Enter your trainer name..."
            style={{width:"100%",background:"#0F172A",border:"1px solid #334155",color:"#F1F5F9",borderRadius:8,padding:"12px 14px",fontFamily:"'Exo 2',sans-serif",fontSize:16,outline:"none",marginBottom:8}}
          />
          {err&&<div style={{color:"#EF4444",fontSize:11,marginBottom:8,textAlign:"left"}}>{err}</div>}
          <p style={{color:"#1E293B",fontSize:10,marginBottom:16,textAlign:"left"}}>New name = new account · existing name = resume your game</p>
          <button onClick={go} disabled={loading||!name.trim()} style={{width:"100%",padding:"13px",background:loading||!name.trim()?"#1A2035":"linear-gradient(135deg,#92400E,#F59E0B)",border:"none",borderRadius:9,color:loading||!name.trim()?"#334155":"#1C1917",fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:13,cursor:loading||!name.trim()?"not-allowed":"pointer",letterSpacing:1}}>
            {loading?"LOADING...":"PLAY →"}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════ MAIN APP */
function App(){
  const [dbPlayer,setDbPlayer]           =useState(null);   // raw Supabase row
  const [collection,setCollection]       =useState([]);     // from Supabase collection table
  const [stockPrices,setStockPrices]     =useState({});
  const [stockHistory,setStockHistory]   =useState({});
  const [page,setPage]                   =useState("shop");
  const [opening,setOpening]             =useState(null);
  const [revealedCards,setRevealedCards] =useState([]);
  const [revealIdx,setRevealIdx]         =useState(0);
  const [toast,setToast]                 =useState(null);
  const [filterRarity,setFilter]         =useState("All");
  const [sortBy,setSort]                 =useState("recent");
  const [nameEdit,setNameEdit]           =useState(false);
  const [tempName,setTempName]           =useState("");
  const [sellConfirm,setSellConfirm]     =useState(false);
  const [showWin,setShowWin]             =useState(false);
  const [surge,setSurge]                 =useState(null);
  const [feedEvents,setFeedEvents]       =useState([]);  // live activity feed
  const timer=useRef(null);
  const isHost=useRef(false); // first player to load becomes price host

  // Convenience: merge dbPlayer + collection into one object for child components
  const player = dbPlayer ? {...dbPlayer, collection} : null;

  const notify=(msg,color="#34D399")=>{setToast({msg,color});setTimeout(()=>setToast(null),3500);};

  // ── After login: load collection + prices + subscribe to realtime
  const onLogin=async(p)=>{
    setDbPlayer(p);
    await loadCollection(p.id);
    await loadPrices();
    subscribeRealtime(p.id);
  };

  const loadCollection=async(pid)=>{
    const{data}=await sb.from("collection").select("*").eq("player_id",pid);
    if(data) setCollection(data.map(row=>({...CARDS.find(c=>String(c.id)===String(row.card_id))||GOLDEN_CHARIZARD,...row,uid:row.uid||row.id,obtainedAt:row.obtained_at,buyPrice:row.buy_price})));
  };

  const loadPrices=async()=>{
    const{data}=await sb.from("stock_prices").select("*");
    if(data&&data.length>0){
      const prices={}; data.forEach(r=>{prices[r.card_key]=r.price;});
      setStockPrices(prices);
    } else {
      // Seed initial prices if empty
      const seeds=[...CARDS,GOLDEN_CHARIZARD].map(c=>({card_key:cardKey(c),price:c.bp}));
      await sb.from("stock_prices").upsert(seeds,{onConflict:"card_key"});
      const p={}; seeds.forEach(s=>{p[s.card_key]=s.price;}); setStockPrices(p);
    }
    // Load history
    const{data:hist}=await sb.from("stock_history").select("card_key,price").order("recorded_at",{ascending:false}).limit(5000);
    if(hist){
      const h={};
      hist.forEach(r=>{if(!h[r.card_key])h[r.card_key]=[];h[r.card_key].unshift(r.price);});
      setStockHistory(h);
    }
  };

  const subscribeRealtime=(pid)=>{
    // Listen for stock price changes from other clients
    sb.channel("stock_prices").on("postgres_changes",{event:"UPDATE",schema:"public",table:"stock_prices"},(payload)=>{
      setStockPrices(p=>({...p,[payload.new.card_key]:payload.new.price}));
      setStockHistory(h=>({...h,[payload.new.card_key]:[...(h[payload.new.card_key]||[]).slice(-80),payload.new.price]}));
    }).subscribe();

    // Listen for market events (surges from any player)
    sb.channel("market_events").on("postgres_changes",{event:"INSERT",schema:"public",table:"market_events"},(payload)=>{
      const typeColors={"Fire":"#EE8130","Water":"#6390F0","Electric":"#F7D02C","Psychic":"#F95587","Dark":"#705746","Dragon":"#6F35FC","Grass":"#7AC74C","Normal":"#A8A77A","Ghost":"#735797","Ice":"#96D9D6"};
      const obj={type:payload.new.surge_type,label:`⚡ ${payload.new.surge_type.toUpperCase()} SURGE! Cards 3× boosted!`,color:typeColors[payload.new.surge_type]||"#FCD34D",expiresAt:payload.new.expires_at};
      setSurge(obj);setTimeout(()=>setSurge(null),payload.new.expires_at-Date.now());
    }).subscribe();

    // Listen for transactions (feed)
    sb.channel("transactions").on("postgres_changes",{event:"INSERT",schema:"public",table:"transactions"},(payload)=>{
      if(payload.new.player_id===pid)return; // skip own events
      setFeedEvents(f=>[{id:payload.new.id,detail:payload.new.detail,type:payload.new.type},...f.slice(0,19)]);
    }).subscribe();
  };

  // ── Stock tick: one random client becomes "host" and pushes prices
  useEffect(()=>{
    if(!dbPlayer)return;
    // Determine host: whoever loaded earliest. We use a simple coin flip with low probability so usually one person wins.
    isHost.current=Math.random()<0.3; // ~30% chance — ensures at least one host among a few players
    if(!isHost.current)return;
    const t=setInterval(async()=>{
      const{np,nh}=tickPrices(stockPrices,stockHistory);
      setStockPrices(np);setStockHistory(nh);
      // Push to Supabase (which broadcasts to all via realtime)
      const updates=Object.entries(np).map(([k,v])=>({card_key:k,price:v}));
      await sb.from("stock_prices").upsert(updates,{onConflict:"card_key"});
      // Record history samples (every other tick to save writes)
      if(Math.random()<0.5){
        const histRows=Object.entries(np).map(([k,v])=>({card_key:k,price:v}));
        await sb.from("stock_history").insert(histRows);
      }
    },10000);
    return()=>clearInterval(t);
  },[dbPlayer,stockPrices]);

  // ── Random surge (host only, every 60-120s)
  useEffect(()=>{
    if(!dbPlayer||!isHost.current)return;
    const schedule=()=>{
      const delay=60000+Math.random()*60000;
      return setTimeout(async()=>{
        const types=["Fire","Water","Electric","Psychic","Dark","Dragon","Grass","Normal","Ghost","Ice"];
        const t=types[Math.floor(Math.random()*types.length)];
        const expiresAt=Date.now()+20000;
        await sb.from("market_events").insert({surge_type:t,expires_at:expiresAt});
        schedule();
      },delay);
    };
    const t=schedule(); return()=>clearTimeout(t);
  },[dbPlayer]);

  // ── Win detection
  useEffect(()=>{
    if(player?.won&&collection.some(c=>c.isGolden)&&!showWin)setShowWin(true);
  },[player,collection]);

  // ── Buy pack
  const buyPack=async(crateId)=>{
    const crate=CRATES.find(c=>c.id===crateId);
    if(player.coins<crate.price){notify("Not enough coins!","#EF4444");return;}
    const activeSurge=surge&&Date.now()<surge.expiresAt?surge:null;
    const cards=rollPack(crateId,activeSurge);
    const withPrices=cards.map(c=>({...c,buyPrice:stockPrices[cardKey(c)]||c.bp}));
    // Deduct coins in DB
    const newCoins=player.coins-crate.price;
    await sb.from("players").update({coins:newCoins,total_packs:player.total_packs+1,total_cards:player.total_cards+cards.length}).eq("id",player.id);
    setDbPlayer(p=>({...p,coins:newCoins,total_packs:p.total_packs+1,total_cards:p.total_cards+cards.length}));
    // Log transaction
    await sb.from("transactions").insert({player_id:player.id,type:"pack",detail:`Opened ${crate.name}`,tx_date:new Date().toLocaleDateString()});
    setRevealedCards(withPrices);setRevealIdx(0);
    setOpening({crate,phase:"opening"});
    clearTimeout(timer.current);
    timer.current=setTimeout(()=>setOpening(o=>o?{...o,phase:"reveal"}:null),1100);
  };

  const revealNext=async()=>{
    if(revealIdx<revealedCards.length-1){setRevealIdx(i=>i+1);}
    else{
      // Save cards to collection table
      const rows=revealedCards.map(c=>({player_id:player.id,card_id:c.id,card_name:c.name,rarity:c.rarity,buy_price:c.buyPrice||c.bp,obtained_at:c.obtainedAt,uid:c.uid}));
      await sb.from("collection").insert(rows);
      await loadCollection(player.id);
      setOpening(o=>({...o,phase:"done"}));
    }
  };
  const closeOpening=()=>{setOpening(null);setRevealedCards([]);setRevealIdx(0);};

  // ── Sell card at market price
  const sellCard=async(card)=>{
    const price=stockPrices[cardKey(card)]||card.bp||10;
    const newCoins=player.coins+price;
    await sb.from("collection").delete().eq("uid",card.uid);
    await sb.from("players").update({coins:newCoins,total_sold:player.total_sold+1}).eq("id",player.id);
    await sb.from("transactions").insert({player_id:player.id,type:"sell",detail:`${card.name} @ ${price}🪙`,coins:price,tx_date:new Date().toLocaleDateString()});
    setDbPlayer(p=>({...p,coins:newCoins,total_sold:p.total_sold+1}));
    setCollection(c=>c.filter(x=>x.uid!==card.uid));
    notify(`+${price}🪙 from ${card.name}`,RARITY_CFG[card.rarity]?.color||"#FCD34D");
  };

  // ── Golden Charizard attempt
  const buyGolden=async()=>{
    const price=stockPrices["golden"]||GOLDEN_CHARIZARD.bp;
    if(player.coins<price){notify("Not enough coins!","#EF4444");return;}
    if(Math.random()>0.1){
      const fee=Math.round(price*.1);
      const nc=player.coins-fee;
      await sb.from("players").update({coins:nc}).eq("id",player.id);
      await sb.from("transactions").insert({player_id:player.id,type:"sell",detail:"Golden Charizard attempt failed",coins:-fee,tx_date:new Date().toLocaleDateString()});
      setDbPlayer(p=>({...p,coins:nc}));
      notify(`Slipped away! Fee: ${fee}🪙`,"#F59E0B"); return;
    }
    const gc={...GOLDEN_CHARIZARD,uid:crypto.randomUUID(),obtainedAt:new Date().toLocaleDateString(),buyPrice:price};
    const nc=player.coins-price;
    await sb.from("collection").insert({player_id:player.id,card_id:6,card_name:"Golden Charizard",rarity:"GOLDEN",buy_price:price,obtained_at:gc.obtainedAt,uid:gc.uid});
    await sb.from("players").update({coins:nc,won:true}).eq("id",player.id);
    await sb.from("transactions").insert({player_id:player.id,type:"buy",detail:"GOLDEN CHARIZARD ACQUIRED!",coins:-price,tx_date:new Date().toLocaleDateString()});
    setDbPlayer(p=>({...p,coins:nc,won:true}));
    setCollection(c=>[...c,gc]);
    notify("✨ GOLDEN CHARIZARD! ✨","#FFD700");
  };

  const getFiltered=()=>{
    let cards=[...collection];
    if(filterRarity!=="All")cards=cards.filter(c=>c.rarity===filterRarity);
    const o=["GOLDEN","Secret","Ultra Rare","Legendary","Epic","Rare","Uncommon","Common"];
    if(sortBy==="rarity")cards.sort((a,b)=>o.indexOf(a.rarity)-o.indexOf(b.rarity));
    else if(sortBy==="name")cards.sort((a,b)=>a.name.localeCompare(b.name));
    else if(sortBy==="value")cards.sort((a,b)=>(stockPrices[cardKey(b)]||b.bp)-(stockPrices[cardKey(a)]||a.bp));
    return cards;
  };

  const doSellAll=async()=>{
    const fc=getFiltered().filter(c=>!c.isGolden);
    const total=fc.reduce((s,c)=>s+(stockPrices[cardKey(c)]||c.bp||0),0);
    const uids=fc.map(c=>c.uid);
    for(const uid of uids) await sb.from("collection").delete().eq("uid",uid);
    const nc=player.coins+total;
    await sb.from("players").update({coins:nc,total_sold:player.total_sold+fc.length}).eq("id",player.id);
    await sb.from("transactions").insert({player_id:player.id,type:"sell",detail:`Bulk sold ${fc.length} cards`,coins:total,tx_date:new Date().toLocaleDateString()});
    setDbPlayer(p=>({...p,coins:nc,total_sold:p.total_sold+fc.length}));
    setCollection(c=>c.filter(x=>!uids.includes(x.uid)));
    notify(`+${total}🪙 bulk sell!`,"#FCD34D"); setSellConfirm(false);
  };

  const rStats=Object.fromEntries(Object.keys(RARITY_CFG).map(r=>[r,collection.filter(c=>c.rarity===r).length]));
  const currentCard=revealedCards[revealIdx];
  const navItems=[["shop","🏪","SHOP"],["stocks","📈","PIKASTOCKS"],["collection","📚","COLLECTION"],["leaderboard","🏆","RANKS"],["profile","👤","PROFILE"]];

  if(!player) return <LoginScreen onLogin={onLogin}/>;

  return(
    <div style={{minHeight:"100vh",background:"#020617"}}>
      {showWin&&<WinScreen playerName={player.username} onContinue={()=>setShowWin(false)}/>}

      {/* Surge banner */}
      {surge&&<div style={{position:"fixed",top:68,left:"50%",transform:"translateX(-50%)",zIndex:200,background:"#080D1A",border:`2px solid ${surge.color}`,borderRadius:12,padding:"10px 22px",color:surge.color,fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:12,letterSpacing:1,animation:"surgeFlash 4s ease forwards",boxShadow:`0 0 30px ${surge.color}66`,whiteSpace:"nowrap"}}>{surge.label}</div>}

      {/* Live feed ticker */}
      {feedEvents.length>0&&(
        <div style={{background:"#050a14",borderBottom:"1px solid #0A0F1E",height:28,overflow:"hidden",position:"sticky",top:60,zIndex:99,display:"flex",alignItems:"center"}}>
          <div style={{color:"#FCD34D",fontFamily:"'Orbitron',monospace",fontSize:8,letterSpacing:2,padding:"0 12px",flexShrink:0,borderRight:"1px solid #1E293B"}}>LIVE</div>
          <div style={{overflow:"hidden",flex:1}}>
            <div style={{display:"flex",gap:32,animation:"tickerScroll 20s linear infinite",whiteSpace:"nowrap",alignItems:"center",height:"100%"}}>
              {feedEvents.map((e,i)=><span key={i} style={{color:"#475569",fontFamily:"'Share Tech Mono',monospace",fontSize:10}}>· {e.detail}</span>)}
            </div>
          </div>
        </div>
      )}

      {/* Opening modal */}
      {opening&&(
        <div style={{position:"fixed",inset:0,zIndex:1000,background:"radial-gradient(ellipse at center,#0a1525 0%,#020617 100%)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"20px",overflow:"hidden"}}>
          {opening.phase==="opening"&&(
            <div style={{textAlign:"center"}}>
              <img src={ITEM(opening.crate.ball)} alt="" style={{width:"120px",height:"120px",objectFit:"contain",imageRendering:"pixelated",animation:"ballShake .18s ease infinite",filter:`drop-shadow(0 0 28px ${opening.crate.color}) drop-shadow(0 0 56px ${opening.crate.color}66)`}} onError={e=>e.target.style.display="none"}/>
              <div style={{color:opening.crate.color,fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:"24px",marginTop:"26px",animation:"pulse .5s ease infinite",letterSpacing:"6px"}}>OPENING...</div>
            </div>
          )}
          {opening.phase==="reveal"&&currentCard&&(()=>{
            const rc=RARITY_CFG[currentCard.rarity]||RARITY_CFG.Common;
            const isLeg=["Legendary","Ultra Rare","Secret","GOLDEN"].includes(currentCard.rarity);
            const isEpic=currentCard.rarity==="Epic";
            const curPrice=stockPrices[cardKey(currentCard)]||currentCard.bp;
            return(
              <div style={{textAlign:"center",display:"flex",flexDirection:"column",alignItems:"center"}}>
                {isLeg&&<div style={{position:"fixed",inset:0,zIndex:-1,pointerEvents:"none"}}><div style={{position:"absolute",inset:0,background:`radial-gradient(circle at 50% 40%, ${rc.color}40 0%, transparent 60%)`,animation:"legFlash 2s ease forwards"}}/>{[...Array(16)].map((_,i)=><div key={i} style={{position:"absolute",top:"42%",left:"50%",width:"2px",height:(55+Math.random()*90)+"px",background:`linear-gradient(to top,${rc.color},transparent)`,transform:`translate(-50%,-100%) rotate(${i*22.5}deg)`,transformOrigin:"bottom center",animation:"rayBurst 1.4s ease forwards",animationDelay:(i*.02)+"s"}}/>)}</div>}
                {isEpic&&<div style={{position:"fixed",inset:0,zIndex:-1,pointerEvents:"none",background:`radial-gradient(circle at 50% 40%, ${rc.color}28 0%, transparent 55%)`,animation:"legFlash 1.4s ease forwards"}}/>}
                <div style={{display:"flex",gap:"6px",marginBottom:"20px"}}>{revealedCards.map((c,i)=><div key={i} style={{width:i===revealIdx?"28px":"8px",height:"8px",borderRadius:"4px",background:i<revealIdx?RARITY_CFG[c.rarity]?.color||"#9CA3AF":i===revealIdx?rc.color:"#1E293B",transition:"all .3s",boxShadow:i===revealIdx?`0 0 12px ${rc.color}`:"none"}}/>)}</div>
                <div key={"c-"+revealIdx} style={{animation:"floatAnim 3s ease infinite"}}>
                  <PokemonCard card={currentCard} animIn large currentPrice={curPrice}/>
                </div>
                {currentCard.rarity==="Secret"&&<div style={{color:"#E879F9",fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:"16px",letterSpacing:"4px",marginTop:"14px",animation:"epicPulse .8s ease infinite"}}>✦ SECRET RARE! ✦</div>}
                {currentCard.rarity==="Ultra Rare"&&<div style={{color:"#FF6B35",fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:"15px",letterSpacing:"3px",marginTop:"14px",animation:"epicPulse .9s ease infinite"}}>◈ ULTRA RARE! ◈</div>}
                {isLeg&&!["Secret","Ultra Rare"].includes(currentCard.rarity)&&<div style={{color:"#FCD34D",fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:"16px",letterSpacing:"5px",marginTop:"14px",animation:"epicPulse .9s ease infinite"}}>✨ LEGENDARY! ✨</div>}
                {isEpic&&<div style={{color:"#C084FC",fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:"13px",letterSpacing:"3px",marginTop:"12px",animation:"pulse .9s ease infinite"}}>⚡ EPIC PULL!</div>}
                <div style={{marginTop:8,color:"#475569",fontFamily:"'Share Tech Mono',monospace",fontSize:10}}>Market value: <span style={{color:"#10B981",fontWeight:700}}>{curPrice}🪙</span></div>
                <button onClick={revealNext} style={{marginTop:"20px",padding:"13px 50px",background:`linear-gradient(135deg,${rc.color}ee,${rc.color}aa)`,border:"none",borderRadius:"12px",color:"#0A0F1E",fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:"12px",cursor:"pointer",letterSpacing:"2px",boxShadow:`0 0 26px ${rc.color}66`}}>
                  {revealIdx<revealedCards.length-1?"NEXT CARD →":"FINISH ✓"}
                </button>
              </div>
            );
          })()}
          {opening.phase==="done"&&(
            <div style={{textAlign:"center",animation:"fadeIn .4s ease"}}>
              <div style={{color:"#F1F5F9",fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:"24px",marginBottom:"4px"}}>PACK COMPLETE!</div>
              <div style={{color:"#334155",fontSize:"11px",marginBottom:"24px"}}>{revealedCards.length} cards added</div>
              <div style={{display:"flex",gap:"12px",flexWrap:"wrap",justifyContent:"center",maxWidth:"900px"}}>
                {revealedCards.map((card,i)=><div key={card.uid} style={{animation:`cardReveal .4s ease ${i*.07}s both`}}><PokemonCard card={card} currentPrice={stockPrices[cardKey(card)]||card.bp}/></div>)}
              </div>
              <button onClick={closeOpening} style={{marginTop:"26px",padding:"13px 44px",background:"linear-gradient(135deg,#065F46,#10B981)",border:"none",borderRadius:"12px",color:"white",fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:"12px",cursor:"pointer",letterSpacing:"1px"}}>✓ ADD TO COLLECTION</button>
            </div>
          )}
        </div>
      )}

      {toast&&<div style={{position:"fixed",top:16,right:16,zIndex:999,background:"#080D1A",border:`1px solid ${toast.color}77`,borderRadius:"12px",padding:"11px 16px",color:toast.color,fontFamily:"'Orbitron',monospace",fontSize:"11px",fontWeight:700,letterSpacing:".5px",animation:"fadeIn .3s ease",boxShadow:`0 0 26px ${toast.color}44`,maxWidth:320}}>{toast.msg}</div>}

      <header style={{borderBottom:"1px solid #0A0F1E",background:"rgba(2,6,23,.97)",backdropFilter:"blur(14px)",position:"sticky",top:0,zIndex:100,padding:"0 14px"}}>
        <div style={{maxWidth:1200,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between",height:60,gap:8}}>
          <div style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:15,letterSpacing:2,userSelect:"none",display:"flex",alignItems:"center",gap:7,flexShrink:0}}>
            <img src={ITEM("poke-ball")} alt="" style={{width:22,height:22,imageRendering:"pixelated"}} onError={e=>e.target.style.display="none"}/>
            <span style={{color:"#FCD34D"}}>PKM</span><span style={{color:"#60A5FA"}}>TCG</span>
            {surge&&<span style={{background:surge.color+"22",border:`1px solid ${surge.color}`,borderRadius:20,padding:"2px 8px",fontSize:7,color:surge.color,animation:"pulse 1s ease infinite"}}>⚡{surge.type}</span>}
          </div>
          <nav style={{display:"flex",gap:2,flexWrap:"wrap"}}>
            {navItems.map(([id,icon,label])=>(
              <button key={id} className="nav-btn" onClick={()=>setPage(id)} style={{padding:"6px 10px",border:"none",borderRadius:"8px",cursor:"pointer",transition:"all .2s",background:page===id?(id==="stocks"?"rgba(96,165,250,.1)":"rgba(252,211,77,.08)"):"transparent",color:page===id?(id==="stocks"?"#60A5FA":"#FCD34D"):"#475569",fontFamily:"'Orbitron',monospace",fontSize:8,fontWeight:700,letterSpacing:.8,borderBottom:page===id?`2px solid ${id==="stocks"?"#60A5FA":"#FCD34D"}`:"2px solid transparent"}}>{icon} {label}</button>
            ))}
          </nav>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{color:"#475569",fontFamily:"'Orbitron',monospace",fontSize:9}}>{player.username}</span>
            <div style={{background:"rgba(252,211,77,.07)",border:"1px solid #FCD34D22",borderRadius:20,padding:"6px 12px",fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:12,color:"#FCD34D",flexShrink:0}}>🪙{player.coins.toLocaleString()}</div>
          </div>
        </div>
      </header>

      <main style={{maxWidth:1200,margin:"0 auto",padding:"28px 14px"}}>

        {/* SHOP */}
        {page==="shop"&&(
          <div style={{animation:"fadeIn .35s ease"}}>
            <h1 style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:"clamp(20px,4vw,28px)",marginBottom:4}}>CARD <span style={{color:"#FCD34D"}}>SHOP</span></h1>
            <p style={{color:"#334155",marginBottom:20,fontSize:12}}>Pure random · {CARDS.length} cards in pool · type surges fire randomly for all players</p>
            {surge&&<div style={{background:surge.color+"12",border:`2px solid ${surge.color}55`,borderRadius:12,padding:"12px 18px",marginBottom:18,display:"flex",alignItems:"center",gap:12}}>
              <div style={{fontSize:22}}>⚡</div><div><div style={{color:surge.color,fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:11,letterSpacing:1}}>ACTIVE SURGE: {surge.type.toUpperCase()}</div><div style={{color:"#94A3B8",fontSize:11,marginTop:2}}>{surge.type} cards appear 3× more often in all packs right now!</div></div>
            </div>}
            <div style={{background:"linear-gradient(135deg,#0b2318,#091b26)",border:"1px solid #10B98122",borderRadius:12,padding:"14px 20px",marginBottom:22,display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,flexWrap:"wrap"}}>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <img src={ITEM("lucky-egg")} alt="" style={{width:36,height:36,imageRendering:"pixelated",filter:"drop-shadow(0 0 8px #10B98188)"}} onError={e=>e.target.style.display="none"}/>
                <div><div style={{color:"#10B981",fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:9,letterSpacing:2}}>FREE DAILY REWARD</div><div style={{color:"#334155",fontSize:11,marginTop:2}}>+200 coins</div></div>
              </div>
              <button onClick={async()=>{const nc=player.coins+200;await sb.from("players").update({coins:nc}).eq("id",player.id);setDbPlayer(p=>({...p,coins:nc}));notify("+200🪙","#10B981");}} style={{padding:"9px 20px",background:"linear-gradient(135deg,#065F46,#10B981)",border:"none",borderRadius:8,color:"white",fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:9,cursor:"pointer"}}>CLAIM +200🪙</button>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(250px,1fr))",gap:14,marginBottom:32}}>
              {CRATES.map(crate=>(
                <div key={crate.id} className="crate-card" style={{background:"linear-gradient(160deg,#0F172A,#1A2035)",border:`1px solid ${crate.color}33`,borderRadius:18,padding:"22px 20px",boxShadow:`0 4px 28px ${crate.color}14`}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"center",marginBottom:12}}><img src={ITEM(crate.ball)} alt={crate.name} style={{width:60,height:60,objectFit:"contain",imageRendering:"pixelated",filter:`drop-shadow(0 0 14px ${crate.color}99)`}} onError={e=>e.target.style.display="none"}/></div>
                  <div style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:15,textAlign:"center",color:"#F1F5F9"}}>{crate.name}</div>
                  <div style={{color:"#334155",textAlign:"center",fontSize:10,marginTop:3,marginBottom:10}}>{crate.desc}</div>
                  {crate.surgeType&&<div style={{background:"rgba(255,255,255,.04)",border:`1px solid ${crate.color}44`,borderRadius:6,padding:"4px 10px",marginBottom:10,textAlign:"center"}}><span style={{color:crate.color,fontFamily:"'Orbitron',monospace",fontSize:7,fontWeight:700,letterSpacing:1}}>⚡ {crate.surgeType.toUpperCase()} SURGE BUILT-IN</span></div>}
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:4}}>
                    <span style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:17,color:crate.color}}>{crate.price}🪙</span>
                    <button onClick={()=>buyPack(crate.id)} disabled={player.coins<crate.price} style={{padding:"9px 18px",background:player.coins<crate.price?"#1A2035":crate.grad,border:player.coins<crate.price?"1px solid #1E293B":"none",borderRadius:8,color:player.coins<crate.price?"#334155":"white",fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:9,cursor:player.coins<crate.price?"not-allowed":"pointer",letterSpacing:1}}>
                      {player.coins<crate.price?"NEED MORE":"OPEN PACK"}
                    </button>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {page==="stocks"&&<StockMarket player={player} stockPrices={stockPrices} stockHistory={stockHistory} onSell={sellCard} onBuyGolden={buyGolden} notify={notify}/>}

        {page==="leaderboard"&&<Leaderboard/>}

        {/* COLLECTION */}
        {page==="collection"&&(
          <div style={{animation:"fadeIn .35s ease"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:18,flexWrap:"wrap",gap:10}}>
              <div>
                <h1 style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:"clamp(20px,4vw,28px)"}}>MY <span style={{color:"#FCD34D"}}>COLLECTION</span></h1>
                <p style={{color:"#334155",fontSize:11,marginTop:3}}>{collection.length} cards · Market value: {collection.reduce((s,c)=>s+(stockPrices[cardKey(c)]||c.bp||0),0).toLocaleString()}🪙</p>
              </div>
              <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                {["All",...Object.keys(RARITY_CFG)].map(r=>{const rc=r!=="All"?RARITY_CFG[r]:null;const active=filterRarity===r;return<button key={r} onClick={()=>setFilter(r)} style={{padding:"4px 10px",borderRadius:20,cursor:"pointer",border:`1px solid ${active?(rc?.color||"#64748B"):"#1E293B"}`,background:active?(rc?rc.color+"18":"#334155"):"transparent",color:active?(rc?.color||"#F1F5F9"):"#334155",fontFamily:"'Orbitron',monospace",fontSize:7,fontWeight:700}}>{r} ({r==="All"?collection.length:rStats[r]||0})</button>;})}
              </div>
            </div>
            <div style={{display:"flex",gap:8,marginBottom:14,alignItems:"center",flexWrap:"wrap"}}>
              <select value={sortBy} onChange={e=>setSort(e.target.value)} style={{background:"#1E293B",border:"1px solid #334155",color:"#F1F5F9",borderRadius:7,padding:"6px 10px",fontFamily:"'Exo 2',sans-serif",fontSize:11,cursor:"pointer"}}>
                <option value="recent">Newest First</option>
                <option value="rarity">By Rarity</option>
                <option value="name">By Name</option>
                <option value="value">By Market Value</option>
              </select>
              {getFiltered().filter(c=>!c.isGolden).length>0&&<button onClick={()=>setSellConfirm(true)} style={{padding:"6px 12px",background:"linear-gradient(135deg,#7f1d1d,#DC2626)",border:"none",borderRadius:7,color:"white",fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:8,cursor:"pointer"}}>SELL ALL ({getFiltered().filter(c=>!c.isGolden).length})</button>}
            </div>
            {sellConfirm&&<div style={{background:"#1E293B",border:"1px solid #EF444466",borderRadius:10,padding:"12px 16px",marginBottom:14,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}><span style={{color:"#F1F5F9",fontSize:12}}>Sell <b>{getFiltered().filter(c=>!c.isGolden).length}</b> for <b style={{color:"#FCD34D"}}>{getFiltered().filter(c=>!c.isGolden).reduce((s,c)=>s+(stockPrices[cardKey(c)]||c.bp||0),0)}🪙</b>?</span><div style={{display:"flex",gap:7}}><button onClick={doSellAll} style={{padding:"6px 12px",background:"#DC2626",border:"none",borderRadius:6,color:"white",fontFamily:"'Orbitron',monospace",fontSize:8,fontWeight:700,cursor:"pointer"}}>CONFIRM</button><button onClick={()=>setSellConfirm(false)} style={{padding:"6px 10px",background:"#334155",border:"none",borderRadius:6,color:"#94A3B8",fontSize:10,cursor:"pointer"}}>Cancel</button></div></div>}
            {collection.length===0?<div style={{textAlign:"center",padding:"70px 0"}}><img src={MINI(129)} alt="" style={{width:70,imageRendering:"pixelated",opacity:.2}} onError={e=>e.target.style.display="none"}/><div style={{color:"#1E293B",fontFamily:"'Orbitron',monospace",marginTop:14}}>Empty — open some packs!</div><button onClick={()=>setPage("shop")} style={{marginTop:12,padding:"9px 20px",background:"linear-gradient(135deg,#92400E,#F59E0B)",border:"none",borderRadius:8,color:"#1C1917",fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:10,cursor:"pointer"}}>SHOP →</button></div>
            :<div style={{display:"flex",flexWrap:"wrap",gap:12}}>{getFiltered().map(card=><PokemonCard key={card.uid} card={card} onSell={card.isGolden?null:sellCard} currentPrice={stockPrices[cardKey(card)]||card.bp}/>)}</div>}
          </div>
        )}

        {/* PROFILE */}
        {page==="profile"&&(
          <div style={{animation:"fadeIn .35s ease"}}>
            <h1 style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:"clamp(20px,4vw,28px)",marginBottom:20}}>TRAINER <span style={{color:"#FCD34D"}}>PROFILE</span></h1>
            <div style={{background:"linear-gradient(135deg,#0F172A,#1A2744)",border:"1px solid #1E3A5F",borderRadius:16,padding:22,display:"flex",gap:18,alignItems:"center",marginBottom:16,flexWrap:"wrap"}}>
              <div style={{width:68,height:68,borderRadius:"50%",background:"linear-gradient(135deg,#1E3A5F,#2563EB)",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 0 24px #2563EB44",flexShrink:0}}><img src={ITEM("poke-ball")} alt="" style={{width:38,height:38,imageRendering:"pixelated"}} onError={e=>e.target.style.display="none"}/></div>
              <div style={{flex:1}}>
                <div style={{display:"flex",gap:9,alignItems:"center"}}><span style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:20}}>{player.username}</span>{player.won&&<span style={{color:"#FFD700",fontSize:18}}>🏆</span>}</div>
                <div style={{color:"#334155",fontSize:10,marginTop:3}}>Since {player.join_date}</div>
              </div>
              <div style={{textAlign:"right"}}><div style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:24,color:"#FCD34D"}}>🪙{player.coins.toLocaleString()}</div></div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:10,marginBottom:16}}>
              {[{label:"Packs",value:player.total_packs,img:"poke-ball",color:"#60A5FA"},{label:"Cards Pulled",value:player.total_cards,img:"master-ball",color:"#34D399"},{label:"Cards Sold",value:player.total_sold,img:"nugget",color:"#FCD34D"},{label:"In Collection",value:collection.length,img:"great-ball",color:"#C084FC"}].map(s=>(
                <div key={s.label} style={{background:"#080D1A",border:`1px solid ${s.color}18`,borderRadius:12,padding:16,textAlign:"center"}}><img src={ITEM(s.img)} alt="" style={{width:28,height:28,imageRendering:"pixelated",filter:`drop-shadow(0 0 7px ${s.color}88)`}} onError={e=>e.target.style.display="none"}/><div style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:22,color:s.color,marginTop:5}}>{s.value}</div><div style={{color:"#1E293B",fontSize:8,marginTop:2,letterSpacing:.5}}>{s.label.toUpperCase()}</div></div>
              ))}
            </div>
            <div style={{background:"#080D1A",border:"1px solid #0A0F1E",borderRadius:12,padding:18,marginBottom:16}}>
              <div style={{fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:8,color:"#1E293B",letterSpacing:3,marginBottom:12}}>COLLECTION BREAKDOWN</div>
              {Object.entries(RARITY_CFG).map(([rarity,cfg])=>{const count=rStats[rarity]||0;const pct=collection.length>0?(count/collection.length)*100:0;return(<div key={rarity} style={{marginBottom:9}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span style={{color:cfg.color,fontFamily:"'Orbitron',monospace",fontSize:8,fontWeight:700}}>{rarity.toUpperCase()}</span><span style={{color:"#1E293B",fontSize:8}}>{count}</span></div><div style={{background:"#0F172A",borderRadius:3,height:4,overflow:"hidden"}}><div style={{background:`linear-gradient(90deg,${cfg.color}77,${cfg.color})`,borderRadius:3,height:4,width:pct+"%",transition:"width .8s ease"}}/></div></div>);})}
            </div>
            {collection.filter(c=>["Secret","Ultra Rare","Legendary","GOLDEN"].includes(c.rarity)).length>0&&(
              <div style={{background:"#080D1A",border:"1px solid #FCD34D12",borderRadius:12,padding:18,marginBottom:16}}>
                <div style={{fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:8,color:"#1E293B",letterSpacing:3,marginBottom:12}}>🏆 PRIZE SHELF</div>
                <div style={{display:"flex",gap:12,overflowX:"auto",paddingBottom:6}}>{collection.filter(c=>["Secret","Ultra Rare","Legendary","GOLDEN"].includes(c.rarity)).map(card=><PokemonCard key={card.uid} card={card} currentPrice={stockPrices[cardKey(card)]||card.bp}/>)}</div>
              </div>
            )}
            <div style={{background:"#080D1A",border:"1px solid #DC262612",borderRadius:12,padding:16}}>
              <div style={{fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:8,color:"#2d0000",letterSpacing:2,marginBottom:10}}>DANGER ZONE</div>
              <button onClick={async()=>{if(window.confirm("Delete account and all data?")){await sb.from("collection").delete().eq("player_id",player.id);await sb.from("transactions").delete().eq("player_id",player.id);await sb.from("players").delete().eq("id",player.id);setDbPlayer(null);setCollection([]);}}} style={{padding:"7px 18px",background:"none",border:"1px solid #DC262644",borderRadius:7,color:"#DC2626",fontFamily:"'Orbitron',monospace",fontSize:8,cursor:"pointer",fontWeight:700}}>DELETE ACCOUNT</button>
            </div>
          </div>
        )}
      </main>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
